<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>HG7 Protocol - Consolidated Reference</title>
<style>
:root{
  --bg:#f7f7f6; --surface:#ffffff; --surface-2:#fbfbfa;
  --ink:#1a1c1e; --ink-2:#3b4045; --muted:#71767c; --faint:#9ba1a7;
  --line:#ececeb; --line-2:#e4e4e2;
  --accent:#3b5bdb; --accent-weak:#eef1fd; --accent-ink:#2f49b8;
  --pos:#0f7b6c; --pos-bg:#eaf5f2; --neg:#b23b32; --neg-bg:#fbeeec;
  --mix:#996a1f; --mix-bg:#f8f0e2; --neu:#71767c; --neu-bg:#f0f0ef;
  --amber:#9a6b18; --amber-bg:#fbf3e4;
  --radius:14px; --r-sm:9px; --shadow:0 1px 2px rgba(16,18,20,.04);
  --w:900px;
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{margin:0;background:var(--bg);color:var(--ink);
  font:14px/1.62 -apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Roboto,Helvetica,Arial,sans-serif;
  -webkit-font-smoothing:antialiased;letter-spacing:-.006em}
a{color:var(--accent);text-decoration:none}
a:hover{text-decoration:underline}
mark{background:#fff2b0;color:inherit;border-radius:2px;padding:0 .05em}
h1,h2,h3,h4{letter-spacing:-.018em}
.mono{font-variant-numeric:tabular-nums}

/* ---------- sidebar ---------- */
.side{position:fixed;top:0;left:0;bottom:0;width:238px;background:var(--surface);border-right:1px solid var(--line);padding:16px 12px;overflow:auto;z-index:30}
.brand{display:flex;gap:9px;align-items:center;padding:6px 8px 8px}
.brand .logo{width:27px;height:27px;border-radius:7px;background:var(--accent);color:#fff;display:grid;place-items:center;font-weight:700;font-size:11px;letter-spacing:-.02em;flex:none}
.brand b{font-size:13.5px;display:block;line-height:1.2}
.brand span{font-size:11px;color:var(--faint)}
.nav{margin-top:6px}
.nav a{display:flex;justify-content:space-between;align-items:center;gap:8px;padding:7px 9px;border-radius:7px;color:var(--ink-2);font-size:13px;font-weight:450;cursor:pointer}
.nav a:hover{background:var(--bg);text-decoration:none}
.nav a.active{background:var(--accent-weak);color:var(--accent-ink);font-weight:550}
.nav a .c{font-size:11px;color:var(--faint);font-variant-numeric:tabular-nums}
.nav a.active .c{color:var(--accent)}
.grouplabel{font-size:10px;text-transform:uppercase;letter-spacing:.07em;color:var(--faint);padding:15px 9px 5px;font-weight:600}

/* ---------- top bar / search ---------- */
.main{margin-left:238px}
.bar{position:sticky;top:0;z-index:20;background:rgba(247,247,246,.82);backdrop-filter:saturate(1.6) blur(9px);border-bottom:1px solid var(--line);padding:11px 32px}
.searchwrap{max-width:var(--w);margin:0 auto;position:relative}
.searchwrap input{width:100%;height:40px;padding:0 42px;border:1px solid var(--line-2);border-radius:10px;background:var(--surface);font-size:14px;color:var(--ink)}
.searchwrap input::placeholder{color:var(--faint)}
.searchwrap input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-weak)}
.searchwrap .ic{position:absolute;left:14px;top:12px;color:var(--faint);pointer-events:none}
.searchwrap .kbd{position:absolute;right:11px;top:9px;font-size:11px;color:var(--faint);border:1px solid var(--line-2);border-radius:5px;padding:2px 6px;background:var(--surface-2)}
.searchwrap .clr{position:absolute;right:10px;top:8px;border:0;background:none;color:var(--muted);font-size:18px;cursor:pointer;display:none;width:24px;height:24px;border-radius:6px}
.searchwrap .clr:hover{background:var(--bg)}
.scopes{max-width:var(--w);margin:9px auto 0;display:none;gap:6px;flex-wrap:wrap;align-items:center}
.scopes.show{display:flex}
.scope{font-size:12px;padding:4px 11px;border:1px solid var(--line-2);border-radius:999px;background:var(--surface);color:var(--muted);cursor:pointer;user-select:none}
.scope:hover{border-color:var(--faint)}
.scope.on{background:var(--ink);color:#fff;border-color:var(--ink)}
.scope .c{opacity:.55;margin-left:5px;font-variant-numeric:tabular-nums}

.wrap{max-width:var(--w);margin:0 auto;padding:26px 32px 90px}

/* ---------- hero ---------- */
.hero{margin-bottom:16px}
.eyebrow{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--faint);font-weight:600}
.hero h1{font-size:30px;font-weight:680;margin:8px 0 8px;letter-spacing:-.03em}
.hero .lede{color:var(--muted);font-size:14.5px;max-width:68ch;margin:0 0 16px}
.stats{display:flex;gap:22px;flex-wrap:wrap;padding:14px 0;border-top:1px solid var(--line);border-bottom:1px solid var(--line)}
.stat b{font-size:19px;font-weight:640;letter-spacing:-.02em}
.stat span{font-size:11.5px;color:var(--faint);margin-left:6px}
.disc{margin:16px 0 0;background:var(--amber-bg);border:1px solid #f0e3c8;border-radius:10px;padding:11px 14px;font-size:12.5px;color:#6f5320;display:flex;gap:9px}
.disc b{color:#5a4212}
.disc .dot{color:var(--amber);flex:none;font-size:14px;line-height:1.3}

/* ---------- sections ---------- */
.section{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:22px 24px;margin-bottom:14px;box-shadow:var(--shadow);scroll-margin-top:78px}
.section>h2{font-size:16px;font-weight:640;margin:0;display:flex;align-items:center;gap:9px}
.section>h2 .idx{font-size:11px;color:var(--faint);font-weight:600;font-variant-numeric:tabular-nums}
.section>.desc{color:var(--muted);font-size:13px;margin:5px 0 16px}
h3{font-size:13px;font-weight:620;margin:20px 0 9px;color:var(--ink);text-transform:uppercase;letter-spacing:.03em}
h3:first-child{margin-top:2px}
.hint{color:var(--muted);font-size:12.5px}

/* ---------- quick reference (condensed protocol) ---------- */
.qref{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);margin-bottom:14px;overflow:hidden;box-shadow:var(--shadow);scroll-margin-top:78px}
.qhead{padding:16px 22px;background:linear-gradient(0deg,var(--surface),var(--surface-2));border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:baseline;gap:12px;flex-wrap:wrap}
.qhead h2{font-size:16px;font-weight:640;margin:0}
.qhead .tag{font-size:11px;color:var(--muted);background:var(--bg);border:1px solid var(--line-2);border-radius:999px;padding:3px 10px}
.qtable{width:100%;border-collapse:collapse}
.qtable td{padding:12px 22px;border-bottom:1px solid var(--line);vertical-align:top;font-size:13.5px}
.qtable tr:last-child td{border-bottom:0}
.qtable tr:hover td{background:var(--surface-2)}
.qtable .nm{font-weight:600;white-space:nowrap}
.qtable .role{color:var(--muted);font-size:12px;margin-top:2px;max-width:34ch}
.qtable .dose{font-weight:640;font-variant-numeric:tabular-nums;white-space:nowrap}
.qtable .form{color:var(--muted);font-size:12.5px}
.qtable tr.opt td{background:var(--surface-2)}
.qtable tr.opt .nm{font-weight:500;color:var(--muted)}
.badge-opt{font-size:10px;color:var(--muted);border:1px solid var(--line-2);border-radius:5px;padding:1px 5px;margin-left:6px;text-transform:uppercase;letter-spacing:.03em}
.qfoot{padding:15px 22px;border-top:1px solid var(--line);display:grid;gap:13px}
.qrow{display:flex;gap:10px;font-size:13px;align-items:baseline}
.qrow .k{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--faint);font-weight:600;flex:none;width:74px;padding-top:1px}
.orderflow{display:flex;flex-wrap:wrap;gap:6px;align-items:center}
.step{background:var(--bg);border:1px solid var(--line-2);border-radius:7px;padding:3px 9px;font-size:12.5px;font-weight:500}
.step .n{color:var(--accent);font-weight:700;margin-right:5px;font-size:11px}
.arrow{color:var(--faint)}
.qrow ul{margin:0;padding-left:17px}.qrow li{margin:3px 0}
.qrow li::marker{color:var(--accent)}
details.more{margin-top:14px;border-top:1px solid var(--line);padding-top:6px}
details.more>summary{cursor:pointer;font-size:12.5px;color:var(--accent);font-weight:550;list-style:none;padding:7px 0}
details.more>summary::-webkit-details-marker{display:none}
details.more>summary::before{content:"+ ";font-weight:700}
details.more[open]>summary::before{content:"- "}

/* ---------- detailed table ---------- */
table.dose{width:100%;border-collapse:collapse;font-size:13px;margin-top:6px}
table.dose th,table.dose td{text-align:left;padding:10px 12px;border-bottom:1px solid var(--line);vertical-align:top}
table.dose th{font-size:10.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--faint);font-weight:600;background:var(--surface-2)}
table.dose td:first-child{width:24px;color:var(--faint);font-weight:600}
table.dose .nn{font-weight:600}
table.dose .ff{color:var(--muted);font-size:12px;margin-top:2px}
table.dose .dd{font-weight:600;font-variant-numeric:tabular-nums}
table.dose .note{color:var(--ink-2);font-size:12.5px}
table.dose .vs{color:var(--muted);font-size:12px;margin-top:5px}
.tag-chg{font-size:9.5px;text-transform:uppercase;letter-spacing:.04em;color:var(--amber);background:var(--amber-bg);border-radius:5px;padding:1px 5px;margin-left:6px}
ul.clean{margin:.3em 0;padding-left:18px}ul.clean li{margin:.3em 0}
ul.clean li::marker{color:var(--accent)}

/* ---------- generic cards / pills ---------- */
.grid{display:grid;gap:10px}
@media(min-width:680px){.grid.two{grid-template-columns:1fr 1fr}}
.card{background:var(--surface-2);border:1px solid var(--line);border-radius:10px;padding:13px 15px}
.card h4{margin:0 0 5px;font-size:13.5px;font-weight:600}
.pill{display:inline-block;font-size:10px;font-weight:650;padding:2px 8px;border-radius:999px;text-transform:uppercase;letter-spacing:.03em}
.pill.pos{background:var(--pos-bg);color:var(--pos)}.pill.neg{background:var(--neg-bg);color:var(--neg)}
.pill.mixed{background:var(--mix-bg);color:var(--mix)}.pill.neutral{background:var(--neu-bg);color:var(--neu)}
.pill.auth{background:var(--accent-weak);color:var(--accent-ink)}
.tagline{display:inline-block;font-size:11px;color:var(--muted);border:1px solid var(--line-2);border-radius:999px;padding:1px 8px}
.src{font-size:11.5px;color:var(--faint);white-space:nowrap}
.src a{color:var(--faint)}
.srcs a{font-size:11px;color:var(--faint);margin-right:3px}

/* results */
.statbar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.statbar .s{border:1px solid var(--line);border-radius:9px;padding:8px 14px;background:var(--surface-2);min-width:78px}
.statbar .s b{display:block;font-size:17px;font-weight:640}
.statbar .s span{font-size:11px;color:var(--faint)}
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
.chip{border:1px solid var(--line-2);background:var(--surface);color:var(--muted);border-radius:999px;padding:4px 11px;font-size:12px;cursor:pointer}
.chip.on{background:var(--accent);border-color:var(--accent);color:#fff}
.exp{border-left:2px solid var(--line-2);padding:9px 0 9px 13px;margin-bottom:2px}
.exp.pos{border-color:var(--pos)}.exp.neg{border-color:var(--neg)}.exp.mixed{border-color:var(--mix)}.exp.neutral{border-color:var(--line-2)}
.exp .top{display:flex;gap:7px;align-items:center;flex-wrap:wrap;margin-bottom:2px}
.exp .who{font-weight:600;font-size:13px}
.exp .eff{margin-top:5px;display:flex;flex-wrap:wrap;gap:4px}
.exp .eff span{font-size:11px;background:var(--surface-2);border:1px solid var(--line);border-radius:5px;padding:1px 6px;color:var(--muted)}
.more-btn{margin-top:12px;font-size:12.5px;color:var(--accent);cursor:pointer;font-weight:550}
.story{background:var(--surface-2);border:1px solid var(--line);border-left:2px solid var(--pos);border-radius:10px;padding:13px 15px}
.story .top{display:flex;gap:7px;align-items:center;flex-wrap:wrap;margin-bottom:5px}
.story .who{font-weight:600;font-size:13.5px}
.story .sum{font-size:13px;color:var(--ink-2)}
.story .eff{margin-top:7px;display:flex;flex-wrap:wrap;gap:4px}
.story .eff span{font-size:11px;background:var(--pos-bg);border:1px solid #cfe6e0;border-radius:5px;padding:1px 6px;color:var(--pos)}
.ytm{color:#ff2b2b;font-size:13px}
.vid{border:1px solid var(--line);border-radius:12px;padding:15px 17px;margin-bottom:11px;background:var(--surface-2)}
.vid .vh{display:flex;gap:11px;align-items:flex-start}
.vid .play{flex:none;width:30px;height:21px;border-radius:5px;background:#ff2b2b;color:#fff;display:grid;place-items:center;font-size:9px;margin-top:2px}
.vid .vt{font-weight:620;font-size:14px;line-height:1.35}
.vid .vt a{color:var(--ink)}
.vid .meta{font-size:11.5px;color:var(--faint);margin-top:3px}
.vid .vsum{font-size:12.8px;color:var(--ink-2);margin:10px 0 2px}
.vlabel{font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:var(--faint);font-weight:650;margin:13px 0 6px}
.moments{display:grid;gap:5px}
.moment{display:flex;gap:10px;font-size:12.6px;align-items:baseline}
.moment .ts{flex:none;font-variant-numeric:tabular-nums;font-weight:600;font-size:11.5px;min-width:44px}
.vid details.qa{margin-top:13px;background:var(--surface)}
.vid details.qa .a .qq{margin-bottom:9px}
.vid details.qa .a .qq b{color:var(--ink)}

/* timeline */
.tl{position:relative;padding-left:20px;margin:0}
.tl::before{content:"";position:absolute;left:5px;top:5px;bottom:5px;width:1.5px;background:var(--line-2)}
.tl .ev{position:relative;padding:0 0 15px 6px}
.tl .ev::before{content:"";position:absolute;left:-19px;top:6px;width:8px;height:8px;border-radius:50%;background:var(--accent);border:2px solid var(--surface)}
.tl .dt{font-size:11px;color:var(--accent-ink);font-weight:650;font-variant-numeric:tabular-nums}
.tl .ev h4{margin:2px 0 2px;font-size:13.5px;font-weight:600}
.tl .ev p{margin:0;color:var(--muted);font-size:12.5px}

/* faq */
details.qa{border:1px solid var(--line);border-radius:10px;margin-bottom:7px;background:var(--surface-2);overflow:hidden}
details.qa summary{cursor:pointer;padding:11px 14px;font-weight:550;font-size:13.5px;list-style:none;display:flex;justify-content:space-between;gap:10px;align-items:center}
details.qa summary::-webkit-details-marker{display:none}
details.qa summary::after{content:"+";color:var(--faint);font-size:16px}
details.qa[open] summary::after{content:"\2013"}
details.qa .a{padding:0 14px 13px;color:var(--ink-2);font-size:13px}

/* search results view */
#searchpane{display:none}
#searchpane.show{display:block}
.rescount{color:var(--muted);font-size:13px;margin:2px 0 16px}
.resgroup{margin-bottom:22px}
.resgroup .gh{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--faint);font-weight:650;margin:0 0 9px;display:flex;gap:8px;align-items:center}
.resgroup .gh .gc{color:var(--faint)}
.hit{display:block;padding:11px 14px;border:1px solid var(--line);border-radius:10px;background:var(--surface);margin-bottom:7px}
.hit .hl{font-weight:600;font-size:13.5px;margin-bottom:2px;display:flex;gap:8px;align-items:baseline;justify-content:space-between}
.hit .snip{color:var(--muted);font-size:12.5px}
.hit .snip .pill{margin-right:6px;transform:translateY(-1px)}
.empty{color:var(--muted);text-align:center;padding:50px 0;font-size:13.5px}

footer{max-width:var(--w);margin:0 auto;padding:22px 32px 60px;color:var(--faint);font-size:12px;text-align:center}
.hidden{display:none!important}
@media(max-width:840px){.side{transform:translateX(-100%);transition:.2s}.main{margin-left:0}.bar,.wrap,footer{padding-left:18px;padding-right:18px}}
</style>
</head>
<body>
<aside class="side">
  <div class="brand"><div class="logo">HG7</div><div><b>HG7 Protocol</b><span>Consolidated reference</span></div></div>
  <nav class="nav" id="nav"></nav>
</aside>
<div class="main">
  <div class="bar">
    <div class="searchwrap">
      <span class="ic">&#9906;</span>
      <input id="q" type="search" placeholder="Search doses, symptoms, side effects, experiences, FAQ..." autocomplete="off" spellcheck="false">
      <span class="kbd" id="kbd">/</span>
      <button class="clr" id="clr" title="Clear">&times;</button>
    </div>
    <div class="scopes" id="scopes"></div>
  </div>
  <div class="wrap">
    <div id="content"></div>
    <div id="searchpane"></div>
  </div>
  <footer id="foot"></footer>
</div>

<script id="data" type="application/json">{"canonical": {"summary": "HG7 is a self-experimental supplement protocol by T_R_Heisenberg in which 7 nutrients are taken together in one tightly-ratioed dose - Elemental Zinc, Vitamin B6, Vitamin B5, Vitamin B7 (biotin), Vitamin C, EGCG, and Molybdenum - on the theory that modern humans have become copper- and iron-toxic at the expense of zinc. The B vitamins and Vitamin C surface stored iron and copper out of the tissues and move them to the liver; EGCG chelates the iron so it is excreted rather than recycled; molybdenum produces uric acid to flush the freed copper through the kidneys; and zinc then refills the emptied receptor sites. Because no single fixed dose fits everyone, HG7 is really a calibration system: symptom tables, deficiency maps, and a taste/gag test tell you which one nutrient to raise or (more often) halve on the next dose. Doses and ratios were tuned continuously for over a year, most dramatically by collapsing Vitamin C back down, which the author concluded was his original and most damaging mistake.", "nutrients": [{"name": "Elemental Zinc", "role_short": "Refills the zinc receptors emptied of iron/copper and repels copper from the liver and tissues (the 'zinc pickaxe')", "dose_current": "~100-110mg elemental (men); women about half (~50mg). Highly variable per person.", "form": "Zinc Gluconate ONLY. NOT picolinate (reported bad long-term effects) and not carnosine. Use elemental zinc; a capsule labeled 50mg is 50mg elemental - the elemental-conversion math only matters for loose powder.", "notes": "Kept just under B6 (B6 slightly higher than zinc; a true 1:1 B6:zinc is slightly too much zinc, so roughly 1:1 to 1.5:1 B6:zinc). Zinc need is the single most person-variable nutrient. Those with a P5P history may need less or zero zinc to start (to clear an iron backlog) and then crave it back. If HG7 consistently makes you heavily nauseous, drop zinc for a few doses - but no-zinc is only a brief correction, you will need it again. Excess zinc pushes too much iron out and causes high-iron symptoms. Raising zinc requires also raising Vitamin C.", "changed_from_seed": "First post: 110-120mg (with a note that P5P-history users may need less/none). Rose to roughly 250mg by late 2025, then reversed all the way down to ~100mg in 2026 once higher B6 was found to greatly improve zinc uptake. Picolinate was later explicitly banned and a women's half-dose was added - neither was in the first post.", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1011047", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1020722", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1020614", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1021702", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1020500", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1016519"], "dose_short": "~100-110mg men · ~50mg women", "form_short": "Zinc gluconate, not picolinate", "optional": false}, {"name": "Vitamin B6", "role_short": "Surfaces stored iron and copper out of the tissues into the blood; its amount dictates the balance of the whole formula", "dose_current": "~150mg standard (working range roughly 100-150mg; 145mg was set as a soft max but B6 keeps proving slightly underdone, so it runs near the top). TRH personally runs ~200-300mg on larger/double doses.", "form": "Pyridoxine HCl ONLY. NEVER P5P or any active form - P5P forces the process every dose without ever storing, draining the other nutrients negative and keeping you B6-starved.", "notes": "B6 must always be equal to or higher than zinc, and it is the tightest, most precise variable in the stack (the whole ratio is built on it), so almost any calibration depletes it - this is why 'Low B6' was added as nausea calibration #5. Never take B6 without biotin (B6 drains biotin within minutes) and never take a dose with zero B6 - even when correcting a B6 overload, use HALF B6, not none. EGCG and molybdenum burn through B6 fast, giving a ceiling of about 2g EGCG per 100mg B6.", "changed_from_seed": "First post: 125-150mg. Raised repeatedly through late 2025 (to 200-300mg, briefly 350mg), then brought back down to ~150mg in 2026 after TRH concluded the earlier 2:1-3:1 B6:zinc ratio was too high and that ~1:1 'was right the first time.'", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1011047", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1017611", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1020471", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1021134", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1022378", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1021119"], "dose_short": "~150mg", "form_short": "Pyridoxine HCl, never P5P", "optional": false}, {"name": "Vitamin B5", "role_short": "Coenzymator for B6; sustains adrenal function and kidney health during copper excretion (the 'power generator')", "dose_current": "~450-750mg; about one 500mg pill per standard dose (two if replenishing).", "form": "Pantothenic Acid (calcium pantothenate powder is also acceptable). Pills preferred over drops.", "notes": "Kept in a B6:B5 ratio of roughly 1:4.25. Relatively safe to overdo but never underdo. Along with biotin, B5 is one of the two nutrients safe to take on its own (both have easy body caps and simply excrete when not needed) - the exception being if you are already low B6 in the blood, in which case it aggravates that.", "changed_from_seed": "First post: 450-500mg. Rose to 850-1000mg alongside the biotin/B6 increases in late 2025, then eased back to about one 500mg pill per dose in 2026 as the overall stack came down.", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1011047", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1014511", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1020465", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1021595"], "dose_short": "~500mg", "form_short": "Pantothenic acid", "optional": false}, {"name": "Vitamin B7 (Biotin)", "role_short": "Coenzymator that repairs the internal wear-and-tear B6 causes and mobilizes/buffers the tissue calcium freed during copper removal", "dose_current": "'Take it until it stops working' - open-ended and highly variable. Now roughly 200-500mg per dose for most (TRH ~200-350mg), down from a 2g peak. Needs start large (especially after any chelator history) then drop dramatically.", "form": "Pure Biotin Powder ONLY - NOT 1% diluted powder, NOT pills, NOT active d-biotin (like P5P, active d-biotin forces the process regardless of need). Dissolve under the tongue (sublingual).", "notes": "Titrate by the sublingual dissolve test: if it dissolves fast under the tongue, take more; if it clumps and will not dissolve, take less. Always raise biotin whenever you raise B6, since B6 drains it within minutes. It cannot be skimped - too little eventually causes migraines, muscle twitches, nightmares, anxiety, and rock-hard stool. Its earlier very-high requirement was partly inflated by running Vitamin C too high; lowering C reduced the biotin need.", "changed_from_seed": "First post: 200-500mg. Raised to 750mg (Jun 2025), then 1400mg, then 2000mg (Aug 2025), then - for the first time ever - dropped in 2026 and redefined as open-ended 'take until it stops working' (~200-500mg) once C was lowered.", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1011047", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1011976", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1014511", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1020407", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1021197"], "dose_short": "~200-500mg, titrate", "form_short": "Pure biotin powder, under tongue", "optional": false}, {"name": "Vitamin C", "role_short": "Mobilizes free copper and 'pushes the cart' - moves the surfaced metals through the blood to the detox sites; the single most fickle, decisive variable", "dose_current": "~1.5-1.8g (latest explicit ~1.8g high end, dropped from a brief 2g; low end ~1.25-1.5g). The LOW end is what is actually needed; ~1.5g is about the practical max before everything else has to rise. People who chelated copper (rutin/NAC history) need even less.", "form": "Ascorbic Acid ONLY, NO RUTIN whatsoever, and not buffered. Capsules preferred over tablets; powder is not advised (it works too fast in the stomach and can cause nausea).", "notes": "The trickiest nutrient - the tiniest deviation makes the whole experience good or bad. Too much C surges iron and copper out faster than EGCG can chelate, creating an iron backlog and spiking demand for EGCG, zinc, and molybdenum; too little stalls the detox entirely. If C makes you gag, take less or skip it that dose (something else needs replenishing first, usually zinc/molybdenum/EGCG); if it is merely tart or sour, that is fine. Split or dilute it with water to reduce heartburn. Vitamin C is nausea calibration #4.", "changed_from_seed": "The biggest change of all. First post: 1.4-1.7g. TRH wrongly pushed it up (to ~5-6g, even near 10g), which he later called his 'grave mistake' that created an iron backlog for many. Across 2026 he collapsed C back down to ~1.25-1.8g and named excess C the true root cause of the endless recalibration loop.", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1011047", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1013949", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1019119", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1019818", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1022284", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1019672"], "dose_short": "~1.5g (keep LOW)", "form_short": "Ascorbic acid, no rutin", "optional": false}, {"name": "EGCG", "role_short": "Chelates iron at the liver and marks it 'unrecyclable' so it excretes via bile/feces instead of returning to storage", "dose_current": "~2300-2500mg standard, kept a sliver on the low end for safety. Hard ceiling is about 2g EGCG per 100mg B6 (~20:1); exceeding it drains B6 into the negative.", "form": "Standardized green tea extract - do NOT buy the NOW brand (too weak); Horbaach and Life Extension work. EGCG is only ~45-50% of green tea extract, so multiply the total extract by ~0.45 to get the actual EGCG - never treat green tea extract as if it were EGCG itself.", "notes": "The main metal-clearing driver: the more you can successfully take, the faster iron clears and the more room is made for zinc. But excess EGCG is the most damaging deviation because it keeps working when it should not - causing temporary anemia, lower-back pain, and kidney-stone risk - so keep it slightly on the low end and scale molybdenum and zinc up with it. To clear an excess-EGCG (lower-back-pain) state, run the standard with half the EGCG for about 2 doses; never take zero EGCG. One 50mg zinc pill typically needs at least 4-5 EGCG capsules alongside it.", "changed_from_seed": "First post: 2300-2700mg (start low, work up). Pushed up in late 2025 (EGCG:zinc raised from 10:1 to 12:1, personal doses to ~3400-3600mg), then brought back to ~2300-2500mg in 2026 and re-anchored to a B6 ceiling (~20:1) rather than only a zinc ratio.", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1011047", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1014542", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1014624", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1019843", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1020652"], "dose_short": "~2,300-2,500mg", "form_short": "Green tea extract ~45-50% EGCG, not NOW brand", "optional": false}, {"name": "Molybdenum", "role_short": "Produces the uric acid needed to bind free copper and flush it out through the kidneys (the 'uric-acid floodgates')", "dose_current": "~4-4.5mg standard (latest explicit ~4.25-4.5mg for ~150mg B6). Volatile and person-variable; low-copper or low-estrogen people need less.", "form": "Molybdenum Amino Acid Chelate ONLY (e.g. Piping Rock). NOT glycinate, NOT sodium molybdate, NOT citrate. The amino acid chelate is deliberately chosen because it is weak enough to stop working when a different nutrient is actually needed; glycinate (like P5P) keeps working regardless and over-chelates copper, causing nerve/leg/sciatica pain and a low-copper/high-iron state.", "notes": "Depletes fast and barely stores, so do not assume that because you did not need it before you do not need it now. Form/brand strongly changes potency, so the mg values assume the amino acid chelate - read the calibration guide and find your sweet spot. Most newcomers under-do molybdenum (suspected because B6 was raised). A tiny extra is better than underdoing. If taking molybdenum makes calibration-#1 symptoms worse, you likely need more B6 first. (TRH was personally trialing a 50/50 glycinate + amino-acid-chelate blend in mid-2026, but the durable rule remains amino acid chelate.)", "changed_from_seed": "First post: 3.5-4.25mg (amino acid chelate, Piping Rock, with glycinate discouraged). Rose to 5-7.5mg through late 2025, then back down to ~4-4.5mg in 2026. The anti-glycinate stance hardened over time from a recommendation into an absolute, form-critical requirement.", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1011047", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1014600", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1020722", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1021756", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1021310", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1021944"], "dose_short": "~4-4.5mg", "form_short": "Amino-acid chelate, never glycinate", "optional": false}, {"name": "Copper (OPTIONAL later add-on, not one of the core 7)", "role_short": "OPTIONAL, TEMPORARY bandaid for specific low-copper individuals only - raises tolerance for molybdenum so very-high iron can excrete", "dose_current": "Not fixed to a number; used only temporarily by a minority profile until their iron drops. TRH announced (May 2026) he would add it to page 1 as an optional bandaid.", "form": "Copper (TRH deliberately did not formalize a required form, because he treats copper as a temporary add-on rather than a core HG7 nutrient).", "notes": "For a narrow profile only: pale, low estrogen, high testosterone/DHT, ectomorph, RH-negative (higher blood copper). Copper raises tolerance for molybdenum so that extremely high iron can excrete, and the need should fall off once iron is reduced. This is the single exception to TRH's otherwise absolute 'never add nutrients' rule. He explicitly declines to call it 'HG8' because copper is meant to be temporary. NOT for the general user.", "changed_from_seed": "Not in the first post at all. Added later (2026-05-16) as an optional, temporary bandaid intended to make the protocol 'universal' for low-copper people who otherwise cannot tolerate molybdenum.", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1021265"], "dose_short": "optional, temporary", "form_short": "specific low-copper profiles only", "optional": true}], "order_of_operations": [{"step": 1, "nutrient": "Vitamin C", "note": "Take first. C (like EGCG) is slow to act, so start it so it is working by the time the fast nutrients land. Never take C at the exact same instant as EGCG. This C-first order (June 2026) reversed the first post's EGCG-first order."}, {"step": 2, "nutrient": "Vitamin B6", "note": "B vitamins next, after C."}, {"step": 3, "nutrient": "Vitamin B5", "note": "Taken with B6."}, {"step": 4, "nutrient": "Vitamin B7 (Biotin)", "note": "Pure biotin powder placed under the tongue (sublingual) and left to dissolve while the rest are taken. Never take the B6 without biotin present."}, {"step": 5, "nutrient": "EGCG", "note": "After the B vitamins. Slow-acting like C. If EGCG or C triggers the gag reflex, take it last among the swallowed items."}, {"step": 6, "nutrient": "Molybdenum", "note": "Fast-acting, so near the end."}, {"step": 7, "nutrient": "Elemental Zinc", "note": "Last, taken together with the EGCG/molybdenum inside the same ~1-minute window (EGCG makes room for zinc rather than countering it). Keep no more than ~10 seconds between each nutrient."}], "taste_test": "The taste/gag test is the primary calibration tool. Place each nutrient (its capsule, or a little of the powder) on the tongue and swirl it around for about 10 seconds, sensing whether it produces a repulsed/gagging reaction or an inviting one. A nutrient that tastes sweet, inviting, and easy to swallow means your body wants it: take it first and toward the high end of its range. A nutrient that tastes bitter or repulsive, or triggers the gag reflex, means you already have enough (or too much): take it LAST and cut it to half (or a quarter) for that dose. In almost every case, halving whichever single nutrient gags you - for just one dose, then returning to the standard - is the entire calibration, because it is far easier to subtract than to add. EGCG is the exception: it always tastes awful, so judge it by whether its capsule swallows easily (still gagging on it means you still need it). When in doubt, taste test.", "core_rules": ["Only these 7 nutrients. Never add anything else - the answer to adding nutrients (magnesium, selenium, calcium, electrolytes, etc.) is always NO; they are bandaids that mask a real need (usually for EGCG), and magnesium/calcium can be actively harmful. The single narrow exception is optional, temporary copper for a specific low-copper profile.", "Exact forms are mandatory and non-negotiable: Zinc Gluconate (not picolinate or carnosine); B6 as Pyridoxine HCl (NEVER P5P or any active form); B5 as Pantothenic Acid; B7 as pure biotin powder (not 1% diluted, not pills, not active d-biotin); Vitamin C as ascorbic acid (no rutin, not buffered); EGCG not the NOW brand (and calculate real EGCG as ~45-50% of green tea extract); Molybdenum as amino acid chelate only (never glycinate, molybdate, or citrate). Using a wrong form means you are no longer doing HG7.", "Take all 7 together within about a 1-minute window (no more than ~10 seconds between each), in the order of operations. Never spread the nutrients out through the day - taken singly they barely work and drive each other negative. Zinc and EGCG in particular must go together.", "Never take Vitamin C and EGCG at the exact same moment - it is the ultimate nausea causer. Take EGCG last.", "Never take B6 without biotin, and always raise biotin whenever you raise B6 (B6 drains biotin within minutes).", "Never take a dose with zero B6 - even when correcting a B6 overload, use HALF B6, not none. Likewise, no-zinc is only a brief correction for an iron backlog, never a sustained mode.", "Ratios matter more than absolute amounts: you may lower or halve the whole dose as long as you keep the ratios, but do NOT go below half the standard (small doses are actually harder to calibrate because they reveal hidden deficiencies). Precision is everything - even 10mg of zinc changes how much EGCG you need.", "No outside chelators or standardized antioxidants (no NAC, rutin, EDTA, or herb extracts standardized to an active) - they pre-chelate copper before iron is cleared and make Vitamin C work far too harshly. Ordinary edible cooking herbs (ginger, cumin, cayenne) are fine.", "Calibrate by SUBTRACTING (taste test, then halve the gag-inducing nutrient), not by adding. Done correctly the protocol should feel calming and soothing, not painful; calibration exists to relieve symptoms, not to be endured.", "Deviations (using P5P, molybdenum glycinate, skipping EGCG, adding outside nutrients) are 'not HG7' but your own thing, and their results are 'dirty data' that should be kept out of HG7 feedback. Accountability for trying the protocol is entirely your own; none of it is institution-backed - it is theory."], "how_to_take": ["Take on an empty stomach. Any time of day works (TRH doses at night), but not right before anything important, since detox symptoms can surface.", "Take all 7 within a ~1-minute window in this order: Vitamin C, then B6, then B5, then biotin (pure powder under the tongue to dissolve), then EGCG, then molybdenum, then zinc - with no more than ~10 seconds between each.", "If you cannot swallow it all at once, split it in half: take half, wait about 5 minutes, then take the other half at the exact same ratios. Each half must contain all 7 in ratio - never split it by taking some nutrients now and others later.", "Frequency: once or twice a day gives faster progress (space multiple doses about 3 hours apart); once the benefits are banked, most people drop to roughly 3x a week (typically weekends) for maintenance.", "Women are advised to run about half the protocol overall and the lower end of zinc (their stomachs take in less at once and they appear to need less zinc).", "Avoid dairy/milk around dosing because it inhibits zinc absorption; otherwise there are no diet restrictions and nutrients from food are negligible. Separate HG7 from any other supplement or substance by at least 3 hours.", "Split or dilute Vitamin C with extra water if it causes heartburn; if any nutrient makes you gag on the taste test, take it last and halve it for that dose.", "Emergency note (from the author): if at any point you feel like you are having a kidney stone, take the full formula with NO EGCG plus extra biotin, wait 3 hours, then reassess.", "No mineral testing is needed before starting - read page 1 in full and calibrate from there. Keep a personal dosing log, ideally in your own separate thread."], "key_changes_since_first_post": [{"change": "Vitamin C was identified as the author's original and most damaging mistake. He had it far too high (up toward 5-10g), which created an iron backlog and drove the endless recalibration loop; he collapsed it back to a low ~1.25-1.8g, calling the low end what is actually needed.", "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1019119"}, {"change": "Overall dosing was non-monotonic: through 2025 nearly everything was raised (roughly doubled, 'golden ratios' pushed C to 5-6g, zinc to ~250mg, molybdenum to 6-7.5mg, biotin to 2g), then in 2026 the whole stack was dramatically lowered ('far less of almost everything except C'), on the theory that surging too much metal at once was the real problem.", "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1019612"}, {"change": "The order of operations was reversed. The first post took EGCG first; the current (June 2026) order is Vitamin C first, then the B vitamins, then EGCG, then molybdenum, then zinc - ordered by how quickly each nutrient acts (C and EGCG are slowest, minerals fastest).", "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1022152"}, {"change": "The molybdenum form rule was hardened from a recommendation into an absolute requirement: amino acid chelate ONLY, never glycinate. Glycinate (like P5P) keeps working regardless of need and over-chelates copper, causing nerve/leg/sciatica pain; everyone who switched to the amino acid chelate reported far better effects.", "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1021310"}, {"change": "B6 was raised (to 200-350mg) and then brought back down to ~150mg, and the B6:zinc ratio settled near 1:1 (B6 slightly higher than zinc) after the author concluded his intermediate 2:1-3:1 ratio was too much B6.", "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1021134"}, {"change": "Zinc dropped from a ~250mg peak to ~100mg and was declared highly variable per person; picolinate was explicitly banned (gluconate only) and women were advised to use about half the zinc.", "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1016762"}, {"change": "Biotin peaked at a flat 2g and was then redefined - for the first time ever reduced - into an open-ended 'take it until it stops working' instruction (~200-500mg for most), because lowering Vitamin C sharply reduced the biotin requirement.", "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1020407"}, {"change": "The nausea calibration table was expanded from the original 5 items to add #4 (Vitamin C) and #5 (Low B6), because the finalized ratio became so precise on B6 that almost any calibration can deplete it.", "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1019990"}, {"change": "A codified target-ratio model was introduced: EGCG:B6 ~20:1, B6:biotin 1:10, B6:B5 ~1:4.25, B6:zinc ~1:1, EGCG:zinc ~3.9:1 - the standard doses are derived from these ratios rather than fixed numbers.", "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1019856"}, {"change": "An optional, temporary copper 'bandaid' was added for a specific low-copper profile (pale, low estrogen, high T/DHT, ectomorph, RH-negative) to raise molybdenum tolerance so high iron can excrete. The author declines to call it 'HG8' since it is meant to be temporary, and it is the sole exception to his 'never add nutrients' rule.", "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1021265"}, {"change": "Administration guidance was refined: empty stomach, avoid dairy, all 7 within a ~1-minute window, and frequency shifted to once/twice daily for progress or about 3x a week (weekends) for maintenance once benefits are banked.", "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1019397"}, {"change": "The first post itself is a living document: page 1 is continuously edited and always holds the latest protocol, so the seed dosages there were superseded many times over 14 months of forum-feedback tuning.", "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1018081"}]}, "theory": {"overview": "Heisenberg's HG7 theory holds that modern humans have become chronically toxic in iron and free copper while being severely depleted in zinc, because sedentary living, iron-fortified food, and the loss of routine blood loss let iron accumulate in the tissues and rob the body's zinc storage receptors. In his model, iron and copper mutually hide one another and both suppress zinc, and this concealed metal load is the root cause of hormonal decline, mental illness, aging, and disease, because zinc-starved DNA loses its ability to repair itself. HG7 combines seven nutrients - Zinc, Vitamin B6, Vitamin B5, Vitamin B7 (biotin), Vitamin C, EGCG, and Molybdenum - taken simultaneously so they mobilize, transport, and excrete iron and free copper while refilling the emptied zinc receptors. He claims the seven cancel each other's individual side effects and also rapidly deplete one another, which is why he insists all of them be dosed at once and kept in tight ratios.", "sections": [{"title": "The core model: a species gone iron- and copper-toxic, zinc-depleted", "body": "The central premise of the theory is that humans, as a species, have become metal toxic, specifically in iron and copper, and correspondingly depleted in zinc. Heisenberg argues that as life became sedentary and food became iron-fortified, the body began robbing its own zinc storage receptors and replacing the zinc with iron or copper, which are far more prevalent in the modern food supply. Zinc, being what he calls a light mineral, sweats out of the body when it has no receptor to occupy. Without zinc the body loses its ability to produce and balance hormones, copper rises, and DNA can no longer repair itself, so the person slowly ages, develops disease, and deteriorates mentally and physically. He stresses that taking zinc alone does not fix this, because iron blocks zinc absorption and the zinc is simply thrown up or excreted through sweat and urine; the iron and its associated copper must be removed first.", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1011047", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1014046"]}, {"title": "Why iron builds up and hides in the tissues", "body": "Heisenberg believes the body evolved to hoard every bit of dietary iron because it treats the mineral as rare and needs it to make red blood cells. Iron, he says, is too large a molecule to pass easily through the kidneys, so the body does not excrete it readily and instead recycles it. Historically, hard physical living and regular blood loss shed iron naturally, but automation ended that stress; women still lose iron through menstruation, while men have no easy avenue for iron loss, and decades of food fortification have compounded the load. Crucially, he claims this iron does not show up in the blood: the blood is smart and hides the iron away in the tissues so it does not dehydrate itself, which is why standard blood tests can look normal while the body is overloaded. He ultimately frames iron toxicity as the root of most disease, with the protocol's job being to safely extract and transport that iron out.", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1011047", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1019862"]}, {"title": "How iron, copper, and zinc suppress and hide each other", "body": "In this model only three minerals - zinc, iron, and copper - compete for the same absorption mechanism, so everyone needs a balance of the three. Iron takes precedence and depletes zinc; copper in turn suppresses iron and repels zinc. Iron and copper are described as a two-way street that seek constant balance: each demands the other, so copper will not reveal itself while iron is too high, and neither excretes without help. Because of this, being out of balance shows up on a blood test as an apparent deficiency rather than an imbalance, which he says is why many women, especially on certain birth controls, look iron deficient when they are actually copper toxic. High iron also masks zinc deficiency, because iron appears to fill a similar storage and electrical-transfer role, so zinc-deficiency symptoms stay suppressed until the iron is removed. He argues the corrective move is counterintuitive: to fix an apparent deficiency in one metal you shave down the other, causing the first to surface.", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1011047", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1014046", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1020317", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1013230", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1021265"]}, {"title": "Zinc - the replacement mineral and copper repellant", "body": "Zinc plays a dual role in the theory: it is both the replenishment material that refills the receptors B6 and EGCG have just emptied, and a repellant that pushes free copper out of the liver and tissues toward the kidneys for detox. Heisenberg frames zinc as the non-toxic mineral that must sit in the receptors for DNA to rebuild, using an Iron Man or car-battery analogy in which iron conducts electricity but accumulates oxidized copper 'rust' that shuts down cellular signaling, whereas zinc is the clean replacement. He says zinc pushes copper out of the cell where copper wants to be, which is what makes iron surface, but if iron is present it blocks zinc and unchelated copper will not budge, so the iron must be cleared first. This is why people with a large loose-iron backlog need less zinc to start. Removing iron without replacing zinc causes a temporary cellular shutdown, which is why even a tiny zinc deficiency feels terrible; conversely, too much zinc surfaces too much iron at once and rapidly depletes B6, which he suspects is the true cause of zinc's nausea, metallic taste, and vomiting.", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1011047", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1021286", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1015389", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1019004"]}, {"title": "Vitamin B6 - the metal mobilizer", "body": "Vitamin B6 (he specifies pyridoxine HCl, never P5P) is the engine that pulls iron and copper out of the tissues and surges them into the blood, while placing the correct minerals into the cells. He argues everyone is heavily B6-negative because of metal toxicity, so any B6 rapidly depletes everything else, and the body will try to use even enormous doses. The neuropathy long attributed to 'B6 toxicity' is, in his view, actually a deficiency of B6's co-enzymators B5 and B7: neglect those and you develop deficiency symptoms, so B5, B6, and B7 must work as one chain. B6 is also required to remove copper - too little and metal never surfaces, leaving you anemic and raising uric acid, while too much clogs the liver with metal it cannot yet process. Because B6 amounts dictate how much metal is mobilized, he treats B6 as the master dial that sets the dosing of the whole formula, and he notes copper is one of the nutrients the body needs to metabolize B6 in the first place.", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1011047", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1013406", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1014221", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1017872", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1018196", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1021097"]}, {"title": "Vitamin B5 - adrenal and kidney support", "body": "Vitamin B5 (pantothenic acid) is one of B6's two co-enzymators and is included to keep the internal havoc that B6 can cause at bay. Its specific jobs in the theory are to sustain adrenal function - which is stimulated by the copper excretion the protocol drives - and to maintain proper kidney health during heavy metal clearance. Heisenberg notes that the first large biotin dose anyone takes dumps a great deal of B5, so most people only feel low-B5 symptoms in the early stages, after which the ratios keep B5 topped off unless they started already deficient. Biotin and B5 consume one another, so they must stay in balance. He considers B5 relatively safe to overdo but warns strongly against underdosing it, since a B5 shortfall lets B6 injure the body.", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1011047", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1017128", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1021140"]}, {"title": "Vitamin B7 (biotin) - tissue rebuilder and calcium mobilizer", "body": "Biotin is B6's second co-enzymator and, in the mining analogy, the worker who rebuilds the cart and keeps it from falling apart. The protocol calls for far more biotin than any other nutrient because Heisenberg believes it is massively stimulating tissue regeneration - keratin, hair, nails, and general repair of the wear and tear the protocol inflicts - rather than substituting for anything else. He also assigns biotin the job of mobilizing and metabolizing tissue calcium, which begins releasing as copper is removed, so biotin mitigates the downsides of that calcium shift. B6 and EGCG burn through biotin extremely fast, which is why demand starts very high and drops over time; he even states that it is biotin that makes B6 work at all, so low biotin can suppress the surfacing of iron and stall the whole process. Biotin is the safest nutrient to overdo, its only real side effect being a grainy, salivating taste, so he deliberately keeps it in the lead.", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1011047", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1013026", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1018846", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1016243", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1021140"]}, {"title": "Vitamin C - blood lubricant and copper pusher", "body": "Vitamin C (ascorbic acid) acts as a pusher and lubricant within the blood and a weak binder of copper, mobilizing free copper toward the excretion sites; without it, he says, copper and many other things cannot move and the blood becomes stagnant and acidic from metal buildup. He calls C the main copper mobilizer in the bloodstream, moving copper to the kidneys, whereas zinc expels copper at the tissue level. In his later refinements C is also a 'scrubber' that surfaces iron, so being high in iron is almost equivalent to being low in C, and too much C aggravates an existing iron overload and makes you gag. He credits C, not EGCG, with actually lowering uric acid, and warns that raising C sharply increases the need for EGCG while draining B6 and zinc; too little C lets copper build up. In the cart analogy, too much C forces the cart to move without enough metal loaded, while too little leaves the cart stuck until it overflows.", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1011047", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1020941", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1013151", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1012683", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1011556"]}, {"title": "EGCG - the iron chelator that frees copper", "body": "EGCG (the active component of green tea extract) is the removal agent of the formula. Once metals have been pushed to the liver detox site, EGCG binds the iron and designates it as unrecyclable, so the body stops treating it as recoverable and routes it out through the bile ducts and feces; without EGCG the process ends and the iron simply returns to storage. Because iron and copper seek balance, binding and removing the iron is also what lets copper roam free to be excreted, so EGCG effectively frees copper even though it is known as an iron chelator, and too much of it frees too much copper and raises estrogen. Every dose of EGCG clears receptor sites where zinc belongs (and possibly where B6 is stored), which is why each EGCG dose immediately creates a demand for more zinc and, in turn, more molybdenum. He warns EGCG is the single most damaging nutrient in excess because it keeps driving everything else negative, and that its effect is delayed by hours (roughly 4 to 12), so overdoses are felt later. Normally these doses would elevate liver enzymes, but he claims the balancing nutrients relieve that oxidative stress.", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1011047", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1011567", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1014465", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1021558", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1020048"]}, {"title": "Molybdenum - the uric-acid engine for copper excretion", "body": "Molybdenum is the final piece, added to the formula almost on a whim after Heisenberg noticed that giving his manic sister EGCG without it made her worse, which suggested that something antagonistic to EGCG would make her better. Its job is to make the body produce the uric acid needed to bind free copper and pass it out in the urine. This only works if the copper is already free, meaning the iron has been removed first; if iron is still too high, molybdenum aggravates the problem and copper will not excrete. He describes it as a blood cleanser that works with C and EGCG and also helps facilitate iron removal, not something that pushes iron on its own. Molybdenum rapidly depletes the vitamins and zinc and is a direct antagonist to B6, so on its own it appears very toxic and severe reactions to it signal a need for more B6. It barely stores and excretes fast through sweat and urine, so a past tolerance does not predict current need, and the main difference between so-called fast and slow oxidizers is simply how much molybdenum they require.", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1011047", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1011059", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1013285", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1015597", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1022168", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1020012"]}, {"title": "How the seven balance and deplete each other", "body": "The defining claim of HG7 is that each nutrient negates the others' negative effects while simultaneously depleting another, like electrolytes that can both hydrate and dehydrate depending on balance. Heisenberg lays out a depletion cycle: molybdenum and EGCG drain B6, B6 drains biotin, biotin drains B5, B5 drains C, C drains EGCG, EGCG drains zinc, and zinc drains molybdenum, after which the cycle repeats. In his more precise later posts he says the nutrients that actually drive B6 negative are molybdenum, C, and zinc, while EGCG only does so indirectly by clearing room for more zinc. He also frames EGCG as the 'cap unlocker': each water-soluble vitamin has a ceiling after which it stops working and is peed out, and only more EGCG - by clearing metal and receptor space - unlocks the ability to take more of the B vitamins and C. Because none of these nutrients store in large amounts, the goal is a ratio that keeps every one of them from going too negative, and they must be swallowed together within seconds, since he believes the stomach acts as a fulfillment center that needs all the parts at once or you get sick and vomit.", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1011047", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1013911", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1011652", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1020981", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1018825"]}, {"title": "The mining-operation analogy that ties it together", "body": "Heisenberg summarizes the whole mechanism as a mining operation. The body holds untapped copper ore sitting in the zinc receptors, encased in a layer of oxidized iron and calcified stone that must be cleared before the ore can be reached. Zinc is the pickaxe that mines the copper, but it cannot work until the iron is removed. B6 is the miner swinging that pickaxe and loading the cart; biotin works alongside B6 to load the cart and, crucially, rebuilds and reinforces the cart as it wears down. B5 is the worker keeping the power generators running. Vitamin C is the cart pusher that moves the loaded cart down to the detox sites - too much C and the cart is forced along underloaded, too little and it will not move and eventually overflows. At the liver the cart's metals are marked either recyclable or for excretion, and EGCG binds them as unrecyclable so they leave the loop. Finally, molybdenum opens the floodgates of uric acid so the kidneys can safely flush the bound metals out. He adds that when someone has lots of loose iron lying around their mines, less zinc is needed at first, because the workers will simply load that loose iron for excretion until it is cleared, after which the zinc pickaxe is required again.", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1011047", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1016522"]}]}, "evolution": {"timeline": [{"date": "2025-05-04", "change": "HG7 protocol first posted in the new thread", "detail": "Defines HG7 as 7 nutrients taken together (Zinc gluconate, B6 as Pyridoxine HCl not P5P, B5, pure biotin powder, C ascorbic acid, EGCG, Molybdenum amino acid chelate) to remove iron plus the freed copper and refill zinc receptors. Baseline doses roughly zinc 110-120mg, B6 125-150mg, B5 450-500mg, biotin 200-500mg, C ~1.5g, EGCG 2300-2700mg, moly 3.5-4.25mg.", "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1011047"}, {"date": "2025-05-05", "change": "Doses doubled versus the old protocol", "detail": "Roughly doubled everything because members on the old low-dose version kept getting low-B6 symptoms; the formula 'just is not suitable in low doses.'", "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1011076"}, {"date": "2025-05-10", "change": "'Golden ratios' target stated", "detail": "Declared the true ideal is ~5.5-6g C, 160-180mg B6, ~230mg zinc, 6mg moly, 2000mg EGCG, and framed the whole protocol as a calibration workaround for hard-to-hit capsule increments.", "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1011259"}, {"date": "2025-05-24", "change": "Mega-dose plus repeated rounds method introduced", "detail": "His fastest method: a large standard dose, then every few minutes an extra round of ~100mg zinc + 3mg moly + ~900-1000mg EGCG, repeated as needed; reports up to a gram of zinc total with no ill effects.", "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1011560"}, {"date": "2025-06-12", "change": "Biotin raised to 750mg; zinc bumped; tolerance levels added", "detail": "500mg biotin left people in a 'drip drain' state so the default rose to 750mg, zinc nudged above 200mg, and higher/lower starting tolerance levels were added to page 1.", "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1011976"}, {"date": "2025-06-15", "change": "Vitamins lowered, biotin raised relative to B6", "detail": "Lowered the vitamin portions (minerals mostly unchanged) because they overwhelmed people, and reset ratios so biotin sits much higher than B6.", "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1012030"}, {"date": "2025-06-18", "change": "Discovery: molybdenum FORM matters", "detail": "Found the Piping Rock amino acid chelate avoids the headaches and high-uric-acid symptoms that the Carlson non-chelate form caused, likely explaining why moly tolerance varies so widely between people.", "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1012106"}, {"date": "2025-06-20", "change": "Admitted page 1 under-dosed biotin and over-dosed C", "detail": "Credited community feedback for revealing biotin was heavily needed (originally posted far too low) and that C had been set too high, prompting the vitamin reduction.", "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1012184"}, {"date": "2025-07-13", "change": "Standard starting dose validated (zinc ~250, moly ~6)", "detail": "Endorsed a near-balanced page-1 standard (C 5g, biotin 500mg, B5 350mg, B6 125mg, EGCG ~2284mg, moly 6mg, zinc 250mg), confirming zinc default had climbed to ~250mg and moly to ~6mg.", "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1012776"}, {"date": "2025-07-30", "change": "First signal that B6 is set too low", "detail": "Flagged night sweats, insomnia and gut/chest water retention as low-B6 signs and floated raising B6.", "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1013314"}, {"date": "2025-08-03", "change": "Formal update: B6 raised, half-dose option added", "detail": "First posted revision raised B6 (too low), barely changed C, added molybdenum guidance, and noted the whole dose may be halved if ratios are kept.", "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1013421"}, {"date": "2025-08-09", "change": "Zinc lowered toward 1:1 with B6", "detail": "Brought zinc and EGCG down a hair because 250mg zinc on 200mg B6 caused night sweats, concluding zinc and B6 are nearly a 1:1 need.", "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1013563"}, {"date": "2025-08-21", "change": "B6/B5/biotin raised; core ratios codified", "detail": "'Last edit' raising B6, B5 and biotin to match, and summarizing the discovered ratios: zinc:EGCG ~1:10, biotin:B6 ~10:1, and zinc:B6 ~1:1.", "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1013811"}, {"date": "2025-08-23", "change": "Core correction: excess Vitamin C was the original mistake", "detail": "Admitted the first protocol wrongly assumed excess C was harmless; C near 10g surfaced too much metal and drained B6, and the original distribution was inverted (vitamins too high, minerals and EGCG too low).", "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1013949"}, {"date": "2025-08-24", "change": "Formalized the 3-part model", "detail": "Split the process into Extraction (B5/B6/B7 + C surface metals to the liver), Chelation/Elimination (EGCG + molybdenum excrete iron and freed copper), and Replenishment (zinc refills receptors), with explicit order-dependency failure modes.", "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1014192"}, {"date": "2025-08-28", "change": "Biotin overshot to 2g; B5 to 850mg", "detail": "Raised biotin to a flat 2000mg (via 1400mg) to end recalibration worry after feedback that less was inadequate, and lifted B5 to 850mg.", "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1014511"}, {"date": "2025-08-28", "change": "Full canonical protocol reposted in a clean thread", "detail": "Restated the theory plus the latest standard (Zinc 220-250mg, B6 250mg, B5 850mg, B7 2000mg, C 5-7g, EGCG 2500-3200mg, Moly 6-7mg) taken together within ~60 seconds, with the ground rules.", "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1014523"}, {"date": "2025-08-28", "change": "EGCG:zinc ratio raised from 10:1 to 12:1", "detail": "Increased the core EGCG-to-zinc ratio because participants kept needing to calibrate upward with more EGCG.", "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1014542"}, {"date": "2025-08-30", "change": "Fine-tuned: C 5-6g, EGCG ~3400, Moly 7.5mg", "detail": "Dropped C back to 5-6g (C is the most damaging when off), set EGCG ~3400, and moly 7.5mg for high-copper individuals, correcting that nausea he had blamed on EGCG was actually too much C.", "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1014624"}, {"date": "2025-09-09", "change": "Molybdenum range added (5-7.5mg)", "detail": "Added an explicit 5-7.5mg moly range to page 1, calling moly 'extremely volatile' with needs that fall as the protocol progresses.", "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1014965"}, {"date": "2025-09-23", "change": "Major ratio revision: Zinc 200-220, Moly floor 4mg, C flat 5g", "detail": "Higher B6 improved zinc uptake so zinc dropped to 200-220; moly lower end rose to 4mg (form-dependent), C set to a flat 5g, EGCG held to let more iron surface.", "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1015403"}, {"date": "2025-10-02", "change": "Zinc dropped sharply to 120-150mg", "detail": "Realized zinc uptake is far better with higher (300mg) B6 present, so cut zinc to 120-150 with EGCG unchanged.", "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1015692"}, {"date": "2025-10-21", "change": "Ratio update: C flat 4g, Moly 4-5mg", "detail": "Brought C down to a flat 4g and settled moly at a form-dependent 4-5mg range, since potency depends entirely on the brand/form used.", "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1016148"}, {"date": "2025-11-04", "change": "EGCG range raised; admits chronic under-suggestion", "detail": "Raised the EGCG range, acknowledging he had vastly under-suggested EGCG and over-suggested C from the start, likely blocking many newcomers.", "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1016433"}, {"date": "2025-11-09", "change": "Front-page rule: drop zinc if heavily nauseous", "detail": "Added guidance that consistent heavy nausea is best fixed by dropping zinc for a few doses, though zinc will be needed again eventually.", "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1016519"}, {"date": "2025-11-14", "change": "Canonical 'mining operation' analogy posted", "detail": "Expanded analogy mapping each nutrient to a role (zinc = pickaxe, B6 swings it, biotin = cart, B5 = generator, C = cart pusher, EGCG marks iron unrecyclable, moly opens the uric-acid floodgates) with too-much/too-little failure modes.", "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1016700"}, {"date": "2025-11-17", "change": "Zinc declared highly variable per person", "detail": "Confirmed from many users that zinc needs are entirely individual (former high-zinc users do better low, high-copper types need more per EGCG), while everyone still needs all seven ingredients.", "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1016762"}, {"date": "2025-11-26", "change": "Scrapped the low-dose molybdenum option", "detail": "Raised moly's lower end and removed the low-dose option after his moly-anomaly user came to need the upper end; noted newcomers routinely under-do moly, likely due to raised B6.", "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1017010"}, {"date": "2025-11-29", "change": "Calibration refinements: #3 to 800mg EGCG, new symptom and rule", "detail": "Calibration step 3 raised to 800mg EGCG, itchy scalp added as a low-molybdenum sign, and a new rule that molybdenum worsening the #1 symptoms means you likely need more B6.", "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1017056"}, {"date": "2025-12-01", "change": "Standard B6 raised to 350mg", "detail": "Raised B6 because the high EGCG and molybdenum doses were depleting it too quickly.", "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1017094"}, {"date": "2025-12-17", "change": "Cadence recommendation: about 3x per week", "detail": "Given the cost of max doses, he now runs the full protocol roughly 3x weekly (mostly weekends), betting it beats daily fractional dosing.", "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1017545"}, {"date": "2025-12-20", "change": "B6 set to a 200-300mg range", "detail": "Made B6 a 200-300mg alternating range (200 too low to sustain, 300 too high) since capsules only come in 50/100mg.", "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1017611"}, {"date": "2026-01-01", "change": "New-year overhaul: first-ever biotin drop", "detail": "Fine-tuned ratios: for the first time ever dropped biotin a bit, lowered B6 to 250mg, declared zinc necessary, tightened and lowered C, lowered B5, and set moly to 7mg even.", "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1017777"}, {"date": "2026-01-03", "change": "EGCG cap raised, B6 tightened; new EGCG-moly pairing rule", "detail": "Raised the EGCG cap and narrowed the B6 window (B6 blamed for recent headaches), and set a standing rule to add 500mcg molybdenum for every extra 600mg EGCG.", "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1017828"}, {"date": "2026-01-12", "change": "Page 1 declared the single source of truth; women need less zinc", "detail": "Clarified the continuously-updated first post always holds the latest protocol, and introduced sex-based dosing where women use the low end of zinc.", "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1018081"}, {"date": "2026-01-26", "change": "Women trial the half-protocol; C low end 3g", "detail": "Tightened zinc with footnotes, began trialing women doing half the protocol, suggested more molybdenum, and set a lower C end of 3g as the sweet spot for most.", "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1018451"}, {"date": "2026-02-13", "change": "Major stack revision: B6 up, C/moly/EGCG/zinc down", "detail": "Raised B6 (low B6 found to be a major nausea cause) and lowered C, molybdenum, the EGCG cap and zinc; zinc ~250mg standard for men but 75-100mg once B6 is high.", "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1018913"}, {"date": "2026-02-23", "change": "Biggest correction restated, plus B6:zinc 3:1", "detail": "Named Vitamin C as the thing he had most wrong (too high, creating the iron backlog): now 2-4g if copper was chelated and ~5g if not, and introduced an optimal ~3:1 B6:zinc ratio (e.g. 300mg B6 to 100mg zinc).", "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1019119"}, {"date": "2026-03-03", "change": "Announced ending the experiment (partial walk-back)", "detail": "Declared he was ending HG7 over its punishing learning curve and safety concerns, then kept replying supportively to remaining users.", "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1019272"}, {"date": "2026-03-14", "change": "Overhaul: halve almost everything except C", "detail": "Posted a far lower standard on the theory that the body cannot handle the full metal-mobilizing dose at once and HG7 must be sustained to match EGCG's slow release.", "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1019612"}, {"date": "2026-03-17", "change": "Nausea Calibrator #4 (Vitamin C) added", "detail": "Added Vitamin C as a fourth nausea calibrator (B6 is kept just above the C ratio), and lowered EGCG with new ranges.", "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1019672"}, {"date": "2026-03-20", "change": "New rule for P5P history: run with no zinc temporarily", "detail": "For anyone who previously took P5P, run regular B6 with zero zinc for several doses until the iron backlog clears, because zinc with B6 queues even more iron.", "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1019779"}, {"date": "2026-03-20", "change": "Vitamin C identified as the elusive variable, dropped to 1-2g", "detail": "Concluded too much C forces iron and copper out faster than EGCG can chelate, and dropped C dramatically to a 1-2g range (1.5g practical max), blaming it for the endless recalibration loop.", "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1019818"}, {"date": "2026-03-22", "change": "Codified the nutrient ratio model and hard stance on forms", "detail": "Formalized target ratios (EGCG:Zinc ~3.9:1, EGCG:B6 20:1, EGCG:Moly ~850:1, B6:Biotin 1:10, B6:B5 1:4.25) and stated he advises completely against any non-listed forms or ratio deviations.", "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1019856"}, {"date": "2026-03-27", "change": "Ratios cleaned up to rounder numbers (B6:zinc 2:1)", "detail": "Simplified the ratios into 25/50/100 increments with B6:zinc landing on an exact 2:1, calling it near-final.", "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1019963"}, {"date": "2026-03-28", "change": "Nausea Calibrator #5 (Low B6) added", "detail": "Added Low B6 as a fifth nausea calibrator because the finalized ratio is so precise on B6 that any other calibration can deplete it.", "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1019990"}, {"date": "2026-04-09", "change": "Zinc form locked to gluconate only", "detail": "Ruled out picolinate and other forms such as carnosine after bad reports, recommending zinc gluconate exclusively.", "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1020290"}, {"date": "2026-04-13", "change": "Biotin redefined as 'take until it stops working'; zinc:B6 to 1:1.8", "detail": "Made biotin open-ended rather than a fixed number (too variable, and lowering C reduced its need), and revised the zinc:B6 ratio from 1:2 to ~1:1.8.", "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1020407"}, {"date": "2026-04-14", "change": "Zinc:B6 revised to 1:1.5; B6 max 145mg", "detail": "After repeatedly going too low on zinc, settled zinc:B6 at ~1:1.5 and capped B6 at 145mg (150 tolerable but incurs minor long-term calibration).", "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1020503"}, {"date": "2026-04-20", "change": "Claimed the peak: zinc ~100mg, EGCG settled to 2300", "detail": "Declared the peak found with zinc right at ~100mg, and kept EGCG a sliver low at 2300 because excess EGCG causes lower-back aches and kidney-stone risk.", "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1020652"}, {"date": "2026-05-11", "change": "B6:zinc walked back toward 1:1", "detail": "Concluded the 2:1 and 3:1 B6:zinc ratios were too high (excess B6 without balanced zinc lets copper and iron displace zinc, causing anger and frontal hair thinning), 'had it right the first time' near 1:1, and raised zinc/C/EGCG while lowering moly.", "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1021134"}, {"date": "2026-05-16", "change": "Optional copper 'bandaid' (HG8) proposed", "detail": "Announced adding copper as an optional, temporary aid for low-copper individuals to make the protocol universal; copper raises molybdenum tolerance so iron can excrete, then is dropped once iron falls.", "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1021265"}, {"date": "2026-05-17", "change": "Molybdenum must be amino acid chelate, NOT glycinate", "detail": "Co
