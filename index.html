er-chelating copper; reduced to ~60-70% standard while waiting on Piping Rock amino acid chelate. Mostly symptom-free now vs early nausea/puking; occasional joint pain/gassiness fixed by EGCG/moly ratio. Reports leaner body, better fat distribution, easier tanning, improving hair texture, optimizing muscle without training. RH- and believes he needs some bioavailable copper.", "notable_effects": ["fixed zinc deficiency", "mediated copper toxicity", "leaner, better fat distribution", "tans more easily", "improving hair texture", "muscle optimizing without training", "early nausea/vomiting resolved", "joint pain/gassiness when EGCG/moly off", "temple hair thinning (attributes to excess moly draining B6)", "high P5P on blood test after formula"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1021402"}, {"author": "Epinerein", "outcome": "positive", "duration": "~9 months (since June 2025)", "summary": "Almost 9 months in. Sleep improved (down to one sleep med from 11), tics improved where nothing else worked, anger/hair loss/hallucination/daytime sleepiness from Cu toxicity under control, no more neuropathy or dysautonomia, energy much improved, cold hands/feet ~25% better. Plans to stay on protocol permanently.", "notable_effects": ["sleep improved", "tics improved", "anger controlled", "hair loss controlled", "hallucination controlled", "no more neuropathy", "no more dysautonomia", "energy improved", "cold hands/feet 25% better"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1019301"}, {"author": "ScrapActivator", "outcome": "positive", "duration": "first ~11 days", "summary": "Male early 50s, carnivore. After 30 years of debilitating illness (brain fog, chronic fatigue, muscle tension/pain, insomnia, anxiety, obesity), calls HG7 real and life-changing. By day 2 felt 30 lbs lighter; #3 calibration stopped year-long crippling neck/head pain 'like a remote control'; shoulders relaxed for first time in 30 years; could squat again; skin tag disappeared; a #1 stopped a panic attack. Main unresolved problems are insomnia from racing thoughts and acidic diarrhea. Calibration takes him 5-8 exhausting hours a day (up to 38 calibrations in one day).", "notable_effects": ["neck/head pain off like a switch with #3", "shoulders/back/neck unlocked", "can squat", "panic attack stopped by #1", "skin tag gone", "acid reflux became normal burps", "acidic diarrhea", "insomnia/racing thoughts"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1011533"}, {"author": "whatisaging", "outcome": "positive", "duration": "~4-6 months (month 2 in Feb 2025)", "summary": "Long-term user on a bumpy journey, not yet fully recovered, but reports significant measurable changes across height, grip strength, IQ, ferritin and HTMA copper. Ongoing struggle is vitamin C tolerance and recurring nausea, plus throwing up undigested EGCG.", "notable_effects": ["grew an inch in 3 months", "grip strength 76 to low 90s", "IQ 115 to 125", "ferritin 110 to 66", "HTMA copper 16 to 6", "energy sensation in arms/bones", "recurring nausea from vitamin C", "gum pains when C lowered"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1011646"}, {"author": "ZinkusMaximus", "outcome": "positive", "duration": "~2-4 weeks", "summary": "Experienced mineral-balancing practitioner trying HG7. Early win was blood in toothpaste going to zero after 3 days. Around two weeks felt good with a couple of incredible days. Later began releasing copper (symptoms resolving with molybdenum), uric acid down 10%, appears more tan. Hypersensitive but tolerates HG7 doses well using tiny fractions of capsules.", "notable_effects": ["blood in toothpaste to zero", "couple of incredible days", "releasing copper", "uric acid down 10%", "more tan", "water retention hips/thighs", "vivid dreams", "night urination"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1011988"}, {"author": "Meikueila", "outcome": "positive", "duration": "~4 years", "summary": "One of the very first people to try the formula (Jacob's girlfriend), calibrating for ~4 years. Got rid of her dust/mite allergies and asthma (was 4/5 severity, on daily meds; no pill for years). Lost a lot of weight, face became more symmetrical, nose less 'potato', grew 2-3cm taller, hair and nails grow fast, skin more hydrated, no wrinkles, rarely gets sick, ferritin improved, feels smarter. Notes caffeine boosts the formula and that as a woman her EGCG tolerance shifts across her cycle.", "notable_effects": ["allergies and asthma resolved", "weight loss", "grew taster/taller by 2-3cm", "fast hair and nail growth", "hydrated skin, no wrinkles", "rarely ill", "improved ferritin", "feels smarter"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1019297"}, {"author": "Meikueila", "outcome": "positive", "duration": "~4 years", "summary": "One of the very first testers (with Jacob for ~4 years). Got rid of dust/mite allergies and asthma (was 4/5 severity, no meds for years), lost weight, more symmetrical face, grew 2-3cm taller, fast hair/nail growth, hydrated skin, no wrinkles, improved ferritin, rarely gets sick, feels smarter/clearer thinking. Feels caffeine slightly boosts the formula.", "notable_effects": ["allergies/asthma gone", "weight loss", "grew taller", "improved ferritin", "clearer thinking/visualization", "rarely sick", "no wrinkles"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1019310"}, {"author": "BaselineShift", "outcome": "positive", "duration": "~5 days (first week)", "summary": "New user, 15-year severe insomnia and low body temp (usually 96-97F). Day 1 easy ride: felt slowed/stoned, metallic taste, arousal, then normal/better after 3h. Day 2 (upper range + light meal): within 10 min body fully relaxed, anxiety COMPLETELY vanished, no metallic taste, body temp rose to 98.6F, lost appetite. Anxiety suppression impressive; new clarity let him reframe a tormenting problem. Ran up to 2 rounds/day by day 5 with no side effects.", "notable_effects": ["anxiety completely vanished", "deep physical relaxation", "body temp rose to normal 98.6F", "metallic taste day 1", "appetite loss", "mental clarity / better decisions", "stoned-like feeling initially"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1021196"}, {"author": "karen138", "outcome": "positive", "duration": "~2 weeks (15 doses)", "summary": "59yo woman, ~dose #14-15 at 60% strength, slowly increasing %. Brain fog left day 1 and never returned, sleep good. Can only tolerate very low EGCG (1 cap/326mg, below range) since dose #4 - believes she is high/toxic copper. Raising zinc to mid-range gave immediate strong positive lift in mood/motivation/lightness. Increasing biotin helped bowel transit temporarily. When she raised EGCG instead of zinc, felt worse, gag reflex to EGCG, brief anger flash.", "notable_effects": ["brain fog gone day 1", "immediate mood/motivation lift from zinc", "only tolerates very low EGCG", "gag reflex/anger when raising EGCG", "slowed bowel transit / constipation", "chocolate tasting different", "leg/foot cramping"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1021242"}, {"author": "Creaky robot", "outcome": "positive", "duration": "months (intermittent, half dose)", "summary": "Female user reporting major menstrual improvements as the only change she made: cycle lengthened from 14-21 days to 35 days, heavy bleeding stopped, and PMS breast tenderness disappeared (returns within a week off, stopped again by one dose). Full dose caused intense nausea and two days of diarrhea, so she uses half dose every 2-3 days. Chronic pre-existing diarrhea persists. Believes she is copper toxic.", "notable_effects": ["cycle lengthened to 35 days", "heavy bleeding stopped", "PMS breast tenderness gone", "improved inflammation markers", "nausea and diarrhea on full dose", "persistent chronic diarrhea"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1012019"}, {"author": "whatisaging", "outcome": "positive", "duration": "~4-5 months", "summary": "Reports major improvements. Had deep fatigue before (would nap standing up after 30 min of basketball); now can run a straight mile. Fatigue worsened in month 2 due to low B6 but resolved and hasn't returned. Oxidation markers improved within first 4-5 months. Reports grip strength gains, increased testosterone, and ~half inch height increase versus his measurement at age 25. Switching vitamin C from powder to capsules raised EGCG tolerance dramatically (from ~1400mg to 8000mg/day without nausea).", "notable_effects": ["fatigue improved, can run a mile", "oxidation markers improved", "grip strength increase", "testosterone increase", "~half inch height increase", "higher EGCG tolerance with capsule vitamin C"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1014153"}, {"author": "ScrapActivator", "outcome": "positive", "duration": "several months plus a 25-day pause", "summary": "Long journey through multiple rebalancing stages (high copper panic/anxiety, then low copper brain fog, then months of dominant iron needing huge EGCG, then iron dropping and dosing easing). After ~6 weeks on the June 15 low dose (B6 125mg) calibrations dropped from every 5-15 min to hourly, bathroom issues and insomnia resolved. Took 25 days off to move with no withdrawal and few returning symptoms; now scaling to 75% of full dose with every supplement finally within recommended ratio for the first time. Reports it does get easier eventually even for a hard calibrator.", "notable_effects": ["calibrations dropped from every 5-15 min to hourly", "insomnia vastly improved", "bathroom issues resolved", "more physical labor capacity", "faster recovery and better stress handling", "gum pain/swelling fixed by increasing C"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1014487"}, {"author": "MrMark", "outcome": "positive", "duration": "~1 week on this dose", "summary": "Near-zero nausea and daily improvements in hearing and vision, sense of wellness and warm social reception. Occasional zinc/EGCG calibrations, almost never low-moly symptoms. Notes background early-cold-symptom feeling and tingling at a prior shingles site.", "notable_effects": ["improved hearing", "improved vision", "sense of wellness", "warm social reception", "occasional cold-onset feeling", "shingles-site tingling"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1015122"}, {"author": "charlie", "outcome": "positive", "duration": "ongoing", "summary": "Kidney lab panel came back completely normal (creatinine 0.80, eGFR 108, alb/creatinine 4) despite recurring back-side kidney soreness, which he attributes to metals queuing during the flush phase. Uses Grok AI to navigate doses and calibrations, reports dumping a ton of iron with waves of copper. Increasingly convinced by the process.", "notable_effects": ["kidney soreness", "hot body", "body odor/stink", "anxiety waves", "iron dumping", "copper waves"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1017897"}, {"author": "whatisaging", "outcome": "positive", "duration": "1 year", "summary": "Relayed 1-year testimony of psrocket1 (@psrocket1174983): 1 year on HG7 at 250-300 mg/day zinc, split 1/3 with breakfast, lunch and dinner. Reports less autism/adhd/ptsd/chronic-fatigue traits, less food intolerance, less eczema/psoriasis, and zero test suppression during his annual s23 SARM cycle (vs suppression in prior years). EGCG was the hardest to balance - too little causes stomach rumbling, too much causes projectile vomiting. Also maintaining bodyweight while losing body fat and gaining muscle (partly attributed to peat-style protein/glycine + lifting).", "notable_effects": ["less autistic/adhd/ptsd/chronic fatigue", "less food intolerance", "less eczema/psoriasis", "zero SARM (s23) test suppression", "fat loss + muscle gain", "low moly -> panic/racing anxiety/negativity; too much moly -> headache"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1021554"}, {"author": "Disrupt4489", "outcome": "positive", "duration": "several months (Oct 2025 to March labs)", "summary": "Motivational iron update backed by labs: serum iron fell from 234 ug/dL (Oct 2025, above the 175 range) to 165 (March) after he started calculating the zinc conversion correctly; agrees with his HTMA hair tests. Reports less scalp inflammation, reduced hair loss, and an injured ankle tendon finally healing. Believes intracellular zinc is now rising (sex drive up), but a downside is herpes outbreaks returning after decades - which he/AI attribute to rapidly rising zinc. Testicular ache and itchy anus signal he needs to calibrate zinc up a bit.", "notable_effects": ["serum iron 234 -> 165 ug/dL", "less scalp inflammation", "reduced hair loss", "ankle tendon healing", "rising sex drive (zinc)", "herpes outbreaks returned"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1021624"}, {"author": "Nusian", "outcome": "positive", "duration": "ongoing", "summary": "Chronically low zinc; the previous standard with lower EGCG works best for him and it's the best he's ever felt and feels he's progressing. Former rutin taker (pre-chelated copper), so he keeps kicking out iron too quickly and has to dial in biotin carefully; too-high biotin pushes his C needs up, and too-high C pushes him into low B6. Prefers 120 mg zinc for now to fight his low-zinc state.", "notable_effects": ["best he's ever felt", "progressing", "low zinc if EGCG too high", "right-side abdominal pain if EGCG too high", "dry hands if C too low", "low B6 if C too high"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1021941"}, {"author": "ZinkusMaximus", "outcome": "positive", "duration": "started ~May 22 (several days)", "summary": "High iron / low copper case (like Hidden49), elevated uric acid, trained as naturopath/mineral-balancing practitioner. Feeling great on a modified high dose with very low molybdenum and reduced Vitamin C. Took as much as 1.2g zinc in a day feeling good. Lower back pain (from too much C, not moly) resolved completely after lowering Vitamin C. No high-copper symptoms despite minimal moly.", "notable_effects": ["feels great", "lower back pain resolved by lowering C", "tolerated 1.2g zinc/day", "nightmares/short sleep (low biotin)", "water retention hips/thighs"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1011521"}, {"author": "whatisaging", "outcome": "positive", "duration": "since Dec 28 2024 (~5 months)", "summary": "Doing well on the protocol. Three hair tests show copper dropped from 160 to 60 over 3 months (normal 10-30). Grip strength improving on its own from 76 to ~93 lbs without training. Increased serum testosterone. Has taken 15mg molybdenum and 400mg zinc daily on average for 5 months with uric acid, copper, and zinc all testing normal, which would cause gout/deficiency/toxicity in isolation. Improved calcium/potassium hair ratio suggesting better thyroid health.", "notable_effects": ["hair copper 160->60", "grip strength 76->93 lbs", "increased testosterone", "improved Ca/K ratio", "reduced shaky hands"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1011526"}, {"author": "whatisaging", "outcome": "positive", "duration": "several months (grip tracked since February)", "summary": "Reports strong benefits: biggest is 'memory traps' (unpleasant memories haunting him 24/7) dropping to 1-3% of former intensity, plus visible muscle gain and rising grip strength. Experiments heavily with EGCG separation and B-vitamin calibration to control nausea. Discovered an EGCG 'fast' (separating EGCG from the rest by 36-48 hrs) kills nausea. Had a kidney-stone scare from using 1-pill-per-symptom calibration.", "notable_effects": ["memory-trap intensity down ~97%", "visible muscle gain", "grip strength 76 to 101", "certain proteins pass undigested", "kidney pain episode"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1012631"}, {"author": "whatisaging", "outcome": "positive", "duration": "~7 months (day 205-213)", "summary": "Long-term user amazed to tolerate very high doses without harm. Reports appetite plummeting with 8+ hour satiety after decades of never feeling full, occasional episodes of 'wicked brain speed' (lightness/clarity, could simulate a complex guitar song unplayed for 5 years), and believes HG7 protects his gut from junk food. Uses 'vitamins fixed, minerals flexible' approach. High dose B vitamins reliably cure his nausea.", "notable_effects": ["appetite loss / long satiety", "brain speed episodes", "gut protection from junk food", "B6 toxicity symptoms from over-calibrating with B vitamins", "mild cold caught on protocol"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1013058"}, {"author": "Hermes", "outcome": "positive", "duration": "unspecified ongoing", "summary": "Reports face looks more symmetrical/balanced and skin softens by the time he hits the 500mg zinc mark; feels at ease, believes overtaxed adrenals calmed. Uses aggressive 'push the process' calibration, taking everything until he gags, aiming to get max zinc in within 3 hours.", "notable_effects": ["more symmetrical/balanced face", "softer skin", "feels relaxed/at ease", "cheese cravings disappeared after upping B6", "foamy urine after formula"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1013281"}, {"author": "dave_282", "outcome": "positive", "duration": "14 days (with a few break days)", "summary": "Completed planned 14 days despite hours-long headaches early on requiring break days. Last 4 days felt really good: good concentration, lots of energy, lost a bit of weight. Upping B vitamins to new doses and EGCG from 2240mg to 2560mg made a big difference. Notably could take 250mg zinc daily without vomiting (used to feel sick on 60mg).", "notable_effects": ["hours-long headaches early", "improved concentration", "high energy", "slight weight loss", "zinc tolerance greatly improved"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1013437"}, {"author": "ZinkusMaximus", "outcome": "positive", "duration": "~3 months (almost 3 months / 3 months)", "summary": "Mineral-balancing (ARL) practitioner and self-described very fast oxidizer trying HG7 alongside his NB background. About 3 months in: not life-changing but encouraged to continue. Had to start with very low VC and molybdenum due to fast-oxidizer sensitivity. Went through a symptom shift around 2 months in that took ~2-2.5 weeks to rebalance.", "notable_effects": ["water retention more consistently down", "uric acid noticeably reduced", "grip strength up substantially", "sleeps and feels a little better", "low-zinc symptoms and teeth looking poor at higher B6 (resolved by lowering B6)"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1013982"}], "count": 330}, "meta": {"total_posts": 4703, "author_posts": 1552, "pages": 236, "authors": 89, "date_from": "2025-05-04", "date_to": "2026-07-06", "author": "T_R_Heisenberg", "thread_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/", "built": "2026-07-06", "order": "Vitamin C, then B6, then B5, then biotin (under tongue), then EGCG, then molybdenum, then zinc, all within a ~1 minute window", "ratios": "EGCG:B6 ~20:1 · B6:zinc ~1:1 · B6:B5 ~1:4.25 · B6:biotin ~1:10 · EGCG:zinc ~3.9:1"}}</script>
<script>
const DATA=JSON.parse(document.getElementById('data').textContent);
const M=DATA.meta||{};
const $=(s,r=document)=>r.querySelector(s);
const el=(t,c,h)=>{const e=document.createElement(t);if(c)e.className=c;if(h!=null)e.innerHTML=h;return e};
const esc=s=>(s==null?'':String(s)).replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));
function hl(s,terms){s=esc(s);if(!terms||!terms.length)return s;const pat=terms.filter(Boolean).map(t=>t.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')).join('|');if(!pat)return s;return s.replace(new RegExp('('+pat+')','ig'),'<mark>$1</mark>')}
const srcOne=u=>u?` <a class="src" href="${esc(u)}" target="_blank" rel="noopener">source &#8599;</a>`:'';
const srcMany=a=>{a=(a||[]).filter(Boolean);return a.length?' <span class="srcs">'+a.slice(0,5).map((u,i)=>`<a href="${esc(u)}" target="_blank" rel="noopener">[${i+1}]</a>`).join('')+'</span>':''};
const OUT=['positive','mixed','negative','neutral'];
const oc=o=>OUT.includes((o||'').toLowerCase())?(o||'').toLowerCase():'neutral';

/* ============ section definitions ============ */
const SECTIONS=[];
function reg(id,title,group,count,render){SECTIONS.push({id,title,group,count,render})}

/* ---- Quick reference (condensed) ---- */
function renderQref(host){
  const k=DATA.canonical||{};
  const box=el('div','qref');box.id='protocol';
  box.appendChild(el('div','qhead',`<h2>The Protocol &middot; latest</h2><span class="tag">take all together, one dose</span>`));
  const tbl=el('table','qtable');const tb=el('tbody');
  (k.nutrients||[]).forEach(n=>{
    const tr=el('tr',n.optional?'opt':'');
    tr.innerHTML=`<td><div class="nm">${esc(n.name.replace(/\s*\(OPTIONAL.*/i,''))}${n.optional?'<span class="badge-opt">optional</span>':''}</div><div class="role">${esc(n.role_short||'')}</div></td>`+
      `<td class="dose">${esc(n.dose_short||'')}</td>`+
      `<td class="form">${esc(n.form_short||'')}</td>`;
    tb.appendChild(tr);
  });
  tbl.appendChild(tb);box.appendChild(tbl);
  const foot=el('div','qfoot');
  // order
  const steps=(k.order_of_operations||[]).slice().sort((a,b)=>(a.step||0)-(b.step||0));
  const orderHtml=steps.length?steps.map((s,i)=>`<span class="step"><span class="n">${i+1}</span>${esc((s.nutrient||'').replace(/\s*\(.*/,''))}</span>`).join('<span class="arrow">&rarr;</span>'):esc(M.order||'');
  foot.appendChild(el('div','qrow',`<span class="k">Order</span><div class="orderflow">${orderHtml}</div>`));
  if(M.ratios) foot.appendChild(el('div','qrow',`<span class="k">Ratios</span><div class="mono">${esc(M.ratios)}</div>`));
  if(k.taste_test) foot.appendChild(el('div','qrow',`<span class="k">Calibrate</span><div>${esc(k.taste_test.split('.').slice(0,2).join('.')+'.')}</div>`));
  const rules=(k.core_rules||[]).slice(0,5);
  if(rules.length) foot.appendChild(el('div','qrow',`<span class="k">Essentials</span><ul>${rules.map(r=>`<li>${esc(r.split('.')[0])}.</li>`).join('')}</ul>`));
  // details
  const det=el('details','more');
  det.appendChild(el('summary',null,'Full per-nutrient detail, exact forms, and what changed'));
  const dwrap=el('div');
  const dt=el('table','dose','<thead><tr><th>#</th><th>Nutrient</th><th>Dose</th><th>Detail</th></tr></thead>');
  const dbody=el('tbody');
  (k.nutrients||[]).forEach((n,i)=>{
    dbody.appendChild(el('tr',null,`<td>${i+1}</td>`+
      `<td><span class="nn">${esc(n.name.replace(/\s*\(OPTIONAL.*/i,''))}</span>${n.changed_from_seed?'<span class="tag-chg">changed</span>':''}<div class="ff">${esc(n.form||'')}</div></td>`+
      `<td class="dd">${esc(n.dose_current||'')}</td>`+
      `<td class="note">${esc(n.role_short||'')}${n.notes?'<div class="vs">'+esc(n.notes)+'</div>':''}${n.changed_from_seed?'<div class="vs"><b>vs original:</b> '+esc(n.changed_from_seed)+'</div>':''}${srcMany(n.source_urls)}</td>`));
  });
  dt.appendChild(dbody);dwrap.appendChild(dt);
  if((k.how_to_take||[]).length){dwrap.appendChild(el('h3',null,'How to take it'));const ul=el('ul','clean');k.how_to_take.forEach(x=>ul.appendChild(el('li',null,esc(x))));dwrap.appendChild(ul)}
  if((k.core_rules||[]).length){dwrap.appendChild(el('h3',null,'All core rules'));const ul=el('ul','clean');k.core_rules.forEach(x=>ul.appendChild(el('li',null,esc(x))));dwrap.appendChild(ul)}
  if((k.key_changes_since_first_post||[]).length){dwrap.appendChild(el('h3',null,'Key changes since the first post'));const ul=el('ul','clean');k.key_changes_since_first_post.forEach(x=>ul.appendChild(el('li',null,esc(x.change||x)+srcOne(x.source_url))));dwrap.appendChild(ul)}
  det.appendChild(dwrap);foot.appendChild(det);
  box.appendChild(foot);host.appendChild(box);
}
reg('protocol','The Protocol','Start',(DATA.canonical.nutrients||[]).length,null);

/* ---- Calibration ---- */
reg('calibration','Calibration & Fixes','Start',(DATA.calibration.symptom_fixes||[]).length,(host)=>{
  const cal=DATA.calibration||{};const s=el('section','section');s.id='calibration';
  s.appendChild(el('h2',null,`<span class="idx">01</span> Calibration &amp; Troubleshooting`));
  if(cal.intro)s.appendChild(el('div','desc',esc(cal.intro)));
  s.appendChild(el('h3',null,'Symptom &rarr; fix'));
  const g=el('div','grid two');
  (cal.symptom_fixes||[]).forEach(x=>{
    const c=el('div','card');
    c.innerHTML=`<h4>${esc(x.symptom)} ${x.authoritative?'<span class="pill auth">author</span>':'<span class="tagline">community</span>'}</h4>`+
      (x.likely_cause?`<div class="hint">Likely: ${esc(x.likely_cause)}</div>`:'')+
      `<div style="margin-top:4px">${esc(x.fix)}${srcMany(x.source_urls)}</div>`;
    g.appendChild(c);
  });
  s.appendChild(g);
  if((cal.deficiency_signs||[]).length){s.appendChild(el('h3',null,'Signs a nutrient is low'));
    const t=el('table','dose','<thead><tr><th>Nutrient</th><th>When low</th></tr></thead>');const tb=el('tbody');
    cal.deficiency_signs.forEach(d=>tb.appendChild(el('tr',null,`<td><span class="nn">${esc(d.nutrient)}</span></td><td class="note">${esc(d.low_signs)}${srcMany(d.source_urls)}</td>`)));
    t.appendChild(tb);s.appendChild(t)}
  host.appendChild(s);
});

/* ---- Theory ---- */
reg('theory','The Theory','Understand',(DATA.theory.sections||[]).length,(host)=>{
  const t=DATA.theory||{};const s=el('section','section');s.id='theory';
  s.appendChild(el('h2',null,`<span class="idx">02</span> The Theory`));
  if(t.overview)s.appendChild(el('div','desc',esc(t.overview)));
  (t.sections||[]).forEach(x=>{s.appendChild(el('h3',null,esc(x.title)));const p=el('p',null,esc(x.body)+srcMany(x.source_urls));p.style.cssText='margin:0 0 4px;color:var(--ink-2)';s.appendChild(p)});
  host.appendChild(s);
});

/* ---- Evolution ---- */
reg('evolution','How It Evolved','Understand',(DATA.evolution.timeline||[]).length,(host)=>{
  const e=DATA.evolution||{};const s=el('section','section');s.id='evolution';
  s.appendChild(el('h2',null,`<span class="idx">03</span> How It Evolved`));
  s.appendChild(el('div','desc','Chronological changelog of the author&rsquo;s authoritative updates, first post to mid-2026.'));
  const tl=el('div','tl');
  (e.timeline||[]).forEach(ev=>tl.appendChild(el('div','ev',`<div class="dt">${esc(ev.date||'')}</div><h4>${esc(ev.change||'')}</h4>${ev.detail?`<p>${esc(ev.detail)}</p>`:''}${srcOne(ev.source_url)}`)));
  s.appendChild(tl);host.appendChild(s);
});

/* ---- Video interviews ---- */
reg('resources','Video Interviews','Understand',(DATA.resources.videos||[]).length,(host)=>{
  const rs=DATA.resources||{};const s=el('section','section');s.id='resources';
  s.appendChild(el('h2',null,`<span class="ytm">&#9654;</span> Video Interviews`));
  s.appendChild(el('div','desc',`${(rs.videos||[]).length} interviews in which the author (T_R_Heisenberg / "Jacob") explains the protocol. Click any timestamp to jump to that moment on YouTube.`));
  (rs.videos||[]).forEach(v=>{
    const c=el('div','vid');
    c.appendChild(el('div','vh',`<span class="play">&#9654;</span><div style="flex:1"><div class="vt"><a href="${esc(v.url)}" target="_blank" rel="noopener">${esc(v.title)}</a></div><div class="meta">${esc(v.host||'')}${v.ep?' &middot; Ep. '+v.ep:''} &middot; <a href="${esc(v.url)}" target="_blank" rel="noopener">watch &#8599;</a></div></div>`));
    if(v.summary)c.appendChild(el('div','vsum',esc(v.summary)));
    const tsLink=(x)=>x&&x.timestamp?`<a class="src" href="${esc(x.deeplink)}" target="_blank" rel="noopener">${esc(x.timestamp)} &#8599;</a>`:'';
    if((v.takeaways||[]).length){c.appendChild(el('div','vlabel','Key moments'));const mm=el('div','moments');v.takeaways.forEach(t=>mm.appendChild(el('div','moment',`<span class="ts"><a href="${esc(t.deeplink)}" target="_blank" rel="noopener">${esc(t.timestamp||'')}</a></span><span>${esc(t.point||'')}</span>`)));c.appendChild(mm)}
    if((v.claims||[]).length){c.appendChild(el('div','vlabel','Claims &amp; results'));const ul=el('ul','clean');v.claims.forEach(cl=>ul.appendChild(el('li',null,`${esc(cl.claim||'')}${cl.detail?' - '+esc(cl.detail):''} ${tsLink(cl)}`)));c.appendChild(ul)}
    if((v.qa||[]).length){const det=el('details','qa');det.appendChild(el('summary',null,`Q&amp;A from this interview (${v.qa.length})`));const a=el('div','a');v.qa.forEach(q=>a.appendChild(el('div','qq',`<b>${esc(q.question||'')}</b><br>${esc(q.answer||'')} ${tsLink(q)}`)));det.appendChild(a);c.appendChild(det)}
    s.appendChild(c);
  });
  host.appendChild(s);
});

/* ---- Success stories ---- */
reg('success','Success Stories','Evidence',(DATA.success.stories||[]).length,(host)=>{
  const su=DATA.success||{};const s=el('section','section');s.id='success';
  s.appendChild(el('h2',null,`<span class="idx">04</span> Success Stories`));
  s.appendChild(el('div','desc',`${su.count} members reported positive outcomes across the thread. Here are ${(su.stories||[]).length} of the most striking, self-reported. Each links to its source post; see Community Results for the full range including mixed and negative reports.`));
  const g=el('div','grid two');
  (su.stories||[]).forEach(e=>{const c=el('div','story');
    c.innerHTML=`<div class="top"><span class="who">${esc(e.author)}</span>${e.duration?`<span class="tagline">${esc(e.duration)}</span>`:''}${srcOne(e.source_url)}</div><div class="sum">${esc(e.summary)}</div>`+((e.notable_effects||[]).length?`<div class="eff">${e.notable_effects.slice(0,8).map(x=>'<span>'+esc(x)+'</span>').join('')}</div>`:'');
    g.appendChild(c)});
  s.appendChild(g);host.appendChild(s);
});

/* ---- Community results ---- */
reg('results','Community Results','Evidence',(DATA.results.experiences||[]).length,(host)=>{
  const r=DATA.results||{};const s=el('section','section');s.id='results';
  s.appendChild(el('h2',null,`<span class="idx">05</span> Community Results`));
  s.appendChild(el('div','desc','Self-reported experiences from forum members. Filter by outcome; use search to find a person, symptom, or effect.'));
  const st=r.stats||{};const bar=el('div','statbar');
  [['total','Total'],['positive','Positive'],['mixed','Mixed'],['negative','Negative'],['neutral','Neutral']].forEach(([k,l])=>bar.appendChild(el('div','s',`<b>${st[k]!=null?st[k]:'-'}</b><span>${l}</span>`)));
  s.appendChild(bar);
  const chips=el('div','chips');const list=el('div');
  let curOut='all',shown=0;
  function draw(reset){
    if(reset){list.innerHTML='';shown=0}
    const arr=(r.experiences||[]).filter(e=>curOut==='all'||oc(e.outcome)===curOut);
    const slice=arr.slice(shown,shown+40);
    slice.forEach(e=>{const o=oc(e.outcome);const d=el('div','exp '+o);
      d.innerHTML=`<div class="top"><span class="who">${esc(e.author)}</span><span class="pill ${o}">${esc(e.outcome||'n/a')}</span>${e.duration?`<span class="tagline">${esc(e.duration)}</span>`:''}${srcOne(e.source_url)}</div><div>${esc(e.summary)}</div>`+
        ((e.notable_effects||[]).length?`<div class="eff">${e.notable_effects.map(x=>'<span>'+esc(x)+'</span>').join('')}</div>`:'');
      list.appendChild(d)});
    shown+=slice.length;
    mbtn.style.display=shown<arr.length?'block':'none';
    mbtn.textContent=`Show more (${arr.length-shown} more)`;
  }
  ['all',...OUT].forEach(o=>{const ch=el('div','chip'+(o==='all'?' on':''),o[0].toUpperCase()+o.slice(1));ch.onclick=()=>{chips.querySelectorAll('.chip').forEach(x=>x.classList.remove('on'));ch.classList.add('on');curOut=o;draw(true)};chips.appendChild(ch)});
  const mbtn=el('div','more-btn');mbtn.onclick=()=>draw(false);
  s.appendChild(chips);s.appendChild(list);s.appendChild(mbtn);draw(true);
  host.appendChild(s);
});

    if((n.recommended_products||[]).length)h+='<div style="margin-top:5px"><b>Use:</b><ul class="clean">'+n.recommended_products.slice(0,8).map(p=>`<li>${esc(p.brand_product)}${p.note?' - '+esc(p.note):''}${srcMany(p.source_urls)}</li>`).join('')+'</ul></div>';

/* ============ build page ============ */
const content=$('#content');
const hero=el('div','hero');
hero.innerHTML=`<div class="eyebrow">Consolidated reference &middot; ${M.total_posts} posts</div>
  <h1>The HG7 Protocol</h1>

  <div class="stats"><div class="stat"><b>${M.total_posts}</b><span>posts</span></div><div class="stat"><b>${M.author_posts}</b><span>by author</span></div><div class="stat"><b>${M.authors}</b><span>contributors</span></div><div class="stat"><b>${M.pages}</b><span>pages</span></div></div>
  <div class="disc"><span class="dot">&#9888;</span><div><b>Not medical advice.</b> An independent synthesis of a public forum discussion of an experimental, self-directed high-dose supplement protocol that is not evaluated or endorsed by any health authority. High-dose supplementation carries real risks. Consult a qualified clinician. Every claim links to its source post.</div></div>`;

/* nav */
const nav=$('#nav');let lastGroup='';

  const a=el('a',null,`<span>${s.title}</span><span class="c">${s.count}</span>`);a.dataset.id=s.id;

/* ============ SEARCH ============ */
const SECMETA=[['protocol','Protocol'],['calibration','Calibration'],['theory','Theory'],['evolution','Evolution'],['resources','Videos'],['success','Success'],['results','Results'],['safety','Safety'],['faq','FAQ'],['sourcing','Sourcing']];
const SECNAME=Object.fromEntries(SECMETA);
function buildIndex(){
  const ix=[];const add=(secKey,label,snippet,url,extra,pill)=>ix.push({secKey,label:label||'',snippet:snippet||'',url:url||'',pill:pill||'',text:((label||'')+' '+(snippet||'')+' '+(extra||'')).toLowerCase()});
  (DATA.canonical.nutrients||[]).forEach(n=>add('protocol',n.name.replace(/\s*\(OPTIONAL.*/i,''),`${n.dose_current}. ${n.role_short}`,(n.source_urls||[])[0],n.form+' '+n.notes+' '+n.changed_from_seed));
  (DATA.calibration.symptom_fixes||[]).forEach(x=>add('calibration',x.symptom,`${x.likely_cause?x.likely_cause+' - ':''}${x.fix}`,(x.source_urls||[])[0],'',x.authoritative?'author':''));
  (DATA.calibration.deficiency_signs||[]).forEach(x=>add('calibration','Low '+x.nutrient,x.low_signs,(x.source_urls||[])[0]));
  (DATA.theory.sections||[]).forEach(x=>add('theory',x.title,x.body,(x.source_urls||[])[0]));
  (DATA.evolution.timeline||[]).forEach(x=>add('evolution',x.change,`${x.date} - ${x.detail||''}`,x.source_url));
  (DATA.resources.videos||[]).forEach(v=>{
    (v.takeaways||[]).forEach(t=>add('resources',t.point,v.title,t.deeplink));
    (v.qa||[]).forEach(q=>add('resources',q.question,q.answer,q.deeplink,v.title));
    (v.claims||[]).forEach(cl=>add('resources',cl.claim,(cl.detail||'')+' ('+v.title+')',cl.deeplink));
  });
  (DATA.success.stories||[]).forEach(x=>add('success',x.author,x.summary,x.source_url,(x.notable_effects||[]).join(' ')+' '+x.duration,'positive'));
  (DATA.results.experiences||[]).forEach(x=>add('results',x.author,x.summary,x.source_url,(x.notable_effects||[]).join(' ')+' '+x.duration,oc(x.outcome)));
  (DATA.safety.reported_side_effects||[]).forEach(x=>add('safety',x.effect,`${x.context||''} ${x.resolution?'- Fix: '+x.resolution:''}`,(x.source_urls||[])[0],x.frequency_hint));
  (DATA.safety.author_warnings||[]).forEach(x=>add('safety',x.warning,x.detail,x.source_url,'','warning'));
  (DATA.faq.faq||[]).forEach(x=>add('faq',x.question,x.answer,(x.source_urls||[])[0]));
  (DATA.sourcing.nutrients||[]).forEach(n=>add('sourcing',n.nutrient,'Use: '+(n.recommended_products||[]).map(p=>p.brand_product).join(', ')+'. Form: '+(n.required_form||''),((n.recommended_products||[])[0]||{}).source_urls?.[0]));
  (DATA.sourcing.general_tips||[]).forEach(x=>add('sourcing','Tip',x.tip,(x.source_urls||[])[0]));
  return ix;
}
const INDEX=buildIndex();
let scope='all';
function pillHtml(p){if(!p)return'';if(OUT.includes(p))return`<span class="pill ${p}">${p}</span>`;return`<span class="tagline">${esc(p)}</span>`}
function snippet(text,terms,len=210){if(!text)return'';const low=text.toLowerCase();let idx=-1;for(const t of terms){const i=low.indexOf(t);if(i>=0&&(idx<0||i<idx))idx=i}if(text.length<=len)return text;if(idx<70)return text.slice(0,len)+'…';const start=Math.max(0,idx-60);return '…'+text.slice(start,start+len)+'…'}
function doSearch(raw){
  const q=raw.trim();
  $('#clr').style.display=q?'block':'none';
  if(!q){exitSearch();return}
  $('#content').classList.add('hidden');
  const R=$('#searchpane');R.classList.add('show');
  const terms=q.toLowerCase().split(/\s+/).filter(Boolean);
  const all=INDEX.filter(it=>terms.every(t=>it.text.includes(t)));
  const counts={};all.forEach(it=>counts[it.secKey]=(counts[it.secKey]||0)+1);
  // scope chips
  const sc=$('#scopes');sc.classList.add('show');sc.innerHTML='';
  const mk=(key,label,n)=>{const c=el('div','scope'+(scope===key?' on':''),`${label}<span class="c">${n}</span>`);c.onclick=()=>{scope=key;doSearch($('#q').value)};return c};
  sc.appendChild(mk('all','All',all.length));
  SECMETA.forEach(([key,label])=>{if(counts[key])sc.appendChild(mk(key,label,counts[key]))});
  if(scope!=='all'&&!counts[scope])scope='all';
  const items=scope==='all'?all:all.filter(it=>it.secKey===scope);
  R.innerHTML='';
  R.appendChild(el('div','rescount',`${items.length} result${items.length===1?'':'s'} for &ldquo;${esc(q)}&rdquo;${scope!=='all'?' in '+SECNAME[scope]:''}`));
  if(!items.length){R.appendChild(el('div','empty','No matches. Try fewer or different words.'));return}
  SECMETA.forEach(([key,label])=>{
    const g=items.filter(it=>it.secKey===key);if(!g.length)return;
    const grp=el('div','resgroup');grp.appendChild(el('div','gh',`${label} <span class="gc">${g.length}</span>`));
    g.slice(0,60).forEach(it=>{const a=el(it.url?'a':'div','hit');if(it.url){a.href=it.url;a.target='_blank';a.rel='noopener'}
      a.innerHTML=`<div class="hl"><span>${hl(it.label,terms)}</span>${it.url?'<span class="src">source &#8599;</span>':''}</div><div class="snip">${pillHtml(it.pill)}${hl(snippet(it.snippet,terms),terms)}</div>`;
      grp.appendChild(a)});
    if(g.length>60)grp.appendChild(el('div','hint',`+ ${g.length-60} more, refine your search`));
    R.appendChild(grp);
  });
}
function exitSearch(){$('#searchpane').classList.remove('show');$('#searchpane').innerHTML='';$('#content').classList.remove('hidden');$('#scopes').classList.remove('show');scope='all'}
let dt=null;
$('#q').addEventListener('input',e=>{clearTimeout(dt);const v=e.target.value;dt=setTimeout(()=>doSearch(v),110)});
$('#clr').onclick=()=>{$('#q').value='';exitSearch();$('#clr').style.display='none';$('#q').focus()};
document.addEventListener('keydown',e=>{if(e.key==='/'&&document.activeElement!==$('#q')){e.preventDefault();$('#q').focus()}if(e.key==='Escape'){$('#q').value='';exitSearch();$('#clr').style.display='none'}});

/* scroll spy */
const spy=new IntersectionObserver(es=>es.forEach(en=>{if(en.isIntersecting)$('#nav').querySelectorAll('a').forEach(a=>a.classList.toggle('active',a.dataset.id===en.target.id))}),{rootMargin:'-40% 0px -55% 0px'});
SECTIONS.forEach(s=>{const e=$('#'+s.id);if(e)spy.observe(e)});

$('#foot').innerHTML=`Built ${M.built} from <a href="${esc(M.thread_url)}" target="_blank" rel="noopener">lowtoxinforum.com thread 53813</a> &middot; ${M.total_posts} posts &middot; independent synthesis, not affiliated with the author.`;
