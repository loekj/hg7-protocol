nfirmed amino acid chelate is not the same as glycinate chelate; everyone who switched off glycinate reported far better results, since glycinate over-chelates copper into a low-copper/high-iron state.", "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1021310"}, {"date": "2026-05-29", "change": "Warning: molybdenum glycinate causes nerve/leg pain", "detail": "Identified molybdenum glycinate as the cause of nerve and leg pain in essentially everyone taking it, requiring a switch to amino acid chelate plus more EGCG and less C.", "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1021656"}, {"date": "2026-06-04", "change": "Rebalance: zinc/C/EGCG up, biotin down", "detail": "Definitive rebalance where zinc, C and EGCG were too low and biotin too high at 1500mg (high C had inflated the biotin need), with moly and B6 judged correct.", "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1021755"}, {"date": "2026-06-10", "change": "Rapid split-dosing method; interim B6 to 200mg", "detail": "Shared a fast two-round split-dose method and suggested running the current standard at 200mg B6 (up from 150) so users are not left B6-deficient.", "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1021898"}, {"date": "2026-06-13", "change": "Trialing a 50/50 molybdenum glycinate + chelate blend", "detail": "Began trialing a half-glycinate, half-amino-acid-chelate molybdenum mix and reported it feeling good, a partial softening of the chelate-only stance.", "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1021996"}, {"date": "2026-06-22", "change": "Order of operations discovered and added to the protocol", "detail": "Realized molybdenum amino acid chelate has the shortest half-life and only works with C present, so intake order should be C, then the Bs, then EGCG, then molybdenum, then zinc; the sequence was officially added to page 1 the next day.", "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1022152"}, {"date": "2026-07-01", "change": "Standard tuned: B6 slightly underdone", "detail": "Concluded B6 was slightly underdone and updated the standard to bring the other nutrients down relative to it.", "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1022378"}]}, "calibration": {"intro": "HG7 starts from a fixed baseline ratio, but nobody's baseline is perfect: because each of the 7 nutrients rapidly depletes the others, symptoms tell you which one has fallen out of balance and you 'calibrate' by taking a small extra dose of just that nutrient, ideally within about 3 hours of your main dose while the other nutrients are still in your system. The primary decision tool is the Taste Test: place a single capsule of one nutrient on your tongue and swirl it, and if it tastes sweet/easy and your tongue wants to swallow it you likely need more of it (take the high end), while if it turns bitter and triggers your gag reflex you have enough (take it last, low, or skip it). Vitamin C is the most reliable nutrient to taste-test, and emotional state plus stool colour and consistency are the most dependable symptom signals.", "symptom_fixes": [{"symptom": "Nausea that won't subside, or vomiting shortly after dosing", "likely_cause": "Usually molybdenum too low (surfaced free copper can't excrete) or not enough EGCG per amount of zinc; nausea that lingers AFTER vomiting is usually excess EGCG", "fix": "Take ~1mg molybdenum (repeat 0.5mg up to 3-4x) and/or raise EGCG toward ~2600mg on the next dose; taste-test C and zinc and halve whichever makes you gag. If nausea persists after vomiting, re-dose with EGCG cut in half - the body tends to vomit only the excess.", "authoritative": true, "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1011047", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1017880", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1019362", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1012933"]}, {"symptom": "Calibration #1 cluster: itchy legs/scalp, anger, migraine, nausea, arm pain, left-side stomach pain, greasy brittle hair, clammy hands, pale lips", "likely_cause": "Low molybdenum - free copper is unable to excrete fully", "fix": "Take 1-1.5mg molybdenum. If this makes it worse, you instead need more B6 and biotin.", "authoritative": true, "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1011047", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1011533"]}, {"symptom": "Calibration #2 cluster: red oily fingertips, ring-finger joint pain, depression, red lips, nausea, runny nose, thinning hair in front, gut/right-side pain, lower back pain, loss of appetite, testicular pain, acidic diarrhea or light-colored stool", "likely_cause": "Low zinc (raising zinc then surfaces free copper)", "fix": "Take 50mg zinc, and follow with ~1mg molybdenum because the zinc will push copper out to excrete.", "authoritative": true, "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1011047", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1011533"]}, {"symptom": "Calibration #3 cluster (high iron): extreme cold/hot hands & feet, nausea, sinus headache, sweaty armpits, oily thinning hair, headache (not migraine), gassy, side pain, yellow eyes, dark circles, insomnia, bloating, shaky hands, endless acidic diarrhea that zinc won't fix, constipation", "likely_cause": "Too much iron that can't excrete (functionally low EGCG)", "fix": "Take 600mg EGCG plus 500mcg molybdenum, and repeat as necessary. One EGCG cap can relieve an active high-iron headache almost instantly.", "authoritative": true, "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1011047", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1013277", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1013196"]}, {"symptom": "Calibration #4 cluster: irritable, dry hair, anger, insomnia, dark yellow urine, nausea, diarrhea OR very hard stool, cravings for sweets or salad, bleeding gums", "likely_cause": "Low vitamin C", "fix": "Take 1g vitamin C.", "authoritative": true, "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1011047"]}, {"symptom": "Calibration #5 cluster: depression/mood swings, metallic taste, side cramps, tight ribs, dry mouth, dry eyes, hair thinning/receding at temples, insomnia, pinky numbness, ring-finger aching", "likely_cause": "Low B6 (but B6 requires the other B vitamins in balance)", "fix": "Take 50mg B6, 100mg biotin, and 200mg B5. This may then trigger a need for molybdenum (do calibration #1).", "authoritative": true, "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1011047", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1013419"]}, {"symptom": "Kidney-stone sensation / sharp kidney pain (EMERGENCY OVERRIDE)", "likely_cause": "Too little molybdenum, zinc, or biotin (side pain WITH testicle/lower-back pain points to kidney; side pain alone may be liver = low EGCG/zinc)", "fix": "Take the FULL formula with NO EGCG and EXTRA (high) biotin, possibly half the zinc. Wait 3 hours and reassess. Some members repeat 4g biotin several times over a couple of days.", "authoritative": true, "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1011047", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1011301", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1014523", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1012536"]}, {"symptom": "GERD / acid reflux / silent reflux / heartburn", "likely_cause": "Low biotin AND molybdenum, with vitamin C overpowering them", "fix": "Take ~1.5mg molybdenum plus a pinch of pure biotin under the tongue, and keep raising biotin (often to 2-2.5g) until it clears. If a headache or bloating follows, add EGCG.", "authoritative": true, "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1011095", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1014173", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1014508"]}, {"symptom": "Neuropathy / burning or tingling hands and feet", "likely_cause": "B6 out of balance with C, biotin and B5 (or non-pure biotin). Hot non-numb tingling is usually low biotin or B5; numb pinky/ring fingers are low B6", "fix": "For hot tingling, take all the vitamins (biotin, C, B5) WITHOUT B6 once. For numbness, raise B6 taken with B5 and B7. If neither helps, take more EGCG and molybdenum.", "authoritative": true, "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1011117", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1016066", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1019807"]}, {"symptom": "Vitamin C makes you gag", "likely_cause": "Iron too high (need EGCG) or EGCG too high; can also be low zinc or molybdenum", "fix": "Do not force the C. Replenish the other nutrient first (take EGCG and molybdenum), then take C last and at the lower end / halved.", "authoritative": true, "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1011209", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1016474"]}, {"symptom": "B6 makes you gag / nauseous", "likely_cause": "Usually low on C, molybdenum, or biotin (can indicate you are low on almost anything else)", "fix": "Replenish C, molybdenum or biotin; taste-test to decide which goes down easiest and take more of that.", "authoritative": true, "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1011353"]}, {"symptom": "Molybdenum makes you gag/vomit, or causes an immediate headache", "likely_cause": "Gagging = too low on vitamin C (especially if you took plenty of EGCG). Instant headache = a copper backlog where even a little moly surfaces iron", "fix": "For gagging, raise vitamin C. For the instant headache, run the protocol with higher EGCG and molybdenum together.", "authoritative": true, "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1014482", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1014479"]}, {"symptom": "Insomnia / waking wide awake / racing thoughts at night", "likely_cause": "Most often low vitamin C (TRH's #1 sleep-depriving deficiency), then low EGCG/high iron, then low B6; but too MUCH C also disrupts sleep by draining B6/zinc/EGCG", "fix": "Raise vitamin C first (even an extra 1000mg at night). If high-iron signs are present, take an EGCG cap; if unease/temple hair thinning, raise B6. If racing thoughts came from excess C, lower the C instead.", "authoritative": true, "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1016682", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1019374", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1019409", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1022196"]}, {"symptom": "Anxiety / panic attacks", "likely_cause": "~95% low biotin or low molybdenum (also low B6). Angry + anxious = low moly (high copper); tired/hungry with bad dreams = low biotin", "fix": "If angry, take molybdenum (often clears panic in about a minute). If desperate/grim, load biotin (e.g. 750mg repeated). Persistent anxiety on the standard dose can also mean underdosed B6.", "authoritative": true, "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1014007", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1014326", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1014488", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1014495"]}, {"symptom": "Brain fog / spaciness / dizziness / drunk or derealized feeling", "likely_cause": "Either low copper (over-chelated from too much molybdenum) or high iron; largest drivers are low molybdenum, zinc, or EGCG", "fix": "If it followed a molybdenum dose (over-chelation), one EGCG cap on its own usually clears it by pushing copper back into the blood. For high-iron fog, add EGCG; if over-chelated, lower molybdenum.", "authoritative": true, "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1018311", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1013461", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1014070", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1013829"]}, {"symptom": "Depression / sadness / low mood / low motivation / low libido", "likely_cause": "Low zinc (sometimes low B6 or low EGCG)", "fix": "Take zinc (a #2 calibration); mood, motivation and body-warmth lift as zinc rises. Avoid EGCG until zinc is replenished if libido is flat.", "authoritative": true, "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1016435", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1014868", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1021242", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1011047"]}, {"symptom": "Anger / rage / irritability", "likely_cause": "Four flavours: scorned/vengeful = low molybdenum (often with low EGCG); exhausted/irritable = low vitamin C; short-fuse won't-let-go = low B5; sad, critical, dread-rooted = low B6. A 'see red' manic rage is high B6 with low zinc", "fix": "Match the type: raise molybdenum, C, B5 or B6 accordingly; use the taste test to choose. For manic rage, do a standard dose then #3 and #2 calibrations.", "authoritative": true, "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1019261", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1019265", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1021135", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1011047"]}, {"symptom": "Testicular pain (men) / deep middle-gut pain (women)", "likely_cause": "Extremely low zinc (high copper aggravates it); low C can contribute", "fix": "Take zinc first (~25mg often relieves it) and avoid EGCG until zinc is replenished; expect to need molybdenum shortly after as zinc surfaces copper. Treat as an early warning before a stone forms.", "authoritative": true, "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1018851", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1017265", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1021531"]}, {"symptom": "Runny nose / excess mucus / chronic white throat mucus / blocked nose & sneezing", "likely_cause": "Low zinc or low B6 (sometimes low C); white mucus specifically means too much iron blocking zinc; if zinc and B6 don't fix it, the upstream cause is copper (molybdenum)", "fix": "Raise zinc or B6 (taste-test which goes down easier). If neither works, take molybdenum; for white mucus take EGCG to clear the iron.", "authoritative": true, "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1011895", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1017864", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1011770", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1012077"]}, {"symptom": "Headaches lasting hours / dose-time headache / migraine not relieved by biotin, moly or zinc", "likely_cause": "Releasing too much iron too fast - either overdoing molybdenum or underdoing EGCG. A migraine that biotin/moly/zinc won't touch is specifically low EGCG", "fix": "Raise EGCG by ~600mg and add 500mcg molybdenum per 600mg EGCG until headaches subside; a couple of EGCG caps can relieve an active headache.", "authoritative": true, "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1013438", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1017827", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1021536", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1021674"]}, {"symptom": "Bleeding or sensitive gums", "likely_cause": "Low EGCG or low C (they are opposites, so the wrong one worsens it); can also be low biotin, B6 or zinc", "fix": "If you have already raised C and still bleed, raise EGCG. Otherwise raise vitamin C. Zinc and C are the biggest culprits.", "authoritative": true, "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1013638", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1020483", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1013681"]}, {"symptom": "Tooth pain / sensitivity / demineralization / rapid decay / jaw-shift pain", "likely_cause": "Ache or sensitivity = low C or zinc; acute drill-like pain = low biotin (sometimes moly); demineralization/decay = low B6, zinc or C", "fix": "Raise C or zinc for aches, biotin for acute drill-like pain. In all tooth cases, lower EGCG on the standard dose by ~20% to relieve excess freed copper.", "authoritative": true, "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1011937", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1018246", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1019827"]}, {"symptom": "Frequent urination / waking to urinate at night", "likely_cause": "Mostly low B5; also low molybdenum, zinc or B6", "fix": "Raise B5 (500mg alone can feel soothing and resolve it); taste-test B5/zinc/B6 to decide which goes down easiest.", "authoritative": true, "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1011942", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1016503", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1017126"]}, {"symptom": "Itchy skin all over / itchy scalp / itchy shins & legs", "likely_cause": "Most often low molybdenum (especially legs and shins); itchy scalp is low biotin or too little EGCG (iron too high); general itch can be moly, biotin, zinc or B5", "fix": "Raise molybdenum (up to a few mg; leg itch can need a larger bump then taper). For itchy scalp, verify biotin is pure powder or add EGCG for the iron.", "authoritative": true, "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1013273", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1016946", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1016941", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1019054"]}, {"symptom": "Stool colour & consistency guide", "likely_cause": "Each pattern maps to a specific low nutrient", "fix": "Floating stool = raise B6. Pale/light-colored (non-acidic) + depressed = raise zinc. Acidic diarrhea (very light, burning) = lay off C, add EGCG + zinc. Dark stool = raise molybdenum, biotin or B5. Hard/sharp stool = raise C (or biotin + EGCG). Watery diarrhea = raise C ~30-50% (add zinc if it worsens). Bulky stool = raise biotin or EGCG. Constipation = raise EGCG or B6.", "authoritative": true, "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1011047", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1016846", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1013333", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1012045"]}, {"symptom": "Urine changes (dark / foamy / burning) and bladder or urethra irritation", "likely_cause": "Dark urine = low C; foamy urine = too much C (so need EGCG/zinc/moly); burning urine = low EGCG, B5 or C; bladder/urethra irritation = low zinc", "fix": "Raise C for dark urine; for foamy urine raise EGCG, zinc and molybdenum. For burning urine taste-test EGCG/B5/C. For bladder/urethra irritation, raise zinc.", "authoritative": true, "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1013503", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1013482", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1016198", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1018642"]}, {"symptom": "Rising uric acid / gout / joint pain", "likely_cause": "Low vitamin C (high iron behaves like low C), low EGCG, or low zinc; too MUCH molybdenum can also drive gout", "fix": "Raise vitamin C (sometimes double it) and/or EGCG - both bring uric acid down. If it came from excess molybdenum, add EGCG + zinc (+ some C) and lower the moly.", "authoritative": true, "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1012315", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1013151", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1014837", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1012685"]}, {"symptom": "Cold hands / cold feet / freezing body / heat & cold intolerance", "likely_cause": "Not enough EGCG or molybdenum (high iron with raised copper, neither excreting); temperature hypersensitivity comes from metals in the blood", "fix": "Do a #3 calibration (EGCG + molybdenum). If more molybdenum didn't fix it, take more EGCG. Correcting zinc balance restores temperature tolerance and body heat.", "authoritative": true, "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1016846", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1022025", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1018136"]}, {"symptom": "Bad breath", "likely_cause": "Almost always low B5 or low zinc; also high iron surfacing, or low molybdenum", "fix": "Raise zinc or B5 (either usually clears it).", "authoritative": true, "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1017485", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1020401"]}, {"symptom": "Skin: breakouts, facial bumps, oily skin", "likely_cause": "Breakouts = low biotin; facial bumps = low B5; oily skin/face = too much C or low B6", "fix": "Raise biotin (e.g. to ~1000mg) for breakouts; small B5 bump for facial bumps; drop vitamin C for oily skin.", "authoritative": true, "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1012293", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1018994", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1019697"]}, {"symptom": "Dry / dehydrated skin, cracked heels, dry hair", "likely_cause": "Dry skin = low B6 or C (some find B5); dry hair = low biotin or C; severe dry skin with electric/shock sensations = severe low B6 / iron backlog", "fix": "Raise B6 or C for skin, biotin for hair. B5 (~1000mg) noticeably helps cracked heels, sometimes overnight.", "authoritative": true, "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1019679", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1018925", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1019763"]}, {"symptom": "Hair thinning / shedding (mapped by location)", "likely_cause": "Temple = low B6; back of head = low B5/moly/EGCG; overall thinning + itchy = low biotin/moly; front-center = low zinc/C/EGCG; general thinning from too much iron in the follicles", "fix": "Correct by location. Crown shedding after a moly+B5 dose = more EGCG or biotin. Sudden large density loss = raise molybdenum and biotin ~20% and confirm biotin is not the 1% diluted version.", "authoritative": true, "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1017371", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1015006", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1013290", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1014002"]}, {"symptom": "Appetite & weight: complete appetite loss, or excessive hunger/cravings, or weight gain", "likely_cause": "No appetite = low zinc (very low zinc kills appetite). Excess hunger = low biotin (or any low B vitamin). Weight gain = low B6, moly or biotin. Cravings map to a specific low nutrient", "fix": "Raise zinc for appetite loss; raise biotin to curb excess hunger; raise B6/moly/biotin for weight gain. Read cravings: red meat -> biotin, salad/citrus -> C, carbs/sugar -> B6, ice cream/salt -> EGCG, salt -> molybdenum.", "authoritative": true, "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1017347", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1018521", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1019828", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1022085"]}, {"symptom": "Low-biotin physical tells: nightmares, lump in throat, white tongue, sore/swollen throat, muscle & eye twitches, index-finger joint pain", "likely_cause": "Low biotin (verify it is pure powder that dissolves quickly under the tongue)", "fix": "Take a mass biotin dose (pure powder under the tongue) - a pinch can clear index-finger pain or twitches in seconds. If a sore throat doesn't respond to biotin, try more molybdenum.", "authoritative": true, "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1015078", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1019727", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1018824", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1011387"]}, {"symptom": "Eye issues: floaters, dry eyes, itchy eyes, pressure behind/at the eyes", "likely_cause": "Floaters = low zinc or biotin; dry eyes = low B6 (or C, or too much EGCG); itchy eyes = low C or molybdenum; front-of-head/temple pressure with cold feet & flat mood = low EGCG; pressure directly behind the eyes = low moly, zinc or biotin", "fix": "Match the sign: zinc/biotin for floaters, B6 for dry eyes, C or moly for itch. Front-of-head pressure is the deadest giveaway to raise EGCG; if pressure is behind the eyes and EGCG is already high, go half EGCG and raise moly/zinc/biotin.", "authoritative": true, "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1011917", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1015325", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1012342", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1016694"]}, {"symptom": "Chest pain / heart pain / stinging in the heart / pain under left rib", "likely_cause": "Low molybdenum or low biotin", "fix": "Raise molybdenum or biotin; a touch too much C can also contribute so re-check C.", "authoritative": true, "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1016862", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1020196", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1018669"]}, {"symptom": "Lower back pain / mid-back ache / back swelling", "likely_cause": "Low zinc, OR copper building in the kidneys from too little molybdenum; back pain WITH water retention/swelling is instead too much EGCG", "fix": "Raise zinc (25mg can cut it ~50%). If it is a copper/kidney ache, do the full molybdenum dose. If from excess EGCG, take more B6 and drop EGCG for a dose.", "authoritative": true, "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1011553", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1013285", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1020046", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1011882"]}, {"symptom": "Right-side pain (liver / gallbladder area)", "likely_cause": "A stab an inch below the right rib, or a painless 'balloon' under the rib, means copper (low molybdenum); a gallbladder-type or back/kidney pain means iron (low EGCG + zinc)", "fix": "For the copper types, take molybdenum (relieves immediately). For the iron type, take EGCG + zinc at ~10:1 by weight (e.g. 650mg EGCG : 50mg zinc); this iron type is made WORSE by molybdenum. A #2 calibration reliably fixes gallbladder-area pain.", "authoritative": true, "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1021688", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1019181", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1016650"]}, {"symptom": "Tinnitus / ringing ears / ear-cartilage pain", "likely_cause": "Ringing = low zinc (or a need for EGCG + zinc); upper ear-cartilage pain = low molybdenum or low B6", "fix": "Raise zinc (and/or EGCG) for ringing; molybdenum or B6 for cartilage pain.", "authoritative": true, "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1020323", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1017055", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1019353"]}, {"symptom": "Bloating / gas / indigestion / gut pressure / swollen legs", "likely_cause": "Low B6 or low zinc when it's a gut issue; but bloating + feeling warm + oily hair is a high-iron sign (low EGCG)", "fix": "Raise B6 or zinc for gut bloating/swollen legs. If the bloating comes with warmth and oily hair, take EGCG + molybdenum.", "authoritative": true, "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1015574", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1020321", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1016907"]}, {"symptom": "Muscle / abdominal cramps", "likely_cause": "Low C, zinc or B5 (sometimes low EGCG); note that extra zinc itself causes cramps by draining B6", "fix": "Try C, zinc or B5 first. If the cramps followed a zinc increase, add ~50mg B6. Biotin resolves calf/foot cramps.", "authoritative": true, "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1022370", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1012238", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1022103"]}, {"symptom": "Feeling 'nothing' / flat / stoned-cold after a dose (over-chelated, low copper)", "likely_cause": "Biotin and C too low, OR copper over-chelated because molybdenum was overdone (moly directly antagonizes B6); low zinc removes the 'active edge'", "fix": "Raise biotin and C if you feel nothing. If you overdid molybdenum (flat, depersonalized), raise B6 and lower moly. Add zinc (some need 180-200mg) to restore drive and body heat.", "authoritative": true, "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1012657", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1020012", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1021276"]}, {"symptom": "Too much zinc (metallic taste, relentless nausea, bloating, worse tinnitus, low mood) or being unable to tolerate zinc/C at all", "likely_cause": "Zinc overshoot (rapid B6 depletion); OR your C, EGCG or B6 is too low so zinc surfaces copper you can't clear", "fix": "For overshoot, do a dose with half or no zinc and keep the zinc:molybdenum ratio above ~30:1; two normal doses re-balance over time. If you simply can't take zinc/C, first raise B6 (with biotin, C, B5) - the zinc craving returns once B6 is restored.", "authoritative": true, "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1019004", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1020156", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1015095", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1013983"]}, {"symptom": "Taste tells: B5 tastes extremely nasty, B5 tastes sweet, or EVERY nutrient tastes bad", "likely_cause": "B5 tasting nasty = you are heavily low biotin; B5 tasting sweet = you need more B5; everything tasting bad = you need more EGCG (the flusher of all nutrients)", "fix": "If B5 is nasty, take a large biotin dose alone under the tongue. If B5 is sweet, add ~250mg B5. If everything tastes bad, raise EGCG (and almost always molybdenum with it).", "authoritative": true, "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1012058", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1022458", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1017544"]}, {"symptom": "Allergies / histamine-like reaction / facial or stomach swelling / allergies with heartburn", "likely_cause": "Low zinc for the histamine/swelling reaction; counterintuitively, allergies WITH heartburn/reflux usually mean low molybdenum", "fix": "Try ~20mg zinc for the swelling/histamine reaction. For allergies with reflux, raise molybdenum (~4mg may be right).", "authoritative": true, "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1014072", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1020008"]}, {"symptom": "Miscellaneous physical: joint/hip stiffness, purple nail beds, soft/bendable nails, hand tremors, mouth sores", "likely_cause": "Joint/hip stiffness = lower molybdenum or low B6 (wrist/general joints = EGCG or zinc); purple nails = high iron or low B6; soft nails = low B6 or zinc (too much C can also cause it); tremors = low EGCG or B5; mouth sores = low C (revealing low EGCG and zinc)", "fix": "Joint stiffness: lower moly or raise B6/EGCG/zinc. Purple nails: standard dose then a #3. Soft nails: check B6, then EGCG, then C, then zinc via taste test. Tremors: raise EGCG or B5. Mouth sores: raise C (then expect EGCG/zinc needs).", "authoritative": true, "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1021773", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1021182", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1022473", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1021108"]}, {"symptom": "Can't dial in the stack - severe recurring nausea/vomiting, 'pill tummy', powder burps, or capsules that won't digest (community methods)", "likely_cause": "A large copper/iron backlog needing repeated micro-corrections, and/or low stomach acid (low zinc/biotin) leaving capsules undigested; the unsettled stomach itself points to low biotin, C or EGCG", "fix": "Community approaches: take the standard full dose, wait 5 min, then do 3-6 rounds of ONLY EGCG + zinc + molybdenum every 5 min (~500mg EGCG / 50mg zinc / 1.5mg moly, ratios constant), or drop to a 25-60% dose; empty EGCG capsules and spoon the powder to the back of the throat; switch vitamin C from powder to capsules to raise EGCG tolerance; separate EGCG from C by 25+ minutes; always take with fats and protein, never an empty stomach.", "authoritative": false, "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1011322", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1011496", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1012319", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1012304", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1014250", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1016490"]}, {"symptom": "Molybdenum glycinate causing sciatica / nerve / leg-hip pain / agitation / over-chelation (community)", "likely_cause": "Wrong molybdenum form: glycinate (and sodium molybdate) over-depletes copper without removing iron", "fix": "Switch to molybdenum amino acid chelate ONLY (per the protocol); lower vitamin C and raise EGCG for a day or two while rebalancing. Some members replace moly entirely with niacin/nicotinic acid (200mg-2g) for moly-induced gout/joint/snoring problems.", "authoritative": false, "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1022377", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1021682", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1022343", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1022559"]}, {"symptom": "Chronic iron backlog / high-iron symptoms that extra zinc & EGCG won't clear (community strategy)", "likely_cause": "An iron-dominant person, or B6 sitting too high relative to zinc (masking zinc need) or zinc too high relative to B6 (surfacing iron)", "fix": "Community strategy: run zero-zinc doses for days to weeks to let iron clear; front-load most of the EGCG with the morning stack instead of dripping it all day; keep B6 at least equal to zinc (some target ~3:1 B6:zinc), and lower B6 if you are a fast oxidizer.", "authoritative": false, "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1017835", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1018685", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1019317", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1015386"]}, {"symptom": "Adjunct non-HG7 supports members found helpful (community)", "likely_cause": "Ancillary deficiencies/imbalances (salt/electrolytes, calcium, bile flow, alkalosis) that show up alongside HG7 detox but are not one of the 7 nutrients", "fix": "Community reports: salt/electrolytes reduce overall calibration symptom intensity; ~2000mg/day dietary calcium improved tolerance; lecithin (2.5-3g) plus eggs eased gallstone pain; Betaine HCl fixed alkalosis symptoms; sun + vitamin D3/K2 cut B6 need sharply; 2mg melatonin helped copper-stirred insomnia. Treat these as adjuncts, not substitutes for calibrating the 7 nutrients.", "authoritative": false, "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1013045", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1013515", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1019186", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1020919"]}], "deficiency_signs": [{"nutrient": "Zinc (elemental, gluconate)", "low_signs": "Sadness/depression, complete loss of appetite, lack of motivation or energy, thinning hair at the front-center of the scalp, red oily fingertips, ring-finger ache, testicular pain/shrinkage (men) or deep middle-gut pain (women), light-colored stool, acidic diarrhea, tinnitus, bad breath, anal itching, poor digestion, and a cold flat 'stoned' feeling. Zinc needs can creep up fast.", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1011047", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1019363", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1020230"]}, {"nutrient": "Vitamin B6 (Pyridoxine HCl)", "low_signs": "Severe unease or a 'world is ending' feeling, depression, insomnia, anxiety, aggression/rage, night sweats, dry eyes, a dehydrated 'rusty hinge' feeling, tingling or numb pinky & ring fingers (neuropathy), floating stool, gassiness, stomach & side cramps, tight ribs with labored breathing, temple hair thinning, oily face, soft bendable nails, blue/purple cold hands, and carb/sugar cravings.", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1011047", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1019588", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1014436"]}, {"nutrient": "Vitamin B5 (Pantothenic Acid)", "low_signs": "Anger (short-fuse, won't-let-go), insomnia, greasy skin/hair, prickly 'electric' skin, dark or smelly diarrhea, shakiness, stomach cramps and tightness, sweaty (but not necessarily smelly) armpits, frequent urination especially at night, and dry skin/cracked heels. B5 becomes intolerable to take if you are also low in B6 or biotin.", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1011047", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1019605", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1013483"]}, {"nutrient": "Vitamin B7 (Biotin, pure powder)", "low_signs": "Severe/desperate anxiety and panic, excessive sleep yet slow to fall asleep, endless hunger, heightened unwanted libido, nightmares, leg/foot/calf cramps and muscle & eye twitches, index-finger joint pain, hair thinning, itchy scalp/back of scalp, constipation, bulky stool, chest/heart pain, migraine, lump in throat/white tongue, acid reflux/GERD, and brain fog. Biotin should dissolve quickly under the tongue when you need it and clump when you don't.", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1011047", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1019374", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1014007"]}, {"nutrient": "Vitamin C (Ascorbic Acid)", "low_signs": "Irritability, insomnia (TRH's #1 sleep-depriving deficiency), dark-colored urine, yellow eyes & nails, bleeding gums, dry skin/hair, thinning hair, sharp/smelly armpit odor, poor digestion (especially spicy food), dull gut pain when eating, and either very hard/sharp stool or watery diarrhea (watery first, hardening if ignored). Too much C is as harmful as too little.", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1011047", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1019374", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1017089"]}, {"nutrient": "EGCG (equivalent to high iron)", "low_signs": "Manic or racing thoughts, insomnia (tired but can't sleep), a warm body, emotionally numb/apathetic, lethargic/sleepy, gassy and bloated, constipated, hot/cold hands & feet, brain fog, dizziness, cold clammy hands, vitamin C makes you gag, and no other nutrient seems appealing. High iron can mimic almost any symptom because it blocks everything.", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1011047", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1019374", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1016907"]}, {"nutrient": "Molybdenum (amino acid chelate)", "low_signs": "Unresolved or scorned anger, tightness in the arms and chest, itchy legs/shins & scalp, severe nausea, anxiety/panic (high copper), confusion/brain fog, an out-of-breath feeling, chest pain (though chest pain is usually biotin), acid reflux, salt cravings, ear-cartilage pain, and frequent night urination. It is rapidly depleted and barely stored, so needs can appear suddenly.", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1011047", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1019374", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1014490"]}], "notes": ["One calibration commonly triggers the need for another: doing a #3 (high iron) quickly creates a need for #2 (low zinc) and vice-versa, because both removing iron and adding zinc surface free copper. You may have to repeat calibrations several times in a session.", "Timing window: calibrations only work while your baseline vitamins are still in your system, roughly within 3 hours of the main dose. Wait longer and you must take a fresh standard dose before recalibrating.", "Pairing rule: almost any time you raise EGCG, raise molybdenum too (freed iron surfaces copper that needs uric acid to excrete); any time you raise zinc, expect a molybdenum need shortly after.", "High iron can mimic nearly any symptom because it blocks everything - the tell-tale signs are feeling bloated/warm and hair feeling thinner, oilier and shinier. When genuinely unsure, one EGCG cap is often the single most useful move.", "Calibrate in small increments. Full-size corrections cause 'ping-ponging' between opposite symptoms; fractions of a crushed tablet or a little powder from an opened capsule are often enough.", "Nausea always means an excess of something (usually molybdenum too low for the surfaced copper, or too much EGCG). Taste-test your C and zinc and halve whichever makes you gag for a couple of doses.", "Biotin is the safest failsafe when you can't tell what's wrong - it rescues an 'out of sorts' feeling. It must be pure biotin powder (never 1% diluted), taken under the tongue, or the deficiency symptoms persist.", "Molybdenum must be the amino acid chelate form; the glycinate form over-chelates copper without removing iron and can cause sciatica, nerve, joint and agitation problems over time.", "A kidney-stone sensation is an emergency override: take the full formula with NO EGCG and extra biotin, wait 3 hours, and reassess before doing anything else.", "Emotional state and stool colour/consistency are the most reliable calibration signals; an isolated symptom like a cramp is hard to calibrate on without other accompanying symptoms.", "These are experimental community/theory calibrations, not medical advice. Symptoms can have non-HG7 causes (food sensitivities, salt/electrolyte loss, dehydration), and the author explicitly states accountability rests with the user."]}, "results": {"stats": {"positive": 330, "negative": 37, "mixed": 145, "neutral": 21, "total": 533}, "highlights": [{"author": "ScrapActivator", "outcome": "mixed", "duration": "7 days (plus days off)", "summary": "Male early 50s, carnivore, decades of chronic fatigue, brain fog, rage, insomnia, 30 years of locked/tense muscles and pain, diabetes, obesity, low libido. On the 'golden ratio' his life was transformed within days: #3 calibration stopped year-long crippling neck/head pain in minutes, #1 turned off panic attacks, #2 turned off sadness; muscles unlocked (shoulders relaxed for the first time in 30 years, then back and neck), body felt 30 lbs lighter, eyesight clearer, food tasted better, acid-reflux burps became plain burps, a skin tag fell off, cold feet warmed with #3. Two severe unresolved side effects remained: insomnia from unstoppable racing thoughts and 'acidic diarrhea'; took up to 38 calibrations in a day. (Quoted by whatisaging.)", "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1019275"}, {"author": "chalceconist", "outcome": "positive", "duration": "~1.5 years", "summary": "Says formula helped a lot fixing zinc deficiency and mediating copper toxicity, still progressing. Doing 1.33x the ratios 1-2x/day. Blindspot was Moly Glycinate over-chelating copper; reduced to ~60-70% standard while waiting on Piping Rock amino acid chelate. Mostly symptom-free now vs early nausea/puking; occasional joint pain/gassiness fixed by EGCG/moly ratio. Reports leaner body, better fat distribution, easier tanning, improving hair texture, optimizing muscle without training. RH- and believes he needs some bioavailable copper.", "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1021402"}, {"author": "ScrapActivator", "outcome": "positive", "duration": "first ~11 days", "summary": "Male early 50s, carnivore. After 30 years of debilitating illness (brain fog, chronic fatigue, muscle tension/pain, insomnia, anxiety, obesity), calls HG7 real and life-changing. By day 2 felt 30 lbs lighter; #3 calibration stopped year-long crippling neck/head pain 'like a remote control'; shoulders relaxed for first time in 30 years; could squat again; skin tag disappeared; a #1 stopped a panic attack. Main unresolved problems are insomnia from racing thoughts and acidic diarrhea. Calibration takes him 5-8 exhausting hours a day (up to 38 calibrations in one day).", "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1011533"}, {"author": "ZinkusMaximus", "outcome": "mixed", "duration": "~35+ days (about 1.5 months by early July)", "summary": "High-iron / high-uric-acid type who keeps releasing copper gradually throughout the day, needing repeated molybdenum. Found a good balance for the first few weeks then things shifted: intermittent runny nose (sometimes zinc helps, sometimes moly), sharp pains in head/feet/lower back after vitamin C, and a concerning feeling that his frame was changing for the worse. Uric acid dropped then rose again. Prefers calibrating with extremely small doses (fractions of a tablet / tiny bits of opened EGCG capsule). First day off after 35 days needed repeated small zinc.", "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1012156"}, {"author": "karen138", "outcome": "mixed", "duration": "~1 month, daily", "summary": "One-month update (age 59). Brain fog 100% gone since day one and never returned; generally less depressed and less fatigued; had a handful of 'super clean energy' days. Under-dosed EGCG days 7-14 and felt 'blah', then increased it. Last week developed daily right-side pressure under the ribs (believes liver + right kidney), bright-yellow BMs, and new right-ear popping; molybdenum top-ups reduce the pressure, so she cut EGCG in half to 575 mg while raising moly to her highest dose yet. Wants to resolve hormonal imbalances, vagus-nerve dysfunction, thin/dry skin and thinning hair. Uses Grok locked onto the HG7 forum for calibration help.", "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1021685"}, {"author": "Admiral", "outcome": "negative", "duration": "~2-3 weeks on-protocol then stopped, ~3 weeks off at retest", "summary": "Developed B6 toxicity. Started with the wrong supplements (P5P and active B5) for the first two weeks, developed warm feet, adjusted with B6. B6 blood level hit 444 (upper limit 100/125) and barely dropped after stopping. Suspects starting on P5P caused the accumulation. Serum retest ~3 weeks off HG7: ceruloplasmin 199 (150-300), copper 14, free copper 4.1 (<6.3). Some symptoms resolving over time; plans to restart with regular B6 (and wants to add magnesium/B2, which others warned against).", "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1012278"}, {"author": "ScrapActivator", "outcome": "positive", "duration": "~1 year", "summary": "HG7 fixed decades of pain that was near to leaving him bedridden in less than two weeks and he has been free of it for nearly a year (except when he takes too long a break); says HG7 restored his ability to have a life. Notes HG7 could NOT fix his type 2 diabetes/severe insulin resistance. Realized his year-long restless legs (piriformis) was actually food sensitivities that molybdenum incidentally masked, not high copper; after eliminating those foods he stopped needing isolated molybdenum. Taking extra B6 (with B5 & B7) resolved low-B6 symptoms within hours - felt 'juicy'/joints lubricated after feeling like a 'rusty, squeaky hinge'.", "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1021476"}, {"author": "ScrapActivator", "outcome": "positive", "duration": "several months plus a 25-day pause", "summary": "Long journey through multiple rebalancing stages (high copper panic/anxiety, then low copper brain fog, then months of dominant iron needing huge EGCG, then iron dropping and dosing easing). After ~6 weeks on the June 15 low dose (B6 125mg) calibrations dropped from every 5-15 min to hourly, bathroom issues and insomnia resolved. Took 25 days off to move with no withdrawal and few returning symptoms; now scaling to 75% of full dose with every supplement finally within recommended ratio for the first time. Reports it does get easier eventually even for a hard calibrator.", "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1014487"}, {"author": "Hidden49", "outcome": "negative", "duration": "Sep 2024-March 2025 his own way; ~1 month trialing standard", "summary": "Says the standard/higher-B6 approach repeatedly goes badly wrong for him: 150mg B6 at 2:1 to zinc leaves him feeling 'the metals' for days, unrelaxed, and in a worse balance. Zinc and molybdenum push him into copper-deficient states with anemia signs after hot showers (purple skin patches, dark eye bags) and pancreas pain. Reports success Sep-March doing it his own way with much lower B6, achieving a constant high-zinc state without the detox rollercoaster. Believes he has a copper-availability problem and that HG7 promotes a low-available-copper, low-estrogen, anti-progesterone (high-cortisol) state for him.", "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1020299"}, {"author": "Meikueila", "outcome": "positive", "duration": "~4 years", "summary": "One of the very first people to try the formula (Jacob's girlfriend), calibrating for ~4 years. Got rid of her dust/mite allergies and asthma (was 4/5 severity, on daily meds; no pill for years). Lost a lot of weight, face became more symmetrical, nose less 'potato', grew 2-3cm taller, hair and nails grow fast, skin more hydrated, no wrinkles, rarely gets sick, ferritin improved, feels smarter. Notes caffeine boosts the formula and that as a woman her EGCG tolerance shifts across her cycle.", "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1019297"}, {"author": "whatisaging", "outcome": "positive", "duration": "1 year", "summary": "Relayed 1-year testimony of psrocket1 (@psrocket1174983): 1 year on HG7 at 250-300 mg/day zinc, split 1/3 with breakfast, lunch and dinner. Reports less autism/adhd/ptsd/chronic-fatigue traits, less food intolerance, less eczema/psoriasis, and zero test suppression during his annual s23 SARM cycle (vs suppression in prior years). EGCG was the hardest to balance - too little causes stomach rumbling, too much causes projectile vomiting. Also maintaining bodyweight while losing body fat and gaining muscle (partly attributed to peat-style protein/glycine + lifting).", "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1021554"}, {"author": "Bruce Wayne", "outcome": "negative", "duration": "2-3 doses (first time)", "summary": "20-year-old athlete with low libido, mucus, fatigue, mild ED. Felt nothing major on day 1. Day 2 brought mild kidney discomfort, slight stinging urination, huge appetite, poor sleep. Day 3 took a full dose without EGCG (self-diagnosed copper-dominant), had sudden violent nausea and vomited twice (phlegm/clear fluid) ~15 min later, then felt strangely calm and played 90 min of soccer as top scorer, but had insomnia all night. Paused the protocol to recover; later agreed he may be too young and should fix lifestyle first.", "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1012902"}], "experiences": [{"author": "sahtft", "outcome": "positive", "duration": "3 weeks (higher dose) + 5 weeks prior (older lower dose)", "summary": "On the high-dose stack for 3 weeks after 5 weeks on the older lower-dose protocol; feels great.", "notable_effects": ["feels great"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1011050"}, {"author": "Orion", "outcome": "mixed", "duration": "~2 months straight (after earlier 3 weeks + 2 week break)", "summary": "Switched to higher amounts a week ago; sees positive gains in skin health but skin remains super oily as a side effect. Higher doses give almost no nausea now, just a general low-grade-flu sick feeling for an hour or two after.", "notable_effects": ["oily skin (mostly face)", "positive skin health gains", "general sick feeling 1-2h after dose"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1011051"}, {"author": "BRENBAIL", "outcome": "mixed", "duration": "started January, on/off through May", "summary": "Started in January at low doses, went up to '100mg zinc' protocol but felt nauseous too often. Chronic low-grade nausea building over days, freezing feet, insomnia; suspects high copper from 20 years of homemade kombucha (high EGCG). Also managing Hashimotos/low thyroid and tapering thyroid meds simultaneously. Calibrates by taste-testing each supplement individually in powder form.", "notable_effects": ["chronic nausea", "freezing feet", "insomnia", "foot/toe muscle twitches"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1011079"}, {"author": "BRENBAIL", "outcome": "positive", "duration": "first HG7-200 dose after months on lower dose", "summary": "First attempt at the high 'HG7-200' dose after lunch; disliked taking so many pills but had no side effects, was shocked. At lower dose she starts feeling imbalances after a few days.", "notable_effects": ["no side effects on first high dose"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1011332"}, {"author": "BRENBAIL", "outcome": "negative", "duration": "3 attempts at high dose", "summary": "Could not tolerate the high doses after 3 tries, each time worse with hours of severe nausea. Reverting to the original stack at halved dosages (50mg zinc etc.) to stay consistent, preferring slow rebalancing over nothing.", "notable_effects": ["severe multi-hour nausea", "intolerance of high dose"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1011486"}, {"author": "Bliss", "outcome": "mixed", "duration": "since January (~4-5 months)", "summary": "Detailed log. Found she needs full biotin dose at the start (stores well) but molybdenum needs repeated small doses over hours (clears fast, recurring nausea). Takes stack first thing with dry refined toast for consistent response so she rarely needs #2/#3 calibration - nausea is almost always resolved by molybdenum. Whole-body cold that resisted calibration eventually warmed after switching to zinc gluconate capsules.", "notable_effects": ["recurring nausea resolved by molybdenum", "whole-body cold", "cold resolved after zinc gluconate capsules"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1011120"}, {"author": "PadrePio", "outcome": "negative", "duration": "~1 week on high dose then stopped", "summary": "Developed horrible GERD/silent reflux after starting the high dose; it did not resolve even after dropping to lowest dose and eliminating Vitamin C. Also got the worst kidney pain of his life (partly from an accidental double zinc dose). Took a break from the protocol to try a sugar fast instead, though he felt the protocol was helping before the reflux wrecked his sleep.", "notable_effects": ["severe GERD/silent reflux", "severe kidney pain", "sleep disruption"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1011094"}, {"author": "Admiral", "outcome": "negative", "duration": "several weeks on/off, then break", "summary": "20-year PFS sufferer. Sees major positives he couldn't achieve in 20 years (muscle wastage, strength, premature ejaculation, libido), but within days of starting HG7 develops burning/tingling feet and hands (neuropathy) that #3 calibration does not fix. Believes he has high but bio-unavailable copper with low ceruloplasmin, so mobilized free copper causes functional copper deficiency symptoms. Took a break.", "notable_effects": ["burning/tingling feet and toes", "tingling hands", "eye twitching", "dizziness/poor balance", "bleeding gums", "candida flare"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1011385"}, {"author": "MrMark", "outcome": "positive", "duration": "since early March (~2 months)", "summary": "Repeatedly vomited on the standard high dose, driven by nausea he attributes to Vitamin C (and taking C with EGCG together). After switching to TRH's combination calibration (standard dose then 3-4 rounds of just EGCG/zinc/moly every 5 min) he felt much better and the high dose seems great. Reports gains in sleep, digestion, strength, and energy.", "notable_effects": ["vomiting (from C / C+EGCG together)", "tinnitus resolved by extra zinc/moly/egcg", "gains in sleep, digestion, strength, energy"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1011229"}, {"author": "Nusian", "outcome": "mixed", "duration": "~1.5 weeks", "summary": "First dose immediately felt calmer and more alert, like fog lifted, though nausea was intense for the first 5-10 min. Over a week and a half vomited 3 times with somewhat inexplicable nausea (only felt cold, didn't match symptom checker); calibration didn't help until he used the combination calibration (full dose then EGCG/zinc/moly rounds x6), after which he felt a lot better. Hopeful for growth/muscle benefits.", "notable_effects": ["mental fog lifted", "calmer, more alert", "intense early nausea", "vomiting x3", "flu-like feeling"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1011250"}, {"author": "thefelixarnold", "outcome": "positive", "duration": "experienced user (a.k.a. arnold01, first guinea pig)", "summary": "High copper / low iron case. Eliminated his nausea and many negative symptoms by taking zinc, moly, B5, B7 first, then taste-testing and taking B6, Vitamin C, and EGCG last, only taking what is truly needed. Pushing EGCG harder produces copper anger/anxiety/nausea, fixed by zinc and molybdenum. Notes higher-iron people may instead need C and EGCG first.", "notable_effects": ["nausea eliminated by dosing order", "copper anger/anxiety when pushing EGCG"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1011349"}, {"author": "ZinkusMaximus", "outcome": "positive", "duration": "started ~May 22 (several days)", "summary": "High iron / low copper case (like Hidden49), elevated uric acid, trained as naturopath/mineral-balancing practitioner. Feeling great on a modified high dose with very low molybdenum and reduced Vitamin C. Took as much as 1.2g zinc in a day feeling good. Lower back pain (from too much C, not moly) resolved completely after lowering Vitamin C. No high-copper symptoms despite minimal moly.", "notable_effects": ["feels great", "lower back pain resolved by lowering C", "tolerated 1.2g zinc/day", "nightmares/short sleep (low biotin)", "water retention hips/thighs"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1011521"}, {"author": "ScrapActivator", "outcome": "positive", "duration": "first ~11 days", "summary": "Male early 50s, carnivore. After 30 years of debilitating illness (brain fog, chronic fatigue, muscle tension/pain, insomnia, anxiety, obesity), calls HG7 real and life-changing. By day 2 felt 30 lbs lighter; #3 calibration stopped year-long crippling neck/head pain 'like a remote control'; shoulders relaxed for first time in 30 years; could squat again; skin tag disappeared; a #1 stopped a panic attack. Main unresolved problems are insomnia from racing thoughts and acidic diarrhea. Calibration takes him 5-8 exhausting hours a day (up to 38 calibrations in one day).", "notable_effects": ["neck/head pain off like a switch with #3", "shoulders/back/neck unlocked", "can squat", "panic attack stopped by #1", "skin tag gone", "acid reflux became normal burps", "acidic diarrhea", "insomnia/racing thoughts"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1011533"}, {"author": "whatisaging", "outcome": "positive", "duration": "since Dec 28 2024 (~5 months)", "summary": "Doing well on the protocol. Three hair tests show copper dropped from 160 to 60 over 3 months (normal 10-30). Grip strength improving on its own from 76 to ~93 lbs without training. Increased serum testosterone. Has taken 15mg molybdenum and 400mg zinc daily on average for 5 months with uric acid, copper, and zinc all testing normal, which would cause gout/deficiency/toxicity in isolation. Improved calcium/potassium hair ratio suggesting better thyroid health.", "notable_effects": ["hair copper 160->60", "grip strength 76->93 lbs", "increased testosterone", "improved Ca/K ratio", "reduced shaky hands"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1011526"}, {"author": "Tarmander", "outcome": "positive", "duration": "since Feb 1 2025 (~4 months)", "summary": "Running the protocol alongside a small amount of NDT thyroid. Feels like he's on autopilot: rarely calibrates, takes the same thing every day. Things going good. Contrasts HG7 favorably against toxic bile theory, which he criticizes as untestable.", "notable_effects": ["stable, rarely needs calibration", "on autopilot"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1011620"}, {"author": "charlie", "outcome": "neutral", "duration": "ongoing", "summary": "Continues HG7 while taking a very small amount of NDT thyroid (one scoop), which he was already taking before starting HG7.", "notable_effects": ["takes NDT concurrently without issue"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1011342"}, {"author": "GuilleM", "outcome": "neutral", "duration": "started ~Jan 29, on original lower dose", "summary": "On the original lower 100mg-B6 dose using mostly capsules; feels neutral (no bad reactions, no strong benefits). Suspects both high iron and high copper (has hemochromatosis genes, mother took copper postpartum, diagnosed low iron as a child). Switched Vitamin C from powder to capsules because the powder taste was intolerable, but wonders if capsules bypass the body's taste-test signals.", "notable_effects": ["neutral / no strong reaction"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1011595"}, {"author": "aqua906", "outcome": "mixed", "duration": "new, first days", "summary": "New user with low thyroid/Hashimotos asking whether others improved. Doing large EGCG doses (pure powder). Reports a swollen throat and a gag reflex from B6 that increases each day, which arnold interprets as a high-copper sign.", "notable_effects": ["swollen throat", "increasing B6 gag reflex", "itchy scalp"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1011345"}, {"author": "whatisaging", "outcome": "positive", "duration": "~4-6 months (month 2 in Feb 2025)", "summary": "Long-term user on a bumpy journey, not yet fully recovered, but reports significant measurable changes across height, grip strength, IQ, ferritin and HTMA copper. Ongoing struggle is vitamin C tolerance and recurring nausea, plus throwing up undigested EGCG.", "notable_effects": ["grew an inch in 3 months", "grip strength 76 to low 90s", "IQ 115 to 125", "ferritin 110 to 66", "HTMA copper 16 to 6", "energy sensation in arms/bones", "recurring nausea from vitamin C", "gum pains when C lowered"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1011646"}, {"author": "aqua906", "outcome": "mixed", "duration": "~1 month (~17 doses since May 1)", "summary": "Mostly higher dose about 17 times. Noticed increased libido and less draining ejaculation, reduced hair loss after adding biotin, possibly a wider jaw, and one strong spark feeling, but frequent nausea and recurring right-side/lower-back/kidney discomfort that tends to subside after the next dose.", "notable_effects": ["increased libido", "less draining ejaculation", "reduced hair loss with biotin", "possibly wider jaw", "occasional spark/feeling good", "frequent nausea", "right side and lower back pain", "kidney pain", "foamy urine"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1011688"}, {"author": "ZinkusMaximus", "outcome": "positive", "duration": "~2-4 weeks", "summary": "Experienced mineral-balancing practitioner trying HG7. Early win was blood in toothpaste going to zero after 3 days. Around two weeks felt good with a couple of incredible days. Later began releasing copper (symptoms resolving with molybdenum), uric acid down 10%, appears more tan. Hypersensitive but tolerates HG7 doses well using tiny fractions of capsules.", "notable_effects": ["blood in toothpaste to zero", "couple of incredible days", "releasing copper", "uric acid down 10%", "more tan", "water retention hips/thighs", "vivid dreams", "night urination"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1011988"}, {"author": "Nusian", "outcome": "mixed", "duration": "several weeks", "summary": "Struggled with severe nausea/vomiting because capsules would not digest, and solved it by emptying EGCG capsules and spooning the powder. Calibration (#3) then produced near-instant results and the taste test began working. In extreme EGCG deficiency developed flu symptoms and hemorrhoids that improve with each EGCG dose. Later learned biotin needs rise over time.", "notable_effects": ["resolved nausea/vomiting via powder method", "calibration produces near-instant results", "hemorrhoids from EGCG deficiency, improve with EGCG", "increasing biotin needs"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1011668"}, {"author": "ScrapActivator", "outcome": "mixed", "duration": "~11+ dosing days", "summary": "Detailed self-experimenter with medical PTSD. First dose triggered a 2-hour panic attack he white-knuckled through before learning a #1 calibration stops it in minutes. Core insight is that everything is a symptom: lifelong problems (lower back pain, panic attacks, neck/head pain) map to low zinc, high copper/low biotin, and high iron, and can be toggled with calibration. Needs huge biotin (up to 6000mg/day) and cannot tolerate raising C to 3g.", "notable_effects": ["panic attack fixed by #1 calibration", "symptoms toggle on/off with calibration", "very large biotin need", "looping calibrations at high B6", "vitamin C intolerance above 2.5g", "insomnia improved with lower C"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1011868"}, {"author": "Admiral", "outcome": "negative", "duration": "several weeks", "summary": "Could not make HG7 work optimally. Serum testing revealed dangerously high B6 (444, limit 100) and B1 (182, limit 140), explaining burning/tingling feet, weak muscles, tiredness, dizziness and brain fog. Also hit low functional copper from avoiding all copper foods, fixed by eating copper-rich foods. Body seems unable to use pyridoxine; plans lower dose with p5p, magnesium and B2 cofactors, and cycling.", "notable_effects": ["serum B6 444 (limit 100)", "serum B1 182 (limit 140)", "burning tingling feet", "weak muscles", "tiredness", "dizziness", "brain fog", "low functional copper symptoms"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1011822"}, {"author": "Bliss", "outcome": "mixed", "duration": "ongoing (months)", "summary": "Copper-toxic experimenter. Found cutting vitamin C in half dramatically reduced nausea, dropping molybdenum need from 8+mg to only 1-2mg in the 6 hours after a dose. Also tested replacing pyridoxine HCl with half-dose p5p, which forced the process too strongly and made symptoms harder to control. Labs reportedly showed lead changes and elevated vitamin A.", "notable_effects": ["halving C reduced nausea dramatically", "molybdenum need dropped 8+mg to 1-2mg", "p5p forced the process too strongly", "lead changes on labs", "elevated vitamin A"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1012034"}, {"author": "BRENBAIL", "outcome": "mixed", "duration": "several weeks (intermittent)", "summary": "Struggling to tolerate the full dose (symptoms so bad she cannot think through calibrations); dialed down to half zinc (50mg) and suspects bound copper or B6 sensitivity. Found diet (gluten-free starches, cassava flour high in lead) was a confounder. Needs large biotin (taste-tests fine to 1000mg+) but gets freezing feet from extra biotin. Iron labs showed total iron dropping near-deficiency while ferritin rose. Put her husband (decades of CFS) on the 100mg zinc dose and he improved.", "notable_effects": ["cannot think through calibrations at full dose", "B6 sensitivity", "large biotin need", "freezing feet from extra biotin", "total iron dropped, ferritin rose", "muscle twitches", "goopy blurry eyes"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1011855"}, {"author": "Sparxfly", "outcome": "negative", "duration": "days", "summary": "On half the newest dose; fine for 2 days then vomited 4 hours after supplements on day 3 (sudden, felt fine afterward), followed by estrogen-like hot flushes attributed to EGCG pulling iron. Can take everything except EGCG, which reliably triggers vomiting and a liver-backing-up feeling.", "notable_effects": ["vomiting 4 hours after dose on day 3", "estrogen-like hot flushes", "EGCG triggers vomiting", "liver backing-up feeling"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1011862"}, {"author": "Creaky robot", "outcome": "positive", "duration": "months (intermittent, half dose)", "summary": "Female user reporting major menstrual improvements as the only change she made: cycle lengthened from 14-21 days to 35 days, heavy bleeding stopped, and PMS breast tenderness disappeared (returns within a week off, stopped again by one dose). Full dose caused intense nausea and two days of diarrhea, so she uses half dose every 2-3 days. Chronic pre-existing diarrhea persists. Believes she is copper toxic.", "notable_effects": ["cycle lengthened to 35 days", "heavy bleeding stopped", "PMS breast tenderness gone", "improved inflammation markers", "nausea and diarrhea on full dose", "persistent chronic diarrhea"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1012019"}, {"author": "Don", "outcome": "mixed", "duration": "4 months", "summary": "Four months with some of the best supplement results he has tried, but brutal groin nerve pain (attributed to B6) forced him to quit, along with worsening silent reflux from vitamin C. Isolation testing pointed to B6 and molybdenum aggravating the nerve pain. Never vomited. Benefits included improved sleep, blood sugar, energy, strength, bowel movements, skin and fat loss.", "notable_effects": ["improved sleep", "improved blood sugar", "improved energy and strength", "better bowel movements", "skin improvements", "fat loss", "brutal groin nerve pain (B6)", "worsening silent reflux"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1012023"}, {"author": "PadrePio", "outcome": "negative", "duration": "3 months", "summary": "Ended a three-month trial. High-dose vitamin C (up to 10g/day) dramatically worsened silent reflux and difficulty breathing, and even low-dose C did so afterward. Also found excessive zinc/molybdenum or too little EGCG gave him kidney pain. Will retry only if gut issues resolve. Knows of three people who developed or worsened silent reflux from large vitamin C doses.", "notable_effects": ["silent reflux worsened by vitamin C", "difficulty breathing", "kidney pain from excess zinc/moly or too little EGCG"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1012004"}, {"author": "sahtft", "outcome": "positive", "duration": "~14-15 weeks", "summary": "Took 1.5x the 100mg zinc formula for about 8 weeks then 1.5x the 200mg zinc formula for 6-7 weeks; everything great. Got into cycling around the higher-dose switch and improved unusually fast, ramping up to two 75km rides per week at 27kph average, having previously done only strength training and walking. Credits HG7.", "notable_effects": ["rapid cycling fitness gains", "two 75km rides per week at 27kph", "general wellbeing"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1011934"}, {"author": "Orion", "outcome": "mixed", "duration": "3+ months", "summary": "Over three months on a higher stack; the only notable side effect is mild nausea for a few hours after dosing and occasional extra bowel movements. Digestion, sleep, strength training and recovery are benefiting. Skin broke out badly after two weeks and is now slowly calming, which he expects to be a major improvement by six months. Positive changes are slow-moving.", "notable_effects": ["improved digestion", "improved sleep", "improved strength and recovery", "skin breakouts then slowly improving", "mild nausea"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1012070"}, {"author": "inde8", "outcome": "negative", "duration": "4 days", "summary": "New starter (previously on TRT, chronic fatigue and brain fog) four days into the protocol, mainly experiencing side effects (nausea, tiredness, brain fog, gassiness, lower back pain) with no benefits yet. Trying to calibrate but unsure which symptoms are copper/iron dumping versus imbalance. Remained on TRT to watch bloodwork changes.", "notable_effects": ["nausea", "tiredness", "brain fog", "gassiness", "lower back pain", "sudden urge to use bathroom"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1011788"}, {"author": "Tarmander", "outcome": "positive", "duration": "long-term (months+)", "summary": "Long-time user who has adapted; now takes everything at once and rarely feels much from the formula. Used to get slight headache or nausea in the first hour, now barely anything. Has pre-existing acid damage (gastro scope 5 years ago) managed by sleeping at an angle and avoiding coffee/chocolate; recommends delayed-release vitamin C for anyone with silent reflux rather than quitting.", "notable_effects": ["no longer feels headache/nausea", "no calibration needed"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1012654"}, {"author": "whatisaging", "outcome": "positive", "duration": "several months (grip tracked since February)", "summary": "Reports strong benefits: biggest is 'memory traps' (unpleasant memories haunting him 24/7) d
