igns after hot showers (purple skin patches, dark eye bags) and pancreas pain. Reports success Sep-March doing it his own way with much lower B6, achieving a constant high-zinc state without the detox rollercoaster. Believes he has a copper-availability problem and that HG7 promotes a low-available-copper, low-estrogen, anti-progesterone (high-cortisol) state for him.", "notable_effects": ["copper-deficient states from zinc/moly", "anemia signs after hot showers", "pancreas pain", "'anti-progesterone' stressed feeling from high B6", "biotin feeds yeast / carb intolerance"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1020299"}, {"author": "StewoParker", "outcome": "negative", "duration": "ongoing", "summary": "Echoes Hidden49: the formula feels too accelerated/in-a-rush and he has problems with the high molybdenum, needing far less. Too much moly leaves him anxious, with neuropathies, feeling detached and 'dumb'.", "notable_effects": ["accelerated/rushed feeling", "anxiety", "neuropathies", "detachment", "cognitive dulling from high moly"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1020356"}, {"author": "Epinerein", "outcome": "negative", "duration": "ongoing (weeks)", "summary": "Chronic sleep failure persists across many ratio tweaks: tosses and turns all night, body feels tight, anxious/edgy by day. Lifelong poor sleeper; symptoms (feeling unreasonably hot in bed at normal body temp, cold, daytime fatigue, irritability, anxiety, tinnitus and ear pain) worsened after a period of copper toxicity. Relies on lemborexant or sleeps only 15-30 min/night without it.", "notable_effects": ["intractable insomnia", "body tightness", "feeling hot in bed", "tinnitus", "ear pain", "daytime anxiety"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1020025"}, {"author": "Hidden49", "outcome": "mixed", "duration": "~6 months own way plus ~1 year total", "summary": "Ran his own lower-dose version for 6 months with minimal symptoms (worst was a mild headache), never went crazy or ended up in pain; only ran into issues in the last month when he started experimenting with a higher B6-to-zinc ratio like the standard protocol.", "notable_effects": ["mild headache as worst symptom", "issues when raising B6:zinc toward standard", "higher B6 gives stressed/anti-progesterone feeling"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1020370"}, {"author": "Epinerein", "outcome": "positive", "duration": "10 months", "summary": "At month 10 took everything within range except biotin (850mg instead of usual 1600mg) and was surprised not to need any calibration.", "notable_effects": ["no calibration needed at month 10"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1020384"}, {"author": "Nusian", "outcome": "positive", "duration": "not stated", "summary": "Dropped vitamin C to 0.5g then 0.3g and saw a huge difference: woke with a clear head and no racing thoughts, felt calm and happy, and could finally take 70mg zinc without feeling like he was kicking out crazy amounts of iron.", "notable_effects": ["clear head, no racing thoughts", "calm and happy", "tolerated 70mg zinc"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1020387"}, {"author": "recoil", "outcome": "positive", "duration": "first few doses", "summary": "Doses #2 and #3 done exactly per page 1 gave a much better experience with no migraine; switched to taking HG7 at night to distance it from morning meds (diuretic and uric acid reducer).", "notable_effects": ["massive increase in energy", "slight metal taste on cracked lips", "slight bloat", "slight nausea after eating", "no migraine"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1020412"}, {"author": "charlie", "outcome": "mixed", "duration": "not stated", "summary": "Did much better on the protocol before the last two changes; the big zinc jump knocked him for a loop, so he forwent the second change and reverted to the earlier dose. Also got eye irritation on the changed dose.", "notable_effects": ["big zinc jump caused problems", "eye irritation/burning", "reverted to prior dose"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1020413"}, {"author": "Orion", "outcome": "positive", "duration": "not stated", "summary": "Doing good on the new stack and moving to 6 days on / 1 day off; nausea was manageable on the double stack and there is no nausea at all now on the new lower stack.", "notable_effects": ["no nausea on new stack", "one-day break feels nice"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1020423"}, {"author": "MrMark", "outcome": "mixed", "duration": "not stated", "summary": "On the current standard symptoms are more subtle and sometimes hard to decide what to calibrate with; most common calibration is more zinc then more egcg about 4-5 hours after the original dose. Noticed biotin clumping around 500mg.", "notable_effects": ["subtle symptoms", "biotin clumps at ~500mg", "recurring need for more zinc then more egcg"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1020427"}, {"author": "Epinerein", "outcome": "positive", "duration": "not stated", "summary": "Still figuring out insomnia by taking individual HG7 components while lying awake at night; EGCG 300mg + Moly 0.5mg gave his first full sleep cycle in weeks (slept 2 hours).", "notable_effects": ["first full sleep cycle in weeks"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1020469"}, {"author": "chalceconist", "outcome": "mixed", "duration": "~1 year (multiple blood draws)", "summary": "Blood test showed zinc finally came up after being chronically low-key deficient, ferritin up slightly to highish-normal, and testosterone off the charts (vs middle/upper normal a year earlier); ongoing issues are sensitive/periodically bleeding gums and seemingly unlimited biotin needs.", "notable_effects": ["zinc came up", "testosterone off the charts", "ferritin up slightly", "sensitive/bleeding gums", "unlimited biotin needs", "high bilirubin (has Gilbert's)"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1020480"}, {"author": "tommyg130", "outcome": "positive", "duration": "not stated", "summary": "A low-estrogen (tanked estradiol/estrone/Dutch), underweight type who never needs high molybdenum (none or 0.5-1mg even at full dose) and can consistently take a full zinc dose with only 1 EGCG capsule; zinc raised all his hormones (DHEA, pregnenolone, T) in balance.", "notable_effects": ["never needs high moly", "full zinc with 1 egcg cap", "zinc raised all hormones in balance"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1020781"}, {"author": "Nusian", "outcome": "positive", "duration": "not stated", "summary": "Switched to molybdenum amino acid chelate (the recommended form) and the whole process just feels nicer and smoother.", "notable_effects": ["process feels nicer and smoother on correct moly form"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1020563"}, {"author": "ZinkusMaximus", "outcome": "negative", "duration": "not stated", "summary": "Lowered EGCG from 7.5 to 6.5 caps to stop endless zinc needs but energy got worse and symptoms less clear; had to keep taking zinc for lower back pain and woke with copper symptoms (itchy legs, frequent urination). Persistent low-zinc symptoms; TRH later said zinc had been set too low.", "notable_effects": ["endless/persistent low-zinc needs", "lower back pain 7-8 hrs post dose", "worse energy on lower egcg", "copper symptoms (itchy legs, frequent urination)"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1020411"}, {"author": "ScrapActivator", "outcome": "mixed", "duration": "~1 year with a 61-day break", "summary": "Took a 61-day break (partly budget, partly a diabetic ketoacidosis ICU crisis explicitly not caused by HG7); during the break his main HG7-addressable problems were high copper (restless upper-butt muscles, insomnia), low B6 (numb pinky/ring fingers), and high iron (neck cricks). Restarted a full dose on the new formula.", "notable_effects": ["high copper = restless upper-butt muscles/insomnia", "low B6 = numb pinky/ring fingers", "high iron = neck cricks"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1020569"}, {"author": "Areez", "outcome": "negative", "duration": "on and off since Feb 2025", "summary": "Hit an extreme B6 deficiency backlog: 7 days of moderate-to-severe unease, labored breathing, gum bleeding, swollen gums/face, feeling hot and sweating, slowed gut, and night sweats, needing 1400-2200mg B6 per day; even 25mg B5 or B7 worsened symptoms. Sunbathing and vitamin D later helped dramatically.", "notable_effects": ["extreme B6 deficiency", "gum bleeding and swollen gums/face", "labored breathing, night sweats, dry mouth", "B5/B7 worsen symptoms"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1020582"}, {"author": "Meikueila", "outcome": "positive", "duration": "~2 years", "summary": "Long-time user (with Jacob); takes the stack every few days, waits for symptoms then takes a little more than the current dose. Takes slightly less zinc but the standard works great; can now take up to 90mg zinc (gags above that) and can take more zinc right before her period, less mid-cycle.", "notable_effects": ["takes every few days", "cycle-dependent zinc tolerance", "standard works well"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1020606"}, {"author": "karen138", "outcome": "positive", "duration": "6 days / 6 doses", "summary": "New female post-menopausal starter (late 50s) who cannot swallow pills; 6 doses at 30-50% of standard with no calibrations needed. Big surge in energy, improved mental health with much less anxiety/worry/overwhelm, and waking up ready to start the day. Reordered to moly first / EGCG last (down to 1 cap) to avoid EGCG nausea.", "notable_effects": ["big energy surge", "much less anxiety", "EGCG nausea resolved by reordering", "achy legs one night"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1020946"}, {"author": "Disrupt4489", "outcome": "positive", "duration": "not stated", "summary": "Current dose goes down suspiciously well with only an itchy anus in the evening (fixed with a little zinc) and nothing else to calibrate; mildly concerned about reabsorption since stool is no longer loose. Reports feeling nothing negative from calibration drift others describe.", "notable_effects": ["very few symptoms", "itchy anus fixed with zinc", "wife reports biotin burning her mouth"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1020899"}, {"author": "purple pill", "outcome": "mixed", "duration": "not stated", "summary": "On 50% of full dose still needs over 2g biotin and low EGCG (1 cap); feels like he clears a huge copper backlog (migraines go away), then flips to high-iron symptoms and back through killer migraines on the next dose. Suffers many migraines.", "notable_effects": ["frequent migraines", "copper backlog then high-iron cycling"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1020822"}, {"author": "Nusian", "outcome": "positive", "duration": "not stated", "summary": "Doing doses with half (or less) EGCG, very little or no B7, 1.5-2x moly, high-end C and zinc; feels like he is kicking out ridiculous amounts of copper and getting calmer and more focused with each dose, as if clearing a copper backlog.", "notable_effects": ["kicking out large amounts of copper", "calmer and more focused"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1020666"}, {"author": "MrMark", "outcome": "positive", "duration": "not stated", "summary": "Feels pretty good on the lower dose, needing a couple of zinc calibrations each day; considering dropping egcg further to ~1250 and lowering b6 if called for.", "notable_effects": ["feels good on lower egcg", "a couple zinc calibrations per day"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1020687"}, {"author": "Areez", "outcome": "mixed", "duration": "~37 days", "summary": "Reports a huge low-B6 backlog requiring enormous B6 amounts starting in April; average daily ~2200 mg B6, 50 mg zinc, 100 mg B7, 300 mg B5, 150 mg C, zero EGCG/moly. Low B6 symptoms return 5-7 hours after each dose. Reports feeling hot/sweating tied to low B6, and disproportionately high B6 needed for itchy scalp/legs. Height partially recovered on HG7.", "notable_effects": ["low B6 symptoms recur 5-7h after dose", "feeling hot and sweating (attributes to low B6)", "itchy scalp/crown/legs needing high B6", "partial height recovery"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1021056"}, {"author": "tinymonkey2", "outcome": "mixed", "duration": "~2 weeks", "summary": "50yo post-menopausal woman with mold history, histamine issues, eczema, suspected copper toxicity (hair test) and above-range ferritin. Historically could barely tolerate any B6 (using P5P) without skin flares. On HG7 is amazed she can now tolerate much more B6. Worked up to 50% of high-end dose. Persistent odd symptoms not in calibration buckets: itchy red tops of ears, itchy neck/lower back, occasional eczema flare, internal tremors worse, wired/disrupted sleep. Taking days off triggered a bad skin flare.", "notable_effects": ["now tolerates B6 (previously couldn't)", "itchy/red tops of ears", "itchy back of neck/lower back", "internal vibrations/tremors worse", "wired feeling / disrupted sleep", "vivid dreams", "light stool then acidic diarrhea", "skin flare after stopping dose"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1021042"}, {"author": "tommyg130", "outcome": "mixed", "duration": "ongoing (weeks+)", "summary": "B6 is 'pure life force' for him - raises body temp, alleviates fear - but crashes hard if biotin lags. EGCG and moly consistently fail him (flat feeling, head pressure, facial pressure/deformation); believes he is more low-iron/low-copper. Found his real fix is high zinc (~180-200 mg) plus B6/B5/B7; extra zinc gave warmth, drive and a dialed-in balanced state, motivation to exercise for first time in years.", "notable_effects": ["B6 raises body temp and confidence, alleviates fear", "hard crash next morning if biotin too low relative to B6", "biotin improves circadian rhythm/waking with sun", "EGCG/moly cause flat feeling, head/facial pressure", "high zinc gave warmth, drive, relaxed-but-alive state", "copper 2mg felt awful/numbing"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1021276"}, {"author": "Meikueila", "outcome": "positive", "duration": "ongoing (on formula)", "summary": "Injured a nail lifting a box - it bent backwards, lifted from bed, bled and bruised but did not crack; healed essentially overnight and fully within two days. Reports nails grow extremely fast and strong naturally on the formula without treatments.", "notable_effects": ["overnight nail/injury healing", "very fast nail growth", "strong nails without treatments"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1021084"}, {"author": "dave_282", "outcome": "positive", "duration": "not specified", "summary": "Confirms same experience as Meikueila - nail growth has been crazy on the formula.", "notable_effects": ["fast nail growth"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1021088"}, {"author": "ScrapActivator", "outcome": "positive", "duration": "~1 year (90 doses)", "summary": "After 90 doses over nearly a year, hit first-ever dose that needed no calibration - the standard page-one dose with half the C (per the new C-rebalancing protocol). Felt so good afterward he danced. Notes he spent a month reading and taking notes before starting.", "notable_effects": ["first calibration-free dose", "felt great, danced"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1021091"}, {"author": "Vive", "outcome": "positive", "duration": "~3 weeks (18 doses)", "summary": "50+ woman on the women's dosage for ~3 weeks. Initially achy, now feels good on dose days; few side effects, sometimes too much zinc. Took a break for a month while in India, got a cough and sore rib muscles (helped by magnesium); paused HG7 for magnesium and cough resolved. Discusses glyphosate/copper theories and beef liver; overall feels good with the protocol and terrible without.", "notable_effects": ["feels good on dose days", "occasional excess zinc", "feels terrible without protocol"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1021110"}, {"author": "chalceconist", "outcome": "positive", "duration": "~1.5 years", "summary": "Says formula helped a lot fixing zinc deficiency and mediating copper toxicity, still progressing. Doing 1.33x the ratios 1-2x/day. Blindspot was Moly Glycinate over-chelating copper; reduced to ~60-70% standard while waiting on Piping Rock amino acid chelate. Mostly symptom-free now vs early nausea/puking; occasional joint pain/gassiness fixed by EGCG/moly ratio. Reports leaner body, better fat distribution, easier tanning, improving hair texture, optimizing muscle without training. RH- and believes he needs some bioavailable copper.", "notable_effects": ["fixed zinc deficiency", "mediated copper toxicity", "leaner, better fat distribution", "tans more easily", "improving hair texture", "muscle optimizing without training", "early nausea/vomiting resolved", "joint pain/gassiness when EGCG/moly off", "temple hair thinning (attributes to excess moly draining B6)", "high P5P on blood test after formula"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1021402"}, {"author": "BaselineShift", "outcome": "positive", "duration": "~5 days (first week)", "summary": "New user, 15-year severe insomnia and low body temp (usually 96-97F). Day 1 easy ride: felt slowed/stoned, metallic taste, arousal, then normal/better after 3h. Day 2 (upper range + light meal): within 10 min body fully relaxed, anxiety COMPLETELY vanished, no metallic taste, body temp rose to 98.6F, lost appetite. Anxiety suppression impressive; new clarity let him reframe a tormenting problem. Ran up to 2 rounds/day by day 5 with no side effects.", "notable_effects": ["anxiety completely vanished", "deep physical relaxation", "body temp rose to normal 98.6F", "metallic taste day 1", "appetite loss", "mental clarity / better decisions", "stoned-like feeling initially"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1021196"}, {"author": "karen138", "outcome": "positive", "duration": "~2 weeks (15 doses)", "summary": "59yo woman, ~dose #14-15 at 60% strength, slowly increasing %. Brain fog left day 1 and never returned, sleep good. Can only tolerate very low EGCG (1 cap/326mg, below range) since dose #4 - believes she is high/toxic copper. Raising zinc to mid-range gave immediate strong positive lift in mood/motivation/lightness. Increasing biotin helped bowel transit temporarily. When she raised EGCG instead of zinc, felt worse, gag reflex to EGCG, brief anger flash.", "notable_effects": ["brain fog gone day 1", "immediate mood/motivation lift from zinc", "only tolerates very low EGCG", "gag reflex/anger when raising EGCG", "slowed bowel transit / constipation", "chocolate tasting different", "leg/foot cramping"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1021242"}, {"author": "Nusian", "outcome": "mixed", "duration": "ongoing", "summary": "Rollercoaster rebalancing after switching from molybdenum glycinate to amino acid chelate; getting close, some low zinc to make up. C and B7 needs have dropped to almost zero (does tiny sips of C, no B7 for over a week). B7 over 1g causes uncontrollable iron dumping requiring ~8x standard everything and feeling shocking. Found he was extremely low zinc which masked other symptoms and impaired clear thinking; new ratios felt good.", "notable_effects": ["extreme low zinc masked symptoms and impaired thinking", "C and B7 needs dropped near zero", "high B7 (>1g) triggers uncontrollable iron dump", "moly glycinate more potent than chelate"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1021082"}, {"author": "Hidden49", "outcome": "mixed", "duration": "long-term (experimented over a year)", "summary": "Reports standard protocol didn't work for his biochemistry (self-described low-available-copper, fast oxidizer type). Found better results with modifications and supporting copper via other means. Gets better zinc utilization (stronger androgen effect, social confidence) using L-glutamine and NAC individually vs HG7. Believes excess zinc/moly/biotin push him into alkalosis, turning off hormones/confidence, fixed by Betaine HCL. B6 makes him confident but less calm; can feel calm 'alpha' energy without B6.", "notable_effects": ["standard protocol failed for him", "alkalosis from zinc/moly/biotin (low confidence, low androgens) fixed by HCL", "better zinc utilization with L-glutamine/NAC", "B6 raises confidence but reduces calm", "milk chocolate caused anger/irritability on HG7", "moly reduces exercise desire/energy"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1021355"}, {"author": "StewoParker", "outcome": "mixed", "duration": "Jan-May 2026 (several months)", "summary": "Never had much success with HG7; tried every stack Jan-now, would work for a couple doses then crash, feeling cold and empty. Kept an Excel of many trials with varying C/zinc. Only started feeling better after backing off high biotin, lowering doses, and adding something else (per Hidden's advice). Now doing well on just 5mg biotin; believes too much biotin causes alkalosis, impaired protein digestion, dry skin, low libido.", "notable_effects": ["repeated crashing after a couple doses", "coldness and emptiness", "improved on much lower biotin (5mg)", "high biotin -> alkalosis, dry skin, low libido, impaired protein digestion"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1021350"}, {"author": "whatisaging", "outcome": "mixed", "duration": "ongoing", "summary": "Fast/hyper-responder: noticed effects within days, fixed a lot of 'front end' stuff in a week, but had many side effects. Nuked copper to low levels via dextrose and now needs tons of zinc; eventually still gets low-moly/high-copper symptoms after a while. Main unresolved issue is zinc-nausea after vitamins drain out. Reports OJ/orange juice gives low-moly symptoms and reverses IQ gains. RH-; inclined toward high EGCG/zinc path rather than copper.", "notable_effects": ["rapid response within days", "fixed front-end symptoms in a week", "many side effects", "needs tons of zinc after copper depletion", "zinc-nausea after vitamins drain", "OJ causes low-moly symptoms and reverses IQ gains", "IQ gains reported"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1021346"}, {"author": "Disrupt4489", "outcome": "positive", "duration": "long-term user", "summary": "Experienced HG7 user with relatively minor symptoms; formula is helping. Loaded a depaged PDF of the thread into NotebookLM as an AI helper for symptom suggestions. Used HTMA tests as a safety net to monitor HG7 (results trended in right direction) but later concluded HTMA is unreliable between labs and no longer recommends HG7 to others without additional safety checks, though still does it on himself. HTMA interpretations confirmed his hidden low zinc, iron dysregulation, low potassium.", "notable_effects": ["HG7 helping his minor symptoms", "HTMA confirmed hidden low zinc, iron dysregulation, low potassium", "uric acid + liver tests used for safety"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1021338"}, {"author": "Mog", "outcome": "positive", "duration": "not specified", "summary": "Self-describes as pale, shredded, low estrogen (low-copper type). Reports flush niacin and B12 gave benefits that could be seen as copper benefits, especially B12. Says taking copper directly didn't work for him.", "notable_effects": ["flush niacin and B12 gave copper-like benefits", "direct copper supplementation didn't work"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1021378"}, {"author": "purple pill", "outcome": "neutral", "duration": "not specified", "summary": "Personal experiment: took pyridoxamine in place of pyridoxine HCl at same dose - little effect; had to take HCl form to boost mood/iron, despite pyridoxamine looking superior on paper.", "notable_effects": ["pyridoxamine had little effect vs pyridoxine HCl", "pyridoxine HCl needed to boost mood/iron"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1021170"}, {"author": "ScrapActivator", "outcome": "positive", "duration": "~1 year", "summary": "HG7 fixed decades of pain that was near to leaving him bedridden in less than two weeks and he has been free of it for nearly a year (except when he takes too long a break); says HG7 restored his ability to have a life. Notes HG7 could NOT fix his type 2 diabetes/severe insulin resistance. Realized his year-long restless legs (piriformis) was actually food sensitivities that molybdenum incidentally masked, not high copper; after eliminating those foods he stopped needing isolated molybdenum. Taking extra B6 (with B5 & B7) resolved low-B6 symptoms within hours - felt 'juicy'/joints lubricated after feeling like a 'rusty, squeaky hinge'.", "notable_effects": ["decades of near-bedridden pain gone in <2 weeks", "restless legs/piriformis resolved after removing food sensitivities", "low-B6 symptoms resolved in hours with extra B6", "joints felt lubricated/'juicy'", "diabetes/insulin resistance NOT fixed"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1021476"}, {"author": "whatisaging", "outcome": "positive", "duration": "1 year", "summary": "Relayed 1-year testimony of psrocket1 (@psrocket1174983): 1 year on HG7 at 250-300 mg/day zinc, split 1/3 with breakfast, lunch and dinner. Reports less autism/adhd/ptsd/chronic-fatigue traits, less food intolerance, less eczema/psoriasis, and zero test suppression during his annual s23 SARM cycle (vs suppression in prior years). EGCG was the hardest to balance - too little causes stomach rumbling, too much causes projectile vomiting. Also maintaining bodyweight while losing body fat and gaining muscle (partly attributed to peat-style protein/glycine + lifting).", "notable_effects": ["less autistic/adhd/ptsd/chronic fatigue", "less food intolerance", "less eczema/psoriasis", "zero SARM (s23) test suppression", "fat loss + muscle gain", "low moly -> panic/racing anxiety/negativity; too much moly -> headache"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1021554"}, {"author": "tommyg130", "outcome": "positive", "duration": "several months (ongoing)", "summary": "Describes HG7 immediately solving the hardest-to-treat mental symptoms for him: neuroticism, fear, a feeling of being 'possessed', 24/7 unease, over-stimulation, depersonalization and inability to enjoy being alive - symptoms his family dismissed as anxiety/weakness because he looked healthy. Theorizes this profile is a 'high copper type' and that HG7's dramatic effect is strongest for that subset vs people with ordinary low-energy/digestive profiles.", "notable_effects": ["neuroticism/fear resolved", "depersonalization lifted", "reduced over-stimulation and unease"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1021486"}, {"author": "dave_282", "outcome": "positive", "duration": "ongoing (alternate-day dosing)", "summary": "Doing HG7 on alternate days, everything going well, nothing negative to report, still feeling good. Switched to zinc gluconate powder without issue and actually prefers it because the powder is sweeter.", "notable_effects": ["feeling good, no issues", "tolerated zinc gluconate switch"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1021574"}, {"author": "taralynne", "outcome": "mixed", "duration": "a few months in 2025, then restarted ~1 month ago", "summary": "First run in 2025: sebaceous cysts on her face reduced in size (didn't fully disappear), but she stopped HG7 because of a crazy amount of hair shedding (one of her main issues). Shedding continued months after stopping and only stopped after red-light therapy 4-5x/week, then partially returned. Lost ~20 lbs last year (unsure if HG7-caused). Restarted 4/26/26 ramping from twice/week to ~3-4x/week; no changes noticed yet. Later realized she had been badly under-dosing B5 due to a dropper miscalculation (25 mg per dropperful, not per drop).", "notable_effects": ["sebaceous cysts reduced", "possible ~20 lb weight loss", "aggressive hair shedding (led to stopping)", "nausea/vomiting when zinc raised to 90 mg"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1021585"}, {"author": "Vive", "outcome": "mixed", "duration": "~3 weeks, nearly daily", "summary": "About 3 weeks in on the recommended dose. Sleeps better and had mornings of feeling really good with energy and calm; one night felt a stream of relaxing 'wind' energy (like vipassana meditation) but couldn't sleep. Downsides: some nausea and gut pain when not eating, right-side neck stiffness near the ear (suspects cortisol), 3am waking, and arm tightness that passes. Suspects white sugar triggers headaches/sugar sensitivity. Experimenting with slightly less C and EGCG.", "notable_effects": ["better sleep", "energy and calm on some mornings", "meditative energy sensations", "nausea", "neck/ear-side stiffness", "gut pain when fasting", "arm tightness"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1021619"}, {"author": "BaselineShift", "outcome": "positive", "duration": "18 days (20 doses)", "summary": "First-timer log, day 18. Takes the standard dose once a day with french fries, nothing negative. Pattern: uneasy feeling for 20-30 min post-dose, which fades, then ~30 min later a pleasant 'medium high' with anxiety gone for hours. Metallic mouth taste only the first two days. Improvements so far mostly mental - drastic general anxiety reduction, more relaxed, smoother interactions, easier decisions; physically hands a bit less dry. Main remaining goal is fixing 15+ years of insomnia with restless-legs-like burning limbs. Uses raw EGCG powder because he doesn't digest big caps well.", "notable_effects": ["drastic anxiety reduction", "pleasant mild high for hours", "smoother social interactions", "hands less dry", "transient metallic taste first 2 days"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1021670"}, {"author": "karen138", "outcome": "mixed", "duration": "~1 month, daily", "summary": "One-month update (age 59). Brain fog 100% gone since day one and never returned; generally less depressed and less fatigued; had a handful of 'super clean energy' days. Under-dosed EGCG days 7-14 and felt 'blah', then increased it. Last week developed daily right-side pressure under the ribs (believes liver + right kidney), bright-yellow BMs, and new right-ear popping; molybdenum top-ups reduce the pressure, so she cut EGCG in half to 575 mg while raising moly to her highest dose yet. Wants to resolve hormonal imbalances, vagus-nerve dysfunction, thin/dry skin and thinning hair. Uses Grok locked onto the HG7 forum for calibration help.", "notable_effects": ["brain fog 100% gone from day one", "less depressed and fatigued", "clean-energy days", "right-side rib pressure (liver/kidney)", "bright yellow stools", "right ear popping"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1021685"}, {"author": "Disrupt4489", "outcome": "positive", "duration": "several months (Oct 2025 to March labs)", "summary": "Motivational iron update backed by labs: serum iron fell from 234 ug/dL (Oct 2025, above the 175 range) to 165 (March) after he started calculating the zinc conversion correctly; agrees with his HTMA hair tests. Reports less scalp inflammation, reduced hair loss, and an injured ankle tendon finally healing. Believes intracellular zinc is now rising (sex drive up), but a downside is herpes outbreaks returning after decades - which he/AI attribute to rapidly rising zinc. Testicular ache and itchy anus signal he needs to calibrate zinc up a bit.", "notable_effects": ["serum iron 234 -> 165 ug/dL", "less scalp inflammation", "reduced hair loss", "ankle tendon healing", "rising sex drive (zinc)", "herpes outbreaks returned"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1021624"}, {"author": "tinymonkey2", "outcome": "positive", "duration": "2 weeks back on (after 2 weeks off for labs)", "summary": "TRH was correct that the user's core issue was low B6. Back on for 2 weeks at a 50% dose with a #3 calibration plus extra B5/B7 to support the higher B6; feels great and most previously mentioned symptoms are gone. The one remaining symptom is an internal tremor/vibration in the hands, most noticeable on waking - present for a year before HG7 but intensified on it. (TRH advised hand tremors are low EGCG or low B5.)", "notable_effects": ["most symptoms resolved", "feels great", "residual internal hand tremor (worse on waking, intensified on HG7)"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1021711"}, {"author": "Nusian", "outcome": "positive", "duration": "ongoing", "summary": "Chronically low zinc; the previous standard with lower EGCG works best for him and it's the best he's ever felt and feels he's progressing. Former rutin taker (pre-chelated copper), so he keeps kicking out iron too quickly and has to dial in biotin carefully; too-high biotin pushes his C needs up, and too-high C pushes him into low B6. Prefers 120 mg zinc for now to fight his low-zinc state.", "notable_effects": ["best he's ever felt", "progressing", "low zinc if EGCG too high", "right-side abdominal pain if EGCG too high", "dry hands if C too low", "low B6 if C too high"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1021941"}, {"author": "kiran.shah15", "outcome": "positive", "duration": "a short period (stopped for unrelated reasons)", "summary": "Was improving on just a quarter dose even while eating 200-300 g of sugar, seed oils and junk a day - called it unreal. Off it now for unrelated reasons, but deeply grateful; says the benefits from that short time spared him an ungodly amount of suffering and hopes there's much more to come.", "notable_effects": ["improvement on quarter dose despite poor diet", "large reduction in suffering"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1021886"}, {"author": "Stargazer89", "outcome": "positive", "duration": "5 months", "summary": "Five months on HG7. On the very first correct dose he immediately felt calmer and a years-old shoulder pain vanished instantly. When he gets molybdenum right, his lifelong seasonal allergies and itchy eyes disappear completely. Also growing new hairs on his head (had feared thinning) and, later, noticed improved vision - can now see distant things without squinting for the first time.", "notable_effects": ["immediate calm", "years-old shoulder pain gone instantly", "seasonal allergies/itchy eyes gone with correct moly", "new hair growth", "improved distance vision (no squinting)"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1021910"}, {"author": "recoil", "outcome": "neutral", "duration": "10 days (one off-day)", "summary": "Day 10 with one off-day. Was taking a 14% dose of a previous recommendation with no need to calibrate; today doubled it and, ~1.5 hours in, still no need for any calibration.", "notable_effects": ["no calibration symptoms at low dose", "no calibration symptoms after doubling"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1021945"}, {"author": "Orion", "outcome": "positive", "duration": "ongoing (recovering from a moly-glycinate injury phase)", "summary": "After a rough stretch of nerve/hip pain traced to molybdenum glycinate plus piriformis strain from squats, he switched to Piping Rock molybdenum and reports all good on the standard doses. Earlier he ran the stack with zero molybdenum for several days to let the iron-backlog nerve pain settle before reintroducing the amino/Piping Rock moly.", "notable_effects": ["all good on standard doses with Piping Rock moly", "prior nerve/hip pain from moly glycinate"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1021949"}, {"author": "MrMark", "outcome": "mixed", "duration": "ongoing (rough 2-3 weeks, then dialed in)", "summary": "Had a hard time getting it right for 2-3 weeks with itchy skin, red eyes, low mood and no motivation (identified as low molybdenum). A revised dose gave much better results with no need for calibration ~5 hours post-dose. Uses taste-testing to tune C (1.3-1.4 g) and B6 (75-100 mg), and found the lower EGCG range (1750-2000 mg) gives fewer calibration symptoms than 2250-2500 mg. Earlier also reported detecting a wider airway and more tongue space, and front-teeth overlap reducing.", "notable_effects": ["itchy skin, red eyes, low mood, no motivation (low moly)", "resolved with dose change", "fewer symptoms on lower EGCG"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1021950"}, {"author": "chalceconist", "outcome": "mixed", "duration": "ongoing", "summary": "Feels pretty neutral as long as he doesn't go too high on EGCG (anything above 1000 mg per 50 mg zinc). Symptoms suggesting he needs more EGCG (purple nail beds especially on the ring finger, joint pain) backfire because more EGCG pushes him low-B6/low-zinc or makes him vomit undigested EGCG caps. Switched to molybdenum AAC (feels smoother) but joint pain persists. Feeling somewhat depressed/sluggish with hair taking a hit; felt really good previously on B6/Zn ratios of 1:1 and 2:1 (both with higher C). Suspects zinc isn't retaining/pushing into blood and more EGCG worsens it - maybe needs more C.", "notable_effects": ["purple nail beds (esp ring finger)", "joint pain", "depression/sluggishness", "hair loss", "vomits undigested EGCG caps at high dose", "felt good on B6/Zn 1:1 and 2:1"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1021770"}, {"author": "purple pill", "outcome": "neutral", "duration": "ongoing", "summary": "Notes he always drifts back into high copper when he misses a day or two of the formula - it seems to be his default state.", "notable_effects": ["reverts to high-copper symptoms after 1-2 missed days"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1021472"}, {"author": "Epinerein", "outcome": "negative", "duration": "ongoing", "summary": "About 4-5 hours after his midday dose he gets a sense of anxiety, low impulse control and liquor cravings - a pattern he's had since copper toxicity but which has recently worsened while doing HG7. Also separately reports constant mind chatter and inability to focus. Considering reverting to NAC & curcumin to stop drinking.", "notable_effects": ["afternoon anxiety and low impulse control", "liquor cravings 4-5h post-dose (worsened on HG7)", "constant mind chatter and poor focus"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1021561"}, {"author": "tommyg130", "outcome": "mixed", "duration": "several months", "summary": "Cannot tolerate the full stack; only functions well on high-ish B6 with lowish EGCG/zinc and cannot do molybdenum or B5. B6 alone was intolerable over the years, but on the stack he needs insane amounts of B6, driven especially by EGCG. Pushing B5, higher biotin, moly, or zinc above ~50mg gives terrible adrenaline, shakiness, yellowing painful teeth, sun sensitivity, food hypersensitivity, tremors. Believes he dumps too many metals to handle and can't calibrate out of it.", "notable_effects": ["EGCG strongly drives B6 need but also makes B6 work/tolerable", "any biotin over 5mg intolerable (previously did 500mg-1g biotin randomly before protocol)", "moly intolerable at any dose despite non-detectable estrogen on bloodwork/Dutch tests", "rapid zinc depletion"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1022036"}, {"author": "recoil", "outcome": "positive", "duration": "ongoing, ramping up", "summary": "Titrated up from 14% to 28% to 56% of an older higher-biotin protocol dose with very little issue, then re-aligned to current recommendations at 25% dose based on page 1, which felt even better (like nothing at all). Accepts gains may be slower than full-dose users.", "notable_effects": ["well tolerated", "chest-localized anxiety around 3-4PM after a 9:30AM post-food dose"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1022048"}, {"author": "Nusian", "outcome": "mixed", "duration": "~12 days on prior standard, then switched", "summary": "Previous 120mg zinc / 4.25mg moly standard slowly drifted him into high copper with no room for more moly without B6 deficit, but was great for boosting badly-needed zinc levels. Doing multiple doses a day. Later found taking C first reduced initial nausea and eliminated end-of-dose low moly symptoms. Felt low-zinc depression/exhaustion for the first time on the new order; 125mg zinc feels great and agreed 110mg zinc per 150mg B6 was too low.", "notable_effects": ["good for raising zinc", "slow drift to high copper", "less nausea with C-first order", "low-zinc depression/exhaustion emerged on lower EGCG"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1022056"}, {"author": "Disrupt4489", "outcome": "mixed", "duration": "~45+ days across posts", "summary": "Reports unusual weight gain, suspected fatty liver; fibroscan later showed 6.1 kPa (slightly stiff, normal <5.8), interpreted as copper redistribution/liver stiffness without fattiness. Recurring constipation (fixed by cabbage/fibre), muscle twitches resolved by sublingual biotin, itchy scrotum, loose stool episodes. Iterating dosing and order; poor at taste testing. Notes joint/tendon issues and slow ankle-injury repair return within 2 weeks of stopping HG7, correlated with iron via blood test and HTMA.", "notable_effects": ["weight gain / suspected fatty liver", "fibroscan 6.1 kPa slightly stiff", "muscle twitches fixed by sublingual biotin", "constipation", "iron-linked joint/tendon issues confirmed via blood + HTMA"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1022084"}, {"author": "whatisaging", "outcome": "positive", "duration": "~5 months (equivalent 6-10 standard doses worth of skewed ratio)", "summary": "Lost 40 pounds in ~5 months basically from undereating (loss of appetite attributed to low zinc/low EGCG), no exercise, aiming for another 30 to look shredded. Runs a heavily skewed ratio toward EGCG and zinc due to chronic deficiency (e.g. 150mg B6 to 5850mg EGCG and 450mg zinc) with almost no symptoms. Radically underdid EGCG/zinc after using dextrose+molybdenum to remove copper to avoid nausea.", "notable_effects": ["40 lb weight loss via appetite suppression", "tolerates very high EGCG/zinc with few symptoms"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1022092"}, {"author": "chalceconist", "outcome": "mixed", "duration": "ongoing, twice daily half-doses", "summary": "Does half of a ~standard dose often twice daily with no issues except trending into low B6 and low zinc, and slowly going high iron from slightly too little EGCG. Occasionally vomits undigested EGCG capsules. Tested a one-dose upped-B6 recommendation. Feels zinc is draining more and more, unsure whether to move to 1:1 Zn/B6 with higher C.", "notable_effects": ["vomiting undigested EGCG capsules", "trends low B6/low zinc", "slow drift high iron", "zinc draining"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1022144"}, {"author": "purple pill", "outcome": "mixed", "duration": "~1 year", "summary": "Has spent ~a year trying to discredit the protocol and considers it validated beyond placebo, but 'hates' it: says it caused his worst migraines, back/ball/kidney/foot pains, skin issues and extreme anger. Finds molybdenum glycinate more potent (clears/prevents iron backlog better, more room for zinc, needs more EGCG) but goes out of balance with iron fast; gravitates back to original dosing with lower B6 on glycinate. Maintains a personal symptom map.", "notable_effects": ["worst migraines, back/ball/kidney/foot pain, skin issues, extreme anger", "glycinate potent but destabilizes iron balance", "no flush at 600mg niacin after months off"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1022049"}, {"author": "Epinerein", "outcome": "negative", "duration": "~2 weeks of calibration attempts", "summary": "Persistent severe insomnia unresolved across many calibrations: high heart rate, stiff/tight muscles at night, frequent liquor craving and chest anxiety in the evenings (~5 hours post-dose), morning irritability, sleeps only ~20 min then awake 40 min cycles, even with sleeping pills. Tried 5g C (overkill, caused issues), higher EGCG, higher zinc. Increasing B6 to 200mg and moly to 7mg finally allowed 3 hours of sleep, but then woke irritable with itchy legs.", "notable_effects": ["severe fragmented insomnia", "high heart rate", "evening chest anxiety + liquor craving", "morning irritability", "3 hours sleep after B6 200 + moly 7mg"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1022189"}, {"author": "MrMark", "outcome": "mixed", "duration": "ongoing across new-ratio doses", "summary": "Much improved overall on new ratios but persistent ear ringing/tinnitus and low mood; halving EGCG resolves both but then brings high iron symptoms, and re-adding EGCG brings back the ringing - suspects zinc too low or a zinc backlog. Post-dose needs a couple EGCG (#3) and zinc calibrations. Also had severe abdominal muscle cramps eventually helped only by potassium and water. Adding 200-400mg niacin/nicotinic acid feels like it improves sleep.", "notable_effects": ["improved overall", "persistent tinnitus tied to EGCG level", "low mood (a #2 calibration resolved quickly)", "abdominal cramps helped by potassium/water", "thinner/wispy beard", "better sleep with added niacin"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1022230"}, {"author": "dave_282", "outcome": "neutral", "duration": "single new-ratio dose reported", "summary": "Took the new tweaked dose in the new order; prior order was very similar.", "notable_effects": ["no adverse effects reported"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1022229"}, {"author": "BaselineShift", "outcome": "positive", "duration": "45 days, 70 standard doses total", "summary": "Day 45 with 70 doses; cruising on two doses a day, feels vaguely funny for about an hour after ingestion but little else. Reports feeling calmer by the day, more confidence and decisiveness, and increased libido (partly attributes effects to a nightly anxiolytic and added psyllium too). Solved EGCG capsule problem by transferring Life Extension EGCG powder from cellulose into gelatin capsules. Wants to increase daily dose within two meals.", "notable_effects": ["calmer, more confident and decisive", "increased libido", "vaguely funny feeling ~1 hour post-dose"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1022255"}, {"author": "MrMetabolicMile", "outcome": "mixed", "duration": "started early May, weeks of niacin experimentation", "summary": "Got gout/joint pain, fatigue and mood problems from molybdenum (citrate and amino acid chelate), worse on exercise days (runs ~30 miles/week), attributing it to excess uric acid. Replaced molybdenum with high-dose niacin (nicotinic acid) 1-2g per full dose, which controls high-copper symptoms without gout and no longer causes afternoon naps as it did during his earlier Copper Revolution phase. Notes niacin is acidic and needs bicarbonate balancing over 1g; experimenting with 1g niacin + 1g L-theanine as a copper chelator combo.", "notable_effects": ["gout/joint pain/fatigue/mood issues from molybdenum", "niacin controls copper symptoms without gout", "niacin no longer causes afternoon naps on HG7"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1022310"}, {"author": " tion": "", "summary": "Now has virtually no copper on his 'front end' - no low-molybdenum brain fog, irritability, sleep issues or anxiety; remaining moly-type symptoms he attributes to nickel in green tea. Also gained a lasting IQ boost from effectively taking ~2 years of molybdenum in a couple of months, and says he escaped kidney stones and surgery.", "notable_effects": [], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1021928"}, {"author": "Stargazer89", "outcome": "positive", "duration": "", "summary": "First correct dose brought immediate calm and instantly erased a years-old shoulder pain; correct molybdenum makes lifelong seasonal allergies and itchy eyes disappear; growing new head hair; and now sees distant objects without squinting for the first time.", "notable_effects": [], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1021910"}, {"author": "karen138", "outcome": "positive", "duration": "", "summary": "Brain fog 100% gone since day one and never returned; generally less depressed and less fatigued, with occasional 'super clean energy' days.", "notable_effects": [], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1021685"}, {"author": "BaselineShift", "outcome": "positive", "duration": "", "summary": "By day 18, drastic reduction in general anxiety, more relaxed and smoother in social interactions, easier decision-making, and slightly less dry hands.", "notable_effects": [], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1021670"}, {"author": "tommyg130", "outcome": "positive", "duration": "", "summary": "HG7 immediately relieves his hardest symptoms - neuroticism, fear, 24/7 unease, over-stimulation and depersonalization (a 'high copper type' profile).", "notable_effects": [], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1021486"}, {"author": "whatisaging", "outcome": "positive", "duration": "", "summary": "psrocket1's 1-year testimony: zero testosterone suppression during his annual s23 SARM cycle (vs suppression in prior years), less eczema/psoriasis, less food intolerance, and body-recomposition (losing body fat while gaining muscle at stable weight).", "notable_effects": [], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1021554"}, {"author": "Disrupt4489", "outcome": "positive", "duration": "", "summary": "Restless-legs sensation he'd had the year before HG7 has not recurred since starting it (attributes it to iron coming down).", "notable_effects": [], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1021671"}, {"author": "Nusian", "outcome": "positive", "duration": "", "summary": "On the previous standard with lower EGCG it's the best he's ever felt and he feels he's progressing (chronically low-zinc responder).", "notable_effects": [], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1021941"}, {"author": "kiran.shah15", "outcome": "positive", "duration": "", "summary": "Was still improving on just a quarter dose despite eating 200-300 g of sugar, seed oils and junk daily; credits it with sparing him an enormous amount of suffering.", "notable_effects": [], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1021886"}, {"author": "taralynne", "outcome": "positive", "duration": "", "summary": "During her 2025 run, sebaceous cysts on her face reduced in size (did not fully disappear), and she lost ~20 lbs over the year (uncertain attribution).", "notable_effects": [], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1021585"}, {"author": "whatisaging", "outcome": "positive", "duration": "", "summary": "Lost 40 pounds in ~5 months (no exercise) via appetite suppression attributed to low zinc/low EGCG; tolerates a heavily EGCG/zinc-skewed ratio with almost no symptoms.", "notable_effects": [], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1022092"}, {"author": "charlie", "outcome": "positive", "duration": "", "summary": "Snore-lab score dropped from 21 to a record-low 10 and kept setting new record lows after swapping molybdenum for niacin/nicotinic acid.", "notable_effects": [], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1022414"}, {"author": "BaselineShift", "outcome": "positive", "duration": "", "summary": "By day 45 / 70 doses: progressively calmer, more confident and decisive, with increased libido; cruising on two doses a day.", "notable_effects": [], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1022255"}, {"author": "Epinerein", "outcome": "positive", "duration": "", "summary": "Achieved 3 hours of sleep (up from 20-min fragments) after raising B6 to 200mg and molybdenum to 7mg, though woke irritable with itchy legs.", "notable_effects": [], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1022484"}, {"author": "Disrupt4489", "outcome": "positive", "duration": "", "summary": "Iron-linked knee/ankle-tendon problems (including a year-long unhealed ankle injury) resolved when iron was brought down on HG7, confirmed by blood free-iron test and HTMA; problems returned within 2 weeks of stopping.", "notable_effects": [], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1022575"}, {"author": "purple pill", "outcome": "positive", "duration": "", "summary": "After ~a year trying to discredit the protocol, considers it validated beyond placebo - credits TRH with mapping a switchable symptom list and narrowing detox to 7 supplements taken en masse for years without other deficiencies.", "notable_effects": [], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1022470"}, {"author": "MrMark", "outcome": "positive", "duration": "", "summary": "Much improved overall on new ratios; feels he sleeps better after adding 200-400mg niacin to the daily dose.", "notable_effects": [], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1022557"}]}, "safety": {"author_warnings": [{"warning": "This is an unproven self-experiment - accountability is yours", "detail": "Nothing here is backed by any health institution beyond claims about individual nutrients; the overall theory is 'just theory'. You try it of your own accord. The author (TRH) takes no payment and no responsibility for harm, though he will try to help. Honesty about exact dosages is required because he treats it as a scientific study.", "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1011047"}, {"warning": "Do not deviate from the listed nutrient forms or dose ratios, then blame the protocol", "detail": "P5P, zero or low EGCG, molybdenum glycinate, added nutrients, or isolating single nutrients make it 'not HG7'. Such 'dirty data' is worse than no data. Wild deviation (as member 'Arnold' did - neglecting EGCG and mass-dosing zinc and molybdenum) drove a persistent hyper-reactive copper-toxic state and a kidney stone, and he ghosted. Follow the ratios exactly and ask for help early rather than staying quiet.", "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1019860"}, {"warning": "Never use P5P - use only plain pyridoxine HCl for B6", "detail": "P5P is an active form the body cannot store; it forces B6 to work when it should not, drives serum B6 dangerously high while lowering usable B6, builds a large tissue-iron backlog, and starves other nutrients, causing burning/tingling feet, cracked mouth corners, hemorrhoids, chest pain, constipation and neuropathy. The author calls P5P (alongside impure biotin) the number one cause of failure and harm; correctable only with regular B6 and no zinc for several doses.", "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1019838"}, {"warning": "Biotin must be PURE powder - never the 1% diluted powder, pills, or active d-biotin", "detail": "Active d-biotin forces the process like P5P. The 1% diluted powder or pills will not deliver the needed dose and can cause anemia and biotin-deficiency symptoms. If nerve pain, swollen throat, or anemia persist, verify biotin purity first. Dissolve under the tongue and titrate by how fast it dissolves.", "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1011360"}, {"warning": "Never use rutin, NAC, or any dedicated copper chelator", "detail": "They chelate copper too fast, creating a pre-chelated-copper backlog and iron surge that can take months or years to recover from. The author blames a rutin overdose for long-lasting snoring, slow nail growth and emotional swings. Only EGCG should be used as the chelator; anyone with prior chelator use will surface iron extremely fast until all pre-chelated copper clears.", "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1021900"}, {"warning": "Use only Molybdenum Amino Acid Chelate - never glycinate, sodium molybdate, citrate, or the Carlson form", "detail": "Non-amino-acid-chelate molybdenum 'works too well', stripping copper without removing iron. Over time it over-chelates copper, causing a painful low-copper/high-iron state, vitamin C hypersensitivity, sciatica, leg pain, connective-tissue weakening, and delayed hypothyroid/hair-loss crashes. The longer it is used, the longer the recovery.", "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1022537"}, {"warning": "Do not use NOW-brand EGCG, and never confuse green-tea extract with EGCG", "detail": "NOW-brand EGCG 'doesn't work'. EGCG is only about 45-50% of standardized green-tea extract, so you must compute the real EGCG content. Miscalculating EGCG (or any nutrient) makes people sick.", "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1011047"}, {"warning": "Never take vitamin C and EGCG together", "detail": "Taken together they are the ultimate nausea and vomiting trigger. Separate them and take EGCG last.", "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1011257"}, {"warning": "All 7 nutrients must be taken together at the same time; never isolate a single nutrient", "detail": "Taken singly through the day the formula fails and makes you sick or vomit - the stomach needs all nutrients simultaneously. Skipping any one nutrient repeatedly depletes another and eventually makes the body reject everything (gagging and vomiting each time). Molybdenum, B6, EGCG and biotin taken in isolation are each specifically called out as harmful.", "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1011914"}, {"warning": "Never take B6 alone or without biotin (and the rest of the stack)", "detail": "B6 drains biotin within minutes; unbalanced high B6 drives the other B vitamins and C negative until you get cramps, then neuropathy and even liver failure. Taking B6 alone builds a silent backlog leading to hemorrhoids, chest pain and constipation. Always pair B6 with biotin, B5 and C.", "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1013985"}, {"warning": "Never neglect or under-dose EGCG", "detail": "Skipping EGCG builds metals in the liver (pale/white burning stool); a later EGCG dose then flushes metals too fast and injures the kidneys. The buildup causes gout, kidney pain, and a hyper-adrenalized, angry, bipolar-like personality ('turns you into a demon') until iron is removed. Running zero EGCG works for only 1-2 doses; lower to the low end instead of zero.", "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1013905"}, {"warning": "Never take EGCG in isolation", "detail": "EGCG alone sends a surge of copper to the kidneys and makes you estrogenic; without molybdenum and zinc at that exact moment the kidneys cannot cope and you get sick. The author says this is what wrecked 'Arnold'.", "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1014112"}, {"warning": "Excess or unbalanced EGCG is the most dangerous overdose and causes kidney stones", "detail": "Every EGCG dose immediately raises the need for zinc then molybdenum; overdoing EGCG without them gives a kidney stone. EGCG keeps driving everything negative the more you take because it keeps working when it should not. Too high relative to zinc/molybdenum/B6/C, or persisting on high EGCG while in a lower-back-pain state, will eventually form a stone. Keep EGCG a sliver on the low end; 4g EGCG alone is 'two steps from a kidney stone'.", "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1020652"}, {"warning": "Vitamin C is the trickiest and one of the most dangerous nutrients to get wrong", "detail": "Too much C queues up too much copper and metals and caused many participants' worst experiences (cold, kidney issues); sustained excess C depletes usable copper enough to cause crippling left-leg pain. Reversible: run the standard dose with half the C until signs of needing it (watery diarrhea, dry hair) return. Use acidic ascorbic acid; a very high one-off C (e.g. 5g) or raising C alone can backfire and just drain B6/zinc/EGCG.", "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1014656"}, {"warning": "Do not add non-protocol nutrients - calcium and magnesium are specifically harmful", "detail": "Adding or subtracting anything makes it 'your own thing', not HG7. Magnesium masks the need for EGCG and only temporarily masks iron. Calcium taken in place of needed molybdenum causes kidney stones and numbs you; years of calcium+magnesium left the author numb, ghost-like, with half-body numbness, brain fog and perpetual ED.", "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1019329"}, {"warning": "Manganese is dangerous - avoid it", "detail": "Felt good for about a day, then caused progressive numbness, high blood iron, hardened and deformed nails, receding gums and loss of libido; the damage was long-lasting.", "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1022330"}, {"warning": "Kidney-stone emergency response", "detail": "If at any point you feel like you are getting a kidney stone, take the full formula with NO EGCG plus extra biotin and high molybdenum, wait about 3 hours, then reassess.", "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1011047"}, {"warning": "Do not take EGCG when you have testicular pain", "detail": "Testicular pain signals extremely low zinc; EGCG is the last thing to take until zinc is replenished.", "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1018851"}, {"warning": "Never take molybdenum without EGCG, or in isolation", "detail": "Molybdenum without EGCG only raises uric acid and aggravates things because the body keeps recycling iron and copper (gout and kidney pain). Taking molybdenum alone, even with some EGCG and C, causes problems that grow worse over time and depletes B6 and copper.", "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1018136"}, {"warning": "Never take excessive single-nutrient doses", "detail": "Excessive molybdenum alone or EGCG alone can send you to the hospital. 4g EGCG on its own is two steps from a kidney stone, whereas 4g inside the balanced formula is fine.", "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1017269"}, {"warning": "Excess B6 has real overdose symptoms unlike B5/B7", "detail": "More than about 300mg B6 at once and the body rejects it (exhaustion). B6 is the one B vitamin whose excess causes harm - insomnia, masking of zinc deficiency, and neuropathy. Excess B5 or B7 can also drain B6 into the negative if it is already low.", "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1019079"}, {"warning": "EGCG and B6 are the most powerful and most dangerous nutrients", "detail": "They do the most work but can do more damage than any other nutrient if the other 5 are not taken with them.", "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1022038"}, {"warning": "Do not quit after only a couple of doses without calibrating", "detail": "It takes a few doses to balance; early kidney pressure is iron blocking copper excretion and needs more EGCG (calibration), not quitting. Giving up after 2 doses without properly calibrating EGCG is a mistake.", "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1012972"}, {"warning": "First-time and ex-P5P users often need a LOT more EGCG at first", "detail": "On early doses, already-surfaced or high iron means the standard ratio can cause nausea and vomiting because much more EGCG is needed initially; repeat EGCG calibrations within minutes if needed. Switching from P5P to regular B6 makes blood iron skyrocket - expect greatly increased EGCG then molybdenum needs.", "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1013326"}, {"warning": "Stopping while out of balance causes 'whiplash' and can leave lasting harm", "detail": "The body was detoxing at hyper speed; quitting while imbalanced or adrenalized can leave lasting personality and relationship damage (the worst side effect is anger destroying relationships), and poorly-calibrated quitters often never feel better. The author believes no nutrient damage is truly permanent, but P5P/rutin/NAC imbalances are the hardest to correct.", "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1019601"}, {"warning": "Do not go below half doses, and measure every nutrient precisely", "detail": "Below half doses the vitamin ratios are not precise enough and can aggravate an existing deficiency; the finalized smaller doses demand much tighter precision. Just 10mg of zinc can change the whole balance. Mis-measuring zinc on a full dose caused violent vomiting, diarrhea and days of kidney discomfort or possible damage - weigh everything (especially zinc and B6) on a milligram scale.", "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1019775"}, {"warning": "Too little of any nutrient is worse than too much - low doses hide deficiencies until too late", "detail": "Too little eventually makes the process shut your body down. On low doses, chronic underdosing (especially zinc and C) stays hidden until copper slowly builds up and alters mood and personality, silently making you angrier over months.", "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1022283"}, {"warning": "Front-end imbalance can recur even years in - do not get cocky at high doses", "detail": "No matter how far along you are, leaving your front end out of balance (especially high iron) turns you metal-toxic again with emotional, digestive, skin and hair issues; fix by increasing EGCG per dose with a little extra molybdenum. At extreme doses it is easy to go off balance, so ask for help early.", "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1014293"}, {"warning": "Off-balance high doses cause nasty symptoms the author claims are temporary", "detail": "Going off balance at extreme doses can produce severe symptoms (bleeding kidneys, stones, hair loss, fissures) that he says have always reversed once balance was restored. This is his personal claim, not proof of safety.", "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1018486"}, {"warning": "The perfected standard dose will worsen a large pre-existing imbalance at first", "detail": "If you are already very imbalanced, the standard maintains that imbalance and surfaces and aggravates it; calibration is mandatory until you work up to the standard. The first standard dose can reveal wild imbalances - study page 1 intensely before starting.", "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1021433"}, {"warning": "In people who previously used copper chelators, biotin or any single nutrient forces copper extraction", "detail": "With a pre-chelated-copper backlog, biotin (or any single non-EGCG piece) stimulates the adrenals and forces copper extraction regardless, leaving you totally negative in EGCG and other nutrients; excess biotin can also push some into alkalosis.", "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1017706"}, {"warning": "HG7 cannot fix everything, and not in weeks", "detail": "Chronic or lifelong ailments require years of correct, frequent dosing; back-end (organ, marrow, cellular, DNA) clearance is slow. Do not expect lifelong conditions fixed in weeks or months.", "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1021478"}, {"warning": "The protocol is hard to learn, and doing it slightly wrong can make you worse", "detail": "The author cited the steep learning curve, too many people quitting, and even slight errors making people feel worse than before as his reason for ending the experiment - he did not want anyone hurt.", "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1019276"}], "reported_side_effects": [{"effect": "Nausea and vomiting (general, dose-related)", "frequency_hint": "many reports", "context": "The single most common complaint, especially in the first days and on the full dose; nausea and vomiting often strike 1 to 4+ hours after dosing, worsen on an empty stomach, with daily dosing, or when a nutrient is out of balance. Some members vomited repeatedly (3x in 1.5 weeks) or in public.", "resolution": "Often reduced by 'calibration' (extra rounds of EGCG/zinc/molybdenum), lowering the dose, dosing only every 2nd or 3rd day, taking with food, and raising vitamin C once dialed in. Some never fully resolved it and stopped.", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1011256", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1011496", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1015068", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1017912", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1012019"]}, {"effect": "EGCG-specific nausea and vomiting of undigested EGCG capsules", "frequency_hint": "many reports", "context": "EGCG (slow-release and poorly water-soluble) frequently came back up hours later still capsule-shaped and solid; it triggered nausea and vomiting when overdosed, taken on an empty stomach, or when digestion was weak. Several could tolerate everything except EGCG.", "resolution": "Emptying capsules and tipping powder to the back of the throat, splitting the EGCG dose, taking it with a solid meal, switching EGCG brands, and lowering EGCG. Vomiting undigested EGCG was read as a sign of taking too much.", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1011964", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1014259", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1022144", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1014674", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1011886"]}, {"effect": "Vitamin C reflux: GERD, silent reflux and heartburn", "frequency_hint": "many reports", "context": "Ascorbic acid powder at multi-gram doses several times a day caused GERD, silent reflux, acid damage, difficulty breathing and heartburn; some had pre-existing acid damage or were diabetic. For a few it persisted for weeks to a month and a half.", "resolution": "Switching from powder to delayed-release or capsule vitamin C, lowering the C dose, splitting and diluting C, sleeping at an angle, or high-dose biotin (2.5g). Several could not tolerate C at all and stopped the protocol.", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1011094", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1012004", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1014730", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1014732", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1014923"]}, {"effect": "Kidney pain and kidney stones", "frequency_hint": "many reports", "context": "Kidney and flank pain, near-stone episodes and outright kidney-stone scares, especially with too little EGCG, excess zinc or molybdenum, accidental double doses, or forcing calibrations. Framed as copper being forced through the kidneys. Some cases were severe (pain to move, crystal-clear urine, near kidney damage).", "resolution": "The author's kidney-stone remedy (full formula with NO EGCG plus extra biotin and high molybdenum, wait about 3h), raising molybdenum, or a no-EGCG dose. Some laid off entirely; a few near-damage cases cleared only after months of high psyllium husk.", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1011299", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1012536", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1012623", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1013247", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1014357"]}, {"effect": "Vitamin B6 toxicity and peripheral neuropathy (burning/tingling feet and hands)", "frequency_hint": "many reports", "context": "Burning and tingling feet and hands, numbness, weak legs, dizziness and brain fog; one member measured serum B6 at 444 (upper limit 100) that barely dropped 3 weeks after stopping. Strongly linked to using P5P or high B6 (250mg+), and symptoms could increase again after about 10 days or persist even at low B6.", "resolution": "Stopping HG7 to let B6 clear, switching from P5P to plain pyridoxine HCl, lowering or occasionally halving B6, doubling biotin, and adding molybdenum. Several were unresolved and some quit; nerve symptoms took weeks to months to ease.", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1011515", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1012278", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1014476", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1013867", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1016065"]}, {"effect": "Insomnia, racing thoughts and night waking", "frequency_hint": "many reports", "context": "Trouble falling asleep, waking wired between 2-4am, and unstoppable racing thoughts, often the same day copper was stirred up or when zinc was raised. Attributed variously to low B6, excess zinc, or mobilized copper. Some had severe, near-nightly insomnia.", "resolution": "Sometimes B5, more vitamin C, molybdenum before bed, or lowering zinc; some needed sleeping pills or melatonin. Frequently unresolved or only partially controlled.", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1011533", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1017221", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1019275", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1015587", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1018810"]}, {"effect": "Nightmares and sleep-paralysis-like episodes (low biotin)", "frequency_hint": "several reports", "context": "Vivid, harrowing nightmares and sleep-paralysis-like episodes with an ominous tone, consistently appearing when biotin was too low (one member likened them to old lead-toxicity sleep paralysis).", "resolution": "Raising biotin (commonly to 1.6g, up to 5.5g) reliably stopped them; recurred whenever biotin was lowered.", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1012307", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1013030", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1015101", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1019724"]}, {"effect": "Diarrhea, loose and watery stool", "frequency_hint": "many reports", "context": "Acidic, watery or yellow diarrhea (one dubbed it 'Acidic Diarrhea of Death'), sometimes for days, often after raising vitamin C, on high EGCG, or on high molybdenum; sometimes described as bile dumping. Some could not leave the house.", "resolution": "Adjusting vitamin C (the author says watery stool is usually low C, though several found high C caused it), lowering EGCG, adding zinc, or taking a break. Very high B5 also caused diarrhea as its main effect.", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1012041", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1013331", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1019153", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1014301"]}, {"effect": "Constipation and hard, painful stool", "frequency_hint": "several repor
