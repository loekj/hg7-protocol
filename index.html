tio) and still gets peripheral neuropathy; can have low-B6 symptoms and neuropathy at the same time. Trying B6 cofactors (magnesium, manganese) away from the formula.", "notable_effects": ["peripheral neuropathy", "simultaneous low-B6 and neuropathy symptoms"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1016065"}, {"author": "dave_282", "outcome": "positive", "duration": "several weeks", "summary": "Doing well on a 60% ratio with increased C and EGCG; feeling good with only occasional headaches (high iron). Reported crazy, strong nail growth. Skipped a day to donate blood. Later ran first 100% dose (everything high range except moly at 4mg) and felt great.", "notable_effects": ["strong rapid nail growth", "occasional high-iron headaches", "felt great on 100% dose"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1015698"}, {"author": "ZinkusMaximus", "outcome": "positive", "duration": "4 months", "summary": "Takes very high EGCG relative to everything else (says he is far more iron toxic than most, was carnivore ~7 years), slowly closing the gap by reducing EGCG 5-10mg/day. Feeling great. Uric acid finally started dropping after long plateau.", "notable_effects": ["feeling great", "uric acid dropping from 0.55-0.65 to 0.51 mmol/L"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1015710"}, {"author": "tommyg130", "outcome": "positive", "duration": "ongoing", "summary": "Once doing all 7 nutrients, instantly needed far less zinc (excess zinc was making him cold and frail). Discovered he was badly under-dosing biotin: pushing biotin over 1g fixed a narrow/recessed jaw and numb/agitated feet (copper dumps). Feels biotin lets the body use dumped metals; feeling solid and strong.", "notable_effects": ["needs much less zinc", "recessed jaw improved", "numb/agitated feet fixed", "feeling solid and strong"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1015772"}, {"author": "whatisaging", "outcome": "positive", "duration": "7-11 months", "summary": "Long-term user who says he messed up the formula more often than not yet still got great results. Runs very high biotin (up to 12g, ~100x original), 1.5-2g B5, 300mg B6, ~8mg moly per 200mg zinc and 3200mg EGCG. Most symptoms mostly gone; a few still improving. At 11 months reports no toxicities.", "notable_effects": ["rumination, eczema, food reactions, back pain, insomnia mostly gone", "fatigue, hair loss, wrinkling improving", "lowered ferritin 30% in a month", "no toxicities at 11 months"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1015785"}, {"author": "KASH", "outcome": "positive", "duration": "ongoing", "summary": "Says the protocol genuinely saved his life; not perfect all the time but the improvement compared to before is 'like magic'. Bought a subscription to support the author and shared an older Iron Metabolism theory thread.", "notable_effects": ["life-changing improvement"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1015929"}, {"author": "Iimcca001", "outcome": "mixed", "duration": "1 week", "summary": "New user, one week in. This dosing gives much milder symptoms than a previous version he tried (which caused lots of nausea). Now only slight nausea, some temperature fluctuation in extremities, lowered mood 4-8 hours after dosing, and some paranoia on a couple of days.", "notable_effects": ["slight nausea", "temperature fluctuation in extremities", "lowered mood 4-8h after", "paranoia on some days"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1015943"}, {"author": "Epinerein", "outcome": "mixed", "duration": "4+ months (since June 9 2025)", "summary": "Has PANS/PANDAS (vaccine/immunization-induced tics, OCD, mania). Tics and OCD are sometimes much better and sometimes much worse; initially improved on HG7 then regressed. Insomnia improved a lot (no more midnight hotflashes/angers) but still needs sleep meds. Reports feeling emotions not felt since 2009 and long-worked-for mindsets finally being expressed.", "notable_effects": ["tics/OCD fluctuating then regressed", "insomnia improved", "midnight hotflashes and angers gone", "feeling emotions since 2009"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1016020"}, {"author": "Epinerein", "outcome": "positive", "duration": "single 20% dose", "summary": "Had been on an older HG7 dose 4 months; after finding the new ratios, tried a 20% dose which was great and brought him out of a several-day mildly schizophrenic feeling he couldn't otherwise calibrate out of.", "notable_effects": ["resolved mildly schizophrenic feeling"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1016044"}, {"author": "ScrapActivator", "outcome": "positive", "duration": "several weeks", "summary": "Progress marker: made it six hours before needing a calibration, which had never happened. Need for biotin has skyrocketed (up to 8g/day on a 50% dose), with a pain in the exact center of the spine that only biotin fixes. Feels EGCG has a worsening-loop quality (the more taken the more needed).", "notable_effects": ["6 hours before calibration (progress)", "spine-center pain fixed by biotin", "escalating biotin need"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1016076"}, {"author": "Disrupt4489", "outcome": "positive", "duration": "~1 month+", "summary": "Confirmed high iron via a blood test (free iron very high, other iron types in range). TRH advised increasing molybdenum, which fixed his issues. Ran for the first time without getting tendonitis, and POIS symptoms improved within a month. Takes a 1/4 dose with increased molyb daily plus apolactoferrin at night (away from HG7) and some MSM.", "notable_effects": ["ran without tendonitis for first time", "POIS improved in a month", "high iron confirmed by blood test"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1016365"}, {"author": "stratocaster", "outcome": "positive", "duration": "~8-9 months (Jan to Sept HTMA)", "summary": "HTMA between January and September showed a large aluminum dump and improved Na/K. Improvement across the board with a broad symptom list all improved greatly, plus weight loss and muscle gain with no strenuous exercise and strong cognitive gains (performing far better at work). Not fully healed but progressing.", "notable_effects": ["fatigue, depression, poor coordination/balance, muscular weakness, visual snow/static, loss of dexterity, constant hunger all improved greatly", "weight loss and muscle gain", "cognitive improvement", "aluminum elimination on HTMA"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1016358"}, {"author": "charlie", "outcome": "positive", "duration": "ongoing", "summary": "Hit severe hip/leg pain that nearly stopped his walking workouts and almost quit HG7; with TRH's help identified it as high iron, calibrated out within a few days and felt stronger, walking longer/stronger than ever. Later had gout-like pains and sore kidneys, identified as low molybdenum (metal backlog in kidneys); after calibrating he urinated heavily overnight.", "notable_effects": ["hip/leg pain (high iron) resolved", "walking longer and stronger than ever", "gout/kidney pain (low moly) resolved", "heavy overnight urination"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1016470"}, {"author": "thefelixarnold", "outcome": "negative", "duration": "several months on, several months off", "summary": "Says he still has molybdenum toxicity from doing the formula despite being several months off it and taking 2-3g vitamin C per day; warns others to stop. Reports symptoms of gout and kidney pain.", "notable_effects": ["persistent molybdenum toxicity", "gout", "kidney pain"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1016418"}, {"author": "Cinna30", "outcome": "negative", "duration": "one week last year; restart now", "summary": "Chronically ill ~2 years; hair analysis showed aluminum/arsenic toxicity, plus blurry screen vision, painful dry skin/dermatitis, and gut issues (IBS, gastritis, h pylori). A week-long attempt last year made him sick and anemic (had miscalculated EGCG). On restart, first dose gave headache, nausea, bloating and fatigue; skin felt smooth and anemia symptoms calmed, but he vomited two hours later.", "notable_effects": ["headache", "nausea", "bloating", "fatigue", "smoother skin", "anemia symptoms calmed", "vomiting 2h later"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1016429"}, {"author": "whatisaging", "outcome": "positive", "duration": "~10-11 months", "summary": "Reports that all tangible symptoms of aging disappear when HG7 is calibrated correctly, feeling as if time moves forward like a teenager rather than someone in his 30s. Rebuts a critic (Metalsbruh): after 10-11 months at high doses he has none of the expected toxicities.", "notable_effects": ["aging symptoms disappear when calibrated", "no toxicities after ~11 months"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1016228"}, {"author": "dave_282", "outcome": "positive", "duration": "ongoing", "summary": "Feeling good doing 100% dose 3x/week; headaches on off-days resolved within an hour by a single EGCG cap.", "notable_effects": ["feeling good", "headache resolution with EGCG"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1016487"}, {"author": "HumanLife", "outcome": "positive", "duration": "ongoing", "summary": "No side effects other than nausea from EGCG when not eating enough beforehand; fixes it by eating more food.", "notable_effects": ["EGCG nausea on empty stomach, fixed by food"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1016490"}, {"author": "Orion", "outcome": "positive", "duration": "8 months", "summary": "Nearly 8 months in and going great; skin healing ramped up rapidly in the last couple weeks. Sometimes drops zinc to 100 or 50mg to push iron out faster.", "notable_effects": ["skin healing", "fast healing once it starts"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1016493"}, {"author": "Epinerein", "outcome": "mixed", "duration": "5 months", "summary": "Persistent unresolved symptoms (insomnia, frequent urination, cold hands/feet, tics/OCD, mucus, neuropathic head discomfort) that come and go; HG7 did clear out chronic copper-toxicity anger from prior CuSO4 supplementation. Long calibration struggle across many posts.", "notable_effects": ["cleared copper-toxicity anger", "persistent dragon-level insomnia", "B5 resolved anger and frequent urination", "optimal stool since starting"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1016501"}, {"author": "Hidden49", "outcome": "positive", "duration": "ongoing (own version of HG7 ~2 months+)", "summary": "Doing own version of HG7 cleared some iron and copper as a slow oxidizer, which made subsequent TEI Para Pack (slow ox) mineral-balancing supplement work far better; now feels potassium retention instead of high glutamate/anxiety. Adds extra supplements (inositol, B12, iodine, B1, coffee) that work better after HG7.", "notable_effects": ["iron/copper reduction", "improved hormones", "thyroid working", "coffee enemas helpful for clearing dumped metals"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1016532"}, {"author": "ZinkusMaximus", "outcome": "positive", "duration": "~6 months", "summary": "Calibration has been straightforward; feels great when dosed right, uric acid slowly trending down (two steps forward one step back). Accepts the ebb and flow of shifting needs. No major health changes yet but feels good. Iron-dominant far into protocol; often just needs EGCG to calibrate.", "notable_effects": ["uric acid decreasing", "cleared low-zinc symptoms with salt", "iron-dominant symptoms respond to EGCG", "adding supplements/omega3/sardines triggers intense low-zinc symptoms"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1016532"}, {"author": "charlie", "outcome": "positive", "duration": "ongoing", "summary": "Used Grok AI (fed the whole thread + mining theory) to calibrate to symptoms; kidney soreness gone in one day, itching much better. Later struggled with what seems like high iron and couldn't find the right combo. Craves salt; eats tallow-fried salted fries.", "notable_effects": ["kidney soreness gone in one day", "itching improved", "salt cravings", "high iron plateau"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1016546"}, {"author": "Cinna30", "outcome": "mixed", "duration": "starting / early", "summary": "First two attempts caused vomiting; third dose finally didn't throw up but felt off (hot forehead, floaty, upset stomach). Notes slight vision improvement early. Dealing with a lot health-wise (suspects Lyme, high aluminum, iron in tissue) so may be extra sensitive.", "notable_effects": ["initial nausea/vomiting", "sense of calm/wooziness", "slight vision improvement"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1016607"}, {"author": "MrMark", "outcome": "positive", "duration": "ongoing", "summary": "Very positive feeling within 5 minutes of dose and reduced/eliminated tinnitus when skipping zinc; when taking zinc he calibrates for high iron and copper and sleeps poorly. Uses biotin to resolve eye pain but it tanked libido.", "notable_effects": ["tinnitus reduced/eliminated without zinc", "positive feeling within 5 min", "biotin resolved eye pain but tanked libido"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1016601"}, {"author": "whatisaging", "outcome": "positive", "duration": "11 months", "summary": "11 months in with no toxicities despite mega-doses; reversed floaters and 'Bells-Palsy' droopy face (pinned as iron); confidence and attractiveness up when fixing iron. Uses periodic 'vitamin reboot' (B's and C only) to gauge progress and fix fatigue/hormone dips; feels much better each reboot. Developed HG5 (drop EGCG/zinc/moly) and huge vitamin-C-deficiency ratios during backlogs.", "notable_effects": ["reversed eye floaters", "fixed droopy face/Bells-Palsy symptoms", "confidence/hormone boost", "fast finger-prick healing observed by TRH analogy"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1016614"}, {"author": "BRENBAIL", "outcome": "mixed", "duration": "intermittent attempts", "summary": "Post-menopausal woman; good for 1-2 days then crashes with nausea and unwellness, can't pinpoint symptoms. Bloodwork: ceruloplasmin dropped 29->22, ferritin rose (chronically low, historically 6-20) to 31-32, more than doubling her usual; total iron dropped near deficiency. Considers it a good ferritin result for her.", "notable_effects": ["1-2 day good window then nausea crash", "ferritin more than doubled (14->31)", "ceruloplasmin dropped", "total iron dropped", "joint problems"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1016590"}, {"author": "stratocaster", "outcome": "mixed", "duration": "a while", "summary": "Still struggles with calibration; pushed himself heavily into high-iron end and TRH guiding back to neutral. Ordered more mg scales to micro-adjust. EGCG clears some issues but they return, making him suspect it's not high iron. Believes there is great benefit even doing it wrong.", "notable_effects": ["fell into high-iron state", "symptoms return after EGCG", "pressure behind eyes, brain fog, cold feet, dry eyes, lightheaded"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1016573"}, {"author": "ScrapActivator", "outcome": "positive", "duration": "ongoing", "summary": "Easiest dose ever after increasing EGCG; calibrates every couple hours. No dairy problems (eats lots of butter/cheese/milk). Figured out mid-back pain is low biotin (takes up to 1800mg per calibration).", "notable_effects": ["easiest dose after raising EGCG", "mid-back pain = low biotin", "gum swelling/pain unresolved"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1016659"}, {"author": "Nusian", "outcome": "positive", "duration": "a while (long-term)", "summary": "Still going and feeling great; getting the hang of it. Doing no-zinc the last couple weeks and feeling great; even the smallest biotin brings out high-iron symptoms. Says the EGCG/Moly vs B/C opposition posts were really helpful.", "notable_effects": ["feeling great on no-zinc", "biotin surfaces high iron"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1017199"}, {"author": "purple pill", "outcome": "positive", "duration": "ongoing (low 1/4 dose)", "summary": "Good flow on lower 1/4 dosage with no real symptoms; dose taken in evening now knocks him out cold like an antihistamine, wakes refreshed. Previously used lower B6 levels to deal with iron backlog which helped but caused low-B6 symptoms.", "notable_effects": ["strong sedation/sleep from dose", "wakes refreshed", "no real symptoms"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1017103"}, {"author": "Disrupt4489", "outcome": "positive", "duration": "ongoing", "summary": "Iron panel showed high free iron, correlated with HTMA iron dysregulation, attributes fixing a tendon injury to it. HG7 at 1/4 dose seemed to cure his POIS (~30 hrs of post-ejaculation brainfog). Found problems only with dairy-in-stomach-same-time and NAC/antioxidants.", "notable_effects": ["cured POIS brainfog", "tendon injury healing", "high free iron confirmed on panel"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1016655"}, {"author": "tommyg130", "outcome": "positive", "duration": "ongoing", "summary": "Extreme high-zinc type: needs 150mg zinc for just one 300mg EGCG capsule; all other 6 nutrients drive zinc need. On EGCG 300mg + zinc 150mg + ~25mg B6 he goes from bottom-1% functionality to functioning very well with total emotional control and elimination of fear/neurotic copper-driven state in one day. Higher EGCG causes instant eye floaters and burning teeth (copper activation); finds molybdenum terrible (right-rib pain).", "notable_effects": ["dramatic emotional control / fear elimination in 1 day", "copper penny smell from hands", "eye floaters and burning teeth on higher EGCG", "moly causes right-rib pain"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1017193"}, {"author": "Dharma", "outcome": "positive", "duration": "~2 months", "summary": "Switched from high-dose zinc gluconate (was needing 300-400mg/day) to zinc carnosine (~16mg elemental) which eliminated remaining symptoms; tripled molybdenum so moly now does the clearing instead of B6; sleep requirement halved by day 2, iron cleared, eyesight had cleared a month prior. Describes it as an 'end game' protocol after two months of hell; uses Grok for guidance and bulk 50% poly green tea extract.", "notable_effects": ["sleep requirement halved", "iron cleared", "eyesight cleared", "no symptoms on zinc carnosine", "peroxynitrite sensitivity lowered"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1017185"}, {"author": "Iimcca001", "outcome": "mixed", "duration": "a few weeks, then stopped", "summary": "Took protocol 4-6x/week for a few weeks then stopped; felt more emotionally reactive during and still somewhat 3-4 weeks after ceasing, plus some weight loss that seemed to coincide.", "notable_effects": ["increased emotional reactivity persisting after stopping", "weight loss"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1017135"}, {"author": "PadrePio", "outcome": "mixed", "duration": "on a break, planning return", "summary": "Confirmed during time off protocol that zinc gives him neurological symptoms and kidney pain; plans to return excluding zinc at first. Blood tests never showed high iron; suspects calcium/gut dysbiosis. Excess zinc gives him horrible insomnia which EGCG reliably relieves.", "notable_effects": ["zinc causes neurological symptoms and kidney pain", "excess zinc causes insomnia relieved by EGCG"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1017129"}, {"author": "Sparxfly", "outcome": "neutral", "duration": "early", "summary": "Noticed the protocol first felt like iron coming out, then suddenly copper started dumping with sudden manic energy.", "notable_effects": ["shift from iron to copper dumping", "sudden manic energy"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1017081"}, {"author": "whatisaging", "outcome": "mixed", "duration": "11+ months", "summary": "Reports switching from a high-copper type to a high-iron type after ~11 months; first 11 months nuked a lot of copper but not much iron. Uses molybdenum for the '5-hour curse' (waking after 5 hours unable to return to sleep = high copper tell). Personality changed after fixing fight/flight biochemistry.", "notable_effects": ["personality change", "sleep sensitive to copper", "iron symptoms resolved by deleting then re-adding moly"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1017346"}, {"author": "Epinerein", "outcome": "positive", "duration": "6 months", "summary": "On month 6; reports psychotic/manic episodes have improved in intensity and frequency, credits protocol with helping him face himself and become a better man. Had a psychotic episode mid-thread (incoherent posts) but says it improved vs prior protocols (copper protocol, pyluria protocol which were harmful). Meditates 30-60 min/day.", "notable_effects": ["reduced frequency/intensity of psychotic episodes", "increased self-reflection", "humbling psychological effect"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1017330"}, {"author": "Nusian", "outcome": "mixed", "duration": "several months", "summary": "Got through high iron/copper backlog and found a huge zinc deficit waiting; earlier taking zinc made him gag while iron/copper still present (pale stool as a tell). Did 3-4 weeks of zero-zinc doses to clear a bad iron backlog attributed to past rutin-containing vitamin C and early underdosing EGCG while overdosing C and moly. Would rather be low zinc than high copper or high iron.", "notable_effects": ["cleared iron backlog", "acne cleared when lowering C", "low-zinc depression lifted with reordering"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1017277"}, {"author": "Youngboy", "outcome": "neutral", "duration": "3-4 weeks (Aug/Sep)", "summary": "Did protocol 3-4 weeks in Aug/Sep and felt nothing at all, no calibrations ever needed, always felt the same. Suspects he underdid biotin to conserve cost but never got symptoms. Returning to try updated ratios and more biotin.", "notable_effects": ["no perceptible effects", "no calibration needs"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1017325"}, {"author": "ZinkusMaximus", "outcome": "mixed", "duration": "7 months", "summary": "Extreme iron-dominant case. Long struggle with persistent metallic/bloody mouth taste, bad breath, rising uric acid, and minor teeth issues. Lowering moly improved bad breath and gave a euphoric rush and calmer/clearer days; eventually found best results with zero zinc, zero moly, lower-than-recommended b6, higher egcg = least calibration needed and best consistent feeling. Later discovered the persistent mouth taste was actually from dietary salt, not a deficiency.", "notable_effects": ["persistent metallic taste (later traced to salt)", "bad breath improved on low moly", "euphoric rush on lowering moly", "high uric acid persisting", "best feeling on zero zinc/moly + higher egcg"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1017763"}, {"author": "tommyg130", "outcome": "positive", "duration": "not specified", "summary": "Believes he is primarily iron-toxic (does terribly with copper antagonizing). Found EGCG dramatically effective when in balance - high iron 'mangles' his face, and high egcg lets facial/skull bones and jaw fall into a relaxed position day to day. Cannot tolerate even 1g vitamin C (gags, sour taste, loose stools) even at 4100-5000mg egcg. Settled on lowering the copper side rather than mega-dosing egcg.", "notable_effects": ["facial/jaw relaxation from high egcg", "calm, empty mind post-dose", "cannot tolerate vitamin C", "face clenching/orbital pressure when unbalanced"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1017420"}, {"author": "purple pill", "outcome": "mixed", "duration": "not specified", "summary": "Runs on 20% of full doses, has suffered high iron symptoms from the beginning (feels better than high copper). Stuck between low-zinc symptoms and major high-iron symptoms when raising zinc (takes days off formula to return to baseline). Lowering moly instantly gives hip pain (his high-copper tell). Suspects past acetyl-cysteine use sensitized him - even looking at B vitamins floods his system with iron.", "notable_effects": ["chronic high iron symptoms", "hip pain on low moly (high copper tell)", "burning stomach on low C", "gagging on higher egcg", "iron flooding from B vitamins"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1017603"}, {"author": "Vive", "outcome": "mixed", "duration": "intermittent, several weeks", "summary": "Taking half doses (sometimes twice daily), experienced numbness and poor sleep both times, vomited on a couple occasions tasting the EGCG. Felt good with higher molybdenum. Hormones not well balanced, taking breaks helps. Vitamin C was very bitter initially, now takes it with more water in powder form. Notes B3 is very effective/strong after this protocol.", "notable_effects": ["numbness", "sleep difficulties", "vomiting", "felt good on higher moly", "low mood after vomiting"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1017505"}, {"author": "MrMark", "outcome": "positive", "duration": "not specified", "summary": "Crazy-high-iron state. Main post-dose symptom was burning/icyhot skin sensation on lower body/feet. Made an 'incredible discovery' that excess biotin kept him in high-iron symptoms even with massive egcg; halving biotin cleared high-iron symptoms within an hour. Settled near-standard ratio that seems doable long term.", "notable_effects": ["burning/icyhot feet skin", "high iron cleared by halving biotin within an hour"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1017692"}, {"author": "Orion", "outcome": "mixed", "duration": "9 months", "summary": "9 months in; skin still oily and freaking out but way calmer than at the beginning. Just keeps pushing. Higher B7 a few weeks prior felt bad (like high stress hormones). Left upper eyelid twitching. Considering keeping B6 lower to not push things too fast.", "notable_effects": ["persistent oily/reactive skin", "much calmer overall", "eyelid twitch (suspected high iron)", "high B7 felt like high stress hormones"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1017556"}, {"author": "charlie", "outcome": "mixed", "duration": "not specified", "summary": "Could not handle the 100% dose despite trying repeatedly; moved down to a 25% dose leaning toward high iron. Confirmed high-iron group; well-timed calibrations (topping up vitamins and molybdenum later in the day) handle it and pay dividends.", "notable_effects": ["could not tolerate full dose", "high iron managed by well-timed later-day calibrations"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1017718"}, {"author": "dave_282", "outcome": "positive", "duration": "several months (since ~Nov)", "summary": "Was doing well through November, took a December supplement break, back on HG7 doing alternate days. Runs slightly less C and moly and higher egcg to combat occasional headaches. Went to bed with a bad headache; upped moly to 6mg but scared of higher due to headaches; brought b6 and b7 down.", "notable_effects": ["occasional headaches managed by lower C/moly + higher egcg", "generally good through November"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1017762"}, {"author": "Admiral", "outcome": "mixed", "duration": "not specified", "summary": "Notices androgens working better; asks whether accompanying hairloss is a sign of androgens working better or needs tweaking.", "notable_effects": ["androgens working better", "hair loss"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1017370"}, {"author": "Cinna30", "outcome": "positive", "duration": "not specified", "summary": "Felt really sick and took a stack, felt better within minutes, couldn't believe it. Concerned biotin measurements are off without a reliable scale.", "notable_effects": ["rapid symptom relief within minutes of a stack"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1017740"}, {"author": "Vive", "outcome": "mixed", "duration": "ongoing", "summary": "Took full dose with 1 capsule of B5 and could not sleep; re-weighing capsules and adjusting to more molybdenum/less EGCG hoping to improve chronic early waking (3am) and short sleep. Suspects too much copper.", "notable_effects": ["insomnia", "early waking at 3am", "short sleep"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1017889"}, {"author": "charlie", "outcome": "positive", "duration": "ongoing", "summary": "Kidney lab panel came back completely normal (creatinine 0.80, eGFR 108, alb/creatinine 4) despite recurring back-side kidney soreness, which he attributes to metals queuing during the flush phase. Uses Grok AI to navigate doses and calibrations, reports dumping a ton of iron with waves of copper. Increasingly convinced by the process.", "notable_effects": ["kidney soreness", "hot body", "body odor/stink", "anxiety waves", "iron dumping", "copper waves"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1017897"}, {"author": "Youngboy", "outcome": "mixed", "duration": "ongoing (started this month; also did protocol in September)", "summary": "Took a full-scale dose at noon and had itchy legs (low molybdenum sign) and slight shortness of breath during basketball; no nausea. Notes vitamin C no longer made him gag and EGCG was easier. In September ratios he never needed to calibrate, but since restarting this month he needs to calibrate, the difference being more EGCG and biotin.", "notable_effects": ["itchy legs", "shortness of breath during exercise"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1017901"}, {"author": "purple pill", "outcome": "mixed", "duration": "ongoing", "summary": "Reports the temporary lower-zinc hack works well for clearing iron backlog. Later flipped to high copper with a strong copper taste in the mouth; upped zinc back to normal and roughly doubled B7 and molybdenum.", "notable_effects": ["copper taste in mouth", "iron/copper flipping"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1017916"}, {"author": "dave_282", "outcome": "positive", "duration": "ongoing", "summary": "Took dose with no issues after having thrown up his previous dose 2 days earlier; the only change was raising molybdenum to 7mg.", "notable_effects": ["resolved prior vomiting after raising moly"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1017912"}, {"author": "Epinerein", "outcome": "positive", "duration": "ongoing (started HG7 June 2025)", "summary": "Tried the new ratio at 50% and liked it; didn't have to calibrate, hands felt warmer afterward, may need slightly more biotin.", "notable_effects": ["warmer hands", "no calibration needed"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1017919"}, {"author": "Disrupt4489", "outcome": "positive", "duration": "~1 month regular use plus breaks", "summary": "Took a half dose and one full dose only once, then 1/4 doses daily for a month; his POIS went away and ankle tendinitis improved (90% gone). POIS did not return even after a 3-week break. Now getting new leg cramps (possibly iron redistribution); biotin helped cramps partially, magnesium fully at times. Balding continues and worsens with boron.", "notable_effects": ["POIS resolved", "ankle tendinitis 90% resolved", "new leg cramps", "ongoing balding (worse with boron)"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1017952"}, {"author": "Epinerein", "outcome": "positive", "duration": "since June 2025 (~7 months)", "summary": "Lifelong cold-sore sufferer (since age 6) who previously needed a low-arginine diet and lysine. Since starting HG7 he can now eat high-arginine foods (macadamia nuts) and cayenne pepper without breakouts, needs no lysine, and hasn't caught cold or flu despite family having 5 counts of strep/flu/cold during germ season.", "notable_effects": ["cold sores prevented despite trigger foods", "no cold/flu despite heavy exposure"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1017954"}, {"author": "Nusian", "outcome": "mixed", "duration": "ongoing (weeks+)", "summary": "Noticed calibration time increased from 1-1.5 hours to 3-4 hours over recent days/weeks, alongside other noticeable changes including a big one. Later suspects larger iron backlog than thought or over-correction; went to very high EGCG (10000mg) with 50mg zinc and remained high iron (right-side neck/shoulder/hip tension) though generally calmer.", "notable_effects": ["longer calibration time", "persistent high iron", "right-side tension", "calmer/warmer emotionally on high dose"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1018082"}, {"author": "EMF-Sensitive", "outcome": "mixed", "duration": "just started (~2 weeks)", "summary": "Started at 1/8 dose. Began with just zinc and molybdenum for a couple nights and felt a negative response (bad taste, head symptoms) after high vitamin C; next day took all 7 with no unpleasant symptoms, concluding they work better together. Later noticed lightly bleeding gums since starting 2 weeks ago and clammy/moist hands after raising B5.", "notable_effects": ["bad taste and head symptoms from zinc/moly alone", "no symptoms taking all 7 together", "lightly bleeding gums", "clammy moist hands after raising B5"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1017995"}, {"author": "purple pill", "outcome": "mixed", "duration": "ongoing (low doser)", "summary": "Self-describes as a low doser making progress based on fluctuations at the same dosage; getting crazy surges of iron and copper and strong urges for B7 at times. Describes it as not the smoothest ride but learning along the way. Later still gets high-copper symptoms (migraine main one), feels zinc antagonizes copper too much but lowering zinc worsens mood.", "notable_effects": ["iron and copper surges", "strong B7 urges", "migraine (high copper)", "mood worsens on lower zinc"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1017986"}, {"author": "Areez", "outcome": "mixed", "duration": "since late February 2025 (~10.5 months)", "summary": "23-year-old man in Pakistan, extremely iron toxic, mostly takes only grams of EGCG daily (rarely B vitamins, occasional C/zinc, rarely moly). EGCG reliably alleviates high-iron symptoms (headache, hardened/sharp stool, cold hands, bloated face, enlarged/bleeding gums, overbite) for some hours. Brews his own green tea (15-20 teabags/day, ~3300mg EGCG estimated) as decaf EGCG unavailable locally. Reports teeth/jaw/facial bones visibly shifting within minutes as iron clears. Upping biotin resolved acute tooth pain overnight.", "notable_effects": ["headache relieved by EGCG", "overbite improves as iron clears", "facial bone/tooth shifting", "acute tooth pain resolved by biotin", "face rash and itching from excess zinc (needs moly)"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1018026"}, {"author": "Areez", "outcome": "mixed", "duration": "one dose", "summary": "Took escalating zinc (150mg total) for a slightly runny nose and feeling sad/empathetic; felt much better and looked better next day, but got slight itching and a face rash which he attributes to freed copper from excess zinc, resolved with molybdenum. Got his mother to try HG7 for the first time.", "notable_effects": ["improved appearance", "face rash (attributed to free copper)", "itching resolved by moly"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1018178"}, {"author": "Areez", "outcome": "mixed", "duration": "ongoing (mother, first time)", "summary": "Started his mother on HG7 for low C and some low B6/B7 symptoms; she refused EGCG, zinc, and moly. She felt a bit better with no symptoms, then got slight arm itching the next day, treated with 500mcg molybdenum.", "notable_effects": ["felt a bit better", "slight arm itching resolved by moly"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1018178"}, {"author": "Youngboy", "outcome": "mixed", "duration": "ongoing", "summary": "Raised molybdenum to 9mg to address recurring itchy legs at 7.5mg, but then developed constipation-type hardened stool with sharp pain (suspected low C). Also underdid biotin because it clumped under the tongue; appetite has been high and he gained 4 lb while trying to lose weight. Interested in using more biotin to suppress appetite.", "notable_effects": ["itchy legs at lower moly", "hardened constipated stool with sharp pain", "high appetite", "4 lb weight gain"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1018101"}, {"author": "Disrupt4489", "outcome": "positive", "duration": "ongoing (weeks, on alternate days)", "summary": "Iron panel confirmed high iron (serum iron 233 vs max 175, ferritin 90, TIBC 318) after a few months on HG7; HTMA also supported high free iron in blood and tissues. Mostly fine last couple weeks with a few mild symptoms; mild brain fog and pre-dose headache that resolves after taking dose. Raised EGCG from 4160mg to 4800mg to address it.", "notable_effects": ["mild brain fog", "pre-dose headache relieved by dose"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1018289"}, {"author": "Epinerein", "outcome": "positive", "duration": "since mid-June 2025 (~7 months)", "summary": "Reports the new first-page ratio is amazing and got him much closer to the ultimate. Does a 50% ratio at least once a week to check for extreme symptoms. Seeking a calibration to reach a no-brain-fog/flow state.", "notable_effects": ["closer to optimal on new ratio"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1018310"}, {"author": "StewoParker", "outcome": "mixed", "duration": "some days (new, full doses, every other day)", "summary": "Started HG7 for very dry skin (especially under beard/hair), cold feet, low libido, flat mood. Iterated over three stacks: first caused mild nausea, bloating, watery stool; raising zinc to 200mg worsened nausea and dry skin but fixed watery stool (suggesting C now correct but too much iron mobilized); dropping zinc to 100mg removed nausea and raised libido but dry skin, dry eyes and blocked nose returned. Advised to raise C rather than lower zinc.", "notable_effects": ["dry skin", "cold feet", "low libido", "flat mood", "nausea (worse at higher zinc)", "watery then normal stool", "dry eyes", "blocked nostril"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1018355"}, {"author": "Areez", "outcome": "positive", "duration": "~10-17 days recent; ongoing over 4.5 years of ups/downs", "summary": "Regrew 0.4 inches in height in the last 10-17 days and reports face/head becoming more shapely and proportionate after previously doing poorly due to 'high iron'. Hopes to grow another inch or two. Some days missed HG7.", "notable_effects": ["height regrowth", "better facial/head shape", "difficulty getting sleepy late at night (possibly green-tea caffeine)"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1018563"}, {"author": "dave_282", "outcome": "positive", "duration": "2 weeks (alternate days)", "summary": "Taking the dose on alternate days for two weeks with no issues apart from a one-off right-sided pain just above the waist that lasted moments and didn't return. Felt good/brilliant. Planning to drop to 50% ratios to save money since going through EGCG fast.", "notable_effects": ["felt good", "one-off right-side pain above waist (transient)"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1018595"}, {"author": "MrMark", "outcome": "mixed", "duration": "a couple of months", "summary": "Feels fine for ~2 hours after dosing then a roller coaster of high-iron symptoms requiring multiple rounds of calibration (EGCG/moly/zinc), rarely feeling fully 'right'; wakes with high iron. Yet reports amazing progress and several days of feeling really great over the past couple months.", "notable_effects": ["cyclic high-iron symptoms", "amazing progress overall", "days of feeling great"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1018636"}, {"author": "ZinkusMaximus", "outcome": "positive", "duration": "~9 months", "summary": "Believes he has a stubborn iron backlog (has taken near-zero zinc for a month+ without low-zinc symptoms). Switched from front-loading only some EGCG plus heavy all-day calibration to taking much more EGCG with the initial stack, which nearly eliminated calibration symptoms and gave proper rest and a very deep voice. Coming up on 9 months; feels good but lacks a hard metric.", "notable_effects": ["deep voice in morning", "proper rest/less insomnia", "near-zero daytime calibration once EGCG front-loaded", "high uric acid not yet moved"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1018994"}, {"author": "StewoParker", "outcome": "mixed", "duration": "several weeks of fine-tuning", "summary": "Struggled with calibration: dosing repeatedly made him freezing/cold, with gagging/mild nausea on EGCG. Theorized a high-copper backlog causing low-iron/cold symptoms; a temporary 0-EGCG dose warmed hands/feet, raised libido and improved skin. Over weeks kept fine-tuning zinc:B6 and EGCG:moly ratios; got better but persistent cold feet, low libido, dry skin near hairline and muscle twitching remained.", "notable_effects": ["cold/freezing on dose", "temporary warmth/libido/skin gains on 0-EGCG", "persistent cold feet", "muscle twitching", "high voice (wanted deeper)"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1018618"}, {"author": "Epinerein", "outcome": "positive", "duration": "ongoing", "summary": "Reports calming of tics and OCD on the protocol: for the first time since age 6 frequently gets over a minute with zero tics, and estimates a 50% overall reduction in tics and OCD in both intensity and frequency. Separately battles severe insomnia and copper-toxic-like symptoms during calibration.", "notable_effects": ["50% reduction in tics and OCD", "over a minute with zero tics", "improved but ongoing insomnia struggle"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1018842"}, {"author": "Disrupt4489", "outcome": "mixed", "duration": "ongoing (1/4 to 1/2 dose)", "summary": "Believes he has high iron (high free iron blood test, high iron on 2 HTMA hair tests, symptom match). Accidentally took half/full dose for a month with no zinc and got no low-zinc problems; concludes he is very sensitive to zinc (zinc makes him puke fastest, then EGCG), so stays on 1/4 dose. Higher biotin helped twitching; new lower-C ratios go down much better and he 'can't even feel anything'.", "notable_effects": ["nausea (worst on zinc, then EGCG)", "muscle twitches reduced by biotin", "mild headaches", "gum discomfort", "new ratios symptom-free"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1018758"}, {"author": "Hermes", "outcome": "mixed", "duration": "ongoing (returned to 100% from 10%)", "summary": "Returned to full HG7 after doing only 10%; smaller doses at higher intervals cured his prior biotin problems. Positives: SIBO slowly clearing (tongue coating shrinking), more dreams, better sleep than summer, emotional rollercoaster ending calmer. Negatives: constant numbness/pain and impaired mobility in hands and feet (can't do pen tricks), and hair loss now in overdrive despite high zinc and biotin. Needs at least 300mg zinc or gets depressed.", "notable_effects": ["SIBO/tongue-coating improving", "more dreams", "finger/foot numbness and stiffness", "hair loss overdrive", "depression if zinc too low"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1018910"}, {"author": "Vive", "outcome": "negative", "duration": "3 days full dose", "summary": "Took the full dosage for three days (accidentally very high zinc one day) and felt cold and low-energy afterward, with a sore throat lasting three days that extra biotin didn't fix. Also gave 1/4 dose to her father, who felt low energy; both felt nauseous on the higher zinc. Suspects releasing bugs/viruses; a later B12 test came back very low (75, should be >187), which she attributes to genetics.", "notable_effects": ["cold and low energy", "3-day sore throat", "nausea on high zinc", "later found very low B12", "fever/monkeypox-like blisters after a full dose"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1018815"}, {"author": "MrMark", "outcome": "positive", "duration": "2 doses on new ratios", "summary": "On the updated ratios, the first dose gave an amazing sense of wellness and energy; the second needed more #3 calibrations because he raised zinc/B6 without enough EGCG. Overall calibration symptoms are much milder and far fewer corrective doses are needed. Credits the refinements with getting past years of digestion and sleep problems; sees the roller coaster trending upward.", "notable_effects": ["strong wellness and energy", "milder calibration symptoms", "digestion and sleep improvements"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1019037"}, {"author": "Areez", "outcome": "positive", "duration": "6+ months", "summary": "After over 6 months of daily very high EGCG, his EGCG needs are now close to normal (only higher after masturbation). Confirmed from first-hand experience that a 125mg B6 dose works fine (previously 75-100mg B6 required too much EGCG). Feeling good with looks slowly improving; still needs milk/calcium for gut motility.", "notable_effects": ["EGCG needs normalized", "looks improving", "good dreams / morning wood", "reliance on milk for gut motility"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1018849"}, {"author": "Orion", "outcome": "positive", "duration": "~1 year", "summary": "Nearly a year on the stack; says it is finally starting to kick in, like reaching the base of the mountain. Loving the results but still a way to go. Results were slow: thought it wasn't working at 6 months and again at 10 months, but pushed through knowing it takes time to reverse years of damage.", "notable_effects": ["slow-building improvements", "results finally kicking in near 1 year"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1019279"}, {"author": "ZinkusMaximus", "outcome": "positive", "duration": "8-9 months", "summary": "Says it took about 8-9 months to figure the protocol out and he still needs a few weeks to confirm he is dialed in, but it's looking good. Notes the tenacity required and that this kind of thing catches on slowly: 'real slow, then all at once'.", "notable_effects": ["dialing-in nearly complete after 8-9 months"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1019282"}, {"author": "Meikueila", "outcome": "positive", "duration": "~4 years", "summary": "One of the very first people to try the formula (Jacob's girlfriend), calibrating for ~4 years. Got rid of her dust/mite allergies and asthma (was 4/5 severity, on daily meds; no pill for years). Lost a lot of weight, face became more symmetrical, nose less 'potato', grew 2-3cm taller, hair and nails grow fast, skin more hydrated, no wrinkles, rarely gets sick, ferritin improved, feels smarter. Notes caffeine boosts the formula and that as a woman her EGCG tolerance shifts across her cycle.", "notable_effects": ["allergies and asthma resolved", "weight loss", "grew taster/taller by 2-3cm", "fast hair and nail growth", "hydrated skin, no wrinkles", "rarely ill", "improved ferritin", "feels smarter"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1019297"}, {"author": "ScrapActivator", "outcome": "mixed", "duration": "7 days (plus days off)", "summary": "Male early 50s, carnivore, decades of chronic fatigue, brain fog, rage, insomnia, 30 years of locked/tense muscles and pain, diabetes, obesity, low libido. On the 'golden ratio' his life was transformed within days: #3 calibration stopped year-long crippling neck/head pain in minutes, #1 turned off panic attacks, #2 turned off sadness; muscles unlocked (shoulders relaxed for the first time in 30 years, then back and neck), body felt 30 lbs lighter, eyesight clearer, food tasted better, acid-reflux burps became plain burps, a skin tag fell off, cold feet warmed with #3. Two severe unresolved side effects remained: insomnia from unstoppable racing thoughts and 'acidic diarrhea'; took up to 38 calibrations in a day. (Quoted by whatisaging.)", "notable_effects": ["neck/head pain off in minutes with #3", "panic attacks stoppable with #1", "sadness off with #2", "30-year muscle tension unlocked", "felt 30 lbs lighter", "clearer eyesight", "skin tag gone", "acid reflux resolved", "severe insomnia/racing thoughts", "acidic diarrhea"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1019275"}, {"author": "charlie", "outcome": "neutral", "duration": "not specified", "summary": "Reports personally experiencing light and sound sensitivity from copper toxicity and from high-copper foods, specifically liver and chocolate.", "notable_effects": ["light and sound sensitivity from copper toxicity and high-copper foods (liver, chocolate)"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1018537"}, {"author": "purple pill", "outcome": "mixed", "duration": "ongoing (sporadic due to work)", "summary": "Needs a large amount of B7 (biotin). Reports copper still spills into his system easily, so that even a cup of black tea now triggers high-copper symptoms, and he has pronounced dark circles under his eyes ('like I've been punched'). Has become so attuned to imbalance symptoms there is 'no turning back' even after a hiatus.", "notable_effects": ["high biotin need", "black tea triggers high-copper symptoms", "dark circles under eyes"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1018773"}, {"author": "Hidden49", "outcome": "mixed", "duration": "since September (ongoing)", "summary": "Reports that for him the protocol behaves differently because he pushes out iron but barely any copper: high-dose biotin only works when enough copper is being excreted, and molybdenum won't help excrete iron without copper present (it just lowers his metabolism). The #3 calibration worked initially in September but no longer works when he's high-iron/low-copper, since the moly further depletes his copper. B6 pushes out only iron for him, not copper.", "notable_effects": ["biotin need lower without copper to excrete", "#3 stopped working when low copper", "moly lowers metabolism without copper", "B6 mobilizes iron only"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1019125"}, {"author": "Peater", "outcome": "neutral", "duration": "not specified", "summary": "Shares thiamine (B1) experience adjacent to HG7: years of coffee/carbs left him drifting in and out of B1 deficiency; a 500mg megadose felt like B1 flooding his system, 'incredible'. Later pushed B2 too low (air-hunger feeling and beginnings of cracked lips) after learning B2 is a cofactor. Considering dropping B1/B2 for a while.", "notable_effects": ["dramatic relief from B1 megadose", "air hunger and cracked lips from B2 going too low"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1018805"}, {"author": "Disrupt4489", "outcome": "positive", "duration": "ongoing (half-dose daily)", "summary": "Takes half dose of current ratios daily, going down very well; POIS resolved first, leg tendons improving, balding possibly slowing. Glad to have started early to prevent minor problems from worsening long term.", "notable_effects": ["POIS resolved", "leg tendons improving", "balding possibly slowing"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1019298"}, {"author": "Epinerein", "outcome": "positive", "duration": "~9 months (since June 2025)", "summary": "Almost 9 months in. Sleep improved (down to one sleep med from 11), tics improved where nothing else worked, anger/hair loss/hallucination/daytime sleepiness from Cu toxicity under control, no more neuropathy or dysautonomia, energy much improved, cold hands/feet ~25% better. Plans to stay on protocol permanently.", "notable_effects": ["sleep improved", "tics improved", "anger controlled", "hair loss controlled", "hallucination controlled", "no more neuropathy", "no more dysautonomia", "energy improved", "cold hands/feet 25% better"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1019301"}, {"author": "Meikueila", "outcome": "positive", "duration": "~4 years", "summary": "One of the very first testers (with Jacob for ~4 years). Got rid of dust/mite allergies and asthma (was 4/5 severity, no meds for years), lost weight, more symmetrical face, grew 2-3cm taller, fast hair/nail growth, hydrated skin, no wrinkles, improved ferritin, rarely gets sick, feels smarter/clearer thinking. Feels caffeine slightly boosts the formula.", "notable_effects": ["allergies/asthma gone", "weight loss", "grew taller", "improved ferritin", "clearer thinking/visualization", "rarely sick", "no wrinkles"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1019310"}, {"author": "Nusian", "outcome": "positive", "duration": "a few days on new ratio", "summary": "Tried TRH's newer ratio for a few days and calls it the best so far; can feel it eating into the iron backlog with each dose. Got an iron backlog from trying lower B6 doses (175mg) for a week or two - had low zinc symptoms that wouldn't resolve even at 150mg, then biotin surfaced iron and made shoulders jump. Can't tolerate more than 300mg B6 at once (350mg too exhausting).", "notable_effects": ["eating into iron backlog", "best results so far"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1019317"}, {"author": "Epinerein", "outcome": "mixed", "duration": "ongoing", "summary": "Experimenting daily with ratios to fix persistent insomnia (originally induced by taking 15mg copper/day until Feb 2025; sleep efficiency was 53% even with meds). Still had insomnia, feeling too warm, slight irritability, ear cartilage/deep ear pain on one dose. Increasing zinc or B6 seems to worsen sleep.", "notable_effects": ["persistent insomnia", "feeling too warm", "irritability", "ear cartilage pain"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1019347"}, {"author": "whatisaging", "outcome": "mixed", "duration": "15 months", "summary": "Has had nothing but side effects for 15 months, severe imbalances, gag/taste reflex doesn't work even while nauseous. Still stuck with it due to benefits. Intentionally gained 30 lbs to test if formula would remove it without lifestyle change - it didn't budge (formula is an amplifier of good habits, not a standalone). Has a large iron/vitamin-A backlog from a dextrose experiment; zinc symptoms are right-side pain and burning on wrinkles.", "notable_effects": ["persistent side effects", "vomiting on zinc", "iron backlog", "can't gag/taste test"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1019426"}, {"author": "StewoParker", "outcome": "positive", "duration": "~2 weeks (modified protocol)", "summary": "Very copper-toxic with low iron; chronic coldness and dry skin on formula. Discovered that dropping EGCG and vitamin C entirely (keeping the other supps to lower copper while letting iron rise) made him feel warm, skin normalized in places, libido rising. Feeling copper mobilize (emotional swings, sneezing/histamine dumps). Index finger dryness dramatically improved in a week (photo). Age 28. Plans to reintroduce C and EGCG once more balanced.", "notable_effects": ["feeling warmer", "dry skin healing", "libido rising", "histamine/sneezing detox", "finger dryness resolved"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1019298"}, {"author": "purple pill", "outcome": "mixed", "duration": "several months", "summary": "Wild goose chase of calibration over months: had to quadruple biotin, double B5, double molybdenum, lower EGCG to almost zero, vary zinc; recently got over crazy high copper doing doses with zero or 1 cap EGCG. Iron finally rising so increasing EGCG again. One deficiency symptom is a 'wet foot' sensation (peripheral-neuropathy-like) which he came to believe is low B6, not excess.", "notable_effects": ["high copper resolved", "iron rising", "wet foot sensation", "large biotin/B5 needs"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1019400"}, {"author": "ZinkusMaximus", "outcome": "positive", "duration": "~10 months total (6 months since last break)", "summary": "Took first break in ~6 months after running out of supplements; pleasantly surprised at feeling great off the supplements - only very slight iron symptoms, feels chill and solid, suggesting background improvements. Later noted trouble taking a break as symptoms returned (iron backlog).", "notable_effects": ["feels great on break", "slight iron symptoms", "background improvements"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1019505"}, {"author": "Orion", "outcome": "positive", "duration": "ongoing", "summary": "Has done a few one-day breaks; reports a significant baseline improvement that appears one day away from dosing, which tells him it is working.", "notable_effects": ["baseline improvement after one-day break"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1019506"}, {"author": "Stargazer89", "outcome": "positive", "duration": "6 months", "summary": "Six months in. Eczema, severe dandruff and terrible body odor all gone quickly. At the 6-month mark each dose feels like magic - reports feeling jawline widen, eyes change shape, shoulders broaden. Biggest calibration issue was vitamin C; once dialed to ~3g the formula worked like magic. Claims a PNPO deficiency (can't convert B6) yet blood shows no issue on pyridoxine HCl; P5P made him feel dehydrated/B6-deficient, and no B6 makes him wired/angry/anxious.", "notable_effects": ["eczema gone", "dandruff gone", "body odor gone", "facial/skeletal changes", "each dose feels like magic"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1019555"}, {"author": "Dharma", "outcome": "mixed", "duration": "ongoing; did a month off", "summary": "Prefers a small dose (100 B6, 1.5 C) as functional and safe, big enough for B's without needing bottomless EGCG. Did a month off with daily headaches but many good life experiences; iron-coming-up after stopping never ended (unlike coffee withdrawal which is 1-2 days). Off protocol, one EGCG morning/night helped headaches but a 2nd tablet within 5h caused low-blood-sugar/low-iron feelings. Lost fat and muscle without dairy but grip strength rose from 44 to 56kg. Reports phone-proximity pain that began during large doses/overdoing zinc.", "notable_effects": ["grip strength up 44 to 56kg", "prolonged iron surfacing after stopping", "phone-proximity pain from large doses", "headaches during month off"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1019639"}, {"author": "dave_282", "outcome": "positive", "duration": "~1 month+ (alternate days)", "summary": "Took higher ratios on alternate days for a month with no issues, only occasional mild headache; happy to switch to the new lower ratios to save money.", "notable_effects": ["no issues", "occasional mild headache"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1019620"}, {"author": "MrMark", "outcome": "positive", "duration": "ongoing (new ratios)", "summary": "Likes the new lower ratio despite an iron backlog; did calibrations and added extra vitamin C (to 3g) for dry skin, no low-B6 symptoms. Reports much fewer symptoms and that dosing is very doable even during work on the new ratios.", "notable_effects": ["much fewer symptoms", "doable during work"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1019670"}, {"author": "Disrupt4489", "outcome": "positive", "duration": "ongoing (new lower ratio)", "summary": "Tried a dose close to the previous ratios under the new lower framework: no nausea at all, odd deep jaw feeling. Had a nightmare and mild constipation/anal itching (attributes to low zinc/biotin). Calls it 'another home run'.", "notable_effects": ["no nausea", "deep jaw sensation", "mild constipation", "anal itching"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1019724"}, {"author": "Epinerein", "outcome": "neutral", "duration": "ongoing (new lower ratio)", "summary": "Tried new lower ratio; fine with no issues, though 2 hours later felt uninspired and slightly irritated (notes it's usually like that anyway).", "notable_effects": ["no acute issues", "mild irritation 2h after"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1019673"}, {"author": "Nusian", "outcome": "positive", "duration": "ongoing", "summary": "Bumped C up because 2.5g was gradually putting him in a deficit; new ratio produced clear, calm feeling, more open eyes, loose free shoulders, no nausea, easy to take (still with iron backlog).", "notable_effects": ["clear calm feeling", "eyes more open", "loose shoulders", "no nausea"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1019453"}, {"author": "Disrupt4489", "outcome": "positive", "duration": "several doses / ongoing", "summary": "Reports higher testosterone (compares to past steroid use as a reference), a widening jawline and better facial symmetry, and feeling 'stuff moving' a few hours after each dose in legs, ankle tendon and knees where inflammation had previously been building.", "notable_effects": ["jawline widening / better symmetry", "gum-ache-like feeling migrating to jaw", "sensation of movement in legs, ankle tendon, knees a few hours post-dose", "reduced knee inflammation"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1019729"}, {"author": "Epinerein", "outcome": "negative", "duration": "ongoing", "summary": "Persistent sleepiness, tiredness, cold hands, apathy, mild brain fog (re-reading paragraphs), lack of motivation and night insomnia. Adding more EGCG in past ratios never solved it.", "notable_effects": ["sleepy/tired", "cold hands", "apathy", "brain fog", "insomnia"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1019734"}, {"author": "Orion", "outcome": "mixed", "duration": "1 year (one year on the stack)", "summary": "One year in, taking a double dose with only occasional nausea as a side effect, easy to power through. Skin (his main issue) doing much better month to month; theorizes body was dumping Fe/Cu into skin as protection. Sleep slightly worse recently; adjusting Mo. Keeps C low because it tastes bad.", "notable_effects": ["occasional nausea", "skin improving month to month", "slightly worse sleep when Mo lowered to 6mg"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1019760"}, {"author": "Disrupt4489", "outcome": "mixed", "duration": "months (multiple mistakes over time)", "summary": "Recounts two big mistakes: (1) took too much zinc on a full dose due to broken scales and a miscalculation, causing churning insides, vomiting, diarrhea and lingering kidney discomfort for days; (2) unknowingly under-dosed zinc for months because the gluconate powder was more diluted than the label implied, yet had no major problems (lucky due to iron backlog). Now measures very carefully.", "notable_effects": ["zinc overdose: churning gut, vomiting, diarrhea, days of kidney discomfort", "months of near-zero zinc without noticeable problems"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1019774"}, {"author": "MrMark", "outcome": "negative", "duration": "20+ doses without zinc; ~1 month on stack", "summary": "Never used P5P, did 20+ doses without zinc. Stuck in a loop: high iron with burning feet and body inflammation, but any #3 correction causes right-side pain and a need for #2, then more high iron. Hadn't felt good in days. Later finds food (dairy/wheat) drives inflammation and a dose without EGCG calms his allergies.", "notable_effects": ["high iron", "burning feet", "body inflammation", "right-side pain on corrections", "allergy relief on no-EGCG dose"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1019802"}, {"author": "purple pill", "outcome": "mixed", "duration": "ongoing, small adjustments", "summary": "Was dialing in near a quarter dose. Recently cleared a long stretch of high copper (doing doses with zero or 1 cap EGCG), then see-sawed into major high-iron symptoms: felt arthritic in the morning, joints and tissue fully inflamed. Pushed EGCG and C up to compensate.", "notable_effects": ["swings between high copper and high iron", "arthritic feeling", "joint/tissue inflammation"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1019805"}, {"author": "Epinerein", "outcome": "negative", "duration": "ongoing", "summary": "Higher-end dose did not fix brain fog or cold intolerance; lay awake the whole night mildly irritable, body tight, alternating hot to cold, despite popping sleep aids every 2 hrs.", "notable_effects": ["unresolved brain fog", "cold intolerance", "full-night insomnia", "irritability", "body tightness", "hot/cold swings"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1019812"}, {"author": "ZinkusMaximus", "outcome": "negative", "duration": "~2 weeks off after long-term use", "summary": "Trying to learn how to cycle on/off for work/affordability. First day off felt good, then bad iron symptoms for ~5 days that never fully cleared; after 2 weeks off, metallic taste and testicular shrinkage worsened. Tiny EGCG-only doses helped only slightly. Notes he needed very specific doses (high B6, huge EGCG, ~5.5g B7, ~2.7g C, zero zinc, near-zero Mo) and links his outsized EGCG need to prior P5P use.", "notable_effects": ["rebound iron symptoms off-stack", "metallic taste", "testicular shrinkage", "very high EGCG requirement"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1019841"}, {"author": "chalceconist", "outcome": "positive", "duration": "~1 year", "summary": "Found HG7 after eating ~1kg liver in 2 weeks and developing clear copper-toxicity symptoms. First low-EGCG dose instantly released the copper 'pressure' and was soothing; then iron revealed itself (confirmed low copper on a blood test, plus hair-lightening from over-chelation). Mostly ran 1/2 doses, slowly cleared an iron backlog. Reports the formula feels soothing/anabolic, hair getting silkier in real time, and mentality/emotions improving despite a stressful year of under-eating, smoking and work stress.", "notable_effects": ["immediate relief of copper pressure", "hair lightening (over-chelation)", "hair texture smoother/silkier", "improved mentality and emotions", "iron backlog slowly clearing"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1019842"}, {"author": "dave_282", "outcome": "positive", "duration": "4 doses at new lower ratios", "summary": "Nothing to report after 4 doses, feeling good on the lowered-dose protocol. Later confirms it keeps working well on alternate days with no negative symptoms, and he feels fantastic after donating blood.", "notable_effects": ["feeling good", "no negative symptoms", "feels fantastic after blood donation"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1019861"}, {"author": "Disrupt4489", "outcome": "positive", "duration": "first dose of new ratio", "summary": "New lower ratio went down well with no nausea or anything to report after 3 hours. Gut feeling that this ratio is even better than the prior weeks'.", "notable_effects": ["no nausea", "well tolerated"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1019934"}, {"author": "Orion", "outcome": "mixed", "duration": "ongoing on new stack", "summary": "Feeling good on the new stack overall, but has a recurring problem of staying asleep - falls asleep fine but too many wake-ups some nights. Asks which part of the stack to tweak.", "notable_effects": ["feeling good", "frequent night wake-ups"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1019936"}, {"author": "chalceconist", "outcome": "positive", "duration": "ongoing", "summary": "No longer craves red meat (which he did pre-HG7, attributing craving to low zinc); HG7 lessens overall appetite and needed food intake, with a big Ghrelin/Leptin impact. Feels it supports nutrient partitioning and negates negative effects of sugar, excess coffee and cigarettes.", "notable_effects": ["reduced red-meat craving", "reduced appetite", "appears to blunt negatives of sugar/coffee/cigarettes"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1019975"}, {"author": "MrMark", "outcome": "positive", "duration": "~1 month in", "summary": "New ratio gave an extremely positive initial impact: higher mood, more clarity of thought (compares to NZT). Even while often off-balance over the past month, has days remarkably better than at the start, learns new material at work very quickly, and digestion is dramatically better. Calls this ratio excellent and doable daily.", "notable_effects": ["higher mood", "mental clarity (NZT-like)", "fast learning at work", "much improved digestion", "endless cravings ~10-12h post-dose"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1019987"}, {"author": "tommyg130", "outcome": "positive", "duration": "ongoing", "summary": "Feels decent on a 2/3 total dose; notes he can't take much zinc or C (goes sky-high iron) and is very prone to low copper. Likes that the ratios scale cleanly (b6:zinc exactly 2:1) and that below 1/3 dose the amounts get too small (25mg zinc insufficient).", "notable_effects": ["feels decent on 2/3 dose", "intolerant of higher zinc/C (high iron)", "prone to low copper"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1019997"}, {"author": "MrMark", "outcome": "positive", "duration": "single dose", "summary": "Really great experience: mood much higher after 30-45 minutes with more fluid movement and thinking. Mild high-iron symptoms and a mild right-side (liver area) ache appeared ~6 hours post-dose but were very manageable.", "notable_effects": ["higher mood", "fluid movement and thinking", "mild high iron at 6h", "mild right-side ache"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1020016"}, {"author": "Orion", "outcome": "positive", "duration": "ongoing", "summary": "On a similar dose to MrMark with no side effects at all.", "notable_effects": ["no side effects"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1020018"}, {"author": "ZinkusMaximus", "outcome": "positive", "duration": "3 days back on, then off", "summary": "Got back on HG7 for 3 days with an even higher EGCG/B6 ratio, then came off, and it fixed most of his coming-off issues; where he used to get iron symptoms 36h after the last dose, he now gets next to none. Believes his EGCG need is way higher than most due to prior P5P use.", "notable_effects": ["smoother off-ramp", "near-elimination of rebound iron symptoms"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1019956"}, {"author": "ZinkusMaximus", "outcome": "positive", "duration": "single dose of new/current stack", "summary": "New (current standard) stack working well: only a little stomach grumbling and burping and slightly lower energy, but no diarrhea and almost imperceptible lower back pain - a big improvement over his prior very-high-EGCG regimen.", "notable_effects": ["mild stomach grumbling/burping", "slightly lower energy", "no diarrhea", "minimal lower back pain"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1020142"}, {"author": "chalceconist", "outcome": "positive", "duration": "ongoing", "summary": "Feeling really good on the 2:1 B6/Zinc ratio; confirms that simply lowering EGCG is how you effectively 'increase' zinc on the protocol. Currently clearing a copper backlog after months of clearing iron.", "notable_effects": ["feels really good", "higher B6 increases zinc uptake", "copper backlog after iron clearing"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1020335"}, {"author": "chalceconist", "outcome": "positive", "duration": "ongoing", "summary": "Confirms the standard higher-B6-plus-zinc dose feels very relaxing and matches the 'progesterone feeling' other members describe, as long as there isn't too much metal spillover or zinc deficiency (which puts his nervous system into fight-or-flight).", "notable_effects": ["very relaxing", "progesterone-like feeling", "fight-or-flight if too zinc deficient"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1020350"}, {"author": "Epinerein", "outcome": "positive", "duration": "single dose of new standard", "summary": "Tried the new dose with everything within range (Mo at 3.5mg); thinks it's good and, rarely for him, didn't have to calibrate at all.", "notable_effects": ["no calibration needed (rare for him)"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1020352"}, {"author": "Osukhan", "outcome": "positive", "duration": "used it in early 2025", "summary": "Did the formula in early 2025 and got along with it well at the time. Now takes a B-complex with P5P (Lifeblud) and is asking how to restart the current protocol (lower zinc, keep B6 at posted amount, discontinue the B-complex).", "notable_effects": ["got along well with formula in early 2025"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1019877"}, {"author": "chalceconist", "outcome": "neutral", "duration": "ongoing (his mother)", "summary": "His mother, who took P5P for a long time, is now doing well on the current stack with no calibration needed, though she doesn't feel much from it - neither negative nor positive, just neutral.", "notable_effects": ["no calibration needed", "neutral / no strong felt effect"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1020114"}, {"author": "Vive", "outcome": "mixed", "duration": "tried some days over ~3 months", "summary": "Has severe dental problems (teeth extracted, abscess, jawbone fragment came out) and a dentist pushing high-dose D3/K/magnesium. Reports HG7 'felt quite good' during the days she tried it over three months and hopes it will help bone regrowth, but also has low B12/D3 and thinks she caught a monkeypox-type virus at work.", "notable_effects": ["protocol felt quite good", "hopes for bone regrowth"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1020125"}, {"author": "Nusian", "outcome": "negative", "duration": "several days of adjustments", "summary": "Started at 1g C on the latest revision and crept up to 1.5g while running the high end of everything else, which 'was sending me insane' - moly needs went through the roof with an iron backlog. Dropped back to ~1.1g C and 35mg zinc (from 70mg) to settle things. Suspects prior rutin use; finds ~1.25g C the most he can tolerate consistently.", "notable_effects": ["'sending me insane'", "moly needs skyrocketing", "iron backlog", "70mg zinc too much"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1020199"}, {"author": "recoil", "outcome": "neutral", "duration": "first dose (after ~6 months lurking)", "summary": "Pulled the trigger on his first dose after lurking almost six months. About four hours later got a bit of ear ringing (not unusual for him) and diarrhea. Plans to hold the same dose for a few days before adjusting.", "notable_effects": ["ear ringing", "diarrhea ~4h post-dose"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1020314"}, {"author": "Hidden49", "outcome": "negative", "duration": "Sep 2024-March 2025 his own way; ~1 month trialing standard", "summary": "Says the standard/higher-B6 approach repeatedly goes badly wrong for him: 150mg B6 at 2:1 to zinc leaves him feeling 'the metals' for days, unrelaxed, and in a worse balance. Zinc and molybdenum push him into copper-deficient states with anemia s
