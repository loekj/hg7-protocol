ts", "context": "Hardened, constipated stool with sharp pain (sometimes tearing internally), and stuck digestion; attributed to low vitamin C, low biotin, or too much iron/EGCG.", "resolution": "More biotin, more vitamin C, and dietary fibre/cabbage; recurred when biotin or C were dropped or without daily fibre.", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1018101", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1022103", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1017475", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1019724"]}, {"effect": "Headache and migraine", "frequency_hint": "many reports", "context": "Headaches and full migraines, often mid-dose, on off-days between doses, or in the afternoon around day 3; attributed to surging iron (low EGCG), low biotin, or B6. One migraine came from badly under-dosed zinc gluconate.", "resolution": "An extra EGCG capsule (often clearing it within an hour), raising biotin, or adjusting C and molybdenum; some migraines from lowering biotin resolved by keeping biotin high.", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1013437", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1018322", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1021583", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1015220", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1016487"]}, {"effect": "Lower back and kidney-area ache (low zinc)", "frequency_hint": "many reports", "context": "Recurrent lower-back and kidney-area ache hours after dosing (often around 4-5pm), reported repeatedly by high-iron members; framed as low zinc or copper/iron settling in the kidneys. For some it turned sharp and became a constant symptom.", "resolution": "Large standalone zinc doses, alternating zinc and molybdenum, keeping EGCG and C high, or raising zinc while lowering EGCG. Often chronic and recurring, worse initially with zinc in a high-iron state.", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1013681", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1013180", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1015077", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1020517"]}, {"effect": "Joint, hip, leg, sciatic and nerve pain (including wrong-molybdenum over-chelation)", "frequency_hint": "many reports", "context": "Hip, leg, knee, Achilles, groin and sciatic pain, plus joint pain and stiffness. Several cases were traced to non-amino-acid-chelate molybdenum (glycinate, citrate, sodium molybdate) over-chelating copper, or to molybdenum-driven gout; a few were severe enough to limit walking or force quitting.", "resolution": "Switching to molybdenum amino acid chelate (one member's strenuous feeling resolved instantly), dropping or adjusting molybdenum, adding biotin/zinc, or replacing molybdenum with niacin. A couple quit to let nerves heal.", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1012023", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1017642", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1021642", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1021682", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1022376"]}, {"effect": "Muscle twitches, cramps and spasms", "frequency_hint": "many reports", "context": "Involuntary twitches and fasciculations in feet, toes, calves and thighs, plus leg and abdominal cramps; most commonly tied to low biotin (or low B6/EGCG), and to mineral shifts during iron/copper redistribution.", "resolution": "Biotin was the usual fix; potassium, calcium or magnesium (glycinate) helped as band-aids for some. Cramps recurred when biotin lagged behind B6.", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1011840", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1018064", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1013334", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1022369"]}, {"effect": "Temperature dysregulation: freezing extremities and hot flushes / heat intolerance", "frequency_hint": "many reports", "context": "Freezing hands and feet or whole-body cold (some needing gloves and hot showers), interpreted as high iron mobilized by vitamin C or a copper backlog; and the opposite - estrogen-like hot flushes, feeling too warm in bed, and heat intolerance (a skin-damage feeling in the heat), tied to EGCG's estrogenic effect or high blood copper.", "resolution": "For cold: lowering vitamin C, temporarily dropping EGCG, or rebalancing EGCG/molybdenum and biotin. For heat: raising EGCG or B6, and cotton bedding. Results were variable and several stayed unresolved.", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1011123", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1015513", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1018586", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1022026", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1011862"]}, {"effect": "Hair thinning, loss and pigment/texture change", "frequency_hint": "many reports", "context": "Overnight thinning (one felt about 30% density lost after a first dose), aggressive shedding, dry/brittle/curled hair, and loss of pigment; hair was a main thing several members wanted fixed. For some it persisted months after stopping.", "resolution": "Framed by the author as reversible with calibration (raising C, zinc, and biotin). One stopped HG7 and used red-light therapy 4-5x/week; several were unresolved and shedding continued.", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1014004", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1021585", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1018911", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1019842", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1018896"]}, {"effect": "Skin and allergic reactions: acne, rashes, eczema, itching, oily/dry skin, histamine flares", "frequency_hint": "many reports", "context": "Breakouts and acne, red itchy bumps and patches, eczema flares, and intense itching of legs and scalp (often read as low molybdenum); oily skin (driven by biotin) versus dry skin (driven by B5); plus histamine dumps with sneezing, wheezing and facial/stomach swelling during copper mobilization. Some framed skin worsening as copper/iron dumping before improving.", "resolution": "Molybdenum for itching, zinc for breakouts, and B5/biotin balance for oily versus dry skin; histamine symptoms often eased with a day off supplements, another calibration, or taking with food. Slow improvement over months; some unresolved.", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1013197", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1018181", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1017453", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1019929", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1019385"]}, {"effect": "Anxiety, panic attacks and racing heart", "frequency_hint": "many reports", "context": "Panic attacks (one lasting two hours with numb hands, chest weight, hot flashes and derealization), anxiety waves and racing heart, frequently about an hour after dosing and tied to high copper (anxiety) or low copper (spacey/drunk feeling). Some anxiety predated HG7 but worsened on it.", "resolution": "Molybdenum fast for high-copper anxiety (sometimes in about 60s), EGCG for the spacey/low-copper side, and raising biotin removed the calibration need for one member; B5 and magnesium chloride were used as band-aids. Several unresolved; one attributed lasting anxiety to EGCG and quit.", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1011868", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1013825", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1014488", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1013827"]}, {"effect": "Anger, irritability, mania and mood swings", "frequency_hint": "many reports", "context": "Anger, irritability, a stressed 'alpha' or high-cortisol energy, and in one case a short psychotic/manic episode with incoherent speech; attributed to copper toxicity and high iron/imbalance. The author repeatedly warns that off-balance anger can destroy relationships.", "resolution": "More zinc and molybdenum with less EGCG, B5 (described as soothing and resolving anger plus frequent urination), copper foods, and non-protocol aids like ashwagandha. Episodes generally passed; some ongoing.", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1017314", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1017087", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1021249", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1020668"]}, {"effect": "Depression, flat affect, low confidence and copper-deficiency signs", "frequency_hint": "many reports", "context": "Flat, empty low mood, loss of motivation and social confidence ('invisibility'), plus over-chelation signs (purple skin patches, dark under-eye bags, pancreas pain, anemia feeling, pale stools) from too much zinc/molybdenum/C depleting usable copper. One member's ceruloplasmin fell to the bottom of range.", "resolution": "Eating high-copper foods (nuts, dark chocolate, lentils) reversed symptoms within days for some; backing off molybdenum, zinc, B6 and C; and non-protocol aids (Na/K supplement, B12, ox bile, HCL). Some had to stop.", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1020299", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1015126", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1013996", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1018931", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1011777"]}, {"effect": "Brain fog, dizziness, spaceyness and derealization", "frequency_hint": "many reports", "context": "Brain fog, feeling drunk or spacey, dizziness about an hour after dosing (one with brief vision-focus loss), and disconnection from reality; tied to high molybdenum/low copper or an iron spike.", "resolution": "An extra EGCG capsule cleared the spacey/drunk feeling for several; dropping a too-high molybdenum dose, or B6. Dizziness usually passed quickly and some tolerated it.", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1014070", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1013198", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1014368", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1013460"]}, {"effect": "Fatigue, crashes and low energy", "frequency_hint": "many reports", "context": "Tiredness, heavy legs, hard next-morning crashes ('hit by a truck'), oversleeping and run-down feeling; tied to low B6, out-of-balance molybdenum, dosing more than weekly, or biotin lagging behind B6.", "resolution": "Correcting B6 (fixed worsening month-2 fatigue for one), fixing the biotin-to-B6 timing to restore circadian rhythm, keeping to weekly dosing, and restoring molybdenum balance. Some resolved fully; others persisted.", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1014153", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1013634", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1021044", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1021350"]}, {"effect": "Liver and gallbladder pain, bile dumping, bloating/gas and raised enzymes", "frequency_hint": "several reports", "context": "Right-rib, liver and gallbladder pain and bile dumps (often after EGCG or exercise), plus raised liver enzymes, a slightly stiff fibroscan and suspected fatty liver/weight gain; also bloating and gassiness (attributed to higher biotin's sulfur) and very sluggish gastric motility with food sitting for hours.", "resolution": "Adding zinc then molybdenum to move iron into bile, switching vitamin C powder to capsules, dropping molybdenum then re-adding; lowering biotin cleared bloating/gas; milk or yogurt (calcium) restored motility. Enzymes normalized when ratios were correct; a couple stopped and cleared symptoms with months of psyllium.", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1013887", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1016650", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1013900", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1020205", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1018711"]}, {"effect": "Molybdenum toxicity: gout and rising uric acid", "frequency_hint": "several reports", "context": "Gout-like pains, sore kidneys and rising uric acid from molybdenum, especially non-amino-acid-chelate forms or molybdenum taken without enough EGCG; worse on exercise days. One member reported molybdenum toxicity with gout and kidney pain still present months after stopping.", "resolution": "Raising EGCG, switching molybdenum form, or replacing molybdenum entirely with 1-2g niacin per dose (no gout, better joints, lower snore score). One case remained unresolved months later.", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1016421", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1016470", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1022336", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1017472"]}, {"effect": "Teeth, gums and mouth: tooth pain, decay, demineralization, bleeding gums, metallic/foul taste, bad breath", "frequency_hint": "many reports", "context": "Acute tooth pain and sensitivity, rapid decay, demineralization, yellow or translucent teeth, teeth/jaws shifting, and bleeding gums; plus a persistent metallic, bloody, sour or coppery mouth taste and bad breath. Attributed to low C, zinc, B6, biotin or EGCG, and to high iron/copper surfacing (one traced the taste to dietary salt).", "resolution": "Adjusting C, zinc, EGCG and biotin; bleeding gums fixed by raising EGCG or C; bad breath eased with more zinc; taste cleared by cutting salt. Some dental changes (decay, a crooked tooth) were unresolved and sent members to the dentist.", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1011938", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1013543", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1014979", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1017555", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1016857"]}, {"effect": "Eye and ear symptoms (twitching, floaters, burning/dry eyes, vision loss, tinnitus, ear pain)", "frequency_hint": "several reports", "context": "Eye twitching, floaters, burning/irritation, dry eyes and a brief loss of vision focus; plus tinnitus (sometimes with post-dose nausea), ear cartilage and deep ear pain, and ear popping. Tied to low biotin/B6, high EGCG (copper), a metal-active silica combo, or panic.", "resolution": "Biotin for eye twitching, EGCG or molybdenum for burning eyes, more C for dryness; extra rounds of zinc/molybdenum/EGCG or skipping zinc for tinnitus. Variable, several unresolved.", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1020416", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1017193", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1013261", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1011324", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1019347"]}, {"effect": "Genital and hormonal (testicular/penile pain, low libido, ED, shrunken testicles)", "frequency_hint": "several reports", "context": "Testicular and penile pain, shrunken testicles with a deeper voice, and reduced libido; testicular pain was framed as a sign of extremely low zinc, while low libido was linked to biotin or copper imbalance.", "resolution": "Zinc first for testicular pain (avoid EGCG until zinc is replenished); libido recovered on rebalancing (dropping EGCG/C to let iron rise) for one member. Some trade-offs remained.", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1013075", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1018852", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1017091", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1013458"]}, {"effect": "Heart palpitations and chest pain", "frequency_hint": "several reports", "context": "Racing or high heart rate, chest pain and pressure, a stinging sensation in the heart, and chest-localized anxiety (one member felt it was blood-sugar related around 3-4pm); often alongside panic attacks or calibration.", "resolution": "Mostly tied to anxiety and calibration; a small vitamin C dose slightly improved chest/head pressure for one. Several were unresolved and members asked for advice.", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1012681", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1022116", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1020147", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1022189"]}, {"effect": "Urinary symptoms (foamy/dark urine, frequent urination, bladder/urethra pain, stinging urination)", "frequency_hint": "several reports", "context": "Foamy or dark urine, frequent nighttime urination, bladder irritation, urethra pain, stinging urination, and (in a possible-stone case) crystal-clear urine with major back pain. Tied to EGCG/C balance, copper excretion, and low B5.", "resolution": "Adjusting EGCG and C balance, B5 for frequent urination, and raising zinc for bladder irritation (though zinc worsened one member's insomnia). Some unresolved.", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1013501", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1018637", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1012902", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1013396"]}, {"effect": "Water retention, swelling and body-shape changes", "frequency_hint": "several reports", "context": "Water retention around hips, butt and thighs, puffy/bloated face and legs, and body-frame changes (tighter/narrower shoulders, skinnier arms, wider hips, smaller-looking face), often reported as iron supposedly reduced around weeks 3-4.", "resolution": "Adjusting molybdenum and vitamin C, and sodium/potassium tweaks (small kelp with dinner); largely unresolved and members kept experimenting.", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1011592", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1013787", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1012156", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1015573"]}, {"effect": "Withdrawal / rebound symptoms on stopping", "frequency_hint": "a few reports", "context": "On stopping HG7 (especially while imbalanced), members reported rebound hair loss, scratchy throat, tooth sensitivity, interrupted sleep, constipation, obsessive thoughts, panic-like anxiety and despair, plus persisting emotional reactivity and weight loss for weeks. The author calls stopping while unbalanced 'whiplash'.", "resolution": "Nicotinic acid (100mg several times a day) eased the mental symptoms for one member; others lingered for weeks and were unresolved.", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1014541", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1017135", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1017523"]}, {"effect": "Dosing-form and food interactions (dairy, fruit, empty stomach, zinc taste/gag, undigested capsules, non-protocol additions)", "frequency_hint": "many reports", "context": "Nausea after a dairy or fruit meal or on an empty stomach; zinc powder stinging, clumping and gagging with a foul taste; and bad reactions when combining non-protocol items (magnesium, melatonin, metal-active silica, D3, dextrose). Capsules (EGCG especially) often passed or came up undigested.", "resolution": "Avoid dairy and fruit around dosing, never dose on an empty stomach, cushion with food, use capsules or the powder-to-throat technique, and avoid adding non-protocol nutrients. The author strongly warns against any additions.", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1012187", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1014786", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1011212", "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1011732"]}], "red_flags": [{"sign": "Signs of a kidney stone - severe one-sided lower-back or flank pain, pain on movement, crystal-clear or bloody urine, or painful/stinging urination", "action": "Stop pushing doses and do not take more EGCG. Seek prompt medical evaluation (urgent care or ER) for a suspected stone. The protocol's own emergency step is the full formula with NO EGCG plus extra biotin and higher molybdenum, then wait about 3 hours - but genuine stone pain needs a doctor, not more supplements."}, {"sign": "Burning, tingling, numbness or weakness in the feet, hands or legs (possible vitamin B6 neuropathy)", "action": "Stop B6 and the protocol. Never use P5P. Ask a doctor for a serum B6 (pyridoxine) blood test - members measured levels several times the upper limit. Nerve symptoms can take weeks to months to improve, and high-dose B6 neuropathy can be lasting."}, {"sign": "Repeated or projectile vomiting, inability to keep fluids down, or signs of dehydration", "action": "Stop dosing, rehydrate with electrolytes, and seek medical care if it continues or you cannot keep water down."}, {"sign": "Severe or persistent kidney, liver, or right-upper-abdomen (gallbladder) pain, or a raised liver enzyme / fibroscan result", "action": "Stop the protocol and get medical labs (kidney function, liver enzymes, imaging). Do not try to calibrate through organ pain."}, {"sign": "Chest pain, palpitations, a racing heart, or difficulty breathing", "action": "Treat as potentially serious and seek urgent medical attention. Do not assume it is only a calibration or panic symptom."}, {"sign": "A manic or psychotic episode, severe anger or agitation, derealization, or a panic attack that will not settle", "action": "Stop dosing and get help from someone you trust and a medical professional. Do not decide to quit alone while adrenalized. Severe mood change is a documented risk of this protocol."}, {"sign": "Gout attack (hot, swollen, painful joint) with sore kidneys, or rapidly rising uric acid", "action": "Stop molybdenum and see a doctor. Molybdenum-related gout and kidney pain were reported to persist for months after stopping in at least one case."}, {"sign": "Accidental overdose of any nutrient, especially zinc - e.g. violent vomiting, diarrhea and kidney discomfort after a mis-measured dose", "action": "Stop, hydrate, and seek medical care if symptoms are severe or persist. Zinc mis-measurement caused days of kidney discomfort and possible damage. Weigh every nutrient on a milligram scale and double-check."}, {"sign": "Signs of copper depletion - unusual anemia, very pale skin or stools, purple nail beds, extreme cold, marked apathy or loss of confidence", "action": "This suggests over-chelation of copper from too much zinc, molybdenum or vitamin C. Reduce or stop those and see a doctor; get copper, ceruloplasmin and iron labs. One member's ceruloplasmin fell to the bottom of the normal range."}, {"sign": "Rapid or dramatic hair loss, tooth pain, tooth decay or demineralization, or teeth shifting", "action": "Reassess or stop the protocol and see a dentist and doctor. Some hair loss and dental changes persisted after stopping."}, {"sign": "New numbness, tremor, deformed or slow-growing nails, or receding gums (reported after adding manganese or using wrong molybdenum forms)", "action": "Stop the offending nutrient or form immediately and seek medical advice; these effects were reported as long-lasting."}, {"sign": "Withdrawal 'whiplash' on stopping - severe anxiety or despair, obsessive thoughts, insomnia, rebound hair loss", "action": "Do not stop abruptly while badly out of balance; taper carefully and get medical or mental-health support rather than self-managing a crisis."}], "disclaimer": "These notes summarize what people posted on an internet forum. They are personal, self-reported experiences, not medical evidence. The HG7 protocol is an unproven, self-experimental regimen that uses very high doses of vitamins and other compounds - far above normal supplemental amounts and often above established safe upper limits. It is not approved, tested, or endorsed by any health authority, and the protocol's own author states it is 'just theory' and takes no responsibility for harm. Specific known risks stand out: high-dose vitamin B6 can cause serious and sometimes lasting nerve damage (peripheral neuropathy), and members measured blood B6 several times the upper limit; high-dose zinc depletes copper and can cause anemia and neurological problems; EGCG (concentrated green-tea extract) at high doses can stress or injure the liver; and the combination was repeatedly linked by users to kidney pain and kidney stones. The reported 'resolutions' are only what individual members tried, not proven cures - many problems were never resolved or required stopping the protocol. Nothing here is medical advice. Do not start, change, or stop any supplement regimen based on this document. Talk to a qualified doctor before considering anything like this, especially if you are pregnant, nursing, a minor, or have kidney, liver, heart, or mental-health conditions, or take any medication. If you develop severe symptoms, seek medical care immediately."}, "faq": {"faq": [{"question": "Are the dosages on page 1 the current updated dosages for all ingredients?", "answer": "Yes.", "authoritative": true, "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1011987"]}, {"question": "Is it normal to feel fine with zero side effects and no need to calibrate on the standard starting dose?", "answer": "Yes - it's a good sign you're close to balanced; keep the dose (he'd only nudge C to 6g every other dose). The formula intentionally breaks current scientific assumptions about absorption limits.", "authoritative": true, "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1012776"]}, {"question": "How long before taking other things (e.g. creatine) after a dose?", "answer": "At least 3 hours between HG7 and anything else.", "authoritative": true, "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1012814"]}, {"question": "Are eggs / high-vitamin-A foods a problem on HG7?", "answer": "No - he eats eggs a lot with no problems.", "authoritative": true, "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1012692"]}, {"question": "Is buffered vitamin C acceptable?", "answer": "He found buffered C ineffective for himself, so cannot recommend it.", "authoritative": true, "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1012561"]}, {"question": "Is toxicity a concern at these high vitamin/mineral doses?", "answer": "No - he has done this for years at doses higher than posted; if toxicity were a concern it would have manifested long ago. A months-long user's mineral blood test supports this.", "authoritative": true, "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1011582"]}, {"question": "Is it safe with marginal kidney/liver function?", "answer": "Not an explicit endorsement, but he started it just after hospital surgery to remove a 10mm kidney stone and it made his kidneys miraculously better; Elwin Robinson's kidney bloodwork was fine after months on HG7.", "authoritative": true, "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1011584"]}, {"question": "Can you safely go above 200mg of B6?", "answer": "Yes - he took 300mg for quite some time; as long as you balance with enough of everything else you can do quite a bit of B6.", "authoritative": true, "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1011467"]}, {"question": "How should someone with a history of high uric acid start?", "answer": "Start on the higher end of EGCG and the lower end of molybdenum; if uric-acid symptoms continue, lower molybdenum again, but never assume you'll never need any one nutrient. 6mg moly shouldn't be an issue unless you're already very low copper.", "authoritative": true, "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1011396"]}, {"question": "Can HG7 help Lyme, and what is the ceiling of what it can heal?", "answer": "Not known to help Lyme specifically, but he believes there isn't a single ailment the formula can't heal because it is fixing DNA - 'When you do that, everything heals.'", "authoritative": true, "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1012862"]}, {"question": "Should you supplement calcium on HG7?", "answer": "No. Calcium caused more problems than it helped; it is only a bandaid, worsens things over time, can cause kidney stones if taken when molybdenum was needed, and B6 already finds/releases the calcium you need.", "authoritative": true, "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1012877"]}, {"question": "Are there dietary restrictions like the Ray Peat diet?", "answer": "No dietary restrictions, though generally avoid milk/dairy because dairy inhibits zinc absorption.", "authoritative": true, "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1013256"]}, {"question": "Can you replace B6 with selenium, or use P5P instead of pyridoxine?", "answer": "No. Don't be stupid - B6 (pyridoxine HCl) is what finds minerals in tissues; P5P will not work on this protocol for long and hurts more than helps.", "authoritative": true, "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1013604"]}, {"question": "How high can you safely go on EGCG in a day?", "answer": "Up to ~10g of EGCG in a day, as long as it's balanced with everything else (more EGCG needs more molybdenum and zinc, and eventually more vitamins).", "authoritative": true, "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1013839"]}, {"question": "Do cooking herbs (ginger, cumin, cayenne) interfere?", "answer": "No - active-ingredient amounts in edible cooking herbs are negligible; eat as you please. Only standardized supplements/chelators (NAC, Rutin, EDTA, standardized extracts) must be avoided.", "authoritative": true, "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1013951"]}, {"question": "How much biotin should I take / how do I know when enough?", "answer": "Keep taking biotin until it stops dissolving quickly under the tongue (clumps / turns bitter) - roughly 1000mg per dose. Overdose rather than underdose; it's extremely safe to overdo.", "authoritative": true, "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1013335"]}, {"question": "Is age (e.g., being 20) a reason not to do it?", "answer": "Age doesn't matter; if someone comes needing help it's not for others to gatekeep. But the young/non-desperate often can't bear the experimental trial-and-error phase.", "authoritative": true, "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1012943"]}, {"question": "When do results appear and stick?", "answer": "You see some results in days or weeks (enough to tease you), but ~6 months is where most changes are felt and ~1 year is where they stick - all assuming you find the right balance.", "authoritative": true, "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1013980"]}, {"question": "What are the standard B-vitamin per-dose amounts and ratios?", "answer": "For every 200mg B6: ~500mg B5 and ~1000mg pure biotin; per dose ~200-300mg B6, ~5000-7500mg C, 500mg B5, biotin until it clumps (~1000mg).", "authoritative": true, "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1013406"]}, {"question": "Does the fix for a copper-toxic/hyper-reactive crash exist?", "answer": "Yes: take the current standard protocol with half the vitamin C (check for pale stool + C aggravating it); may need to repeat once or twice, with EGCG, molybdenum and zinc on the higher end, to return to balance.", "authoritative": true, "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1013936"]}, {"question": "Can I split the dose by 10-20 minutes (Bs first, then the rest)?", "answer": "No. Without everything draining the Bs at the same time, your Bs won't absorb much at all. Must take all at the same time.", "authoritative": true, "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1014524"]}, {"question": "Is it a problem to overdo biotin/B5 at high doses?", "answer": "Not a problem. B5 and B7 are relatively safe to overdo (he does it all the time); just never underdo.", "authoritative": true, "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1014370"]}, {"question": "Should I add magnesium (or B2, selenium, calcium)?", "answer": "No - you should never need magnesium; needing it is a sign of high iron. B2 not necessary (never felt it did anything). These 7 nutrients are the distilled result of 15 years; everything else is a bandaid that muddies the experiment.", "authoritative": true, "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1014326"]}, {"question": "Is Horbaach Molybdenum Amino Acid Chelate as good as Piping Rock?", "answer": "Fairly sure it's the same thing (both amino acid chelate). Carlson glycinate works differently - switch to amino acid chelate.", "authoritative": true, "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1014290"]}, {"question": "Is there a specific order to take the supplements?", "answer": "Not necessarily, but do it with a meal. He starts with vitamins, then EGCG, then molybdenum and zinc together - all within ~60 seconds of each other.", "authoritative": true, "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1014404"]}, {"question": "Can I dose multiple times a day / how to get faster results?", "answer": "Yes - do it as many times a day as you're inclined to; more zinc and EGCG uptake speeds progress. He personally finds double/triple doses daunting.", "authoritative": true, "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1014585"]}, {"question": "For a high-copper individual, how much molybdenum?", "answer": "Go to the higher end - 7mg (young-looking, emotionally wired = high copper indicator); later flat 7.5mg (1.5mg per 50mg zinc).", "authoritative": true, "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1014378"]}, {"question": "Can I take reduced (fractional) doses long term?", "answer": "Yes, as long as the exact ratios are adhered to - e.g. scale everything ×0.4 for a 100mg B6, or 1/5th, 1/3, or half dose. Ratios are everything.", "authoritative": true, "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1014682"]}, {"question": "Can micro-doses (1/10 dose) be calibrated for me?", "answer": "No - for him to properly help calibrate, the large doses must be done, otherwise he can't tell if it's low vitamins or low minerals and doing the wrong thing could be more problematic.", "authoritative": true, "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1014341"]}, {"question": "Do I need to keep taking molybdenum/biotin if I didn't need it before?", "answer": "Yes - molybdenum and biotin don't store; they're a quick shot then excreted fast. Don't assume past tolerance means you don't need it later.", "authoritative": true, "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1014523"]}, {"question": "Are molybdenum glycinate and amino acid chelate the same thing?", "answer": "No. Glycinate works far too strongly compared to amino acid chelate and screws up the process; use amino acid chelate.", "authoritative": true, "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1014774"]}, {"question": "Why not calibrate with the active form of B6 (P5P/pyridoxamine)?", "answer": "Because P5P works when it's not supposed to, throwing the balance out of whack; TRH used it early and it wrecked him.", "authoritative": true, "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1014832"]}, {"question": "Is it OK to take NAC in the evening if HG7 was taken in the morning?", "answer": "No. NAC chelates metals outside the protocol's guardrails and can alter HG7 results; TRH will not endorse extra antioxidants.", "authoritative": true, "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1015065"]}, {"question": "Does taking excess molybdenum increase free iron / need for EGCG?", "answer": "Yes, excess molybdenum increases the need for EGCG.", "authoritative": true, "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1015022"]}, {"question": "Can I take just C alone to fix gout/kidney pain?", "answer": "No. C only pushes; EGCG is the removal agent. Without EGCG, uric acid can't excrete and C alone will aggravate the issue.", "authoritative": true, "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1016424"]}, {"question": "Can I do many high doses without zinc to clear excess iron?", "answer": "At most 1-2 doses without zinc unless you've overdone zinc for a very long time; after that you'll get zinc deficiency symptoms fast (faster with high EGCG).", "authoritative": true, "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1015436"]}, {"question": "Is it OK to do HG7 while donating blood?", "answer": "TRH can't call it 'good,' but he donated blood while on HG7 for a while with no issues whatsoever.", "authoritative": true, "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1015706"]}, {"question": "How much elemental zinc do most zinc supplements contain?", "answer": "Most zinc supplements are ~50-60mg elemental zinc; the full dose targets ~150mg elemental zinc.", "authoritative": true, "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1016084"]}, {"question": "Which molybdenum/EGCG brands do you recommend?", "answer": "Horbach brand for molybdenum and EGCG for price point; EGCG and molybdenum are the only brand-specific recommendations.", "authoritative": true, "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1016495"]}, {"question": "Should I keep molybdenum at 4mg if I'm high iron?", "answer": "No - molybdenum is a blood cleanser and doesn't push iron out on its own; zinc is what forces iron to the surface. Lower zinc instead; keep molybdenum, EGCG and C.", "authoritative": true, "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1015597"]}, {"question": "Does B6 alone get iron out of storage?", "answer": "No - it's the combo of Bs, C and Zinc that brings iron out; B6 alone only works so long without zinc.", "authoritative": true, "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1015388"]}, {"question": "Should someone with leaky gut/malabsorption start the protocol?", "answer": "TRH can't give medical advice but was worse off (shot kidneys) when he began; suggests trying a low dose and seeing how it works.", "authoritative": true, "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1015066"]}, {"question": "Should I do mineral testing before starting the protocol?", "answer": "No. Just read page 1 entirely and calibrate from there.", "authoritative": true, "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1016751"]}, {"question": "Can HG7 raise ferritin?", "answer": "Yes - raising ferritin on this protocol seems as easy as a single low-EGCG dose.", "authoritative": true, "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1016726"]}, {"question": "Can HG7 treat specific diseases (e.g., Lyme)?", "answer": "TRH won't give disease-specific claims, but says the formula finds heavy-metal imbalances and corrects them, theorized to regenerate broken DNA; there's nothing he wouldn't personally use HG7 to attempt to resolve.", "authoritative": true, "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1016698"]}, {"question": "Can you take the nutrients one at a time and get similar results?", "answer": "No - the biggest mistake. One-at-a-time moves the process an inch vs a mile taken together.", "authoritative": true, "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1017252"]}, {"question": "Is it OK to do individual nutrients on their own to learn their effect?", "answer": "Yes for learning (deleting one component from the full stack is most informative), but do NOT try excessive dosages of anything except the vitamins - excessive molyb or EGCG alone can send you to the hospital / cause kidney stones.", "authoritative": true, "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1017269"]}, {"question": "Should I keep adjusting to the updated ratios or stick with my original dose?", "answer": "Follow TRH's lead and adjust as the standard changes - he adjusts for a reason - though some people need more of some things early on.", "authoritative": true, "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1017862"]}, {"question": "How do you measure biotin precisely?", "answer": "TRH never measures it - takes biotin until it stops dissolving quickly under the tongue; safer to overdo. Precise amount depends on how much C and B6 you take.", "authoritative": true, "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1017745"]}, {"question": "Where to source pure biotin powder (Europe)?", "answer": "Purebulk (suggested).", "authoritative": true, "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1016818"]}, {"question": "Do men and women need the same zinc?", "answer": "Based on several women's testimonies, TRH now thinks women might need less zinc overall.", "authoritative": true, "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1017817"]}, {"question": "Does no-fap / ejaculation affect dosing?", "answer": "No-fap reduces zinc needs a tad (you lose zinc and C in semen).", "authoritative": true, "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1016829"]}, {"question": "Can you speedrun the protocol once ratios are near perfect?", "answer": "Yes - once ratios are right you can do it as intensely as you can handle; higher doses give much faster progress and reversal.", "authoritative": true, "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1017933"]}, {"question": "What gives the fastest results?", "answer": "300mg of B6 gives the fastest results and surfaces staggering amounts of iron, but raises the need for everything else, especially EGCG.", "authoritative": true, "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1017949"]}, {"question": "Does EGCG chelate/counter the zinc, so should they be separated?", "answer": "Some zinc may get chelated, but both are needed together - EGCG makes room for zinc rather than countering it; without both together the process does not work. Take within a 1-minute window.", "authoritative": true, "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1018766"]}, {"question": "Can you take just biotin and B5 separately (e.g., for tics/PANDAS)?", "answer": "Yes - B5+B7 is the one combo fine to do alone since they cap and excrete; exception is if already low B6 in the blood, where they aggravate it and may surface iron.", "authoritative": true, "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1018846"]}, {"question": "Should you buy specific recommended brands for all seven?", "answer": "No - brand differences in straight vitamins/minerals are negligible; any credible retailer is fine, avoid knock-offs. Much of the protocol is experimental and requires intuition.", "authoritative": true, "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1018485"]}, {"question": "Can P5P be substituted for regular B6?", "answer": "No - P5P does not work the same; it puts you in a negative/starved B6 state because it does not store. Stick to regular pyridoxine B6.", "authoritative": true, "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1019111"]}, {"question": "Does dietary iron sabotage the protocol / offset B6-driven iron absorption?", "answer": "No - the iron in a single meal is nowhere near enough to counteract the iron depleted by ~5g of EGCG.", "authoritative": true, "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1019124"]}, {"question": "Should you take calcium/magnesium to help sleep?", "answer": "No - they help sleep but come with a cost (stones, numbness, potential ED); calcium is a bandaid for copper toxicity. Better to raise natural calcium/magnesium via EGCG removing iron.", "authoritative": true, "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1019326"]}, {"question": "Can you take doses larger than a full stack once dialed in?", "answer": "He runs higher doses himself for faster progress; smaller doses are maintenance while higher doses are needed for reversal of state.", "authoritative": true, "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1017937"]}, {"question": "Is it better to take one large EGCG dose or split calibration through the day?", "answer": "Order matters: he takes smaller EGCG/zinc/moly first, waits a couple minutes, then tops up to full; recommends the layered same-session approach.", "authoritative": true, "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1018737"]}, {"question": "Is molybdenum glycinate a deal-breaker like P5P vs Pyridoxine HCl?", "answer": "Yes, it can be - same reason as NAC; it makes certain things work when they aren't supposed to. Use amino acid chelate, not glycinate.", "authoritative": true, "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1019477"]}, {"question": "Starting dose for a new person / do women take 50% of the new lower dose?", "answer": "Use the standard dose on page 1.", "authoritative": true, "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1019618"]}, {"question": "How to start HG7 if you've been taking a P5P B-complex?", "answer": "Discontinue the B-complex; try the current standard, and if it makes you nauseous, do it with NO zinc following and see how it goes - you likely won't need zinc for a few doses.", "authoritative": true, "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1019879"]}, {"question": "What are the symptoms of taking too much EGCG?", "answer": "Low B6 symptoms arise quickly: very anxious, sad, possibly angry (worse if coupled with too much C); tingling feet, feeling cold, tinnitus. If bad enough it can cause a kidney stone; fix by halving EGCG on the next doses until resolved.", "authoritative": true, "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1019892"]}, {"question": "Can nausea/detox symptoms be a habitual/conditioned response at the old dosing times?", "answer": "No - 'Dont be ridiculous. Thats not how this works.'", "authoritative": true, "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1019521"]}, {"question": "Does biotin/molybdenum store copper in the liver?", "answer": "No. Biotin may aid transport of copper OUT of the body, but they don't store copper in the liver, and molybdenum certainly doesn't.", "authoritative": true, "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1019427"]}, {"question": "How long until real progress on the protocol?", "answer": "About 6 months is where progress really starts beginning.", "authoritative": true, "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1019522"]}, {"question": "Is calcium (from food or B5) needed / optimal to add?", "answer": "No - calcium and all nutrients from food are negligible in this process.", "authoritative": true, "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1019827"]}, {"question": "Which forms should be avoided entirely (personal regret list)?", "answer": "Rutin, NAC, and P5P - the three things TRH wishes he hadn't taken; they caused severe imbalances requiring precise correction, and fixing them REQUIRED pyridoxine HCl.", "authoritative": true, "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1019771"]}, {"question": "How much time between doses is ideal?", "answer": "About 3 hours for him is enough before another dose isn't overbearing; gauge by feel.", "authoritative": true, "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1020153"]}, {"question": "Can the nutrients be taken individually / spread throughout the day?", "answer": "No. The whole stack must be taken together in the stomach; this much biotin won't go down on its own and the stack must work as a unit.", "authoritative": true, "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1020333"]}, {"question": "Is zinc carnosine okay to use?", "answer": "No - he now recommends zinc gluconate only.", "authoritative": true, "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1020290"]}, {"question": "How problematic is zinc picolinate?", "answer": "Picolinate doesn't work for the protocol; too many people reported bad effects.", "authoritative": true, "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1020500"]}, {"question": "Is the correct way to fix low zinc to raise zinc?", "answer": "No - lower EGCG to the low end so zinc can catch up; raising zinc upsets the B6 balance. Everything else is water-soluble.", "authoritative": true, "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1020686"]}, {"question": "Should you fix imbalance by taking zero EGCG?", "answer": "No - taking no EGCG can backfire (iron hits fast); fix imbalances slowly by doing the low end for a while, e.g. half EGCG.", "authoritative": true, "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1020746"]}, {"question": "Does raising B6 to a 2:1 (B6:zinc) work long term?", "answer": "No - it's not a 2:1; a 2:1 eventually forces calibration. Zinc:B6 is closer to 1:1.5.", "authoritative": true, "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1020491"]}, {"question": "What molybdenum form is required?", "answer": "Amino Acid Chelate; not using it explains many members' anomalous (low) molybdenum needs. Glycinate gives varied results.", "authoritative": true, "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1020659"]}, {"question": "Do people need different amounts per mg because of different metabolisms?", "answer": "No - he does not believe per-mg effects differ between people; the only real differences are how much metal you must remove and your current front-end balances. Acceptable front-end ranges are tight and similar for everyone.", "authoritative": true, "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1020483"]}, {"question": "Should I run an elemental conversion on zinc gluconate?", "answer": "Only for loose zinc powder. A capsule labeled 50mg zinc gluconate is 50mg elemental zinc; no conversion needed.", "authoritative": true, "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1021198"]}, {"question": "Is molybdenum glycinate chelate the same as amino acid chelate?", "answer": "No. They are not the same; switch to the cheap Amino Acid Chelate form. Glycinate over-chelates copper and causes a low-copper/high-iron pain state.", "authoritative": true, "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1021310"]}, {"question": "Can I do the formula with P5P instead of pyridoxine HCl?", "answer": "No. Anyone who has done the formula with P5P has failed; only regular pyridoxine HCl works. If you use P5P you have not truly tried HG7.", "authoritative": true, "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1021119"]}, {"question": "If B6 has built up too much, do I take the full stack with NO B6?", "answer": "No, use half B6, not zero. A no-B6 dose makes the problem worse.", "authoritative": true, "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1021588"]}, {"question": "How many rounds can I safely take per day?", "answer": "TRH's practical limit is about 5 standard doses per day (limited by willingness to swallow pills); he has never tried to max out.", "authoritative": true, "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1021311"]}, {"question": "Should I always take B6 together with B5 and B7?", "answer": "Depends on how you feel; you may just need an initial B6 boost. A little extra B6 goes a long way.", "authoritative": true, "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1021100"]}, {"question": "For a low-copper person, take copper or just lower moly?", "answer": "You still need molybdenum for iron excretion, so the better play is to temporarily increase zinc and EGCG rather than reduce moly. Before adding copper, taste-test C (if it gags you, reduce C, not add copper).", "authoritative": true, "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1021301"]}, {"question": "How to know if you need copper (HG8 candidate)?", "answer": "Taste-test copper: if it is sweet, you may need some (start small); if metallic/gagging, you have too much. Indicators: pale, low estrogen, high T/DHT, ectomorph/mesomorph, balding/poor hair, RH-.", "authoritative": true, "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1021270"]}, {"question": "What B5 form/amount should I use?", "answer": "Pills recommended; only 1x 500mg pill per standard (2 if replenishing). Bulk Supplements calcium pantothenate powder is fine.", "authoritative": true, "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1021595"]}, {"question": "How do I gauge the right biotin amount?", "answer": "Take biotin sublingually: if it dissolves quickly your body needed it; if it clumps and lingers you didn't need as much. Too much biotin is far better than not enough.", "authoritative": true, "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1020936"]}, {"question": "Should I take 0mg molybdenum while recovering from moly-induced leg pain?", "answer": "No - 0 moly isn't right; you still need it, but take less C and switch to the amino acid chelate form.", "authoritative": true, "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1021695"]}, {"question": "Is glycinate vs 'amino acid' chelate molybdenum just a purity/blend difference?", "answer": "No. Amino acid chelate is chosen specifically because it strategically doesn't work well if you need something else, whereas glycinate keeps working regardless and causes issues; most people's leg problems come from glycinate.", "authoritative": true, "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1021944"]}, {"question": "Would more frequent smaller doses help someone very toxic?", "answer": "A strategically sustained-release version would be most optimal - a slow-release HG7 running all day. Later reiterated as a possible dose every 6 hours.", "authoritative": true, "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1021845"]}, {"question": "Should I add histidine, manganese, MSM, or other extra compounds?", "answer": "Manganese seriously harmed him (numbness, slowed nails, high iron); it is unnecessary and costly. Stick to the plan; the 7 nutrients are the only ones the protocol drains.", "authoritative": true, "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1022330"]}, {"question": "Does HG7 cause or worsen deficiencies in other nutrients (magnesium, silica, etc.)?", "answer": "No - the protocol does not meaningfully worsen other deficiencies and may indirectly improve them by improving food absorption; other nutrients only appear low when iron is high, which EGCG fixes.", "authoritative": true, "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1022534"]}, {"question": "Is selenium worth adding?", "answer": "No - selenium did nothing good; it's his top candidate for a placebo supplement.", "authoritative": true, "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1022490"]}, {"question": "Which EGCG brand for price?", "answer": "The Horbaach brand on Amazon for price point.", "authoritative": true, "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1022479"]}, {"question": "Is a real niacin deficiency happening on the protocol?", "answer": "No - niacin is stored/synthesized and not drained; true niacin-deficiency symptoms don't appear. B1 and B2 are also not needed as they're stored and reflect iron levels.", "authoritative": true, "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1022406"]}]}, "sourcing": {"nutrients": [{"nutrient": "Zinc", "required_form": "Zinc Gluconate", "recommended_products": [{"brand_product": "Nutravein Premium Zinc Gluconate 100mg (120 capsules)", "note": "Switched from Bulk Supplements powder because zinc powder tastes horrible; tops up with a little powder to reach 230mg; label 50mg is elemental zinc", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1011600"]}, {"brand_product": "Zinc bisglycinate by Nutramedix (50mg elemental)", "note": "What BRENBAIL used; considered switching to gluconate for cold symptoms", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1011125"]}, {"brand_product": "Nordic Naturals Zinc Glycinate (20mg)", "note": "dave_282 planned to use glycinate instead of gluconate; asked if substitution is OK", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1012093"]}, {"brand_product": "Zinc: Nordic Naturals glycinate 20mg (later Zinc Bisglycinate powder); EGCG: MCS Formulas 400mg green tea/320mg EGCG; Vitamin C: Piping Rock powder; B5: Sunday Naturals 500mg; B6: Sunday Naturals 25mg (later 100mg pyridoxine HCl); Biotin: bulk powder; Molybdenum: Sunday Naturals 200mcg or Metabolics Sodium Molybdate 1mg", "note": "Full UK shopping list; EGCG bottle ~£40 lasting ~14 days at 7 caps/day is the expensive bottleneck.", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1013019"]}, {"brand_product": "BulkSupplements Zinc Gluconate capsules/powder; Nature's Bounty zinc gluconate tablets", "note": "Zinc gluconate powder + scale is the most cost-effective (~$34 for 500+ doses). Nature's Bounty tablets have fillers (carnuba wax, silica, dicalcium phosphate) that author says are fine. Gluconate does not need to say 'elemental'.", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1014343"]}, {"brand_product": "Zinc gluconate (powder or caps)", "note": "MrMark says gluconate works best by far; picolinate and bis-glycinate underperformed. 250mg elemental ~ 1,740mg gluconate powder (divide target by 0.144).", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1014735"]}, {"brand_product": "Zinc bisglycinate powder (50mg elemental per 180mg powder); NutraMedix zinc bisglycinate chelate (BRENBAIL); zinc gluconate tablets 70mg (10mg elemental)", "note": "dave_282 debating bisglycinate vs gluconate; Hidden49 and purple pill prefer gluconate for HG7; whatisaging mostly uses bisglycinate", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1015301"]}, {"brand_product": "Zinc gluconate", "note": "Hidden49 finds gluconate works much better with HG7 owtoxinforum.com/threads/theory-protocol-discussion.53813/post-1011668"]}, {"brand_product": "MCS Formulas (400mg green tea / 320mg EGCG per cap)", "note": "dave_282's planned EGCG source, 7 caps for 2240mg", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1012093"]}, {"brand_product": "Life Extension EGCG (~325mg per cap)", "note": "Used in calibration math experiments", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1012643"]}, {"brand_product": "Life Extension EGCG (325mg capsules)", "note": "Brand used by whatisaging/Sparxfly in dosing experiments; ~6x325mg constituted a full EGCG dose.", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1012765"]}, {"brand_product": "NatureWise green tea extract, 500mg/capsule, 50% standardized EGCG", "note": "Capsules pinkish; suspected vomited-up pink material was these capsules", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1013329"]}, {"brand_product": "MCS Formulas EGCG (320mg per tablet)", "note": "~£60 for 2 bottles, ~25 days at 8 tablets/day (2560mg); pricey but got great results with upped EGCG", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1013599"]}, {"brand_product": "Horbaach", "note": "Youngboy planned to buy Horbaach EGCG as the author-specified brand for cost-effectiveness", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1014251"]}, {"brand_product": "Life Extension EGCG", "note": "Used by MrMark; pacamara notes 325mg per capsule for dose math.", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1014731"]}, {"brand_product": "Horbaach EGCG", "note": "Youngboy notes each pill contains 270mg EGCG; TRH takes Horbaach brand.", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1014557"]}, {"br
