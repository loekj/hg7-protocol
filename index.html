reads/theory-protocol-discussion.53813/post-1017185"]}, {"brand_product": "Life Extension green tea extract capsules", "note": "725mg capsule standardized to 45% = ~326mg EGCG per cap (tommyg130); decaf/40% version cited as ~290mg per cap (~2490mg for 8.6 caps) by ZinkusMaximus. Most brands standardize around half the capsule size.", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1017424"]}, {"brand_product": "Life Extension decaf green tea extract", "note": "~2600mg egcg from 8 caps (~325mg/cap) used in ZinkusMaximus's stack", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1017763"]}, {"brand_product": "Horbäach Green Tea Extract EGCG (180 capsules)", "note": "The brand Jacob/Heisenberg originally used; imported by Areez, ran out in ~5 days", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1018028"]}, {"brand_product": "Lipton Green Tea teabags (home-brewed)", "note": "Cited PASTIC study finding ~290mg EGCG per gram of leaves; brews 15-20 teabags/day (~3300mg EGCG estimated). Used in Pakistan where decaf EGCG capsules unavailable.", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1018056"]}, {"brand_product": "LifeExtension EGCG, Horbaach molybdenum, BulkSupplements for the rest", "note": "Disrupt4489 has been OK with these; recommends checking EGCG concentration on every new order", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1019296"]}, {"brand_product": "EGCG capsule labeling gotcha", "note": "A bottle marked 45% and '725mg' - the 725mg is the green tea extract, not the actual EGCG content; recalculate accordingly", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1018761"]}, {"brand_product": "Home-extracted green tea extract", "note": "Areez extracts green tea extract at home and drinks it straight, so he no longer measures EGCG in mg", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1019106"]}, {"brand_product": "Horbaach Green Tea Extract with EGCG - 1800mg per 3-capsule serving (600mg per capsule)", "note": "Meikueila's source; StewoParker notes Piping Rock has an identical label", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1019490"]}, {"brand_product": "Piping Rock Green Tea Extract (same label/spec as Horbaach)", "note": "StewoParker uses this; 600mg per capsule", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1019491"]}, {"brand_product": "Horbach EGCG (~16 caps used by TRH)", "note": "TRH reports success with ~16 caps of the Horbach EGCG", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1019317"]}, {"brand_product": "Life Extension green tea extract (45% EGCG)", "note": "ZinkusMaximus doses it in 'caps' (16-17+ caps at his high-EGCG stage; 7 caps on the current stack). recoil also uses Life Extension EGCG 45% at 1900mg = 6 pills.", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1019841"]}, {"brand_product": "80% EGCG capsules (brand unspecified)", "note": "chalceconist runs 80% caps (e.g. 10 caps ~3200mg) and is considering switching to 45% green tea extract for its other compounds once stock runs out.", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1020236"]}, {"brand_product": "Home-extracted green tea (for EGCG) and home-extracted molybdenum", "note": "Areez extracts his own green tea and molybdenum at home instead of using pills, and eyeballs/taste-tests doses.", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1019944"]}, {"brand_product": "Life Extension and PureBulk", "note": "Good results with both brands", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1020830"]}, {"brand_product": "Life Extension decaf EGCG", "note": "Opening capsules to use as powder, planning to try in beef broth", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1020654"]}, {"brand_product": "Piping Rock", "note": "Bought for her husband", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1020654"]}, {"brand_product": "Life Extension EGCG (45% EGCG caps)", "note": "Used by taralynne and whatisaging; whatisaging's 10:1 EGCG:zinc ratio equates to ~650 mg EGCG (Life Extension) per 50 mg zinc; Nusian uses 4-5 caps (~1300-1630 mg). Note it is only 45% EGCG so conversion is needed.", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1021705"]}, {"brand_product": "Life Extension EGCG (cellulose capsules)", "note": "Comes in cellulose capsules; BaselineShift transfers the powder into gelatin capsules to solve a problem with it.", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1022255"]}], "avoid": [{"brand_product": "Life Extension decaffeinated EGCG", "reason": "ZinkusMaximus dosing 13-15 caps; decaf avoids caffeine confounding symptoms"}, {"brand_product": "Edible gelatin bags (Amazon B0978DXTSW) filled with green tea extract powder", "reason": "Cheapest way to take EGCG; measure powder by % EGCG (e.g. 6g of 45% powder = ~2700mg EGCG) and swallow the bag to avoid bitterness."}]}, {"nutrient": "Molybdenum", "required_form": "Molybdenum Amino Acid Chelate ONLY - not glycinate", "recommended_products": [{"brand_product": "Piping Rock 500mcg capsules (chelated / amino acid chelate)", "note": "Cheapest and what TRH uses; in Asia and the US Amazon only the chelated form is available", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1011600"]}, {"brand_product": "Piping Rock 500mcg", "note": "About 12 caps to reach the target", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1011636"]}, {"brand_product": "Metabolics sodium molybdate (1mg caps)", "note": "Preferred main moly; clean ingredients, convenient 1mg dose", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1012112"]}, {"brand_product": "Swanson's Molybdenum glycinate chelate / Piping Rock", "note": "Used for smaller doses and mini #1 calibrations; glycinate chelate like Carlson, no problems reported", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1012112"]}, {"brand_product": "Seeking Health molybdenum glycinate", "note": "What ZinkusMaximus was using; glycinate form later flagged as 'overpowered' by others", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1012159"]}, {"brand_product": "Sodium Molybdate / potassium molybdate", "note": "dave_282 planned to use sodium molybdate; stratocaster used potassium molybdate 3mg (non-chelate forms discussed vs amino-acid chelate)", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1012370"]}, {"brand_product": "Molybdenum Amino Acid Chelate", "note": "Chelate form seems to prevent excess uptake; excess is sweated out", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1013528"]}, {"brand_product": "Piping Rock (author-specified); Horbaach (cheaper alternative)", "note": "Author specifies Piping Rock; Youngboy asked whether cheaper Horbaach chelate is as effective. Disrupt4489 found chelate at 2 pills below normal dose insufficient and recommends normal chelate for dose comparability.", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1014287"]}, {"brand_product": "Piping Rock molybdenum (amino acid chelate)", "note": "MrMark uses Piping Rock moly; TRH's recommended amounts assume molybdenum amino acid chelate specifically.", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1014731"]}, {"brand_product": "Carlson molybdenum (glycinate)", "note": "Crab uses Carlson glycinate and wonders if it behaves differently; TRH says Carlson was MORE potent, disrupting the process like using P5P.", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1014522"]}, {"brand_product": "Seeking Health Molybdenum Glycinate Chelate", "note": "pacamara suggests it as available in both US and Europe (unlike Piping Rock) and asks TRH to compare; some forum users reportedly happy with it.", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1014817"]}, {"brand_product": "Albion glycinate chelate", "note": "aqua906 has Albion moly glycinate chelate and asks if it's suitable.", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1014786"]}, {"brand_product": "Molybdenum glycinate powder (unspecified brand)", "note": "Nusian uses moly glycinate powder (cheaper) at just over 2mg; below 2mg needs extra calibration. pacamara's spreadsheet assumes 500mcg caps (Piping Rock or Seeking Health).", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1014760"]}, {"brand_product": "Piping Rock 5000mcg tablets; Seeking Health (BRENBAIL, 4000mcg via 8 caps)", "note": "dave_282 takes 9 tablets for 4.5mg at 60% dose", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1015100"]}, {"brand_product": "Seeking Health", "note": "500mcg capsules (8 caps = 4000mcg)", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1015656"]}, {"brand_product": "Swanson", "note": "Dharma notes Swanson moly is 'different' and dosed 6-8mg cautiously; uses it as his molybdenum source", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1017185"]}, {"brand_product": "glycinate form (earlier), amino acid chelate (current)", "note": "Nusian earlier used 7-8mg molybdenum glycinate before TRH learned about differences between moly forms; his moly always tastes sweet like candy", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1017835"]}, {"brand_product": "Seeking Health Molybdenum 500mcg per capsule", "note": "", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1017995"]}, {"brand_product": "Molybdenum glycinate", "note": "Form used by Nusian at 6-7mg", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1018082"]}, {"brand_product": "Molybdenum amino acid chelate (NOT glycinate)", "note": "TRH: glycinate causes issues, amino acid chelate does not; glycinate reported as the #1 problem with people who claim molybdenum is intolerable. Nusian and Epinerein used glycinate and had it work but were advised to switch.", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1019458"]}, {"brand_product": "Piping Rock Molybdenum 2.5mg", "note": "Used by recoil.", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1020314"]}, {"brand_product": "KAL brand tablets", "note": "Tablets dissolve in the mouth if swirled for 15-20 seconds", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1020708"]}, {"brand_product": "Amino acid chelate (the recommended form)", "note": "Much better and smoother than glycinate; whole process feels nicer", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1020563"]}, {"brand_product": "Liquid molybdenum from the forum's Life Giving Store", "note": "Uses liquid for moly, capsules for EGCG and vitamin C, powders for the rest", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1020633"]}, {"brand_product": "Piping Rock Amino Acid Chelate (preferred) vs Seeking Health / Albion Molybdenum Glycinate Chelate (avoid)", "note": "Glycinate chelate is more potent and over-chelates copper; amino acid chelate is the recommended form. Piping Rock doesn't disclose which amino acid is used.", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1021306"]}, {"brand_product": "Piping Rock molybdenum caps", "note": "Used by karen138, dave_282 and Orion; Orion reports all good on standard doses after switching to it. purple pill cautions Piping Rock's 'amino acid chelate' may be a cheaper mixed-amino blend and weaker than pure glycinate, so there's confusion over which chelate is stronger.", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1021949"]}, {"brand_product": "Horbaach Molybdenum Amino Acid Chelate", "note": "charlie tried it for a short time but it did not seem to help his sciatica; he had also used sodium molybdate.", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1022393"]}, {"brand_product": "Molybdenum glycinate vs amino acid chelate (form comparison)", "note": "Glycinate is more potent, clears/prevents iron backlog better and makes more room for zinc but needs more EGCG and destabilizes iron balance fast; amino acid chelate is 'weak enough' to be safer. MrMetabolicMile used molybdenum citrate.", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1022049"]}, {"brand_product": "High-dose nicotinic acid as molybdenum substitute", "note": "MrMetabolicMile uses 1-2g per dose; charlie 250-350mg; MrMark 200-400mg. Balance with bicarbonate above 1g; experimenting with 1g niacin + 1g L-theanine.", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1022343"]}], "avoid": [{"brand_product": "Molybdenum amino acid chelate vs molybdenum glycinate", "reason": "Multiple users (Nusian, Orion, TRH) report molybdenum glycinate causes a low-copper/high-iron state, right leg/hip pain, agitation and worsening zinc deficiency over months; switching to amino acid chelate is smoother and resolved those issues. Everyone who switched from glycinate to amino acid chelate reported better effects."}]}], "general_tips": [{"tip": "Never take Vitamin C and EGCG together - it is the ultimate nausea causer; space them a few minutes apart, and take C/EGCG/B6 last in the sequence.", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1011254"]}, {"tip": "Always take the formula after a meal (a light meal is fine) because the protocol dumps a lot of bile; helps sensitive stomachs tolerate it.", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1011249"]}, {"tip": "Take the full biotin dose at the start (it stores in easily-accessed reserves), but molybdenum needs repeated small doses over hours since it doesn't store well and clears fast.", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1011120"]}, {"tip": "Take the stack first thing with dry (refined) toast for a consistent response, so calibration is almost always just molybdenum for nausea.", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1011121"]}, {"tip": "Taste test works especially well on Vitamin C, B6, EGCG, zinc and molybdenum: if a capsule on the tongue makes you gag you don't need it; if your tongue wants to swallow it, you likely do.", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1011341"]}, {"tip": "Biotin is the safest supplement to overdo; a triple 'catch-up' dose then return to normal is fine (has taken up to 4300mg/day with no ill effects).", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1011541"]}, {"tip": "Use calculated ratios (a spreadsheet), not just added milligrams - raising one supplement can effectively lower a ratio; you can change ratios significantly without increasing overall doses (e.g. 1/4 the EGCG, cut C to 2/3, up B6 to 200mg).", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1011538"]}, {"tip": "Order extra molybdenum, EGCG, and zinc - you'll need a lot more than you think for calibration.", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1011533"]}, {"tip": "Avoid adding other supplements (magnesium etc.) - calibration is much less effective when other stuff is in the mix.", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1011201"]}, {"tip": "Calibration is generally effective up to about 6 hours after the initial dose.", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1011549"]}, {"tip": "High-iron people should run very low molybdenum and somewhat lower Vitamin C.", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1011570"]}, {"tip": "Interpret gag reflex to identify metal imbalance: gagging on B6/C/EGCG = copper too high; gagging on zinc/molybdenum = iron too high.", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1011352"]}, {"tip": "Think of calibration as a three-sided see-saw: high iron (needs EGCG/#3), high copper (needs moly/#2), and low zinc (#1).", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1011335"]}, {"tip": "If lowering EGCG the stack feels better and skipping EGCG entirely is tolerable, you likely have high copper; you can run without EGCG until #3 (headache) symptoms appear - kidney stones come from too MUCH EGCG relative to zinc/moly/biotin, not too little.", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1011310"]}, {"tip": "Do not put EGCG powder directly on the tongue like other powders; it numbs whatever it touches for 10-15 minutes. Spoon it to the back of the throat instead.", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1011668"]}, {"tip": "Track progress with objective measures: height, grip strength (a ~$20 Amazon dynamometer), eye-color and skin-blemish photos, and periodic online IQ/reaction-time tests.", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1011646"]}, {"tip": "Useful lab tests to monitor metal movement: ferritin, hair tissue mineral analysis (HTMA), retinol (vitamin A), liver enzymes (ALT/AST) and BUN/creatinine, plus DEXA bone density and (untried) urine copper or stool metals.", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1011646"]}, {"tip": "Keep a timestamped log of every dose, calibration and symptom; analyzing it is invaluable for finding your ratios and avoiding repeated mistakes.", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1011868"]}, {"tip": "Everything is a symptom: do not discount lifelong or pre-existing symptoms as unrelated, because HG7 can toggle them on and off by changing metal and vitamin levels.", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1011868"]}, {"tip": "Do not be afraid to calibrate, and you do not need to be nauseated to do so; if you feel bad in a way you can link to a calibration, take it. A wrong calibration just adds symptoms that reveal the correct one.", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1011868"]}, {"tip": "Take the full dose rather than a small one, because it makes calibration symptoms very noticeable; a small dose can leave you with a single ambiguous symptom and no way to know what to take.", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1011868"]}, {"tip": "To swallow floating capsules, tilt your head forward (not back); they float to the back of the throat for easy swallowing.", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1011868"]}, {"tip": "Use the under-the-tongue biotin taste test to monitor need: it tastes mildly sweet and dissolves when you need it, and clumps when you have had enough.", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1012050"]}, {"tip": "Separate EGCG from vitamin C by a time interval (at least 25 minutes, or take EGCG alone) to reduce nausea, since they appear to compete over iron mobilization.", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1012035"]}, {"tip": "If you get low-copper symptoms, cut vitamin C in half while keeping everything else in a similar ratio.", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1012034"]}, {"tip": "Taking the formula after eating, or splitting it into two doses per day, can make the dosing side effects less intense.", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1011783"]}, {"tip": "For candida/yeast flares, biotin may help prevent candida converting to its invasive fungal form; vitamin C and EGCG encourage autophagy, and red light can help mop up excess yeast.", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1011747"]}, {"tip": "If you get silent reflux from vitamin C, try a delayed-release vitamin C.", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1012064"]}, {"tip": "Avoid combining metal-active supplements (silica, melatonin) with HG7; they can upset the delicate high-dose balance and cause long-lasting issues.", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1011732"]}, {"tip": "Adapt calibration doses individually rather than treating the whole-pill amounts as exact; open capsules and weigh small amounts to avoid overshooting.", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1011722"]}, {"tip": "Zinc or EGCG can be taken as much as 24 hours after the main dose if calibration symptoms call for it, but be more cautious taking the B vitamins that far out.", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1011889"]}, {"tip": "If biotin still dissolves and tastes sweet, you likely need more; some people take several thousand mg, and TRH says biotin is the safest to overdo. Triple it for a catch-up dose if deficient.", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1011871"]}, {"tip": "When taking extra biotin, aim to match B5 roughly 1:1, since biotin and B5 needs appear closely aligned.", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1011903"]}, {"tip": "Buy a cheap mini scale if unsure of biotin amounts; a quarter teaspoon of pure biotin is roughly 400-500mg", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1012094"]}, {"tip": "Make more accurate scoops by scooping in excess (a 'hill') then scraping the top flat with another spoon's handle; cuts error from ~+/-20% to ~+/-5%. Note 1/4 tsp biotin = 0.52g, B5 = 0.55g, but vitamin C = 0.84g, so measure each powder once", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1012217"]}, {"tip": "Empty out EGCG (and other) capsules and take as powder - feels more consistent", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1012138"]}, {"tip": "Take EGCG at least 25 minutes before the other nutrients to reduce nausea", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1012094"]}, {"tip": "A drain-based dosing order that mirrors Heisenberg's drain list: B5, Biotin, C, B6, EGCG, Moly, Zinc (repeat EGCG/Moly/Zinc if splitting)", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1012196"]}, {"tip": "For 'pill tummy' take a decent gulp of acid (apple cider vinegar or lemon) with the pills", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1012303"]}, {"tip": "Don't premix the whole dose into a smoothie - it's the most disgusting thing to drink; take the vitamins first, it goes more smoothly", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1012397"]}, {"tip": "Use a delayed-release vitamin C to avoid silent reflux instead of quitting the protocol", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1012073"]}, {"tip": "Tart cherry powder (and a handful of berries) makes vitamin C easier to get down, though it doesn't stop the nausea", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1012242"]}, {"tip": "Silica-rich water (Fiji, or cleaner Gerolsteiner in glass) may help bind aluminum; cycle on and off due to minor impurities, ~1 litre/day", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1012462"]}, {"tip": "If you consume dairy, subtract ~2 EGCG pills to allow for the lactoferrin (which acts like EGCG) to avoid unbalancing the stack", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1012576"]}, {"tip": "1000mg biotin was no more helpful than 500mg for some people; 500mg makes the supply last longer", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1012285"]}, {"tip": "Higher-strength molybdenum caps (e.g. 1mg sodium molybdate) drastically reduce the pill count versus 200mcg caps (only ~6 needed for 6mg)", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1012131"]}, {"tip": "HG7 is very sensitive to diet: carnivore/heme-iron meals can sabotage progress, while lower-iron foods bring in more copper needing #1 calibrations; make only one change per day to track effects", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1012192"]}, {"tip": "Don't be afraid to take far more than 50mg biotin at a time - 500-900mg is typical on dose days, with no ill effect noted up to thousands of mg", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1012132"]}, {"tip": "Biotin drains B5, so gagging on biotin likely signals low B5 - add B5.", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1012696"]}, {"tip": "High-dose B vitamins (B6/B5/B7) reliably cure nausea for me; keep them on hand for when you're about to throw up.", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1012823"]}, {"tip": "Try a 'vitamins fixed, minerals flexible' approach: take a standard vitamin dose, then only add enough zinc/moly/EGCG to handle symptoms that arise.", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1013103"]}, {"tip": "Don't over-react/yo-yo calibrating; wait for a second confirming signal - symptoms often vanish before you act, so you calibrate nothing. Only calibrate if symptoms last over an hour and point at the same thing.", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1012953"]}, {"tip": "Vitamin C brand/form and purity matter enormously - tablets are weaker than capsules/powder; a cheap C (e.g. Bronson) may be behind months of struggle. Try sustained-release or other brands.", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1013219"]}, {"tip": "Fix pain-type symptoms (gout pain, nausea, diarrhea) as soon as they arrive rather than playing through them - ignoring a warning too long may turn it into tangible damage.", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1013264"]}, {"tip": "Check whether a supplement label lists elemental zinc or the compound weight; e.g. 40mg elemental zinc = 364% RDA (RDA 11mg for men). 1.7g of that powder = ~238mg elemental zinc, a normal standard dose.", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1013178"]}, {"tip": "Use pyridoxine HCl, not P5P, for B6 - using P5P can cause a headache and off results.", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1013117"]}, {"tip": "Get off HG7 only while in balance (no persistent symptoms), or your front-end issues follow you; they seem to rebalance in a week or two.", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1013190"]}, {"tip": "Keep salt/electrolytes up - a pinch of salt per glass of water and liberal salting improves stability and lowers symptom intensity after dosing.", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1013045"]}, {"tip": "Take biotin when taking a lot of zinc - without enough biotin, high zinc makes you feel bad.", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1013209"]}, {"tip": "High-iron people need much less molybdenum (and find C aggravating) until they've cleared iron; raising C raises molybdenum need.", "source_urls": ["https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1013148"]}]}, "resources": {"videos": [{"id": "v1", "title": "HG7: what is it with Elwin and @T_R_Heisenberg", "url": "https://www.youtube.com/watch?v=2PEBEKM2Zwg", "ep": null, "host": "Elwin Robinson", "summary": "This is a short recap/synopsis segment of an interview between host Elwin Robinson and Jacob ('the real Heisenberg'), creator of the HG7 protocol. Elwin summarizes the formula's four goals - replenish zinc, detoxify copper, remove iron and other heavy metals, and replenish any other low vitamins - and Jacob confirms them, framing the overarching aim as DNA repair achieved via increased zinc retention boosting telomerase production and telomere health. Jacob explains that EGCG and zinc together increase telomerase, but no one has previously been able to take enough of both to see benefit, which HG7 is designed to solve. Elwin recounts conversations with Dr. Mercola, who named EGCG as her second-favorite longevity strategy after being introduced to the formula, and references the Walsh ('wall') system finding that over 90% of mental-health patients were severely zinc deficient, plus EGCG's role in preventing zinc-induced nausea. The segment closes by listing the seven components: Zinc, EGCG, molybdenum, vitamin C, B5, B6, and B7.", "takeaways": [{"point": "The formula has four stated goals: replenish zinc, detoxify copper, remove iron (and potentially other heavy metals), and replenish any other vitamins that are low.", "timestamp": "00:11", "deeplink": "https://www.youtube.com/watch?v=2PEBEKM2Zwg&t=11s", "t_seconds": 11}, {"point": "The overall theoretical goal that all of these actions together accomplish is DNA repair.", "timestamp": "00:38", "deeplink": "https://www.youtube.com/watch?v=2PEBEKM2Zwg&t=38s", "t_seconds": 38}, {"point": "Increased zinc retention is thought to raise telomerase production, which keeps the telomeres on the ends of DNA strands healthier.", "timestamp": "00:51", "deeplink": "https://www.youtube.com/watch?v=2PEBEKM2Zwg&t=51s", "t_seconds": 51}, {"point": "EGCG and zinc in combination increase telomerase, but no one had previously been able to take enough of both together to get a benefit - HG7 is presented as the way to do it.", "timestamp": "01:10", "deeplink": "https://www.youtube.com/watch?v=2PEBEKM2Zwg&t=70s", "t_seconds": 70}, {"point": "Dr. Mercola named EGCG as her second top longevity strategy and attributed it to the formula Elwin introduced her to.", "timestamp": "01:51", "deeplink": "https://www.youtube.com/watch?v=2PEBEKM2Zwg&t=111s", "t_seconds": 111}, {"point": "Under the Walsh ('wall') system, based on test results from thousands of people, over 90% of those with mental health issues were severely zinc deficient.", "timestamp": "02:18", "deeplink": "https://www.youtube.com/watch?v=2PEBEKM2Zwg&t=138s", "t_seconds": 138}, {"point": "EGCG prevents the nausea people often get from zinc, letting them tolerate more zinc and relieve symptoms.", "timestamp": "02:34", "deeplink": "https://www.youtube.com/watch?v=2PEBEKM2Zwg&t=154s", "t_seconds": 154}, {"point": "The seven components of the formula are Zinc, EGCG, molybdenum, vitamin C, B5, B6, and B7.", "timestamp": "03:08", "deeplink": "https://www.youtube.com/watch?v=2PEBEKM2Zwg&t=188s", "t_seconds": 188}], "qa": [{"question": "Is it a fair summation that the formula has four goals - replenish zinc, detoxify copper, get out iron and potentially other heavy metals, and replenish any other low vitamins?", "answer": "Yes, I would say so. The overall goal that all of that together accomplishes is DNA repair - that is the theory.", "timestamp": "00:29", "deeplink": "https://www.youtube.com/watch?v=2PEBEKM2Zwg&t=29s", "t_seconds": 29}, {"question": "How does increased zinc retention help DNA in the body?", "answer": "I'm not that deep into the science yet, but increased zinc retention raises telomerase production, which makes the telomeres on the ends of your DNA strands healthier, theoretically. There's a lot of research that EGCG and zinc together increase that production, though they don't necessarily know why.", "timestamp": "00:47", "deeplink": "https://www.youtube.com/watch?v=2PEBEKM2Zwg&t=47s", "t_seconds": 47}, {"question": "What is the formula / what are its components?", "answer": "Zinc, EGCG, molybdenum, vitamin C, vitamin B5, B6, and B7 - those are the seven components. (Listed by host Elwin.)", "timestamp": "03:05", "deeplink": "https://www.youtube.com/watch?v=2PEBEKM2Zwg&t=185s", "t_seconds": 185}], "claims": [{"claim": "There is a lot of research that the combination of EGCG and zinc increases telomerase production.", "detail": "Jacob notes researchers don't necessarily know the mechanism yet.", "timestamp": "01:08", "deeplink": "https://www.youtube.com/watch?v=2PEBEKM2Zwg&t=68s", "t_seconds": 68}, {"claim": "No one has previously been able to take enough EGCG and zinc together to experience any real benefit from the combination.", "detail": "Jacob frames HG7 as the way to actually achieve sufficient combined intake.", "timestamp": "01:20", "deeplink": "https://www.youtube.com/watch?v=2PEBEKM2Zwg&t=80s", "t_seconds": 80}, {"claim": "Dr. Mercola listed EGCG as her second of three top anti-aging / longevity strategies, and confirmed it came from the formula Elwin introduced her to.", "detail": "Recounted by host Elwin from a not-yet-aired podcast episode; when asked 'Where did that come from? Is that by any chance because of this formula that I introduced you to?', she said 'Yeah, actually.'", "timestamp": "01:51", "deeplink": "https://www.youtube.com/watch?v=2PEBEKM2Zwg&t=111s", "t_seconds": 111}, {"claim": "Under the Walsh ('wall') system, evaluation of test results from thousands of people found that over 90% of people with mental health issues were severely zinc deficient.", "detail": "Recounted by Elwin; described as one of Dr. Mercola's specialties. The system's finding was based on actual test results, not just theorizing.", "timestamp": "02:14", "deeplink": "https://www.youtube.com/watch?v=2PEBEKM2Zwg&t=134s", "t_seconds": 134}, {"claim": "People taking zinc often become nauseous, but giving EGCG alongside it prevents the nausea and lets them handle more zinc, which helps relieve their symptoms.", "detail": "Recounted by Elwin as something Dr. Mercola observed in patients.", "timestamp": "02:29", "deeplink": "https://www.youtube.com/watch?v=2PEBEKM2Zwg&t=149s", "t_seconds": 149}], "quotes": [{"quote": "The overall goal that this is accomplishing, like all of that together, is accomplishing DNA repair - is the theory.", "timestamp": "00:35", "deeplink": "https://www.youtube.com/watch?v=2PEBEKM2Zwg&t=35s", "t_seconds": 35}, {"quote": "Increased zinc retention is causing your... telomerase production to increase, which causes the little telomeres on the end of... your DNA... to be healthier theoretically.", "timestamp": "00:59", "deeplink": "https://www.youtube.com/watch?v=2PEBEKM2Zwg&t=59s", "t_seconds": 59}, {"quote": "No one's ever been able to take enough EGCG and zinc together to really experience any sort of benefit from that, but I think this is the way to do it.", "timestamp": "01:20", "deeplink": "https://www.youtube.com/watch?v=2PEBEKM2Zwg&t=80s", "t_seconds": 80}], "theory": [{"point": "The unifying theory: replenishing zinc, detoxing copper, removing iron/heavy metals, and topping up low vitamins all together accomplish DNA repair.", "timestamp": "00:38", "deeplink": "https://www.youtube.com/watch?v=2PEBEKM2Zwg&t=38s", "t_seconds": 38}, {"point": "Increased zinc retention drives an increase in telomerase production in the body.", "timestamp": "00:51", "deeplink": "https://www.youtube.com/watch?v=2PEBEKM2Zwg&t=51s", "t_seconds": 51}, {"point": "Higher telomerase production keeps the telomeres (the little strands on the ends of DNA) healthier, theoretically.", "timestamp": "01:02", "deeplink": "https://www.youtube.com/watch?v=2PEBEKM2Zwg&t=62s", "t_seconds": 62}, {"point": "EGCG and zinc together synergistically increase telomerase production; the exact mechanism is not fully understood.", "timestamp": "01:10", "deeplink": "https://www.youtube.com/watch?v=2PEBEKM2Zwg&t=70s", "t_seconds": 70}], "protocol": [{"point": "The protocol requires taking a high dose of EGCG and zinc together - the key being enough of both simultaneously, which people haven't managed before.", "timestamp": "01:20", "deeplink": "https://www.youtube.com/watch?v=2PEBEKM2Zwg&t=80s", "t_seconds": 80}, {"point": "You should not take only EGCG and zinc; molybdenum and the vitamins must be taken as well, otherwise there will eventually be problems.", "timestamp": "02:44", "deeplink": "https://www.youtube.com/watch?v=2PEBEKM2Zwg&t=164s", "t_seconds": 164}, {"point": "The full formula is seven components taken together: Zinc, EGCG, molybdenum, vitamin C, B5, B6, and B7.", "timestamp": "03:08", "deeplink": "https://www.youtube.com/watch?v=2PEBEKM2Zwg&t=188s", "t_seconds": 188}]}, {"id": "v2", "title": "HG7 Works?! Jacob Shares DNA Methylation Results | RP Ep. 149", "url": "https://www.youtube.com/watch?v=fykshhPEOnM", "ep": 149, "host": "Rejuvenate Podcast", "summary": "In this Rejuvenate Podcast episode (Ep. 149), Jacob (T_R_Heisenberg, creator of the HG7 protocol) shares his first-ever test since starting HG7: a True Age DNA methylation panel. Despite an extreme unhealthy lifestyle (a pack of cigarettes plus cannabis daily since age 19, one fried-food meal a day, roughly five sodas a day, no exercise for six years, and only four to six hours of sleep), his methylation biological age came back 30.8 versus a chronological age of 34.1, and organ-system 'symphony ages' were 2-4 years younger than his real age, with liver and kidneys among the youngest despite years of very high EGCG dosing. Only his heart and lungs read older, which both he and the host attribute to heavy smoking rather than the protocol. Jacob recounts the 15-year origin story of HG7 (zinc deficiency, copper/iron bioavailability, a near-fatal 10mm kidney stone, and the 2021 discovery of taking all seven nutrients together), explains his 'mining operation' mechanism analogy, and gives the full current dosing for all seven nutrients. He frames the results as evidence the protocol is at least safe for him, while stressing it remains an experimental, self-calibrated theory and that he is not a doctor.", "takeaways": [{"point": "This True Age DNA methylation test is Jacob's first-ever test since starting HG7; he had avoided testing for years out of fear it would 'jinx' how good he felt.", "timestamp": "53:31", "deeplink": "https://www.youtube.com/watch?v=fykshhPEOnM&t=3211s", "t_seconds": 3211}, {"point": "Methylation biological age (M age) came back 30.8 vs a chronological age of 34.1 - about 3.3 years younger, which Jacob argues should really be counted as ~10 years younger given his damaging lifestyle.", "timestamp": "65:05", "deeplink": "https://www.youtube.com/watch?v=fykshhPEOnM&t=3905s", "t_seconds": 3905}, {"point": "Across ~11 organ 'symphony ages,' liver and kidneys were among the youngest despite years of very high EGCG - directly countering critics who said EGCG would destroy his liver.", "timestamp": "72:30", "deeplink": "https://www.youtube.com/watch?v=fykshhPEOnM&t=4350s", "t_seconds": 4350}, {"point": "The only two organ systems that aged older were heart and lungs, which both attribute to heavy smoking (cigarettes plus cannabis), not the protocol.", "timestamp": "69:54", "deeplink": "https://www.youtube.com/watch?v=fykshhPEOnM&t=4194s", "t_seconds": 4194}, {"point": "HG7 is seven nutrients taken together: zinc, vitamin B6, B5, B7 (biotin), vitamin C, EGCG, and molybdenum.", "timestamp": "20:38", "deeplink": "https://www.youtube.com/watch?v=fykshhPEOnM&t=1238s", "t_seconds": 1238}, {"point": "The protocol is explicitly experimental and self-calibrated by symptom/taste feedback; it is not a fixed daily dose and requires an open, experimental mindset.", "timestamp": "103:12", "deeplink": "https://www.youtube.com/watch?v=fykshhPEOnM&t=6192s", "t_seconds": 6192}, {"point": "Jacob deliberately keeps a bad lifestyle (smoking, junk food, no exercise) as a 'control' so results can't be attributed to lifestyle changes rather than HG7.", "timestamp": "42:36", "deeplink": "https://www.youtube.com/watch?v=fykshhPEOnM&t=2556s", "t_seconds": 2556}, {"point": "He now suspects women need less zinc than men, since ~90% of female participants quit, likely from too-high zinc causing iron-overload-like symptoms.", "timestamp": "97:15", "deeplink": "https://www.youtube.com/watch?v=fykshhPEOnM&t=5835s", "t_seconds": 5835}, {"point": "Jacob will retest in 6-12 months and is withholding celebration until he can compare a second data point; he lacks a pre-HG7 baseline, his biggest regret.", "timestamp": "67:47", "deeplink": "https://www.youtube.com/watch?v=fykshhPEOnM&t=4067s", "t_seconds": 4067}, {"point": "Everything visible in the report is consistent with his theory that toxic metals sit in tissues (not blood) and that iron overload is a root problem most guests agree on.", "timestamp": "89:47", "deeplink": "https://www.youtube.com/watch?v=fykshhPEOnM&t=5387s", "t_seconds": 5387}], "qa": [{"question": "Why did you choose to excrete free copper rather than increase ceruloplasmin to bind it?", "answer": "He was actually trying to do both; he originally thought raising ceruloplasmin was how to get rid of copper, and believes many of the nutrients accomplish both - excreting free copper while also converting some into usable copper for energy/ATP.", "timestamp": "07:03", "deeplink": "https://www.youtube.com/watch?v=fykshhPEOnM&t=423s", "t_seconds": 423}, {"question": "What caused your kidney stone when you were young?", "answer": "Too much EGCG taken on its own. EGCG rapidly binds and removes iron, causing a fast flush of metals into the kidneys; without the rest of the balancing protocol (which spikes uric acid to flush metals safely) it caused a 10mm stone that had to be surgically removed.", "timestamp": "15:11", "deeplink": "https://www.youtube.com/watch?v=fykshhPEOnM&t=911s", "t_seconds": 911}, {"question": "Why pyridoxine hydrochloride instead of the 'better' active P5P form of B6?", "answer": "The whole point is that the body converts B6 to its active form only when it needs it; P5P is always active and won't 'pee out' the excess, so at these doses it destroys the balance and causes imbalances. Use pyridoxine HCl only.", "timestamp": "20:50", "deeplink": "https://www.youtube.com/watch?v=fykshhPEOnM&t=1250s", "t_seconds": 1250}, {"question": "In what way is zinc gluconate 'harsh,' and why do you want that?", "answer": "When you don't need zinc, gluconate makes you throw up quickly - that harsh signal tells you your body doesn't need zinc at that moment. He recommends gluconate largely because it's what he uses, is cheap, and is widely available.", "timestamp": "24:19", "deeplink": "https://www.youtube.com/watch?v=fykshhPEOnM&t=1459s", "t_seconds": 1459}, {"question": "How did seeing the -3.3 year younger result feel?", "answer": "Given he does nothing else healthy and actively does aging things, he feels the adjusted figure should really be around -10 years; it was a huge confidence booster after years of being afraid to test.", "timestamp": "66:29", "deeplink": "https://www.youtube.com/watch?v=fykshhPEOnM&t=3989s", "t_seconds": 3989}, {"question": "Does EGCG also chelate/bind zinc?", "answer": "It's possible, and could be one reason zinc is needed so heavily in the protocol, but he's very convinced iron is the primary metal EGCG goes after (he's felt anemic taking EGCG when not iron-overloaded).", "timestamp": "122:02", "deeplink": "https://www.youtube.com/watch?v=fykshhPEOnM&t=7322s", "t_seconds": 7322}, {"question": "Did you try other/stronger iron chelators like IP6?", "answer": "Yes, several (IP6, turmeric/curcumin, others). IP6 felt like a blood cleanser that pulls metal from blood back to the liver, whereas EGCG uniquely feels like it penetrates organs/tissues and actually removes iron, relieving liver/kidney/head pressure.", "timestamp": "123:13", "deeplink": "https://www.youtube.com/watch?v=fykshhPEOnM&t=7393s", "t_seconds": 7393}, {"question": "Does diet matter, and is dairy a problem?", "answer": "Diet mostly doesn't matter, but high-calcium foods like dairy can mildly interfere because calcium competes with zinc (and iron) absorption; for him milk causes digestion issues. Also avoid alcohol, which alters blood iron and stresses the liver.", "timestamp": "128:26", "deeplink": "https://www.youtube.com/watch?v=fykshhPEOnM&t=7706s", "t_seconds": 7706}, {"question": "Did you create separate protocols for men and women?", "answer": "Not yet - it's a recent realization. He plans to add a note for women to try less zinc plus slightly different ratios, since most women quit and reducing zinc corrected their iron-overload-like symptoms.", "timestamp": "100:16", "deeplink": "https://www.youtube.com/watch?v=fykshhPEOnM&t=6016s", "t_seconds": 6016}, {"question": "Where should people go to learn the full protocol?", "answer": "The low toxin forum (lowtoxinforum.com, now the Bioenergetic/Toxin-Free Living Forum), in the large 'Theory + Protocol Discussion of HG7' thread; his screen name is TR Heisenberg and he checks it daily. He stresses he is not a doctor and makes no money from it.", "timestamp": "137:60", "deeplink": "https://www.youtube.com/watch?v=fykshhPEOnM&t=8279s", "t_seconds": 8279}], "claims": [{"claim": "Chronological age 34.1 (recently turned 34, around October).", "detail": "Baseline figure on the True Age report; test provider was True Age (used despite customer-service issues).", "timestamp": "64:52", "deeplink": "https://www.youtube.com/watch?v=fykshhPEOnM&t=3892s", "t_seconds": 3892}, {"claim": "Methylation biological age (M age) = 30.8, i.e. -3.3 years vs chronological age.", "detail": "Described as a deeper reflection of biological age from DNA methylation; rounded to 'guess ~31.'", "timestamp": "65:05", "deeplink": "https://www.youtube.com/watch?v=fykshhPEOnM&t=3905s", "t_seconds": 3905}, {"claim": "Jacob argues the lifestyle-adjusted deaging is more like -10 years, not -3.3.", "detail": "Because he actively does aging behaviors (smoking, junk food, no exercise, poor sleep).", "timestamp": "66:29", "deeplink": "https://www.youtube.com/watch?v=fykshhPEOnM&t=3989s", "t_seconds": 3989}, {"claim": "Symphony (organ-system) ages were mostly 2-4 years younger than chronological age.", "detail": "Abbreviated report covers ~11 organ systems (blood, brain, inflammation, liver, kidney, immune, hormones, heart, lungs, etc.).", "timestamp": "69:29", "deeplink": "https://www.youtube.com/watch?v=fykshhPEOnM&t=4169s", "t_seconds": 4169}, {"claim": "Only heart and lungs read OLDER; attributed to smoking a pack a day plus cannabis.", "detail": "Host and Jacob agree this fits heavy smoke exposure; heart plausibly also from iron mobilized into circulation.", "timestamp": "69:54", "deeplink": "https://www.youtube.com/watch?v=fykshhPEOnM&t=4194s", "t_seconds": 4194}, {"claim": "Hormones was Jacob's single best (youngest) organ-system score of all 11.", "detail": "Notable because hormonal problems were the original reason he started taking zinc.", "timestamp": "72:15", "deeplink": "https://www.youtube.com/watch?v=fykshhPEOnM&t=4335s", "t_seconds": 4335}, {"claim": "Liver and kidneys were among the youngest/best markers despite massive EGCG intake.", "detail": "Critics predicted EGCG would destroy his liver; kidneys younger despite a prior hospitalization for bloody kidneys and 30 pills/day with soda.", "timestamp": "72:30", "deeplink": "https://www.youtube.com/watch?v=fykshhPEOnM&t=4350s", "t_seconds": 4350}, {"claim": "EGCG intake: ~5-15 g per WEEK currently (~10 g/week), lifetime average ~3-5 g/week; ~5 g per standard dose.", "detail": "Well above the ~400 mg (0.4 g) commonly cited as the liver-danger threshold.", "timestamp": "73:48", "deeplink": "https://www.youtube.com/watch?v=fykshhPEOnM&t=4428s", "t_seconds": 4428}, {"claim": "Pace of aging came back below 1 (aging ~9 biological years per 10 chronological years).", "detail": "A pace >1 is associated with ~50% increased risk of death; Jacob's is below 1, i.e. protective.", "timestamp": "79:29", "deeplink": "https://www.youtube.com/watch?v=fykshhPEOnM&t=4769s", "t_seconds": 4769}, {"claim": "Host's own pace of aging was ~0.65, comparable to Brian Johnson (who reportedly spends ~$2M/year).", "detail": "Context: host does full healthy lifestyle; Jacob's pace was slightly worse than host's but still better than average.", "timestamp": "80:57", "deeplink": "https://www.youtube.com/watch?v=fykshhPEOnM&t=4857s", "t_seconds": 4857}, {"claim": "Telomere length was above average / good.", "detail": "Telomeres were historically the main DNA-aging measure before methylation; still a positive marker for Jacob.", "timestamp": "85:58", "deeplink": "https://www.youtube.com/watch?v=fykshhPEOnM&t=5158s", "t_seconds": 5158}, {"claim": "Fasting glucose was lower than average and HbA1c (A1C) was well below average.", "detail": "Surprising given ~5 cans of soda a day and a poor diet; blood sugar well controlled.", "timestamp": "88:10", "deeplink": "https://www.youtube.com/watch?v=fykshhPEOnM&t=5290s", "t_seconds": 5290}, {"claim": "Hemoglobin was on the high side, indicating iron is NOT being over-depleted despite heavy EGCG.", "detail": "Jacob uses this as evidence the body still holds a large iron reserve that EGCG hasn't exhausted.", "timestamp": "88:46", "deeplink": "https://www.youtube.com/watch?v=fykshhPEOnM&t=5326s", "t_seconds": 5326}, {"claim": "Androsterone sulfate was in the top 10 percentile (androgen-activity marker downstream of testosterone).", "detail": "The only masculine hormone directly measured; consistent with Jacob's historically high overall hormone output.", "timestamp": "92:10", "deeplink": "https://www.youtube.com/watch?v=fykshhPEOnM&t=5530s", "t_seconds": 5530}, {"claim": "Immune markers were mostly normal; elevated monocytes tied to EGCG, and high neutrophils / CD4:CD8 explained by a flu just before testing.", "detail": "Jacob notes this made it a poor time to assess immune system, but that wasn't the test's purpose.", "timestamp": "85:00", "deeplink": "https://www.youtube.com/watch?v=fykshhPEOnM&t=5100s", "t_seconds": 5100}, {"claim": "Alkaline phosphatase (a liver enzyme expected high in liver stress) was actually LOW.", "detail": "Further evidence against EGCG-driven liver damage.", "timestamp": "91:29", "deeplink": "https://www.youtube.com/watch?v=fykshhPEOnM&t=5489s", "t_seconds": 5489}, {"claim": "Lifestyle context: smokes a pack a day since age 19 (plus cannabis), sleeps ~4-6 hours, no exercise for 6 years, <~1000 steps/day, one fried-food meal a day, ~5 sodas/day, no stress-management.", "detail": "Kept deliberately as a 'control' so results can't be credited to healthy habits.", "timestamp": "42:36", "deeplink": "https://www.youtube.com/watch?v=fykshhPEOnM&t=2556s", "t_seconds": 2556}, {"claim": "Jacob had a near-fatal history: hospitalized with a 10mm kidney stone (surgically removed) and bleeding kidneys before he found the correct protocol.", "detail": "He attributes the stone to taking too much EGCG/molybdenum individually rather than the balanced formula.", "timestamp": "14:40", "deeplink": "https://www.youtube.com/watch?v=fykshhPEOnM&t=880s", "t_seconds": 880}, {"claim": "Discovery moment: after the hospital he took ALL the pills at once (instead of individually) and went from near-death/depressed to warm hands, happy, and motivated.", "detail": "This 'all-at-once' insight in 2021 became the basis of HG7 after ~10-15 years of trial and error.", "timestamp": "17:08", "deeplink": "https://www.youtube.com/watch?v=fykshhPEOnM&t=1028s", "t_seconds": 1028}, {"claim": "Reversal of prior chronic conditions after ~4 years of doing it 'properly': asthma, insomnia, poor body composition, and severe lactose/dairy intolerance all resolved.", "detail": "Reports thinking ~3x faster and feeling happy almost all the time.", "timestamp": "39:33", "deeplink": "https://www.youtube.com/watch?v=fykshhPEOnM&t=2373s", "t_seconds": 2373}, {"claim": "Protocol cost is roughly $50-100/month; Jacob currently runs it about 3 times per week.", "detail": "Biotin sourcing is the hardest/most expensive piece for many; far cheaper than elite longevity regimens.", "timestamp": "82:38", "deeplink": "https://www.youtube.com/watch?v=fykshhPEOnM&t=4958s", "t_seconds": 4958}], "quotes": [{"quote": "I've essentially come up with a way to not have to destroy yourselves in the gym and spend all that time making these extremely healthy, dirty-tasting meals... basically have your cake and eat it too.", "timestamp": "95:56", "deeplink": "https://www.youtube.com/watch?v=fykshhPEOnM&t=5756s", "t_seconds": 5756}, {"quote": "I take 30 pills a day and drink them with soda and my kidneys are younger. That's more than a coincidence... there's just no other way than evidence to support that what I'm doing is at least safe for me.", "timestamp": "74:31", "deeplink": "https://www.youtube.com/watch?v=fykshhPEOnM&t=4471s", "t_seconds": 4471}, {"quote": "There was a huge cost in figuring this out. I had to nearly die 50 times to get to this point.", "timestamp": "96:38", "deeplink": "https://www.youtube.com/watch?v=fykshhPEOnM&t=5798s", "t_seconds": 5798}, {"quote": "It wants that B6 really bad. Like it wants it so bad that it's willing to cause these toxic effects because it's using it to extract metals from your tissues.", "timestamp": "60:23", "deeplink": "https://www.youtube.com/watch?v=fykshhPEOnM&t=3623s", "t_seconds": 3623}, {"quote": "Even my worst skeptics will agree that iron is a huge problem.", "timestamp": "90:19", "deeplink": "https://www.youtube.com/watch?v=fykshhPEOnM&t=5419s", "t_seconds": 5419}, {"quote": "You have to come into this protocol with an open mind. Because if you come in here thinking you know everything... it's probably not going to work for you.", "timestamp": "133:44", "deeplink": "https://www.youtube.com/watch?v=fykshhPEOnM&t=8024s", "t_seconds": 8024}, {"quote": "I'm breaking natural physical laws by proving out that you can have your cake and eat it too.", "timestamp": "139:00", "deeplink": "https://www.youtube.com/watch?v=fykshhPEOnM&t=8340s", "t_seconds": 8340}, {"quote": "This is a theoretical cure for zinc deficiency... but it's all theory. I am not accredited. I am not a doctor. Please do not take my advice as such. I am an engineer, if anything, and a scientist - very curious person.", "timestamp": "140:40", "deeplink": "https://www.youtube.com/watch?v=fykshhPEOnM&t=8440s", "t_seconds": 8440}], "theory": [{"point": "Root theory: overgrown iron and copper 'mines' clog zinc receptor sites; because the body treats iron/copper as rare and they're heavy, they don't excrete well and oxidize in tissues, eventually making zinc unusable and driving hormonal imbalance, aging, and disease.", "timestamp": "31:39", "deeplink": "https://www.youtube.com/watch?v=fykshhPEOnM&t=1899s", "t_seconds": 1899}, {"point": "Iron is the key blocker: it's the only metal heavy enough to stop zinc reaching its receptors; too much iron in blood makes you appear copper- and zinc-deficient, and vice versa, so the fix is to lower iron/copper rather than add more.", "timestamp": "28:16", "deeplink": "https://www.youtube.com/watch?v=fykshhPEOnM&t=1696s", "t_seconds": 1696}, {"point": "Metals hide in tissues, not blood - which is why standard blood panels always told him he was 'fine.' They only appear in blood once surfaced by the protocol, which also explains why doctors couldn't detect his problem.", "timestamp": "55:36", "deeplink": "https://www.youtube.com/watch?v=fykshhPEOnM&t=3336s", "t_seconds": 3336}, {"point": "Mining-operation analogy: B6 is the worker swinging a zinc 'pickaxe' to tear metals from tissue into carts; biotin is the cleanup/repair crew; B5 is the power generator; vitamin C is the cart-pusher and copper mobilizer.", "timestamp": "33:29", "deeplink": "https://www.youtube.com/watch?v=fykshhPEOnM&t=2009s", "t_seconds": 2009}, {"point": "At the liver, EGCG binds iron so the body no longer recognizes it as reusable iron and passes it to the kidneys; without EGCG the liver keeps 'rare' iron and returns it to storage.", "timestamp": "35:22", "deeplink": "https://www.youtube.com/watch?v=fykshhPEOnM&t=2122s", "t_seconds": 2122}, {"point": "Molybdenum acts as the kidney 'floodgate opener': it drives uric-acid production that lets accumulated metal pass the kidney filter and exit via urine; without it metals stall in the kidneys and recycle back into storage. Molybdenum is established as needed for copper excretion (e.g. Wilson's disease).", "timestamp": "36:52", "deeplink": "https://www.youtube.com/watch?v=fykshhPEOnM&t=2212s", "t_seconds": 2212}, {"point": "Zinc is the optimal replacement metal in the receptor - lightest of the three, conducts electricity for mitochondria, and blocks the aromatase enzyme (reducing estrogen conversion); iron can conduct but doesn't do zinc's hormonal jobs.", "timestamp": "37:60", "deeplink": "https://www.youtube.com/watch?v=fykshhPEOnM&t=2279s", "t_seconds": 2279}, {"point": "B6 'toxicity' (e.g. neuropathy) is reframed as a deficiency signal: symptoms come from B6 surfacing so much metal that it short-circuits nerve signaling, and the body keeps absorbing B6 because it wants it badly to extract metals - so B6 is the last nutrient to stop 'working' when overdosed.", "timestamp": "59:24", "deeplink": "https://www.youtube.com/watch?v=fykshhPEOnM&t=3564s", "t_seconds": 3564}, {"point": "'Done' indicator: the process is complete when he can take B6 (and all the other vitamins) and nothing happens - meaning tissue metal backlog is cleared and zinc storage is restored.", "timestamp": "59:24", "deeplink": "https://www.youtube.com/watch?v=fykshhPEOnM&t=3564s", "t_seconds": 3564}, {"point": "Peak-not-youth hypothesis: HG7 may not de-age below one's biological peak (~mid-20s to mid-30s) but rather restore and hold a person at that peak regardless of chronological age.", "timestamp": "86:22", "deeplink": "https://www.youtube.com/watch?v=fykshhPEOnM&t=5182s", "t_seconds": 5182}, {"point": "He believes ratios are broadly similar across people, but starting points differ; women likely need less zinc (much of men's zinc is stored in the testes, which women lack), and body size affects tolerable max dose.", "timestamp": "97:15", "deeplink": "https://www.youtube.com/watch?v=fykshhPEOnM&t=5835s", "t_seconds": 5835}], "protocol": [{"point": "Seven nutrients, taken together (not individually): zinc, vitamin B6, vitamin B5, vitamin B7 (biotin), vitamin C, EGCG, and molybdenum - roughly 30+ pills per full dose.", "timestamp": "20:38", "deeplink": "https://www.youtube.com/watch?v=fykshhPEOnM&t=1238s", "t_seconds": 1238}, {"point": "Vitamin B6: pyridoxine HYDROCHLORIDE only (never P5P), ~250 mg per dose; keep between 200-300 mg, do not exceed 300 or go below 200.", "timestamp": "112:09", "deeplink": "https://www.youtube.com/watch?v=fykshhPEOnM&t=6729s", "t_seconds": 6729}, {"point": "Vitamin B5: pantothenic acid, ~1,000 mg per dose (two 500 mg caps); brand not important.", "timestamp": "110:40", "deeplink": "https://www.youtube.com/watch?v=fykshhPEOnM&t=6640s", "t_seconds": 6640}, {"point": "Vitamin B7 (biotin): the standout dose - 2.2 to 2.5 GRAMS (2200-2500 mg, not micrograms) of PURE powder, never the 1% diluted powder; he uses the Bulk Supplements brand on Amazon.", "timestamp": "114:55", "deeplink": "https://www.youtube.com/watch?v=fykshhPEOnM&t=6895s", "t_seconds": 6895}, {"point": "Vitamin C: ascorbic acid ONLY, ~3.5-5 g per dose; avoid buffered forms and any with added antioxidants (they can disrupt the EGCG chelation sequence).", "timestamp": "115:21", "deeplink": "https://www.youtube.com/watch?v=fykshhPEOnM&t=6921s", "t_seconds": 6921}, {"point": "Zinc: zinc gluconate; minimum ~50 mg, typical range 100-300 mg, most (especially men) do best ~200-250 mg; do not exceed 300 mg. Occasionally skip zinc for a dose or two to let iron backlog clear.", "timestamp": "116:32", "deeplink": "https://www.youtube.com/watch?v=fykshhPEOnM&t=6992s", "t_seconds": 6992}, {"point": "Molybdenum: amino-acid chelate form, ~6-8 mg per dose (far above typical 200-500 mcg); dangerous alone at this level but necessary within the protocol to handle the metal dump / uric-acid surge.", "timestamp": "117:57", "deeplink": "https://www.youtube.com/watch?v=fykshhPEOnM&t=7077s", "t_seconds": 7077}, {"point": "EGCG: ~4.8-6 g per dose (~5 g standard; started at ~2,000 mg and roughly doubled). Brand matters a lot - he uses the Horbaach 'triple strength green tea' brand for price and recommends Life Extension; a bad brand fails to clear iron and mimics protocol failure.", "timestamp": "126:11", "deeplink": "https://www.youtube.com/watch?v=fykshhPEOnM&t=7571s", "t_seconds": 7571}, {"point": "Amounts scale together: more B6 (e.g. 300 mg) requires proportionally more EGCG (5-6 g) and more of everything else; ratios per nutrient stay similar even as totals rise.", "timestamp": "126:11", "deeplink": "https://www.youtube.com/watch?v=fykshhPEOnM&t=7571s", "t_seconds": 7571}, {"point": "Take the powders under the tongue - they dissolve fast until you 'cap out' and clumping begins, which signals you've had enough (biotin especially); the body pees out excess water-soluble vitamins, which is why megadoses are tolerated.", "timestamp": "113:16", "deeplink": "https://www.youtube.com/watch?v=fykshhPEOnM&t=6796s", "t_seconds": 6796}, {"point": "Calibrate by symptom-matching against the forum's deficiency-symptom lists and by the 'taste/gag test': when nauseous, the one nutrient (usually EGCG, zinc, or molybdenum) that does NOT trigger the gag reflex - or tastes good/sweet - is the one you need, and taking it clears the nausea almost immediately.", "timestamp": "106:24", "deeplink": "https://www.youtube.com/watch?v=fykshhPEOnM&t=6384s", "t_seconds": 6384}, {"point": "Large doses of zinc can actually REMOVE nausea when zinc is what's needed (host confirmed this from experience), contrary to zinc's usual reputation for causing nausea.", "timestamp": "108:51", "deeplink": "https://www.youtube.com/watch?v=fykshhPEOnM&t=6531s", "t_seconds": 6531}, {"point": "Avoid dairy/high-calcium foods (calcium competes with zinc and iron absorption) and avoid alcohol (alters blood iron and stresses the liver) while dosing; Jacob swallows the ~30 pills with soda (or use kefir/milk/juice) to ease the gag.", "timestamp": "128:26", "deeplink": "https://www.youtube.com/watch?v=fykshhPEOnM&t=7706s", "t_seconds": 7706}, {"point": "Do NOT take EGCG (or molybdenum) alone at these doses - EGCG alone will likely cause liver damage and copper-toxicity-type symptoms; it is only safe within the balanced seven-nutrient protocol.", "timestamp": "76:44", "deeplink": "https://www.youtube.com/watch?v=fykshhPEOnM&t=4604s", "t_seconds": 4604}]}, {"id": "v3", "title": "Holy Grail of Health? HG7 Beginners Guide with Jacob & Krissy | Rejuvenate Podcast Ep. 126", "url": "https://www.youtube.com/watch?v=Y6Amlrw3vsI", "ep": 126, "host": "Rejuvenate Podcast (Jacob & Krissy)", "summary": "In this beginners-guide episode of the Rejuvenate Podcast, host Krissy Hawks interviews Jacob (T_R_Heisenberg), creator of the HG7 protocol, at a deliberately non-technical level. Jacob recounts his roughly 10-year self-experimentation journey (starting from teenage hair loss and chronic fatigue, through kidney stones and self-induced bipolar symptoms) that led him to distill seven nutrients: B5, B6, B7/biotin, vitamin C, EGCG, zinc, and molybdenum. The core theory is that excess iron and copper accumulate and block zinc, and that the seven nutrients together detox those metals while replenishing zinc, supposedly reversing many health issues. He walks through the current recommended dosages/ratios, the gag-reflex taste test used to calibrate, when and how to take it (post-meal, before bed), what NOT to add (calcium, extra minerals, antioxidants like rutin), and troubleshooting (biotin purity, EGCG vs green tea extract, dropping EGCG during a kidney stone). Throughout he stresses it is experimental, not FDA-backed, not medical advice, and best supported via the forum.", "takeaways": [{"point": "Jacob (aka TR Heisenberg) is the creator of the HG7 formula; this episode is a beginners guide framed in layman's terms for sharing with non-science people.", "timestamp": "00:10", "deeplink": "https://www.youtube.com/watch?v=Y6Amlrw3vsI&t=10s", "t_seconds": 10}, {"point": "HG7 is seven nutrients Jacob narrowed down to after about 10 years of massive trial and error.", "timestamp": "08:16", "deeplink": "https://www.youtube.com/watch?v=Y6Amlrw3vsI&t=496s", "t_seconds": 496}, {"point": "Core theory: iron and copper accumulate and block zinc; zinc, copper and iron share absorption mechanisms.", "timestamp": "05:48", "deeplink": "https://www.youtube.com/watch?v=Y6Amlrw3vsI&t=348s", "t_seconds": 348}, {"point": "The seven ingredients are three B vitamins (B5 pantothenic acid, B6 pyridoxine HCl, B7 biotin), vitamin C, EGCG, and two minerals (zinc and molybdenum).", "timestamp": "27:30", "deeplink": "https://www.youtube.com/watch?v=Y6Amlrw3vsI&t=1650s", "t_seconds": 1650}, {"point": "Balancing iron AND copper simultaneously is the key insight; chelating only one of them makes people sick (e.g. hair going white when only copper is chelated).", "timestamp": "14:59", "deeplink": "https://www.youtube.com/watch?v=Y6Amlrw3vsI&t=899s", "t_seconds": 899}, {"point": "The protocol is explicitly experimental, self-directed, at your own risk, and not fully recommended to anybody - Jacob is only sharing what worked for him.", "timestamp": "37:29", "deeplink": "https://www.youtube.com/watch?v=Y6Amlrw3vsI&t=2249s", "t_seconds": 2249}, {"point": "There is no single perfect universal dose yet, but Jacob has distilled it to a good starting point that requires personal calibration.", "timestamp": "37:53", "deeplink": "https://www.youtube.com/watch?v=Y6Amlrw3vsI&t=2273s", "t_seconds": 2273}, {"point": "The gag-reflex taste test is central to calibrating how much of each nutrient to take.", "timestamp": "42:53", "deeplink": "https://www.youtube.com/watch?v=Y6Amlrw3vsI&t=2573s", "t_seconds": 2573}, {"point": "Biotin (pure, correct strength - not the 1% diluted powder) is the number-one thing people get wrong.", "timestamp": "85:20", "deeplink": "https://www.youtube.com/watch?v=Y6Amlrw3vsI&t=5120s", "t_seconds": 5120}, {"point": "Best way to start and get support is the paid forum (about $5/month); post your age/problems and ask questions - Jacob and several experienced users respond.", "timestamp": "81:09", "deeplink": "https://www.youtube.com/watch?v=Y6Amlrw3vsI&t=4869s", "t_seconds": 4869}, {"point": "For someone sick who just wants to feel better, Jacob estimates it is a 2-3 year process; he is on year 4+ of successfully running it.", "timestamp": "62:08", "deeplink": "https://www.youtube.com/watch?v=Y6Amlrw3vsI&t=3728s", "t_seconds": 3728}], "qa": [{"question": "How did you get here, and how did the HG7 protocol develop?", "answer": "Jacob got into nutrition in his late teens because he was losing his hair and generally feeling sick and tired (chronic fatigue), which his dad and older brother shared. Sports-nutrition testosterone boosters worsened his hair shedding, which convinced him the cause was hormonal. He narrowed it to zinc, then discovered zinc/copper/iron share absorption mechanisms, then found B vitamins draining each other; over roughly 10 years of trial and error he arrived at the seven nutrients now called HG7.", "timestamp": "01:17", "deeplink": "https://www.youtube.com/watch?v=Y6Amlrw3vsI&t=77s", "t_seconds": 77}, {"question": "What specifically about zinc led you to that conclusion?", "answer": "Three or four online articles said zinc blocks the aromatase enzyme (which converts free testosterone into estrogenic byproducts like estradiol) and also DHT conversion, so he reasoned more zinc would reduce conversion and stop his hair falling out.", "timestamp": "03:22", "deeplink": "https://www.youtube.com/watch?v=Y6Amlrw3vsI&t=202s", "t_seconds": 202}, {"question": "Why is the iron/copper situation a problem, and how does it show up?", "answer": "Iron and copper are needed only in tiny amounts. Iron is a heavy metal that does not sweat out like zinc, so when it cannot excrete the body stores it in tissues, taking over zinc receptor sites and blocking zinc - which is central to hormones, enzymes and protein production. Copper is a stimulant; when too high it suppresses iron so you appear anemic, and removing copper lets iron surface. Balancing the two is key, and most people wrongly chelate just one.", "timestamp": "12:12", "deeplink": "https://www.youtube.com/watch?v=Y6Amlrw3vsI&t=732s", "t_seconds": 732}, {"question": "Many women appear iron deficient (very low ferritin) - are they actually deficient or is iron hiding?", "answer": "Jacob guesses that with modern diets most people have plenty of iron and plenty of copper, and the copper is suppressing iron from surfacing. Copper and B vitamins together produce ATP/energy; if copper is too high it overstimulates and drains the B vitamins, causing chronic fatigue and poor iron utilization, so removing copper would actually drop your apparent iron need.", "timestamp": "16:58", "deeplink": "https://www.youtube.com/watch?v=Y6Amlrw3vsI&t=1018s", "t_seconds": 1018}, {"question": "What are the full seven ingredients?", "answer": "Three B vitamins - B5 (pantothenic acid), B6 (pyridoxine HCl), B7 (biotin); vitamin C (part vitamin, part antioxidant); EGCG (a green-tea-derived antioxidant that binds the metals for removal); and two minerals, zinc and molybdenum. Molybdenum was the last piece he added about 3 years ago because it is needed to produce uric acid that removes free copper.", "timestamp": "27:30", "deeplink": "https://www.youtube.com/watch?v=Y6Amlrw3vsI&t=1650s", "t_seconds": 1650}, {"question": "Can you share the current standard doses and ratios?", "answer": "Updated since the last protocol (vitamins lowered). B6: 125-200 mg. Biotin: about 500 mg at 125 mg B6, about 1,000 mg at 200 mg B6. B5: about 350 mg at the 125 mg B6 dosage. Vitamin C: 5-7 grams. Zinc: 200-220 mg. EGCG: about 2,600 mg (adjust against zinc). Molybdenum: about 6 mg, though some people (like Elwin) need only 1-2 mg depending on how copper-toxic they are.", "timestamp": "41:48", "deeplink": "https://www.youtube.com/watch?v=Y6Amlrw3vsI&t=2508s", "t_seconds": 2508}, {"question": "Is there any nutrient you can do without at any time?", "answer": "Each can be taken in small amounts alone, but never take any of them isolated at the high protocol dosages (e.g. 2,600 mg EGCG alone would make you very ill nine times out of ten). You cannot skip EGCG - Elwin thought he didn't need it and started getting EGCG-deficiency symptoms a month later. Biotin is the only one Jacob has safely taken in excess long-term.", "timestamp": "46:24", "deeplink": "https://www.youtube.com/watch?v=Y6Amlrw3vsI&t=2784s", "t_seconds": 2784}, {"question": "How do people buy the right pure powder, what should they experience, and is there an order?", "answer": "Use the taste test: the residue on the capsule is enough - you don't need to open it. Test when nauseous, since the body is most discriminating then. If vitamin C tastes sweet you need it; if it makes you gag you don't yet. Everything is taken as capsules except biotin, which he recommends as pure powder under the tongue. There is no fixed order - it depends on your current state.", "timestamp": "52:37", "deeplink": "https://www.youtube.com/watch?v=Y6Amlrw3vsI&t=3157s", "t_seconds": 3157}, {"question": "Is there a recommended order to take these?", "answer": "No - it depends entirely on your current level of each of the seven nutrients. EGCG is really an indicator of how high your surfaced/blood iron is: low EGCG means high surfaced iron, which blocks every other nutrient from working, so you take more EGCG to bind and remove it.", "timestamp": "57:29", "deeplink": "https://www.youtube.com/watch?v=Y6Amlrw3vsI&t=3449s", "t_seconds": 3449}, {"question": "How long do you stay on HG7 - is it a forever protocol?", "answer": "Jacob says he could stop now and be fine because he has cleared every health issue he cared about, but he continues out of obsession and curiosity (calls it playing God). For someone who is sick and just wants to feel better he estimates a 2-3 year process; his own first 10 years actually made him worse before the last few years of undoing that damage.", "timestamp": "59:46", "deeplink": "https://www.youtube.com/watch?v=Y6Amlrw3vsI&t=3586s", "t_seconds": 3586}, {"question": "When should you take it - which meal, with or without food?", "answer": "Don't take it before anything important because you may need to calibrate for nausea. Post-meal is easier and the body is more forgiving of ratio errors than on an empty stomach (empty stomach requires more precision). Jacob takes it before bed because extra EGCG has a sedentary effect that helps him sleep; some people get the opposite and need more EGCG or vitamin C.", "timestamp": "64:16", "deeplink": "https://www.youtube.com/watch?v=Y6Amlrw3vsI&t=3856s", "t_seconds": 3856}, {"question": "What helps with waking up all night / an overactive mind?", "answer": "Usually a need for more vitamin C or more EGCG. Insomnia comes from copper or iron being over-stimulated or surfaced; vitamin C pushes copper out, but if it is iron you need EGCG to remove it (C would make iron worse). It takes about 6 months to get comfortable running the protocol without help.", "timestamp": "68:34", "deeplink": "https://www.youtube.com/watch?v=Y6Amlrw3vsI&t=4114s", "t_seconds": 4114}, {"question": "Can you take other vitamins, supplements or minerals alongside HG7?", "answer": "Jacob never recommends additional supplements. Calcium especially is discouraged (antagonistic to zinc; the goal is to remove tissue calcium, not add it). Extra minerals get a firm no; extra antioxidants (especially rutin) are discouraged because they chelate and unbalance the formula. B vitamins (niacin, B12, even folic acid) are probably harmless to add since they are water soluble.", "timestamp": "69:53", "deeplink": "https://www.youtube.com/watch?v=Y6Amlrw3vsI&t=4193s", "t_seconds": 4193}, {"question": "How would someone know the protocol is finished / that they have enough zinc?", "answer": "It is actually B6 completion he is looking for, not zinc. Every B vitamin has a storage cap except B6, which the body keeps begging for because we are so metal-imbalanced and therefore incredibly B6 deficient. When you can take B6 and it does absolutely nothing (no metals left to balance), that is his theorized point of perfection - probably years away. Benefits accrue along the whole way.", "timestamp": "74:16", "deeplink": "https://www.youtube.com/watch?v=Y6Amlrw3vsI&t=4456s", "t_seconds": 4456}, {"question": "Are there warning signs people should watch for before starting?", "answer": "It is mainly about mentality: go in expecting to be experimental and to feel bad a few times before dialing it in - you may not get it right in the first five tries, and that does not mean it fails. Jacob stresses he is not selling anything and nobody funds him.", "timestamp": "79:59", "deeplink": "https://www.youtube.com/watch?v=Y6Amlrw3vsI&t=4799s", "t_seconds": 4799}, {"question": "How should someone get in touch or start?", "answer": "Join the forum (about $5/month), write a brief synopsis (age, your problems) and ask your question; roughly five or six experienced users plus Jacob (who checks daily) will help. He does not recommend Twitter DMs since his Twitter is his political/venting outlet. Read the dosages and brands very carefully.", "timestamp": "83:03", "deeplink": "https://www.youtube.com/watch?v=Y6Amlrw3vsI&t=4983s", "t_seconds": 4983}, {"question": "During an active kidney stone, is there anything you can take to shift it?", "answer": "Yes - run the protocol WITHOUT the EGCG. A stone means copper got too high (from chelating iron too fast), and that copper is stuck in the kidneys leaching calcium; dropping EGCG stops surfacing more iron and copper. In Jacob's experience the protocol actually breaks stones down, not just prevents them.", "timestamp": "86:28", "deeplink": "https://www.youtube.com/watch?v=Y6Amlrw3vsI&t=5188s", "t_seconds": 5188}, {"question": "Any final thoughts or words of wisdom?", "answer": "It is not easy at first; be patient and experimental. Most people feel something in the first week, maybe the first day, but dosages will not always be identical each time. Nothing he says is FDA-backed. Do not assume that because a single nutrient made you sick in the past it won't work here - these nutrients drain each other and the balance shifts within minutes. Read the forum and make your own decision; he is a theorizer too.", "timestamp": "88:12", "deeplink": "https://www.youtube.com/watch?v=Y6Amlrw3vsI&t=5292s", "t_seconds": 5292}, {"question": "Is the forum always being updated with new tweaks?", "answer": "Yes. Early on the dosages were wildly different because Jacob was impatient and didn't document precise milligrams; the protocol changed a lot over the first 6 months. It changes less now that most people have success, but expect it not to be the same 6 months from now.", "timestamp": "91:10", "deeplink": "https://www.youtube.com/watch?v=Y6Amlrw3vsI&t=5470s", "t_seconds": 5470}], "claims": [{"claim": "Developing the formula took about 10 years of massive trial and error, about four kidney stones, cost him every friend, and drove him bipolar.", "detail": "", "timestamp": "08:24", "deeplink": "https://www.youtube.com/watch?v=Y6Amlrw3vsI&t=504s", "t_seconds": 504}, {"claim": "He was able to fix the self-induced bipolar disorder and shared the formula with his sister, whose paranoia and mania subsided substantially.", "detail": "", "timestamp": "08:40", "deeplink": "https://www.youtube.com/watch?v=Y6Amlrw3vsI&t=520s", "t_seconds": 520}, {"claim": "He can confirm about 100 people are taking it online and estimates possibly up to 500; posted it online in November of last year and
