ropping to 1-3% of former intensity, plus visible muscle gain and rising grip strength. Experiments heavily with EGCG separation and B-vitamin calibration to control nausea. Discovered an EGCG 'fast' (separating EGCG from the rest by 36-48 hrs) kills nausea. Had a kidney-stone scare from using 1-pill-per-symptom calibration.", "notable_effects": ["memory-trap intensity down ~97%", "visible muscle gain", "grip strength 76 to 101", "certain proteins pass undigested", "kidney pain episode"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1012631"}, {"author": "ScrapActivator", "outcome": "positive", "duration": "~2+ months (started roughly early spring 2025)", "summary": "Dramatic functional improvement: could barely survive standing up a couple months ago, now able to dance. Finds HG7 very sensitive to diet - quit carnivore because heme iron in every meal was sabotaging progress (three steps forward, two back); now on lower-iron foods brings in more copper needing #1 calibrations. Doses ~3 days/week due to time limits and calibrates 8-12 hours after dosing. Finished a 100,000mg bag of pure biotin over 16 doses.", "notable_effects": ["went from barely standing to dancing", "no dairy intolerance", "pill tummy", "long 8-12hr calibration tail"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1012238"}, {"author": "Admiral", "outcome": "negative", "duration": "~2-3 weeks on-protocol then stopped, ~3 weeks off at retest", "summary": "Developed B6 toxicity. Started with the wrong supplements (P5P and active B5) for the first two weeks, developed warm feet, adjusted with B6. B6 blood level hit 444 (upper limit 100/125) and barely dropped after stopping. Suspects starting on P5P caused the accumulation. Serum retest ~3 weeks off HG7: ceruloplasmin 199 (150-300), copper 14, free copper 4.1 (<6.3). Some symptoms resolving over time; plans to restart with regular B6 (and wants to add magnesium/B2, which others warned against).", "notable_effects": ["hot/tingling feet and hands", "cracking mouth corners", "dry lips", "dizziness/loss of balance", "weak leg muscles", "lethargy", "accelerated hairloss", "bleeding gums", "eye twitches (later resolved)"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1012278"}, {"author": "ZinkusMaximus", "outcome": "mixed", "duration": "~35+ days (about 1.5 months by early July)", "summary": "High-iron / high-uric-acid type who keeps releasing copper gradually throughout the day, needing repeated molybdenum. Found a good balance for the first few weeks then things shifted: intermittent runny nose (sometimes zinc helps, sometimes moly), sharp pains in head/feet/lower back after vitamin C, and a concerning feeling that his frame was changing for the worse. Uric acid dropped then rose again. Prefers calibrating with extremely small doses (fractions of a tablet / tiny bits of opened EGCG capsule). First day off after 35 days needed repeated small zinc.", "notable_effects": ["gradual copper release all day", "runny nose", "sharp pains after vitamin C", "narrower shoulders/wider hips/water retention", "teeth slightly whiter", "facial/jaw/neck tissue tightening", "hip joints popping", "low-biotin nightmares"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1012156"}, {"author": "MrMark", "outcome": "positive", "duration": "not specified (dialed in by early July)", "summary": "After adopting the new recommended doses, finally dialed in with almost zero nausea and feeling positive changes almost daily. Getting a mild flare-up of a previous shingles area, interpreted as possible healing/virus resurfacing; finds he always needs more EGCG and zinc. Earlier had B6 causing nausea and a gag reflex.", "notable_effects": ["almost zero nausea", "positive changes almost daily", "shingles-area flare-up"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1012419"}, {"author": "Nusian", "outcome": "positive", "duration": "~1 month+", "summary": "Was low-C going in; bleeding gums much improved on 7.5g C/day. Found taking vitamin C straight before EGCG prevents nausea, but any C after EGCG triggers strong whole-body resistance. Later realized molybdenum glycinate was 'overpowered' and driving up his EGCG needs - dropped moly from 7mg to 2mg, which felt like a huge leap forward and made calibrating far more intuitive (13 #3s and 5 #2s to correct, no low-moly symptoms). Still needs 1-1.5g biotin.", "notable_effects": ["bleeding gums much better", "more intuitive calibration after lowering moly", "no low-moly symptoms even at 2mg"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1012502"}, {"author": "stratocaster", "outcome": "mixed", "duration": "several weeks", "summary": "Struggles badly with vitamin C - can barely get a gram down, even 500mg tastes horrendous and causes instant acid reflux and gas; thinking about it makes him feel sick. Post-stack feels ok but flat, brain fog, low energy, then diarrhea (interpreted as low C) that he can't correct. Reduced molybdenum due to high-iron symptoms. HTMA showed extreme aluminum toxicity; switched to Fiji water hoping to bind aluminum.", "notable_effects": ["severe vitamin C intolerance/reflux", "diarrhea", "brain fog", "flat mood", "extreme aluminum on HTMA"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1012370"}, {"author": "Don", "outcome": "positive", "duration": "days (biotin experiment)", "summary": "Used ridiculous doses of pure biotin powder under the tongue for nerve pain and reports feeling better with the nerve pain calmed down though not gone. Taking 50mg doses, 2-3 times on dosing days.", "notable_effects": ["reduced nerve pain from high-dose biotin"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1012129"}, {"author": "Tee4", "outcome": "positive", "duration": "single experiment", "summary": "Tried the HG7 stack with extra protein (4g Master Amino Acid Protein tablets, plus another 4g before bed), reasoning protein feeds detox molecules. Got about 8 hours sleep versus his usual 5-6.", "notable_effects": ["improved sleep (8 hrs vs usual 5-6)"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1012286"}, {"author": "Sparxfly", "outcome": "mixed", "duration": "weeks (still ramping EGCG)", "summary": "Has low stomach acid plus nausea from EGCG a couple hours after the stack; avoided vomiting by eating dry salty biscuits and drinking coke to stimulate digestion. Believes a decent-sized meal and regular calories are needed to keep digestion moving and avoid backlog. Separately notes energy returning and a new desire to protect his time/boundaries.", "notable_effects": ["nausea ~2 hrs after stack", "low stomach acid", "returning energy", "wanting boundaries"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1012243"}, {"author": "tommyg130", "outcome": "mixed", "duration": "early / partial use", "summary": "Self-described high-copper type. Individual nutrients hit him hard: even 100mcg moly is terrible (bloated, gut pain), vitamin C is terribly bitter, B6 clears eye floaters (from excess zinc) but makes his hair fall out, zinc makes hair and bowels good but makes him skinny/frail alone. After first full stack got forehead/temple pressure and cold feet, feeling calm but flat and apathetic.", "notable_effects": ["gut pain/bloating from moly", "hair loss from B6", "forehead/temple pressure", "cold feet", "flat/apathetic mood"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1012317"}, {"author": "aqua906", "outcome": "mixed", "duration": "ongoing (weekly dosing)", "summary": "Finds once-a-week dosing tolerable; taking the stack more often leaves him run down, low energy and needing constant calibration (compares it to overtraining at the gym). Adding magnesium causes liver pain even days off the stack. Says quinoa is the worst food to take the stack with.", "notable_effects": ["liver pain from added magnesium", "run down / low energy when dosing too often", "bad reaction with quinoa"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1012617"}, {"author": "purple pill", "outcome": "mixed", "duration": "trial period, currently paused", "summary": "Was 'flying high' at the beginning of his HG7 trial but poor calibration skills, headaches, throwing up and a kidney-stone scare (from not heeding TRH's warnings) put him off; currently laid off the supps but still believes there is 'very much something to HG7' and is seeking success stories to get re-motivated.", "notable_effects": ["initial high", "headaches", "vomiting", "kidney stone scare"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1012623"}, {"author": "Disrupt4489", "outcome": "mixed", "duration": "several weeks, then a break", "summary": "Takes the stack on an empty stomach then eats later; found more nausea with no-protein salads and less when taking it with fats/eggs/rice. Never really calibrates (waits 30 min and feels better). Once accidentally took a B-vitamin complex hours before a full dose and had zero nausea. Reports the protocol messes up his microbiome and reduces bowel movements (blames vitamin C), and his stool/poo returned to normal on a break after running out of EGCG. Has a sensitive stomach from parasite damage; wants a gentler vitamin C route (buffered/suppository).", "notable_effects": ["nausea varies a lot", "microbiome disruption / fewer bowel movements", "vitamin C hard on gut", "zero nausea after prior B-complex"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1012576"}, {"author": "Orion", "outcome": "mixed", "duration": "~4 months", "summary": "Front-end issue is skin, which is the worst it has been in years and pushes good then bad; closing in on 4 months and plans to plug away to see what 6 months brings. Found 1000mg biotin not more helpful than 500mg, so sticking with 500mg to make supply last.", "notable_effects": ["skin worse than in years", "good-then-bad cycling"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1012285"}, {"author": "Bliss", "outcome": "mixed", "duration": "ongoing", "summary": "Reports releasing copper for hours: after about 6 hrs any continuing #1 symptoms are mild, but often wakes the next day with #1 and/or #2 symptoms. Uses sodium molybdate as the main moly. HTMA (referenced by whatisaging) showed lowered lead. Nausea tends to arrive ~75-90 min after the initial dose.", "notable_effects": ["mild residual #1 symptoms after ~6 hrs", "next-morning #1/#2 symptoms", "lowered lead on HTMA", "nausea 75-90 min post-dose"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1012084"}, {"author": "dave_282", "outcome": "neutral", "duration": "pre-start (planning)", "summary": "New member preparing to start HG7 on a Saturday morning after months of research; has many high-copper symptoms and has already tolerated standalone zinc and moly on a low-vitamin-A diet. Planning to use the updated recommended doses. Has several open questions about substitutions and timing before beginning.", "notable_effects": ["not yet started"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1012093"}, {"author": "whatisaging", "outcome": "positive", "duration": "~7 months (day 205-213)", "summary": "Long-term user amazed to tolerate very high doses without harm. Reports appetite plummeting with 8+ hour satiety after decades of never feeling full, occasional episodes of 'wicked brain speed' (lightness/clarity, could simulate a complex guitar song unplayed for 5 years), and believes HG7 protects his gut from junk food. Uses 'vitamins fixed, minerals flexible' approach. High dose B vitamins reliably cure his nausea.", "notable_effects": ["appetite loss / long satiety", "brain speed episodes", "gut protection from junk food", "B6 toxicity symptoms from over-calibrating with B vitamins", "mild cold caught on protocol"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1013058"}, {"author": "Nusian", "outcome": "positive", "duration": "several weeks + past experience", "summary": "After a 3-day break (waiting on supplements) caused severe listlessness/lack of motivation which he traced to extremely low B6, he switched to a 'standard vitamins + minerals only as needed' approach and reports feeling amazing with phenomenal progress. Realized his pre-HG7 front-end symptoms and his earlier nausea/vomiting were all low-vitamin symptoms from running out of vitamins. Body seemingly can't retain vitamins overnight, starting each day deficient.", "notable_effects": ["feel amazing / phenomenal progress", "vitamins not retained overnight", "no ceiling on vitamin C for him", "persistent low-C runny nose and bleeding gums"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1013103"}, {"author": "ZinkusMaximus", "outcome": "mixed", "duration": "~8 weeks", "summary": "Self-identified fast oxidizer and high-iron (from prior hair tests). Fasted uric acid only fell 0.59 -> 0.54 over 5-8 weeks and stalled; no tangible health changes felt yet. Needs unusually low molybdenum (high-iron pattern) and suddenly needs roughly double the zinc he did in the first two months. Struggles to get off HG7 because low-zinc lower-back pain returns within a day or two of stopping.", "notable_effects": ["uric acid reduction very slow", "endless zinc need / lower back pain", "EGCG relief on tongue for high-iron headaches", "red itchy bumps/patches on forearms", "salt reduces calibration symptom intensity"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1013146"}, {"author": "Hermes", "outcome": "mixed", "duration": "ongoing (started ~June)", "summary": "Describes HG7 as hard work like lifting weights, not a quick fix - vomited many times, lain awake many nights, calls it an emotional roller coaster, but enjoys the calm afterward. EGCG tolerance climbed from one 350mg capsule in early June to 26 capsules (9,100mg) by late July. Reports face looking more symmetrical and skin softer during a dose (noticeable by ~500mg zinc mark), feeling more masculine, and at ease. Loses all vitamins overnight ('Groundhog Day').", "notable_effects": ["face more symmetrical / softer skin", "more masculine, no eye bags", "vitamins wasted overnight", "EGCG causes night kidney pain", "feels wiped out (sauna-like) after 5g biotin"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1013179"}, {"author": "Bruce Wayne", "outcome": "negative", "duration": "2-3 doses (first time)", "summary": "20-year-old athlete with low libido, mucus, fatigue, mild ED. Felt nothing major on day 1. Day 2 brought mild kidney discomfort, slight stinging urination, huge appetite, poor sleep. Day 3 took a full dose without EGCG (self-diagnosed copper-dominant), had sudden violent nausea and vomited twice (phlegm/clear fluid) ~15 min later, then felt strangely calm and played 90 min of soccer as top scorer, but had insomnia all night. Paused the protocol to recover; later agreed he may be too young and should fix lifestyle first.", "notable_effects": ["kidney pressure", "stinging urine", "insomnia / wired at night", "high appetite", "violent vomiting then calm", "'less masculine' feeling"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1012902"}, {"author": "stratocaster", "outcome": "neutral", "duration": "early (single detailed session)", "summary": "Bought a blood uric acid tester to guide calibration. Pre-HG7 uric acid 402 umol/l. Through the session vitamins pushed uric acid up (to 528), and EGCG repeatedly produced erratic swings (up to 673 then down to 421/519), confusing him. Held off molybdenum out of fear of pushing uric acid higher. Ended feeling only mild brain fog but otherwise fine.", "notable_effects": ["uric acid rose on vitamins", "erratic uric acid swings with EGCG", "brain fog", "good mood", "head pressure"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1012681"}, {"author": "Tarmander", "outcome": "positive", "duration": "ongoing (established user)", "summary": "Feels good overall across days and weeks but no longer feels acute nausea or headaches in the 1-2 hour window after dosing. Happy without those symptoms and declines to calibrate to force them. Rarely feels much from the formula now; takes it all at once.", "notable_effects": ["stable good mood", "minimal acute symptoms after dose", "no silent reflux with delayed-release C"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1013163"}, {"author": "Disrupt4489", "outcome": "mixed", "duration": "~1 tub of EGCG / several doses", "summary": "Hasn't felt clearly better after any dose - mostly nausea or nothing, though less tired after sex. Prefers cautious, slow calibration and finds symptoms often pass before he acts, so he usually calibrates nothing. Later realized his zinc gluconate was mostly non-elemental, jumped to 1.7g powder (~238mg elemental) with the full dose and got diarrhea, nausea and vomiting, plus fear/shakiness needing reassurance.", "notable_effects": ["nausea or nothing", "less tired after sex", "diarrhea + vomiting from big zinc dose", "anxiety/fear during reaction"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1013134"}, {"author": "dave_282", "outcome": "positive", "duration": "day 4 (first run)", "summary": "New UK user on a prior low-VA diet. First 3 days only mild nausea in the first hour or two, then felt great by 2pm once absorbed. Day 4 had mild testicular pain which cleared after a small moly+zinc calibration. Plans a 14-day run; main obstacle is EGCG cost. Later discovered he'd been using P5P instead of pyridoxine HCl and got a headache, so paused until he sourced the correct B6.", "notable_effects": ["mild nausea first hour", "felt great by afternoon", "testicular pain (calibrated away)", "headache from wrong B6 form (P5P)"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1013075"}, {"author": "ScrapActivator", "outcome": "positive", "duration": "long-term", "summary": "Reports needs changing widely over time ('a moving target'). Early on had lots of copper and needed lots of molybdenum; then moly made him feel spacey/disconnected so he cut it, and later raised it again for restless legs. EGCG need peaked at 19,000mg in a day early on; now the more he takes the worse he feels, with his easiest-ever dose at 3,100mg/day. Never noticed negative effects from biotin.", "notable_effects": ["needs shift over time", "moly caused spaciness at high dose", "restless legs when moly too low", "no negative effects from high biotin"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1013198"}, {"author": "Orion", "outcome": "mixed", "duration": "~4.5 months", "summary": "Skin still 'going nuts' at 4.5 months but slowly improving; believes dumping copper and iron makes skin worse before better and worries this will scare off people with skin issues. Sleep had been progressing well (long deep-sleep stretches) but then 4 nights of waking wide awake at 4am with no diet/stack changes and only mild nausea.", "notable_effects": ["skin flare improving slowly", "improved deep sleep then 4am waking", "mild nausea some days"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1012974"}, {"author": "Admiral", "outcome": "positive", "duration": "restart, ~1 week half dose", "summary": "Jumped back on HG7 at half dosage to ease in; smooth sailing with only pressure behind the fingernails (mostly thumbs) as a symptom. Uses P5P instead of plain B6 and separately reports plasma B6 toxicity coming down while B1 stays above limit despite never taking B1.", "notable_effects": ["smooth re-entry on half dose", "pressure behind fingernails/thumbs", "eye twitching returned"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1013234"}, {"author": "Sparxfly", "outcome": "positive", "duration": "early (not far in)", "summary": "Early-stage user who views HG7 as a supported rebalancing/removal process, not a quick fix, and emphasizes staying fed with energy (even soda if needed) and working on mindset as toxins surface. Noticed less plaque buildup on teeth on the protocol.", "notable_effects": ["less dental plaque buildup", "impatience with others' slow thinking"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1013144"}, {"author": "aqua906", "outcome": "mixed", "duration": "ongoing (autoimmune patient)", "summary": "Has an autoimmune disease and adopted HG7 cautiously after years of lifestyle changes. Amazed at how fast single nutrients relieve symptoms - an index-finger joint pain vanished within seconds of a pinch of sublingual biotin, and big nausea eased seconds after one EGCG capsule. Biotin made her gag at half-dose (250mg).", "notable_effects": ["near-instant joint pain relief from sublingual biotin", "fast nausea relief from EGCG", "gagging on biotin"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1013194"}, {"author": "ZinkusMaximus", "outcome": "mixed", "duration": "~2 months", "summary": "Ran a high-iron stack (normal for most, very low moly 0.5mg and VC 2g). Did great until suddenly needing tons of zinc with persistent lower back ache; nudging VC to 2.25g and moly to 0.6mg made a major difference, dropping zinc need to ~450mg/day.", "notable_effects": ["persistent lower back ache", "increased nighttime urination", "high zinc demand"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1013281"}, {"author": "ZinkusMaximus", "outcome": "positive", "duration": "~2 months+", "summary": "Grip strength up from 48kg to 56kg over two months and a week on HG7 with no real exercise beyond a lightly active lifestyle.", "notable_effects": ["grip strength increase 48kg to 56kg"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1013375"}, {"author": "ZinkusMaximus", "outcome": "mixed", "duration": "~1 month", "summary": "Increasing VC and moly little by little felt great and helped lower back pain (suspected kidney calcification), but ran into new issues: increased hunger, worse sleep, teeth turning translucent/off-color, recurring lower back pain and bleeding gums as doses climbed. Long ongoing calibration battle.", "notable_effects": ["translucent/yellow teeth", "bleeding gums", "recurring lower back pain 4-5pm", "poor sleep", "increased hunger", "puffy bloated face"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1013490"}, {"author": "whatisaging", "outcome": "positive", "duration": "since February (~6 months)", "summary": "Grip strength climbed from 76 lbs (34kg) in February to 115 lbs (52kg), averaging ~4.91 lbs/month; charted data. Also reports testosterone bloodwork increased and some hair color changing from black to red-brown in armpit.", "notable_effects": ["grip strength 76 to 115 lbs", "testosterone bloodwork increase", "hair color changing black to red-brown"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1013380"}, {"author": "Hermes", "outcome": "positive", "duration": "unspecified ongoing", "summary": "Reports face looks more symmetrical/balanced and skin softens by the time he hits the 500mg zinc mark; feels at ease, believes overtaxed adrenals calmed. Uses aggressive 'push the process' calibration, taking everything until he gags, aiming to get max zinc in within 3 hours.", "notable_effects": ["more symmetrical/balanced face", "softer skin", "feels relaxed/at ease", "cheese cravings disappeared after upping B6", "foamy urine after formula"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1013281"}, {"author": "Vandivier", "outcome": "negative", "duration": "first day / new starter", "summary": "First time doing the standard dose exactly: nausea, sinus headache, gassy, bloated, shaky hands, diarrhea. Follow-up EGCG/moly dose led to acidic vomiting. Later still had yellow watery diarrhea and leg/foot cramping.", "notable_effects": ["nausea", "sinus headache", "bloating", "shaky hands", "diarrhea", "acidic vomiting", "leg and foot cramping", "fogginess"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1013324"}, {"author": "dave_282", "outcome": "positive", "duration": "14 days (with a few break days)", "summary": "Completed planned 14 days despite hours-long headaches early on requiring break days. Last 4 days felt really good: good concentration, lots of energy, lost a bit of weight. Upping B vitamins to new doses and EGCG from 2240mg to 2560mg made a big difference. Notably could take 250mg zinc daily without vomiting (used to feel sick on 60mg).", "notable_effects": ["hours-long headaches early", "improved concentration", "high energy", "slight weight loss", "zinc tolerance greatly improved"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1013437"}, {"author": "Orion", "outcome": "mixed", "duration": "5 months", "summary": "5 months on stack but skin still slow to clear/heal (upper chest, back, arms) with buckets of facial oil though face is clear; freckles and moles disappearing from those areas. Increased B5 to combat sebum overdrive.", "notable_effects": ["slow skin clearing/healing", "excessive facial oil/sebum", "freckles and moles disappearing"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1013467"}, {"author": "Nusian", "outcome": "positive", "duration": "since protocol update (days)", "summary": "Tried the updated protocol the day it was posted and did it once a day since; likes it best so far. Higher EGCG and zinc, lower C works well; calibration was easy and not guesswork. Still adds a couple hundred mg extra biotin.", "notable_effects": ["feels good/best so far", "calf cramps on higher B6 version requiring biotin"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1013550"}, {"author": "charlie", "outcome": "positive", "duration": "restart", "summary": "Restarted HG7 after bringing calcium up to ~2000mg/day (mostly from food); now handling it a lot better with no issues, generating incredible heat and energy. Credits calcium for tolerance.", "notable_effects": ["much better tolerance", "incredible heat and energy generation"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1013515"}, {"author": "tommyg130", "outcome": "mixed", "duration": "months on protocol", "summary": "Months in but still needs 500+ mg zinc daily. Anything that liberates copper turns his teeth more yellow; for him high zinc calms the copper dump more than moly. Reports symptom-to-nutrient correlations consistently match Heisenberg's.", "notable_effects": ["yellow teeth from copper liberation", "high ongoing zinc need", "foamy urine tied to EGCG"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1013628"}, {"author": "BRENBAIL", "outcome": "mixed", "duration": "restart after 1-month break", "summary": "Took a month off then restarted at 1/2 dosages; still gets mild manageable nausea. Restarted because TSH rose to 3.55 while still at 60% thyroid med reduction, believing HG7 was helping thyroid. Also has slight gallbladder pain (predating restart, not calibration-related) but no other low-thyroid symptoms.", "notable_effects": ["mild nausea", "TSH rise to 3.55", "gallbladder pain (predating)"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1013548"}, {"author": "Disrupt4489", "outcome": "mixed", "duration": "long-term (accidental low-zinc), plus low-dose approach", "summary": "Took the protocol for a long time accidentally with almost no zinc and no obvious side effects. A recent full dose caused bad puking and diarrhea until empty, followed by a dull lower back ache. Later shifted to low-dose zinc, biotin and some EGCG which stopped his hair loss.", "notable_effects": ["puking and diarrhea on full dose", "lower back ache", "hair loss stopped on low-dose"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1013574"}, {"author": "stratocaster", "outcome": "negative", "duration": "new starter", "summary": "On a listed stack feels very flat/lethargic with mental confusion, slight loss of balance/clumsy hands, pressure behind eyes, unconsciously holding breath, and slight nausea. Unsure if low zinc or high iron.", "notable_effects": ["lethargy/flatness", "mental confusion", "loss of balance", "pressure behind eyes", "breath-holding", "nausea"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1013664"}, {"author": "Hidden49", "outcome": "negative", "duration": "unspecified", "summary": "Reports HG7 did not work for him: copper is deep inside the liver and hard to access while too much surface iron gets in the way, causing issues with zinc and molybdenum. Removing red meat/bread improves workouts/physique but pushes him into a high-copper state. EGCG works better with sun/vitamin D (lowers hepcidin).", "notable_effects": ["HG7 ineffective for him", "cracked-out energy from bioavailable iron", "copper dumping from liver flushes/TUDCA"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1013598"}, {"author": "Tarmander", "outcome": "positive", "duration": "concurrent with HG7", "summary": "Testing older Ray Peat remedies alongside HG7: juiced/drank ~2.5 lbs potatoes/day for a week and a half; sleep better, muscles stronger, and resistant starch cut cravings for sugar/alcohol/nicotine. Believes HG7 enables other interventions to work. Testosterone bloodwork increased.", "notable_effects": ["better sleep", "stronger muscles", "reduced sugar/alcohol/nicotine cravings", "testosterone increase"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1013478"}, {"author": "whatisaging", "outcome": "mixed", "duration": "8 months", "summary": "Roughly 8 months in and still going. Oxidation markers improved (already better by month 4), but Na/K ratio didn't budge, matching persistent deep fatigue that hasn't resolved. Reports keeping many benefits after stopping for 2 weeks. Never fully mastered the taste test, and liver/pancreas/kidneys feel worse when he messes up the ratios.", "notable_effects": ["improved oxidation markers", "unchanged Na/K ratio", "persistent deep fatigue", "grip strength improvement", "testosterone increase", "reported ~1 inch height gain", "liver/pancreas/kidney discomfort when ratios wrong"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1013970"}, {"author": "ZinkusMaximus", "outcome": "positive", "duration": "~3 months (almost 3 months / 3 months)", "summary": "Mineral-balancing (ARL) practitioner and self-described very fast oxidizer trying HG7 alongside his NB background. About 3 months in: not life-changing but encouraged to continue. Had to start with very low VC and molybdenum due to fast-oxidizer sensitivity. Went through a symptom shift around 2 months in that took ~2-2.5 weeks to rebalance.", "notable_effects": ["water retention more consistently down", "uric acid noticeably reduced", "grip strength up substantially", "sleeps and feels a little better", "low-zinc symptoms and teeth looking poor at higher B6 (resolved by lowering B6)"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1013982"}, {"author": "gilbert90", "outcome": "mixed", "duration": "~2 days (started Aug 22, first doses)", "summary": "Beginner on his first day/second day of HG7. First full dose caused severe symptoms: dizziness/vision-focus loss, panic attacks, racing heart. Facial puffiness of 15+ years went down slightly after first dose. Second day brought extreme anxiety, dramatic hair thinning (felt like 30% density lost overnight), then brain fog and dizziness through a calibration roller-coaster. Found the experience scary and hard to reconcile with holding a full-time job.", "notable_effects": ["dizziness with transient vision-focus loss", "panic attacks / racing heart", "reduced facial puffiness after first dose", "less water retention", "extreme anxiety", "severe hair thinning overnight", "brain fog", "feeling drunk/dizzy", "facial and stomach swelling (histamine-like reaction to polyphenols/EGCG)"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1014004"}, {"author": "Admiral", "outcome": "negative", "duration": "a few weeks (another round)", "summary": "Restarted HG7 a few weeks ago at half the original dose with pure ingredients and nothing added. B6 still causing neuropathy symptoms despite trying all recommended calibrations. Believes he lacks non-HG7 minerals/vitamins (electrolytes, magnesium) - recent hair tests showed low magnesium, potassium and sodium - which prevent success, but doesn't want to add to HG7.", "notable_effects": ["persistent B6-induced neuropathy symptoms", "low magnesium/potassium/sodium on hair test"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1013867"}, {"author": "thefelixarnold", "outcome": "negative", "duration": "months (one of the earliest long-term test subjects)", "summary": "Formerly the protocol's biggest advocate (posts also under 'arnold01'), now strongly against it. Describes an initial 'duration paradox' good phase followed by crushing kidney and liver pain. Says EGCG made him extremely anxious, estrogenic, and an insomniac - lying in bed popping zinc/EGCG/molybdenum just hoping to sleep. Believes the formula buries iron/copper in the liver rather than removing it, and warns it will damage kidneys/liver long term. Now recovered a good chunk using psyllium.", "notable_effects": ["initial temporary improvement (duration paradox)", "severe kidney and liver pain", "EGCG-induced anxiety, estrogenic effects, insomnia", "molybdenum raised uric acid / near-kidney damage after sprints + bile dump", "recovery after months of high psyllium"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1013872"}, {"author": "Hidden49", "outcome": "negative", "duration": "tried months ago, gave up; brief recent single-calibration test", "summary": "HG7 never really worked even with lower molybdenum; gave up long ago. On HG7 his zinc never worked properly and he still felt flat/empty and low-energy after taking zinc. A friend's success with lactoferrin led him to retry it, needing 150mg zinc and ~12g VC. Recently tried a standalone '#3' molybdenum+EGCG calibration: felt relaxed same day but next day felt very copper-deficient, flat, empty, with pale stools; body didn't want zinc or C. Later a B6+biotin calibration made him feel really good.", "notable_effects": ["zinc never working properly on HG7", "persistent flat/empty low-energy feeling", "relaxation then next-day copper-deficiency (flat, empty, pale stools) from moly+EGCG", "feeling good after B6+biotin", "EGCG inhibiting bile / worsening vitamin A metabolism (attributed to CYP450 inhibition)"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1013843"}, {"author": "Deadpool", "outcome": "negative", "duration": "months on HG7, now off", "summary": "Says high-dose supplements, especially molybdenum, wrecked him for months. Now off all big supplement doses and reports feeling a lot better than months ago. Believes HG7 slows detox and stores metals in the liver like other megadose protocols, and that the body calibrates better when you stop putting imbalancing substances into it.", "notable_effects": ["felt wrecked for months from megadoses/molybdenum", "improved after stopping"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1014049"}, {"author": "purple pill", "outcome": "mixed", "duration": "several months (on and off)", "summary": "Felt awesome the first week or two, then repeatedly 'chased the magical dragon' without recapturing it. Now suspects he was simply badly depleted in B6 and zinc at the start, which explains the early good feeling. Skeptical the protocol delivers the promised miraculous results, noting people are still calibrating with teething issues 8 months in.", "notable_effects": ["felt awesome first 1-2 weeks", "unable to recapture initial effect afterward", "suspected initial B6/zinc depletion driving early benefit"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1013990"}, {"author": "PadrePio", "outcome": "negative", "duration": "not specified (long enough to test and abandon)", "summary": "Tried the protocol and observed a negative effect. Threw in the towel when asked to keep taking something he had already observed to harm him. Says he shared dosages long ago; was told to calibrate with molybdenum and B6, which did not help, then was accused of dishonesty. Describes the interaction as gaslighting/narcissistic.", "notable_effects": ["observed negative effect", "no improvement from moly+B6 calibration"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1014063"}, {"author": "ZinkusMaximus", "outcome": "positive", "duration": "3+ years on Nutritional Balancing (context/comparison)", "summary": "Comparison experience with Nutritional Balancing (ARL/Eck method), not HG7 itself: incredibly sick since birth, could only eat raw meat for ~7 years and was still degenerating; a little over 3 years on NB saved him. Now eats a dozen or so foods, is unusually strong, thinks clearly, decent energy, most symptoms gone. Trying HG7 as a faster-acting experiment, especially for hoped-for bone/structural growth.", "notable_effects": ["life-saving recovery from lifelong illness over 3+ years", "expanded diet", "strength and mental clarity gains", "facial/structural aesthetic shifts"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1013852"}, {"author": "thefelixarnold", "outcome": "mixed", "duration": "long-term (first and longest-lasting test subject) before switching off", "summary": "First and longest-lasting HG7 test subject who was once optimistic but turned critical of the protocol and author. Says he still has a good chunk of excess copper and now controls copper symptoms, kidney and liver pain by taking soluble fiber (psyllium husk) instead. Believes EGCG is estrogenic and anti-androgenic.", "notable_effects": ["still has excess copper", "psyllium husk eliminated copper symptoms, kidney and liver pain", "believes EGCG is estrogenic/anti-androgenic"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1014111"}, {"author": "aqua906", "outcome": "positive", "duration": "observer/critic of arnold", "summary": "Believes HG7 jumpstarted arnold's health and gave him the capacity to experiment with other protocols; broadly supportive of the protocol's effect on arnold.", "notable_effects": ["credits HG7 with jumpstarting arnold's health"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1014132"}, {"author": "PadrePio", "outcome": "mixed", "duration": "attempted protocol, then stopped", "summary": "Attempted HG7 in good faith following recommendations; it produced some positive effects but he could not tolerate the vitamin C load, which gave him horrible GERD. Neither increased dosages nor different ratios resolved his negative effects. Has complex health history (sleep apnea, adrenal dysfunction, breathing issues) and declines to reattempt. Considering an HTMA.", "notable_effects": ["some positive effects", "horrible GERD from vitamin C load", "could not tolerate vitamin C"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1014163"}, {"author": "ZinkusMaximus", "outcome": "mixed", "duration": "~3 months on HG7, plus ~4 years mineral balancing", "summary": "ARL mineral balancing practitioner testing HG7 as being under the mineral balancing umbrella. Energy is decent on HG7, about the same as MB overall but slightly better recently. Sees pros and cons to both HG7 and MB. Takes very large doses of zinc and molybdenum (feels severely deficient). Had side effects (lower back pain, teeth issues, sleep issues, gum bleeding, fatigue). Reports improved tanning/mineral balance and physical appearance changes.", "notable_effects": ["decent energy, slightly better recently", "raising molybdenum fixed copper building in kidneys", "improved tanning, never burns", "rapid changes in physical appearance"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1014149"}, {"author": "whatisaging", "outcome": "positive", "duration": "~4-5 months", "summary": "Reports major improvements. Had deep fatigue before (would nap standing up after 30 min of basketball); now can run a straight mile. Fatigue worsened in month 2 due to low B6 but resolved and hasn't returned. Oxidation markers improved within first 4-5 months. Reports grip strength gains, increased testosterone, and ~half inch height increase versus his measurement at age 25. Switching vitamin C from powder to capsules raised EGCG tolerance dramatically (from ~1400mg to 8000mg/day without nausea).", "notable_effects": ["fatigue improved, can run a mile", "oxidation markers improved", "grip strength increase", "testosterone increase", "~half inch height increase", "higher EGCG tolerance with capsule vitamin C"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1014153"}, {"author": "Hidden49", "outcome": "mixed", "duration": "tried months ago (failed), then breakthrough over last ~3-5 days with modified version", "summary": "Full standard HG7 never worked for him and he believes it dumped a huge iron load that messed him up for days while depleting copper and making him socially anxious with no motivation. After spending a month+ building up vitamin C tolerance and using a self-modified sequence (EGCG+molybdenum, then biotin, then B6, then more molybdenum), he had a major breakthrough: biotin working strongly, feeling amazing, achieving the 'zinc hormone glow' effect, better breathing, and improved appearance. Argues standard doses are unsafe for high-iron/gut-pathogen/low-ceruloplasmin individuals who need to clear iron first before zinc.", "notable_effects": ["full protocol dumped iron, depleted copper, caused social anxiety", "breakthrough with modified sequence", "achieved zinc hormone glow", "better/faster breathing (higher oxidation)", "more symmetrical face, hunter eyes, lighter hair"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1014232"}, {"author": "gilbert90", "outcome": "positive", "duration": "just started (took new HTMA one week before starting)", "summary": "Started HG7 recently at first with roughly the author's ratio but 1/10 dose. Initially got anxiety without magnesium (has calcium shell on hair test indicating magnesium need); magnesium fixed anxiety instantly. After author's advice to raise biotin, molybdenum and EGCG, he got zero anxiety, felt very relaxed like a chill-pill, no magnesium needed. Molybdenum instantly fixed anxiety where psyllium did nothing. Plans a follow-up hair test in 3 months.", "notable_effects": ["molybdenum instantly fixed anxiety", "raising biotin/moly/EGCG eliminated anxiety without magnesium", "felt relaxed like a chill-pill", "sharper brain from B5"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1014361"}, {"author": "Youngboy", "outcome": "neutral", "duration": "brand new, first dose", "summary": "18-year-old college freshman, first-time user researching brands and cost-effective options. Took first dose (Zinc 250mg, B6 250mg, B5 1000mg, B7 1.2mg, C 5g, EGCG 2700mg, Moly 7mg) with fruit. Felt roughly the same, maybe slightly more attentive, some internal organ activity, brief uneasy swelling sensation, no nausea. Fell asleep quickly (20 min vs usual 45+). Had pre-existing symptoms he hopes to resolve (brain fog, fatigue, knee pain, gyno, etc.).", "notable_effects": ["fell asleep faster (20 min)", "slightly more attentive", "internal organ activity", "no nausea", "green/darker stool next day"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1014405"}, {"author": "Admiral", "outcome": "mixed", "duration": "on and off, back on for a few weeks", "summary": "Believes in the protocol but keeps hitting a B6 sensitivity wall: after about 10 days on standard doses, neuropathy symptoms increase again. High B6 dose increases his B6 symptoms so he sometimes takes half dose. Also experiencing waking wide awake in the middle of the night/morning. Grateful for the author's work.", "notable_effects": ["neuropathy symptoms increase after ~10 days", "B6 sensitivity", "middle-of-night wakefulness/insomnia"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1014207"}, {"author": "Tarmander", "outcome": "positive", "duration": "since Feb 1st (~6-7 months)", "summary": "On the formula since Feb 1. Recent blood test (for life insurance) showed one liver enzyme elevated but others fine, and kidney numbers better than in years. No melting of liver/kidneys. Worst side effect is a little dizziness ~1 hour after taking, which goes away fast. Took a month or two to calibrate and has changed very little since. Cautions others against pushing too hard.", "notable_effects": ["kidney numbers best in years", "one liver enzyme slightly elevated", "mild dizziness ~1 hour post-dose"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1014368"}, {"author": "purple pill", "outcome": "mixed", "duration": "tried HG7 at least once (fafo)", "summary": "Reports that on a prior HG7 attempt his urine went crystal clear for about a week along with major back pain that may have been kidney stones. Was taking a good amount of zinc but only half-dose molybdenum (gagged at the thought of it); suspects copper stacked up in the kidneys because of the low molybdenum.", "notable_effects": ["crystal clear urine for a week", "major back pain / possible kidney stones", "suspected copper buildup in kidneys from low molybdenum"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1014359"}, {"author": "Nusian", "outcome": "mixed", "duration": "ongoing, calibrating", "summary": "Struggles to sense what is happening in his body but developed a manual palpation technique to calibrate. Discovered he needed much more molybdenum than he'd been taking, and more vitamin C alongside it since the extra molybdenum brought back dry skin on his hands.", "notable_effects": ["low-EGCG headache is fleeting/hard to detect", "right-side pain radiates down hip/thigh", "extra molybdenum caused dry hands, needing more vitamin C"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1014435"}, {"author": "Disrupt4489", "outcome": "neutral", "duration": "ongoing", "summary": "Coordinating hair tests for redundancy. Tried molybdenum amino acid chelate, taking 2 pills less than normal dose thinking chelate would be stronger; it wasn't enough. Also noted from earlier partial-stack experience that a B vitamin complex helped fix nausea twice.", "notable_effects": ["chelate at reduced dose was insufficient", "B vitamin complex fixed nausea twice on partial stack"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1014348"}, {"author": "ScrapActivator", "outcome": "positive", "duration": "several months plus a 25-day pause", "summary": "Long journey through multiple rebalancing stages (high copper panic/anxiety, then low copper brain fog, then months of dominant iron needing huge EGCG, then iron dropping and dosing easing). After ~6 weeks on the June 15 low dose (B6 125mg) calibrations dropped from every 5-15 min to hourly, bathroom issues and insomnia resolved. Took 25 days off to move with no withdrawal and few returning symptoms; now scaling to 75% of full dose with every supplement finally within recommended ratio for the first time. Reports it does get easier eventually even for a hard calibrator.", "notable_effects": ["calibrations dropped from every 5-15 min to hourly", "insomnia vastly improved", "bathroom issues resolved", "more physical labor capacity", "faster recovery and better stress handling", "gum pain/swelling fixed by increasing C"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1014487"}, {"author": "gilbert90", "outcome": "mixed", "duration": "unspecified (several weeks)", "summary": "First and only full dose made him feel like dogshit (anxiety, spaceyness) but the next day years-long water retention was almost gone, face and body very defined, didn't recognize himself. Has taken 40% of Heisenberg's dose ever since but edema hasn't dropped like that first day. Plans to slowly increase toward full dose. Finds calibration scary.", "notable_effects": ["water retention almost gone after one full dose", "facial/body definition", "anxiety on full dose", "spaceyness on full dose"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1014505"}, {"author": "gilbert90", "outcome": "positive", "duration": "unspecified", "summary": "Only two uncomfortable symptoms from HG7: anxiety/panic attacks and brain fog/spaceyness (felt almost drunk). Molybdenum fixed anxiety in ~60 seconds but flipped him to spacey/drunk feeling just as fast; EGCG then cleared the spaceyness. Interprets anxiety as high copper and spaceyness as low copper.", "notable_effects": ["anxiety/panic attacks (high copper)", "brain fog/spaceyness (low copper)", "molybdenum fixed anxiety in 60s", "EGCG cleared spaceyness"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1014488"}, {"author": "gilbert90", "outcome": "positive", "duration": "unspecified", "summary": "Guitar playing significantly better after starting HG7 with more coordinated hands, despite 20+ years of playing.", "notable_effects": ["improved fine motor coordination", "better guitar playing"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1014567"}, {"author": "stratocaster", "outcome": "mixed", "duration": "since ~January 2025 (roughly 1 in 3 days)", "summary": "Rough time on earlier protocols, later protocols suited him much better. Long list of improvements over months but reports balancing the formula is tricky and taste-test isn't always reliable. Believes being extremely toxic makes calibration harder early on. Had sky-high aluminium and cadmium on HTMA and is curious about toxic metal removal.", "notable_effects": ["overall energy increase", "reduced visual snow/eye floaters", "back acne cleared", "mucocele gone", "jock itch gone after years", "improved coordination", "better glute/muscle activation", "fruits and vegetables more palatable", "heartburn gone", "more satiated after eating", "hard to balance early", "unreliable taste test"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1014583"}, {"author": "stratocaster", "outcome": "positive", "duration": "since ~January 2025", "summary": "Reports guitar legato and hand synchronisation are better on HG7, agreeing with gilbert90.", "notable_effects": ["better legato", "better hand synchronisation"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1014574"}, {"author": "MrMark", "outcome": "negative", "duration": "unspecified", "summary": "Took a large dose, felt totally fine for ~2 hours then became nauseous with a coppery taste. As soon as he picked up the molybdenum to calibrate he had urgent, sudden vomiting. Guesses his iron was already too high and molybdenum would have made it worse.", "notable_effects": ["delayed nausea", "coppery taste", "sudden projectile vomiting on attempting moly calibration"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1014480"}, {"author": "MrMark", "outcome": "positive", "duration": "unspecified", "summary": "After switching to the new TRH ratio, dropping C from 6g to 5g and bumping biotin to 1800mg, he was 'totally good.' Says the new version is pretty damn close to perfect for him, and vitamin C on the lower end gives less nausea and calibration.", "notable_effects": ["resolved prior nausea/heartburn", "less need for calibration on lower C"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1014731"}, {"author": "ZinkusMaximus", "outcome": "positive", "duration": "3+ months", "summary": "Believes he is extremely iron toxic; uric acid stayed high after 3 months even while substantially increasing EGCG. Ran EGCG at ~2x the recommended ratio (half dose of everything else) for a week and felt calmer, saw teeth improvements, and finally began getting low-zinc symptoms - which he read as iron clearing off receptor sites making room for zinc. After clearing the iron backlog the recommended ratios felt good at ~40% dose.", "notable_effects": ["felt calmer with high EGCG", "small teeth improvements", "eventual onset of low-zinc symptoms (back pain, sadness)", "persistently high uric acid", "lower back aches worsened by zinc, helped by moly"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1014700"}, {"author": "Crab", "outcome": "negative", "duration": "a few months, on and off", "summary": "Good initial results but could never stay balanced. A full standard dose felt mostly fine (mild nausea fixed by one calibration), but a day or two later he'd wake up badly hypothyroid (crunchy swallowing, rapid hair thinning, eyebrows burning off) plus scattered rapidly-changing symptoms. Taste test gives no clear signal when not actively dosing, so he feels he's flying blind. Suspects his Carlson molybdenum glycinate behaves differently; is more of a high-copper type per hair tests.", "notable_effects": ["delayed hypothyroid symptoms 1-2 days after dosing", "rapid hair thinning", "eyebrows disintegrating", "kidney pain, numb mouth, tooth pain, bloating, cold hands, sore arms, neck pain, headache, anger, depression", "biotin now tastes like soap"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1014522"}, {"author": "Bliss", "outcome": "mixed", "duration": "unspecified (ongoing, with stop attempts)", "summary": "Experiences strong rebound symptoms starting the second day after stopping HG7: increased hair loss, scratchy throat, tooth sensitivity, interrupted sleep, constipation, and severe mental symptoms (obsessive thoughts, panic-like anxiety, despair). Theorizes B6 persists in muscle stores (bound to glycogen phosphorylase) and keeps unearthing copper/metals without the supporting nutrients to clear them. Taking just biotin+B5 caused a headache not fixed by #3. Not smooth sailing on the stack either.", "notable_effects": ["day-2-off rebound: hair loss, scratchy throat, tooth sensitivity, insomnia, constipation", "obsessive thoughts and panic-like anxiety off stack", "nicotinic acid relieves mental symptoms"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1014541"}, {"author": "PadrePio", "outcome": "mixed", "duration": "unspecified (returning user)", "summary": "Previously developed horrible GERD from HG7 (from vitamin C powder at 5-6g) but had a few moments of feeling amazing. On retrying the new ratio at half dose with everything in capsules taken at once, he had no GERD but felt nothing at all, good or bad, on two attempts. Concludes vitamin C capsules solve the GERD and that putting everything in capsules made the difference.", "notable_effects": ["prior horrible GERD from C powder", "no GERD with capsule C", "felt nothing good or bad on new capsule half-dose"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1014829"}, {"author": "Youngboy", "outcome": "neutral", "duration": "unspecified (early)", "summary": "Took the dose with a big meal and felt nothing at all except a B6 aftertaste that made him gag when thinking about it; slight intermittent nausea that wasn't worsening. No calibrations needed, suspects ratio works well for him. Light brown/tan floating stool made him wonder if he needed more zinc. Primarily motivated by weight loss / water retention (210lb, ~15% BF).", "notable_effects": ["B6 aftertaste / gag reflex", "mild non-worsening nausea", "light brown floating stool", "no calibrations needed"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1014557"}, {"author": "Disrupt4489", "outcome": "positive", "duration": "a few doses", "summary": "Reports HG7 seems to have cured his POIS (post-orgasmic illness syndrome) after just a few doses that included more zinc. Very happy with the result.", "notable_effects": ["POIS apparently cured", "zinc/EGCG nausea managed with 1/4 dose and split EGCG"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1014825"}, {"author": "whatisaging", "outcome": "positive", "duration": "early doses", "summary": "Felt nothing on the first two doses; only on dose #3 did the positives kick in. Interprets it as his 'backend' needing two days to unclog before the 'front end' felt benefits. Notes even very small (6%) doses and small dietary changes cause noticeable symptoms, so believes blood-level changes are felt while organ-level changes stay invisible.", "notable_effects": ["no effect first two doses", "positives from dose #3", "small doses still noticeable"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1014846"}, {"author": "Nusian", "outcome": "positive", "duration": "a few days on new dosages", "summary": "First time really feeling the 'soothing' feeling described in the first post - head feels lighter and floating with clarity. On the low end (220mg zinc, 4g C) but has to calibrate EGCG up to ~3260mg most times. Surprised that with lower C the dry skin on the backs of his hands/fingers cleared up rapidly. Uses molybdenum glycinate powder at just over 2mg (needs to calibrate extra below 2mg).", "notable_effects": ["soothing/light-headed clarity", "dry skin on hands cleared rapidly on lower C", "needs EGCG calibration up to 3260mg"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1014760"}, {"author": "Hermes", "outcome": "mixed", "duration": "a month or more", "summary": "Spent over a month trying to get high-iron symptoms under control - never knew he had this much iron and had previously received iron shots for low ferritin. Drastically lowered molybdenum (used to crave it, now averse), pushed EGCG to a zinc:EGCG ratio of 1:23-1:27, still battling insomnia. Overshot zinc early (1000mg+), now on standard dose; sadness/depression are his signs of needing zinc. Has a blood donation appointment to help dump iron.", "notable_effects": ["persistent high-iron symptoms", "insomnia", "sadness/depression as low-zinc signal", "aversion to moly after lowering"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1014865"}, {"author": "HumanLife", "outcome": "positive", "duration": "2-3 months, used inconsistently, then off several months", "summary": "Felt energetic when starting out (then it tapered off), with vastly improved digestion letting him eat a lot without his usual lethargy. Reports measuring 181cm in three 2025 film productions versus 180cm in 2023-2024, attributing a possible 1cm height gain to the protocol. Wants to restart and asks about prioritizing brands.", "notable_effects": ["initial energy boost", "vastly improved digestion", "possible ~1cm height increase", "reduced lethargy while eating more"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1014897"}, {"author": "Orion", "outcome": "neutral", "duration": "unspecified", "summary": "Stopped HG7 for a couple of days and returned to a nice baseline, contrasting with others who report bad rebound symptoms on stopping.", "notable_effects": ["no bad rebound", "returned to nice baseline after 2-day break"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1014544"}, {"author": "aqua906", "outcome": "mixed", "duration": "unspecified, with a 2-3 week break", "summary": "Had a break because he couldn't balance properly for a long time; when he did balance he felt good and didn't want to disturb it. Encouraged by reports the new ratios are good, plans to resume starting from a 100mg B6 capsule (~0.4x ratio). Previously taking it after a fruit meal ended in liquid diarrhoea.", "notable_effects": ["felt good when balanced", "difficulty balancing", "liquid diarrhoea when taken after fruit meal"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1014681"}, {"author": "purple pill", "outcome": "mixed", "duration": "unspecified", "summary": "Got good effects from p5p and zinc for a while but other symptoms flared up. Headaches and backache were the biggest problem at the start no matter how much EGCG and zinc he took. Projectile vomited a couple of times on the old formula. Awaiting a biotin refill to retry the new dosages.", "notable_effects": ["headaches and backache at start", "projectile vomiting on old formula", "symptom flares despite EGCG/zinc"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1014525"}, {"author": "Hidden49", "outcome": "positive", "duration": "unspecified (ongoing)", "summary": "Doing his own version of the protocol and says it's going well; claims that when you get zinc working properly people start sucking up to you. Reports staff at his local organic grocery store who'd seen him for months suddenly introducing themselves and shaking his hand. Attributes this to hormones (progesterone) being switched on.", "notable_effects": ["improved social magnetism / people friendlier", "attributes to hormonal changes"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1014629"}, {"author": "ZinkusMaximus", "outcome": "mixed", "duration": "~1 week", "summary": "Ran very high EGCG at ~2x ratio with half dose of everything else to clear a suspected large iron backlog; had zero low-zinc symptoms initially and mostly high-copper, calibrating with lots of moly and no zinc. After about a week of very high EGCG finally started getting low-zinc symptoms (low back pain, sadness relieved by zinc), which he interpreted as iron clearing off receptor sites. Acknowledged he can't sustain the high-EGCG ratio long-term (kidney stone / zinc-deficiency risk).", "notable_effects": ["zero low-zinc symptoms at first", "high-copper symptoms", "onset of low-zinc symptoms after a week", "back pain / sadness relieved by zinc"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1014866"}, {"author": "Admiral", "outcome": "mixed", "duration": "unspecified (returning after break)", "summary": "Struggled with high B6 levels and neuropathy that the protocol didn't resolve; taking only molybdenum and biotin for 3 days to lower B6 didn't help and extra moly gave headaches (relieved by EGCG). Later his neuropathy subsided a bit and he wants to hop back on but with older ratios where B6 isn't so high, feeling his body is overflowing with B6 and unable to take 250mg. Previously tolerated 150mg B6 in a TEI Mini-plex B formula that had cofactors.", "notable_effects": ["persistent neuropathy", "high B6 levels", "extra molybdenum caused headaches (fixed by EGCG)", "neuropathy later subsided somewhat", "pelvic pain (unclear link)"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1014835"}, {"author": "gilbert90", "outcome": "mixed", "duration": "unspecified", "summary": "Took a couple days off after running out of molybdenum; hair stayed thick during the break, but taking the exact same ratio/dose as before made his hair feel thin again and caused anxiety needing 1.5mg moly to calibrate. Only difference was taking biotin first instead of last, hurriedly, over ~2 minutes. Confused why identical dosing produced a different reaction.", "notable_effects": ["hair felt thin after dose", "anxiety needing moly calibration", "inconsistent reaction to identical dose"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1014871"}, {"author": "ZinkusMaximus", "outcome": "positive", "duration": "unspecified", "summary": "Getting next to no low-zinc symptoms and mostly high-copper; molybdenum helps but he needs a decent amount. Not taking much zinc - even a small increase triggers iron or copper symptoms. Suspects a lot of iron and copper still to clear beyond what's blocking receptors.", "notable_effects": ["high-copper dominant", "small zinc increases trigger iron/copper symptoms", "feels great overall"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1014617"}, {"author": "ZinkusMaximus", "outcome": "mixed", "duration": "~3.5 months (biotin taken 3.5 months)", "summary": "Teetering between mild copper/iron/low-zinc symptoms; persistent lower back pain that only moly partly relieved, weird throat lump, insomnia and nightmares when lowering EGCG/VC. Eventually found relief by keeping EGCG very high and lowering B6; described feeling 'like a demigod' during a high-EGCG stretch and grateful for a break in constant back pain.", "notable_effects": ["throat lump", "lower back pain", "insomnia", "nightmares", "felt like a demigod on high EGCG"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1015080"}, {"author": "ZinkusMaximus", "outcome": "positive", "duration": "ongoing", "summary": "Lowered B6 and felt 'way, way better'; convinced oxidation rate/cell permeability (fast oxidizer, low cal/K ratio) drives his need for high EGCG relative to B6. Requiring less calibration after zeroing in on ratios.", "notable_effects": ["improved wellbeing", "milder calibration symptoms"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1015246"}, {"author": "whatisaging", "outcome": "positive", "duration": "~6 months", "summary": "Long-term user reporting strong physical gains: grip strength 76 to 113, pushups 3 to 12 in a few weeks, scalp inflammation dropped to 0-3% (from 30+ red bumps), fixed months-long right-side liver/gallbladder pain and lower back pain that had made walking hard. Attributes prior struggles to vitamin C powder causing EGCG intolerance and iron backlog.", "notable_effects": ["grip strength up", "pushups up", "scalp inflammation cleared", "liver pain resolved", "back pain resolved"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1015138"}, {"author": "sahtft", "outcome": "positive", "duration": "~6 months (since March 10)", "summary": "Daily HG7 helped with long work hours and focus. Reports thicker hair, better average mood (less rumination/anxiety, faster bounce-back from upsets), better mental endurance, and a 60-watt FTP (cycling) increase in 4 months. New ratios felt fine (roughly double biotin and 1.3x EGCG per same zinc).", "notable_effects": ["improved focus", "thicker hair", "better mood", "mental endurance", "cycling FTP +60W"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1015130"}, {"author": "MrMark", "outcome": "positive", "duration": "~1 week on this dose", "summary": "Near-zero nausea and daily improvements in hearing and vision, sense of wellness and warm social reception. Occasional zinc/EGCG calibrations, almost never low-moly symptoms. Notes background early-cold-symptom feeling and tingling at a prior shingles site.", "notable_effects": ["improved hearing", "improved vision", "sense of wellness", "warm social reception", "occasional cold-onset feeling", "shingles-site tingling"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1015122"}, {"author": "MrMark", "outcome": "positive", "duration": "2 days at zero zinc", "summary": "Second day of the stack with zero zinc, calibrating high-iron symptoms with #3; reports lots of improvement in mood and symptoms.", "notable_effects": ["mood improvement", "high iron after initial dose"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1015425"}, {"author": "pacamara", "outcome": "negative", "duration": "first full dose (after 2 weeks at 60%)", "summary": "Symptomless on 60% dose for two weeks; first full dose triggered belly ache, cold hands/feet, nausea and vomiting ~4.5 hrs after dosing despite a #3 calibration. Concluded low doses tend to be symptomless but full dose gives feedback for adjusting ratios.", "notable_effects": ["cold hands and feet", "belly ache", "nausea", "vomiting"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1015068"}, {"author": "pacamara", "outcome": "negative", "duration": "ongoing", "summary": "Consistent flu-like symptoms (nausea, belly cramps, fever, weakness lasting hours) every time zinc gluconate is taken, even at 50% zinc (125mg). Skipping zinc entirely gave zero issues for the first time. Had supplemented zinc + oysters + beef in the 6 months before starting.", "notable_effects": ["flu-like symptoms", "nausea", "belly cramps", "fever", "weakness"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1015591"}, {"author": "dave_282", "outcome": "mixed", "duration": "returning user, ~6 days into 60%", "summary": "Restarted on new ratios at 60% dose; first few days symptomless and feeling good, planning to track nail growth as a marker. Recurring mild lingering afternoon headache around day 3 and again later, corrected by adding an EGCG capsule (attributed to surging iron).", "notable_effects": ["lingering afternoon headache", "corrected by extra EGCG", "feeling good otherwise"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1015220"}, {"author": "Hidden49", "outcome": "mixed", "duration": "ongoing", "summary": "Joint stiffness attributed to molybdenum (possibly uric acid crystals or metals pulled from joints). Repeatedly reports going high-iron/low-copper where zinc and moly (even small doses) aggravate pancreas/left-side pain and cause extreme cold; only relieved by eating high-copper foods. Disputes that more EGCG always raises copper - for him it often only raises iron.", "notable_effects": ["joint stiffness", "gallbladder feels like a rock", "left-side pancreas pain", "extreme cold", "anemia feeling"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1015126"}, {"author": "Nusian", "outcome": "mixed", "duration": "ongoing", "summary": "Slowly ran into low B5 on the current ratios - persistent low-B7 symptoms that wouldn't stay away with extra B7, then got 'electric skin'; ~1100mg B5 resolved it.", "notable_effects": ["persistent low B7 symptoms", "electric skin", "resolved with B5"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1015195"}, {"author": "Youngboy", "outcome": "neutral", "duration": "3-4 weeks", "summary": "3-4 weeks in with no noticeable changes and never needing calibrations; believes front-end is fine and back-end slowly clearing. Discovered his scale underestimated biotin (was taking ~1000mg, half of intended). Suspects cholestasis/liver issues, later got right-trap neck pain from lowering moly too fast plus surging appetite (attributed to low biotin).", "notable_effects": ["no noticeable changes", "no calibrations needed", "neck/trap pain from lowering moly", "increased appetite"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1015336"}, {"author": "purple pill", "outcome": "mixed", "duration": "ongoing", "summary": "Zinc bisglycinate seemed to stop working; persistent high-iron feeling and crippling backache days after dosing that extra zinc alone wouldn't touch. Halving B6 (keeping EGCG same) finally produced high-copper symptoms and a taste/craving for molybdenum for the first time. Ordered zinc gluconate to align with the protocol.", "notable_effects": ["high iron feeling", "crippling backache", "high copper symptoms after halving B6", "developed taste for moly"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1015386"}, {"author": "BRENBAIL", "outcome": "mixed", "duration": "early participant (since January), returning", "summary": "One of the earliest participants who had rough calibration when ratios were off. Returned on half doses keeping ratios; lowering Vitamin C a little stopped previously freezing/hurting cold feet (suspects high iron). Then got achy knees and outer-thigh bursitis. Later moved to full dose (200mg zinc etc, 33 pills at once) with no nausea after 2 days, only mild unease he attributes to PTSD from early bad experiences and mild insomnia the first night.", "notable_effects": ["cold feet resolved by lowering C", "achy knees", "bursitis", "no nausea on full dose", "mild insomnia first night"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1015624"}, {"author": "Orion", "outcome": "positive", "duration": "ongoing", "summary": "Feeling good on his stack with no noticeable tracker symptoms; lower zinc-to-B6 ratio definitely removed all nausea. Taking a slow-and-steady long-haul approach.", "notable_effects": ["no tracker symptoms", "nausea removed by lower zinc:B6"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1015614"}, {"author": "ScrapActivator", "outcome": "mixed", "duration": "ongoing", "summary": "Struggling with two persistent symptoms at 50% dose: a shivering single muscle above the left kidney (distinct from low-biotin twitch) and nighttime dry eyes (attributed to low B6) that recur a few hours after a bedtime vitamin booster. Later realized he was in a moly-vs-B6 tug of war (moly for restless legs vs B6 for dry eyes).", "notable_effects": ["shivering back muscle", "nighttime dry eyes", "restless legs", "moly vs B6 antagonism"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1015295"}, {"author": "Disrupt4489", "outcome": "positive", "duration": "~1 month", "summary": "Accidentally did about a month on the full protocol with almost no zinc (didn't notice the zinc powder wasn't 100%), finishing over a bottle of EGCG without much trouble - had never taken zinc before. Has before/after HTMA hair tests in his personal log.", "notable_effects": ["tolerated near-zero zinc for a month", "HTMA tracked"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1015438"}, {"author": "PadrePio", "outcome": "neutral", "duration": "5 doses", "summary": "Took fifth dose at half the new ratio and still didn't feel anything.", "notable_effects": ["no sensation"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1015176"}, {"author": "Admiral", "outcome": "mixed", "duration": "ongoing", "summary": "Beetroot smoothies now turn urine/stool red-purple for two days since starting HG7, which he reads as a low-iron symptom alongside increased hair loss and pale look. Later reports a front tooth growing crooked since June, which he strongly attributes to HG7 imbalances (and takes as evidence of HG7's power). Currently running exactly the page-1 dose at 1/4 strength.", "notable_effects": ["red/purple urine and stool", "hair loss", "pale look", "crooked front tooth"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1015518"}, {"author": "BRENBAIL", "outcome": "negative", "duration": "single dose (2-3 days in on same stack)", "summary": "Took the stack at 1:30pm and by ~5:40pm developed head pressure, moderate nausea, feeling hot, and mouth watering; ultimately vomited while at work. Delayed nausea hours after dosing when stomach was empty was a recurring struggle.", "notable_effects": ["head pressure", "nausea", "feeling hot", "mouth watering", "vomiting", "acidic/sour stomach afterward"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1015656"}, {"author": "BRENBAIL", "outcome": "positive", "duration": "next-day recalibration", "summary": "After vomiting and a lingering sour/burning stomach, dropped to 60% levels and omitted zinc entirely; reported feeling better with no more burning stomach.", "notable_effects": ["burning stomach resolved"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1015690"}, {"author": "pacamara", "outcome": "mixed", "duration": "a few weeks in", "summary": "Reached a point where adding any zinc creates nausea lasting for hours. Had to vomit once several hours after the stack, which cleared the nausea and let them function normally. Eating a meal helps mitigate zinc nausea.", "notable_effects": ["zinc-triggered nausea lasting hours", "vomiting relieved nausea"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1015661"}, {"author": "Orion", "outcome": "positive", "duration": "1 day trial", "summary": "Zinc is the main culprit for nausea. Did the stack for one day with zero zinc and nausea was non-existent.", "notable_effects": ["no nausea without zinc"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1015664"}, {"author": "MrMark", "outcome": "mixed", "duration": "several doses", "summary": "Did two zero-zinc doses then 200mg and 150mg zinc doses; still getting high iron symptoms. Planning to try dropping zinc to 100 and changing only one variable at a time.", "notable_effects": ["persistent high iron symptoms"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1015669"}, {"author": "purple pill", "outcome": "positive", "duration": "ongoing, low doses", "summary": "Taking the formula sparingly at low doses to dial in ratios. Did a dose with zero B6 (had neuropathy) and felt awesome for the first time in a long time, almost manic but enjoyable, with high iron symptoms but not as bad as usual. Suspects stored B6 from past P5P use.", "notable_effects": ["felt awesome/almost manic", "milder high iron symptoms"], "source_url": "https://lowtoxinforum.com/threads/theory-protocol-discussion.53813/post-1015674"}, {"author": "purple pill", "outcome": "mixed", "duration": "ongoing at 20%", "summary": "Running 20% dosages frequently but can only manage 20mg B6 (vs ~50mg for the ra
