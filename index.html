 that's really that's what I would say.", "timestamp": "90:35", "deeplink": "https://www.youtube.com/watch?v=Y6Amlrw3vsI&t=5435s", "t_seconds": 5435}, {"quote": "to see those messages in my inbox of people saying, Hey, this is working for me. Thank you. That's more reward than any dollar bill.", "timestamp": "81:29", "deeplink": "https://www.youtube.com/watch?v=Y6Amlrw3vsI&t=4889s", "t_seconds": 4889}], "theory": [{"point": "Zinc, copper and iron all share absorption mechanisms, which led him to suspect iron and copper are blocking zinc.", "timestamp": "05:48", "deeplink": "https://www.youtube.com/watch?v=Y6Amlrw3vsI&t=348s", "t_seconds": 348}, {"point": "Iron is a heavy metal that does not sweat/pee out the way light-mineral zinc does, so when absorption is blocked zinc is the first to be let go because it is easiest to remove.", "timestamp": "12:24", "deeplink": "https://www.youtube.com/watch?v=Y6Amlrw3vsI&t=744s", "t_seconds": 744}, {"point": "Because iron cannot excrete, the body stores it in tissues and takes over zinc receptor sites - possibly related to how zinc vs iron conduct electrical charge in the cell.", "timestamp": "12:48", "deeplink": "https://www.youtube.com/watch?v=Y6Amlrw3vsI&t=768s", "t_seconds": 768}, {"point": "Zinc sits at the root of hormone balance and production, protein production and enzyme breakdown, so when zinc fails those systems fail.", "timestamp": "13:38", "deeplink": "https://www.youtube.com/watch?v=Y6Amlrw3vsI&t=818s", "t_seconds": 818}, {"point": "Copper is an adrenal stimulant; in excess it acts as a suppressant to blood iron, making you appear anemic, and removing copper lets iron surface.", "timestamp": "14:27", "deeplink": "https://www.youtube.com/watch?v=Y6Amlrw3vsI&t=867s", "t_seconds": 867}, {"point": "Copper and B vitamins work together to make ATP/energy; too-high copper overstimulates and constantly drains the B vitamins, which the body barely stores.", "timestamp": "17:17", "deeplink": "https://www.youtube.com/watch?v=Y6Amlrw3vsI&t=1037s", "t_seconds": 1037}, {"point": "B6 extracts iron from tissues and, with vitamin C, surfaces it to the blood, but the B vitamins cannot work if copper is too high, and copper just recycles rather than excreting.", "timestamp": "17:48", "deeplink": "https://www.youtube.com/watch?v=Y6Amlrw3vsI&t=1068s", "t_seconds": 1068}, {"point": "The body treats iron and copper as rare minerals and recycles them; an evolutionary survival mechanism from when men lost iron by bleeding/hunting now backfires in sedentary modern life.", "timestamp": "18:49", "deeplink": "https://www.youtube.com/watch?v=Y6Amlrw3vsI&t=1129s", "t_seconds": 1129}, {"point": "Excess iron both blocks zinc and depletes electrolytes; as a lesser-of-two-evils the body depletes its B and C vitamins and buries iron in tissues to avoid a dangerous blood surge.", "timestamp": "19:51", "deeplink": "https://www.youtube.com/watch?v=Y6Amlrw3vsI&t=1191s", "t_seconds": 1191}, {"point": "He theorizes that aging and death are largely organs rusting from the inside out due to these accumulated metals.", "timestamp": "24:50", "deeplink": "https://www.youtube.com/watch?v=Y6Amlrw3vsI&t=1490s", "t_seconds": 1490}, {"point": "Indiana Jones metaphor: pulling iron out of tissues leaves an empty hole that triggers a shutdown/depression trap unless zinc is put in its place at the same time.", "timestamp": "25:26", "deeplink": "https://www.youtube.com/watch?v=Y6Amlrw3vsI&t=1526s", "t_seconds": 1526}, {"point": "He speculates the metal lets electricity conduct through the cell; remove it entirely and conduction fails, but replace it with zinc and conduction resumes.", "timestamp": "26:47", "deeplink": "https://www.youtube.com/watch?v=Y6Amlrw3vsI&t=1607s", "t_seconds": 1607}, {"point": "Removing free copper consumes uric acid, and molybdenum is crucial for producing that uric acid and enabling copper removal via the kidneys.", "timestamp": "28:34", "deeplink": "https://www.youtube.com/watch?v=Y6Amlrw3vsI&t=1714s", "t_seconds": 1714}, {"point": "B6 searches the whole body for unwanted metals, going after life-critical organs (brain, heart, lungs) first and cosmetic tissues (hair, skin, nails) later.", "timestamp": "29:12", "deeplink": "https://www.youtube.com/watch?v=Y6Amlrw3vsI&t=1752s", "t_seconds": 1752}, {"point": "B6 needs a large amount of biotin to convert to its active form; missing this is why many people get neuropathy from B6.", "timestamp": "30:59", "deeplink": "https://www.youtube.com/watch?v=Y6Amlrw3vsI&t=1859s", "t_seconds": 1859}, {"point": "One forum theory: B6 slightly rips tissues/proteins to pull metals out, and biotin rebuilds those tissues at a micro level (why it helps hair and skin).", "timestamp": "31:52", "deeplink": "https://www.youtube.com/watch?v=Y6Amlrw3vsI&t=1912s", "t_seconds": 1912}, {"point": "Biotin is a major mobilizer/utilizer of calcium; during detox calcium surfaces and biotin mitigates bad symptoms like kidney stones and acne.", "timestamp": "32:19", "deeplink": "https://www.youtube.com/watch?v=Y6Amlrw3vsI&t=1939s", "t_seconds": 1939}, {"point": "The three B vitamins work as a chain: B6 drains biotin, biotin drains B5, and B5 counter-balances B6.", "timestamp": "32:58", "deeplink": "https://www.youtube.com/watch?v=Y6Amlrw3vsI&t=1978s", "t_seconds": 1978}, {"point": "Vitamin C is a pusher that forces metals through the blood and out the kidneys/bile, while keeping the blood slightly alkaline (despite being an acid) and uric acid from getting too high.", "timestamp": "33:12", "deeplink": "https://www.youtube.com/watch?v=Y6Amlrw3vsI&t=1992s", "t_seconds": 1992}, {"point": "Without a chelator the body redistributes surfaced metal back into itself; EGCG binds the surfaced iron so the body stops recognizing it and excretes it.", "timestamp": "34:37", "deeplink": "https://www.youtube.com/watch?v=Y6Amlrw3vsI&t=2077s", "t_seconds": 2077}, {"point": "All seven nutrients in the right ratios are meant to seamlessly remove iron, remove copper and replenish zinc, which he says rebuilds DNA and halts aging.", "timestamp": "35:26", "deeplink": "https://www.youtube.com/watch?v=Y6Amlrw3vsI&t=2126s", "t_seconds": 2126}, {"point": "EGCG level is really a proxy for how high your surfaced/blood iron is; high surfaced iron can trigger deficiency in almost everything else.", "timestamp": "57:43", "deeplink": "https://www.youtube.com/watch?v=Y6Amlrw3vsI&t=3463s", "t_seconds": 3463}, {"point": "Iron build-up causes an insomniac, over-energized reaction; too little EGCG lets iron build and keeps you awake, while more EGCG produces a sedentary effect.", "timestamp": "67:42", "deeplink": "https://www.youtube.com/watch?v=Y6Amlrw3vsI&t=4062s", "t_seconds": 4062}, {"point": "Calcium and zinc are antagonistic; the protocol aims to move excess tissue calcium back into the bone rather than add calcium.", "timestamp": "70:27", "deeplink": "https://www.youtube.com/watch?v=Y6Amlrw3vsI&t=4227s", "t_seconds": 4227}, {"point": "If vitamin C makes you gag it means its antagonist (usually EGCG or molybdenum) is very low, so C would drain rather than help - the body signals this via the gag reflex.", "timestamp": "49:25", "deeplink": "https://www.youtube.com/watch?v=Y6Amlrw3vsI&t=2965s", "t_seconds": 2965}, {"point": "Kidney-stone chain of causation: chelating iron too fast surfaces too much copper, which lodges in the kidneys and leaches calcium (to calm copper's stimulation), forming a stone.", "timestamp": "86:43", "deeplink": "https://www.youtube.com/watch?v=Y6Amlrw3vsI&t=5203s", "t_seconds": 5203}, {"point": "He argues vitamins act essentially the same across people (otherwise RDAs could not exist); individual differences are mainly in storage sites and slightly different ratios, so the protocol is largely universal.", "timestamp": "64:44", "deeplink": "https://www.youtube.com/watch?v=Y6Amlrw3vsI&t=3884s", "t_seconds": 3884}], "protocol": [{"point": "The seven nutrients: B5 (pantothenic acid), B6 (pyridoxine HCl), B7 (biotin), vitamin C, EGCG (green tea extract), zinc, and molybdenum.", "timestamp": "27:30", "deeplink": "https://www.youtube.com/watch?v=Y6Amlrw3vsI&t=1650s", "t_seconds": 1650}, {"point": "B6 dosage: 125-200 mg (lowered from earlier versions where vitamins were too high).", "timestamp": "41:57", "deeplink": "https://www.youtube.com/watch?v=Y6Amlrw3vsI&t=2517s", "t_seconds": 2517}, {"point": "Biotin: about 500 mg at 125 mg of B6, scaling to about 1,000 mg at 200 mg of B6 - more B6 requires more of everything.", "timestamp": "42:06", "deeplink": "https://www.youtube.com/watch?v=Y6Amlrw3vsI&t=2526s", "t_seconds": 2526}, {"point": "B5: about 350 mg at the 125 mg B6 dosage.", "timestamp": "42:38", "deeplink": "https://www.youtube.com/watch?v=Y6Amlrw3vsI&t=2558s", "t_seconds": 2558}, {"point": "Vitamin C: 5-7 grams.", "timestamp": "42:46", "deeplink": "https://www.youtube.com/watch?v=Y6Amlrw3vsI&t=2566s", "t_seconds": 2566}, {"point": "Zinc: 200-220 mg.", "timestamp": "43:41", "deeplink": "https://www.youtube.com/watch?v=Y6Amlrw3vsI&t=2621s", "t_seconds": 2621}, {"point": "EGCG: about 2,600 mg, adjusted by feel against zinc since zinc and EGCG need a specific balance.", "timestamp": "43:46", "deeplink": "https://www.youtube.com/watch?v=Y6Amlrw3vsI&t=2626s", "t_seconds": 2626}, {"point": "Molybdenum: about 6 mg on this dosage, but some people (like Elwin) need only 1-2 mg depending on copper toxicity; back off if it makes you gag or gives bad headaches.", "timestamp": "44:04", "deeplink": "https://www.youtube.com/watch?v=Y6Amlrw3vsI&t=2644s", "t_seconds": 2644}, {"point": "Rule of thumb: roughly 1,000 mg of biotin for every 200 mg of B6 (versus an RDA of under ~100 micrograms of biotin).", "timestamp": "41:15", "deeplink": "https://www.youtube.com/watch?v=Y6Amlrw3vsI&t=2475s", "t_seconds": 2475}, {"point": "Calibrate means taking a little extra of something (EGCG, molybdenum, zinc, or C) beyond the base recommendation when you feel a deficiency symptom; the forum lists symptoms of being low in each nutrient.", "timestamp": "38:25", "deeplink": "https://www.youtube.com/watch?v=Y6Amlrw3vsI&t=2305s", "t_seconds": 2305}, {"point": "Taste test: gauge how much to take by taste - if vitamin C tastes sweet (rather than tart) take the higher end; if it makes you gag you don't need that much yet.", "timestamp": "42:53", "deeplink": "https://www.youtube.com/watch?v=Y6Amlrw3vsI&t=2573s", "t_seconds": 2573}, {"point": "You do not need to open a capsule for the taste test - the residue on the capsule is enough, and it works best when you are nauseous.", "timestamp": "52:48", "deeplink": "https://www.youtube.com/watch?v=Y6Amlrw3vsI&t=3168s", "t_seconds": 3168}, {"point": "EGCG always tastes bitter/earthy, so judge it purely by whether you can swallow it easily versus gagging, not by good taste.", "timestamp": "54:55", "deeplink": "https://www.youtube.com/watch?v=Y6Amlrw3vsI&t=3295s", "t_seconds": 3295}, {"point": "The taste test really means the gag reflex: if it is triggered you will likely throw up (don't take it); if not, you are probably safe to take it.", "timestamp": "56:49", "deeplink": "https://www.youtube.com/watch?v=Y6Amlrw3vsI&t=3409s", "t_seconds": 3409}, {"point": "Biotin should be taken as pure powder under the tongue; it absorbs fast when needed and just clumps when not - fastest right after EGCG and B6.", "timestamp": "55:38", "deeplink": "https://www.youtube.com/watch?v=Y6Amlrw3vsI&t=3338s", "t_seconds": 3338}, {"point": "Everything except biotin is recommended in capsule form, because you need so much biotin and readily available 100 mg biotin capsules do not exist.", "timestamp": "55:41", "deeplink": "https://www.youtube.com/watch?v=Y6Amlrw3vsI&t=3341s", "t_seconds": 3341}, {"point": "There is no required order for taking the nutrients; it depends on your current state.", "timestamp": "57:29", "deeplink": "https://www.youtube.com/watch?v=Y6Amlrw3vsI&t=3449s", "t_seconds": 3449}, {"point": "Do not take the protocol before anything important, because you may need to calibrate for nausea.", "timestamp": "64:16", "deeplink": "https://www.youtube.com/watch?v=Y6Amlrw3vsI&t=3856s", "t_seconds": 3856}, {"point": "Take it post-meal; the body is more forgiving of ratio mistakes with food, whereas an empty stomach demands more precision.", "timestamp": "66:52", "deeplink": "https://www.youtube.com/watch?v=Y6Amlrw3vsI&t=4012s", "t_seconds": 4012}, {"point": "Jacob takes it before bed, using slightly extra EGCG (with molybdenum) for a sedentary, sleep-aiding effect.", "timestamp": "67:19", "deeplink": "https://www.youtube.com/watch?v=Y6Amlrw3vsI&t=4039s", "t_seconds": 4039}, {"point": "Never take any single one of these nutrients isolated at the high protocol dosages (e.g. never 2,600 mg EGCG alone).", "timestamp": "46:41", "deeplink": "https://www.youtube.com/watch?v=Y6Amlrw3vsI&t=2801s", "t_seconds": 2801}, {"point": "Do not run the protocol while skipping nutrients for long; only biotin is safe taken in excess/isolation.", "timestamp": "48:39", "deeplink": "https://www.youtube.com/watch?v=Y6Amlrw3vsI&t=2919s", "t_seconds": 2919}, {"point": "Do not add other supplements - especially no calcium, no extra minerals, and no extra antioxidants (rutin called out); B vitamins like niacin, B12, folic acid are probably harmless.", "timestamp": "69:53", "deeplink": "https://www.youtube.com/watch?v=Y6Amlrw3vsI&t=4193s", "t_seconds": 4193}, {"point": "Read both dosages and brands carefully; some brands do not work well.", "timestamp": "84:19", "deeplink": "https://www.youtube.com/watch?v=Y6Amlrw3vsI&t=5059s", "t_seconds": 5059}, {"point": "Watch EGCG standardization: an 1,800 mg green tea extract standardized to 45% EGCG gives 1,800 x 0.45 of actual EGCG - green tea extract is not the same as EGCG.", "timestamp": "84:39", "deeplink": "https://www.youtube.com/watch?v=Y6Amlrw3vsI&t=5079s", "t_seconds": 5079}, {"point": "Biotin must be pure and at the right strength; taking the 1% diluted powder is the number-one way people fail on the protocol and can cause anxiety, cramps and kidney stones.", "timestamp": "85:15", "deeplink": "https://www.youtube.com/watch?v=Y6Amlrw3vsI&t=5115s", "t_seconds": 5115}, {"point": "If you are getting a kidney stone, run the protocol without EGCG; the protocol can also break existing stones down in his experience.", "timestamp": "86:28", "deeplink": "https://www.youtube.com/watch?v=Y6Amlrw3vsI&t=5188s", "t_seconds": 5188}, {"point": "To get started, join the forum (about $5/month), post a brief synopsis (age, problems) and ask questions.", "timestamp": "81:09", "deeplink": "https://www.youtube.com/watch?v=Y6Amlrw3vsI&t=4869s", "t_seconds": 4869}, {"point": "Expect about 6 months to get comfortable running the protocol without needing help.", "timestamp": "68:59", "deeplink": "https://www.youtube.com/watch?v=Y6Amlrw3vsI&t=4139s", "t_seconds": 4139}, {"point": "Most people feel effects within the first week, sometimes the first day, but dosages will not always be exactly the same each time.", "timestamp": "88:36", "deeplink": "https://www.youtube.com/watch?v=Y6Amlrw3vsI&t=5316s", "t_seconds": 5316}]}, {"id": "v4", "title": "HG7 - is it Safe? Does it Work? Test Results, Calibration Guide + Updates with Jacob | RP Ep. 117", "url": "https://www.youtube.com/watch?v=Ro7dSNHla1E", "ep": 117, "host": "Rejuvenate Podcast", "summary": "In this Rejuvenate Podcast episode, host Owen Robertson and Jacob (the real Heisenberg, creator of HG7) focus on safety, test results, and a detailed calibration guide for the HG7 protocol - seven nutrients (B6, B7/biotin, B5, vitamin C, zinc, molybdenum, EGCG) taken together to chelate iron and copper out of tissues while replenishing zinc. Jacob presents the updated standard dose and a symptom-based calibration system centered on the three hardest-to-balance components (zinc, molybdenum, EGCG), and reframes iron as the 'main villain' with copper more of a 'side quest.' Owen shares three months of his own bloodwork (zinc, copper, ceruloplasmin, full iron panel, liver enzymes, kidney function) showing everything stayed in normal/safe ranges despite very high doses, arguing the combination is non-toxic when balanced correctly. They speculate at length about copper-type vs iron-type physiology and hormones, and announce Jacob will take a DNA methylation (biological age) test to prove the anti-aging claims, to be revealed first on this podcast.", "takeaways": [{"point": "The episode answers the two most-asked questions about HG7: does it work (test results) and is it dangerous (safety), plus provides calibration guidance for doing the experiment as safely as possible.", "timestamp": "00:36", "deeplink": "https://www.youtube.com/watch?v=Ro7dSNHla1E&t=36s", "t_seconds": 36}, {"point": "HG7 stands for 'Holy Grail 7 nutrients'; it is a protocol (not a single supplement) of 7 nutrients: B6, B7/biotin, B5, zinc, molybdenum, EGCG, and vitamin C.", "timestamp": "03:24", "deeplink": "https://www.youtube.com/watch?v=Ro7dSNHla1E&t=204s", "t_seconds": 204}, {"point": "Mechanism theory: B vitamins + vitamin C extract heavy metals from tissues to the liver, EGCG chelates them so the body excretes rather than recycles them, and zinc refills the vacated sites - eventually turning on telomerase/DNA healing.", "timestamp": "04:35", "deeplink": "https://www.youtube.com/watch?v=Ro7dSNHla1E&t=275s", "t_seconds": 275}, {"point": "Getting the RATIOS right is the hard part; each nutrient has positive and negative effects and the others negate each other's negatives, so a perfect universal ratio may not exist - personal responsibility and calibration are required.", "timestamp": "07:38", "deeplink": "https://www.youtube.com/watch?v=Ro7dSNHla1E&t=458s", "t_seconds": 458}, {"point": "Iron is now seen as the 'main villain'; copper is more of a 'side quest' that excretes relatively easily once ratios are right, but won't excrete while iron is too high.", "timestamp": "10:40", "deeplink": "https://www.youtube.com/watch?v=Ro7dSNHla1E&t=640s", "t_seconds": 640}, {"point": "This is explicitly framed as an experimental research project, not medical advice - two researchers speculating; Jacob makes no money from it.", "timestamp": "17:04", "deeplink": "https://www.youtube.com/watch?v=Ro7dSNHla1E&t=1024s", "t_seconds": 1024}, {"point": "If you take the full standard (high-vitamin) dose, almost any issue traces to one of the three minerals/antioxidant: zinc, molybdenum, or EGCG (or a combination).", "timestamp": "39:16", "deeplink": "https://www.youtube.com/watch?v=Ro7dSNHla1E&t=2356s", "t_seconds": 2356}, {"point": "Neglecting even ONE of the seven nutrients breaks the whole 'chain' - the process stops and the body starts robbing that nutrient (e.g. biotin) from hair/skin, making you sick.", "timestamp": "39:56", "deeplink": "https://www.youtube.com/watch?v=Ro7dSNHla1E&t=2396s", "t_seconds": 2396}, {"point": "Announcement: Jacob will take a DNA methylation (biological age) test after a set protocol period and reveal the results first on this podcast, to prove he is anti-aging and not harming himself.", "timestamp": "84:34", "deeplink": "https://www.youtube.com/watch?v=Ro7dSNHla1E&t=5074s", "t_seconds": 5074}, {"point": "Owen's 3-month bloodwork on very high doses shows zinc slightly DOWN, copper/ferritin stable-to-up, and liver/kidney markers normal - evidence the protocol is non-toxic when balanced.", "timestamp": "93:42", "deeplink": "https://www.youtube.com/watch?v=Ro7dSNHla1E&t=5622s", "t_seconds": 5622}, {"point": "Owen recommends people read the full first forum page thoroughly and, if joining, direct calibration questions to Jacob on lowtoxinforum.com (small monthly fee).", "timestamp": "122:39", "deeplink": "https://www.youtube.com/watch?v=Ro7dSNHla1E&t=7359s", "t_seconds": 7359}], "qa": [{"question": "What is HG7 in brief?", "answer": "A protocol (not a single supplement) of 7 nutrients - three B vitamins (B6/pyridoxine HCl, B7/biotin, B5/pantothenic acid), two minerals (zinc and molybdenum), the antioxidant EGCG, and vitamin C - combined in specific ratios to chelate heavy metals (mainly iron and copper) out of the tissues and replenish zinc.", "timestamp": "03:24", "deeplink": "https://www.youtube.com/watch?v=Ro7dSNHla1E&t=204s", "t_seconds": 204}, {"question": "Why do you now see iron as the main villain rather than copper?", "answer": "Under normal circumstances you get enough dietary molybdenum/zinc to excrete copper, and copper is easy to excrete once ratios are right. The hard part is balancing iron, because copper won't excrete while there's too much iron in the body. Jacob throws up trying to take zinc/molybdenum/B/C alone, but adding EGCG lets the body take them in.", "timestamp": "11:00", "deeplink": "https://www.youtube.com/watch?v=Ro7dSNHla1E&t=660s", "t_seconds": 660}, {"question": "Why can't you just take one huge dose of zinc or EGCG on its own?", "answer": "Too much zinc pushes free copper/metals into the blood from the liver; if there's already too much free metal, the body refuses more zinc and you throw up. Exception: someone extremely zinc-deficient might tolerate ~200mg once. EGCG at ~200-300mg per dose is almost universally required to let the high zinc levels be absorbed.", "timestamp": "14:54", "deeplink": "https://www.youtube.com/watch?v=Ro7dSNHla1E&t=894s", "t_seconds": 894}, {"question": "What does 'calibration' mean?", "answer": "The standard dose sets a base level; then you assess how it makes you feel against a symptom list for being low on any nutrient, and add small 'calibration' doses (mainly of zinc, molybdenum, and/or EGCG) to correct. Because everyone starts from a different mineral status, calibration is individual.", "timestamp": "20:26", "deeplink": "https://www.youtube.com/watch?v=Ro7dSNHla1E&t=1226s", "t_seconds": 1226}, {"question": "How do you tell a copper type from an iron type?", "answer": "High-copper people tend to be childlike, higher-estrogen, softer/rounder faces, sometimes chubbier, often MORE head hair, wired/emotional/'all over the place.' High-iron people tend to have darker skin, chronic fatigue, are quiet/stoic/mellow-to-shut-down, may lose head hair and have more body hair (via DHT). Women swing more due to menstruation cycling their copper/iron ratio.", "timestamp": "21:59", "deeplink": "https://www.youtube.com/watch?v=Ro7dSNHla1E&t=1319s", "t_seconds": 1319}, {"question": "What does 'clammy' hands mean as a symptom?", "answer": "Cold AND sweaty - the sweatiness (fingertips looking sweaty) is the key part; cold hands alone can be misleading.", "timestamp": "44:55", "deeplink": "https://www.youtube.com/watch?v=Ro7dSNHla1E&t=2695s", "t_seconds": 2695}, {"question": "What about sweaty bottoms of the feet?", "answer": "Usually low zinc or low vitamin C (taking those tends to fix it), though sometimes it also means too much iron needing more EGCG + C + zinc; it may take several doses to correct.", "timestamp": "45:29", "deeplink": "https://www.youtube.com/watch?v=Ro7dSNHla1E&t=2729s", "t_seconds": 2729}, {"question": "Is acid reflux / GERD / burning throat a sign of low molybdenum?", "answer": "Yes - that burning/reflux sensation is low molybdenum almost all the time, or occasionally low biotin.", "timestamp": "46:09", "deeplink": "https://www.youtube.com/watch?v=Ro7dSNHla1E&t=2769s", "t_seconds": 2769}, {"question": "Why is nausea listed as a low-ZINC symptom when it's also high-copper/low-molybdenum?", "answer": "Nausea can come from all three. Jacob personally uses excessive EGCG so zinc fixes his nausea; people taking less EGCG may find the nausea is actually from too little EGCG. Zinc fixes nausea specifically when you've taken excess EGCG.", "timestamp": "49:00", "deeplink": "https://www.youtube.com/watch?v=Ro7dSNHla1E&t=2940s", "t_seconds": 2940}, {"question": "How is lower back pain connected to low zinc?", "answer": "It's really a high-copper effect: built-up copper leaches calcium, and that slow calcium leaching forms kidney stones - lower back pain is the early sign of a stone forming (Jacob got a stone attack ~3 weeks after such pain). Fix: run the formula WITHOUT EGCG so you clear copper only and leave iron intact; you need both zinc (frees copper) and molybdenum (removes freed copper).", "timestamp": "50:28", "deeplink": "https://www.youtube.com/watch?v=Ro7dSNHla1E&t=3028s", "t_seconds": 3028}, {"question": "How does depression relate to low zinc as an immediate symptom?", "answer": "When zinc is very low (lots of empty, unfilled zinc storage sites rather than sites occupied by iron), the body seems to stop producing some happiness-related hormone/enzyme, producing a literal 'empty' feeling and depression.", "timestamp": "53:57", "deeplink": "https://www.youtube.com/watch?v=Ro7dSNHla1E&t=3237s", "t_seconds": 3237}, {"question": "What causes dark circles under the eyes?", "answer": "Jacob's suspicion: excess iron stops B vitamins and vitamin C (e.g. B12/B6) from working, producing a functional anemia - and being anemic doesn't necessarily mean low iron, it can be the opposite (excess iron not metabolized properly).", "timestamp": "64:55", "deeplink": "https://www.youtube.com/watch?v=Ro7dSNHla1E&t=3895s", "t_seconds": 3895}, {"question": "Why list constipation, given it can be caused by anything?", "answer": "It's most commonly associated with high iron (too-high iron will eventually always cause constipation), and iron also stops vitamin C working; occasionally it's low B6 or low vitamin C. Pale/hard stool = low vitamin C; dark/thick stool = low biotin or low EGCG.", "timestamp": "69:56", "deeplink": "https://www.youtube.com/watch?v=Ro7dSNHla1E&t=4196s", "t_seconds": 4196}, {"question": "What's the most you have ever taken in a day?", "answer": "Up to 3-5x the standard protocol in one day - toward a gram of zinc. One other researcher (very high iron) is taking around 30 grams of EGCG regularly and it's working for him, but Jacob strongly does NOT recommend starting anywhere near that; even a third of that unbalanced would give Jacob a kidney stone.", "timestamp": "72:20", "deeplink": "https://www.youtube.com/watch?v=Ro7dSNHla1E&t=4340s", "t_seconds": 4340}, {"question": "Have you tested your testosterone to prove the hormone claims?", "answer": "Owen: his results are skewed because he was using a small amount of testosterone cream, so he considers it 'cheating' to attribute it to the formula; he's cycling off and will retest. He notes his estrogen dropped and suspects his own benefit is more about lowered prolactin (raising dopamine) via high-dose B6. Jacob's guess: the formula keeps testosterone as testosterone / reduces conversion to estrogen rather than boosting production.", "timestamp": "106:38", "deeplink": "https://www.youtube.com/watch?v=Ro7dSNHla1E&t=6398s", "t_seconds": 6398}, {"question": "How do people join the research?", "answer": "Go to lowtoxinforum.com, search HG7, read the first page thoroughly, and post. There's a small membership fee (~$5-7/month) that goes to the forum owner, not Jacob (who makes no money); Jacob then responds and helps you calibrate.", "timestamp": "122:39", "deeplink": "https://www.youtube.com/watch?v=Ro7dSNHla1E&t=7359s", "t_seconds": 7359}], "claims": [{"claim": "Owen's baseline test (19 Feb 2025): zinc near the top of the reference range, copper near the bottom, ceruloplasmin near the bottom - so free copper was reasonably high (~30%) but not exceptional; a normal practitioner would say no need for zinc and no copper excess.", "detail": "Dr. Walsh-style 7-marker panel; ferritin was not particularly high, which would seem to argue against high iron, but ferritin can also reflect inflammation and other factors.", "timestamp": "92:02", "deeplink": "https://www.youtube.com/watch?v=Ro7dSNHla1E&t=5522s", "t_seconds": 5522}, {"claim": "After ~3 months of high doses (EGCG up to 4g, zinc commonly ~150mg up to 350mg/day): ferritin/iron went UP not down, and zinc went DOWN slightly - the opposite of the feared deficiencies.", "detail": "Interpreted as iron that was hiding in tissues being surfaced, and zinc going where it's needed rather than pooling in blood.", "timestamp": "93:59", "deeplink": "https://www.youtube.com/watch?v=Ro7dSNHla1E&t=5639s", "t_seconds": 5639}, {"claim": "Evidence that zinc is being used rather than accumulating: two years earlier on only ~50mg/day zinc, Owen's blood zinc was OFF the reference range at 243 (nearly double); now averaging ~200mg/day it has gone DOWN into range.", "detail": "NutrEval test, mid-2023, zinc 243 above range.", "timestamp": "95:30", "deeplink": "https://www.youtube.com/watch?v=Ro7dSNHla1E&t=5730s", "t_seconds": 5730}, {"claim": "Copper rose ever so slightly and ceruloplasmin rose, so free (unbound) copper actually went DOWN slightly over the 3 months.", "detail": "", "timestamp": "96:38", "deeplink": "https://www.youtube.com/watch?v=Ro7dSNHla1E&t=5798s", "t_seconds": 5798}, {"claim": "Liver panel (16 April, already months into high dosing): all liver enzymes and bilirubin basically unchanged and in-range; kidney function fine with creatinine down since January and a properly-calculated eGFR of ~130.", "detail": "ALP, ALT, GGT all mid/low range; no liver damage despite high EGCG.", "timestamp": "98:55", "deeplink": "https://www.youtube.com/watch?v=Ro7dSNHla1E&t=5935s", "t_seconds": 5935}, {"claim": "Repeat liver panel a week before filming (after 'hammering' high EGCG): GGT 20 to 17, ALT 26 to 25, ALP 46 to 43, bilirubin 7 to 6 - all improved or stable.", "detail": "Directly rebuts the common warning that high EGCG/zinc destroys the liver, at least for this N=1.", "timestamp": "100:25", "deeplink": "https://www.youtube.com/watch?v=Ro7dSNHla1E&t=6025s", "t_seconds": 6025}, {"claim": "Full iron panel: serum iron near the top of range (no iron deficiency from massive EGCG), TIBC fine, UIBC showing a slight iron lack, ferritin low but not deficient - not excessive, not deficient.", "detail": "Consistent with iron possibly hiding in tissues while blood markers stay normal.", "timestamp": "105:09", "deeplink": "https://www.youtube.com/watch?v=Ro7dSNHla1E&t=6309s", "t_seconds": 6309}, {"claim": "Owen's medical doctor (a functional-medicine GP in the UK NHS) reviewed the results and said he's 'doing better than ever.'", "detail": "", "timestamp": "106:30", "deeplink": "https://www.youtube.com/watch?v=Ro7dSNHla1E&t=6390s", "t_seconds": 6390}, {"claim": "Jacob reports no common cold in three years for himself or his girlfriend since being on the protocol; Owen likewise hasn't had a cold (attributes his to other factors).", "detail": "", "timestamp": "80:44", "deeplink": "https://www.youtube.com/watch?v=Ro7dSNHla1E&t=4844s", "t_seconds": 4844}, {"claim": "Reported real-world benefits among people having success: unprecedented strength gains, better tolerance of toxins (drinking ~3x as much, smoking more without wheezing), improved mood, skin, digestion, hair growth, and body-composition/symmetry changes.", "detail": "Jacob frames these as downstream of rising zinc and improved DNA/hormone health; anecdotal, self-reported on the forum.", "timestamp": "08:34", "deeplink": "https://www.youtube.com/watch?v=Ro7dSNHla1E&t=514s", "t_seconds": 514}, {"claim": "Normal 'safe limit' for EGCG is around 400mg/day (the most typically allowed in a supplement); the protocol has people taking on the order of 3,000mg/day and up.", "detail": "", "timestamp": "64:37", "deeplink": "https://www.youtube.com/watch?v=Ro7dSNHla1E&t=3877s", "t_seconds": 3877}, {"claim": "EGCG has numerous published studies for promoting stem cell growth and telomerase - benefits Jacob argues have never been properly utilized because no one could previously tolerate multi-gram doses.", "detail": "", "timestamp": "113:11", "deeplink": "https://www.youtube.com/watch?v=Ro7dSNHla1E&t=6791s", "t_seconds": 6791}, {"claim": "Multiple forum users report tolerating 10-15x more molybdenum than before (e.g. from a former max of 500 micrograms to 10 milligrams) once the balancing vitamins are present.", "detail": "", "timestamp": "44:00", "deeplink": "https://www.youtube.com/watch?v=Ro7dSNHla1E&t=2640s", "t_seconds": 2640}, {"claim": "A couple of forum users have NOT had success; Jacob is transparent that failures exist but says they are far fewer than successes, and are often people who deviated from the exact protocol.", "detail": "Possible causes floated: faulty/weak supplements, different bodies, or self-modifying the formula.", "timestamp": "124:35", "deeplink": "https://www.youtube.com/watch?v=Ro7dSNHla1E&t=7475s", "t_seconds": 7475}], "quotes": [{"quote": "HG7... stands for holy grail seven nutrients.", "timestamp": "03:36", "deeplink": "https://www.youtube.com/watch?v=Ro7dSNHla1E&t=216s", "t_seconds": 216}, {"quote": "If you're missing one piece of a chain, it's not a chain anymore. It's a broken chain. It's not going to work.", "timestamp": "40:51", "deeplink": "https://www.youtube.com/watch?v=Ro7dSNHla1E&t=2451s", "t_seconds": 2451}, {"quote": "The gut is the base of it all, but zinc is the base of the gut.", "timestamp": "62:33", "deeplink": "https://www.youtube.com/watch?v=Ro7dSNHla1E&t=3753s", "t_seconds": 3753}, {"quote": "Proof is in the pudding with at least one person.", "timestamp": "101:01", "deeplink": "https://www.youtube.com/watch?v=Ro7dSNHla1E&t=6061s", "t_seconds": 6061}, {"quote": "It's like I've been wearing a shoe that's been too small my whole life and that shoe is finally growing to fit the foot that's inside.", "timestamp": "120:45", "deeplink": "https://www.youtube.com/watch?v=Ro7dSNHla1E&t=7245s", "t_seconds": 7245}, {"quote": "It is those who are crazy enough to think that they can change the world that actually do it. So you do have to be a little crazy for something like this.", "timestamp": "129:34", "deeplink": "https://www.youtube.com/watch?v=Ro7dSNHla1E&t=7774s", "t_seconds": 7774}, {"quote": "Am I saying don't consult a physician? Not only am I not saying that, I do consult a physician. It's just that I pick my physician carefully.", "timestamp": "129:47", "deeplink": "https://www.youtube.com/watch?v=Ro7dSNHla1E&t=7787s", "t_seconds": 7787}, {"quote": "Too much zinc is known to cause problems and you should always be consulting a physician before you do any of this. That's what [AI is] going to tell you. And I can't really argue with that.", "timestamp": "129:12", "deeplink": "https://www.youtube.com/watch?v=Ro7dSNHla1E&t=7752s", "t_seconds": 7752}], "theory": [{"point": "B vitamins and vitamin C extract heavy metals from tissues and queue them in the liver at detoxification sites; but extraction alone isn't enough or multivitamin-takers wouldn't be sick - the body recycles metals back into tissue unless they're chelated.", "timestamp": "04:47", "deeplink": "https://www.youtube.com/watch?v=Ro7dSNHla1E&t=287s", "t_seconds": 287}, {"point": "EGCG binds/chelates the metals so the body no longer recognizes them as recyclable and passes them out (bile/urine); zinc then fills the vacated storage sites.", "timestamp": "05:27", "deeplink": "https://www.youtube.com/watch?v=Ro7dSNHla1E&t=327s", "t_seconds": 327}, {"point": "High copper surfaces during the process, requiring extra molybdenum, which drives uric-acid production to eliminate copper.", "timestamp": "05:56", "deeplink": "https://www.youtube.com/watch?v=Ro7dSNHla1E&t=356s", "t_seconds": 356}, {"point": "The end goal is building zinc high enough to switch the body into a DNA-heal mode - turning on telomerase and improving telomere/DNA health so the whole body repairs over time.", "timestamp": "06:41", "deeplink": "https://www.youtube.com/watch?v=Ro7dSNHla1E&t=401s", "t_seconds": 401}, {"point": "Copper won't excrete while iron is too high; taking a copper-removal mechanism (zinc/molybdenum/B/C) without EGCG makes Jacob vomit, but adding EGCG (which reduces iron and exposes copper) lets it work and drops uric acid.", "timestamp": "12:14", "deeplink": "https://www.youtube.com/watch?v=Ro7dSNHla1E&t=734s", "t_seconds": 734}, {"point": "Zinc and iron share the same storage sites; iron (heavier) takes precedence and pushes lighter zinc out (zinc sweats out), so taking zinc alone can't fix high iron - EGCG must bind the iron first so the body excretes it.", "timestamp": "24:03", "deeplink": "https://www.youtube.com/watch?v=Ro7dSNHla1E&t=1443s", "t_seconds": 1443}, {"point": "Iron blocks B-vitamin and vitamin-C usage: too much of those vitamins would surge iron into the blood, dehydrating you, so the body stores iron in tissues and robs zinc receptors instead - producing functional B/C deficiency symptoms even when levels look adequate.", "timestamp": "22:53", "deeplink": "https://www.youtube.com/watch?v=Ro7dSNHla1E&t=1373s", "t_seconds": 1373}, {"point": "Women are more prone to progressive copper toxicity because menstruation loses iron more easily than copper, so their copper/iron ratio keeps shifting (and shifts again at menopause) - explaining bigger lifetime personality swings.", "timestamp": "27:03", "deeplink": "https://www.youtube.com/watch?v=Ro7dSNHla1E&t=1623s", "t_seconds": 1623}, {"point": "Hormone theory: high-copper (or high copper + high iron) bodies convert more testosterone to estrogen (softer, more fat, more head hair); high-iron-only bodies convert more testosterone to DHT (more body hair, GABA-sedating, stoic/fatigued).", "timestamp": "28:02", "deeplink": "https://www.youtube.com/watch?v=Ro7dSNHla1E&t=1682s", "t_seconds": 1682}, {"point": "The problem isn't testosterone/DHT/estrogen themselves but the failure to KEEP testosterone as testosterone in an unhealthy mineral balance - the resulting loss of drive/passion is the real harm.", "timestamp": "36:57", "deeplink": "https://www.youtube.com/watch?v=Ro7dSNHla1E&t=2217s", "t_seconds": 2217}, {"point": "Low molybdenum signals a lot of free copper trying to excrete; molybdenum stores little at a time, gives a quick uric-acid shot, then sweats/pees out - and taken alone it drains B6/zinc/C fast, which is why it usually causes bad symptoms solo.", "timestamp": "43:20", "deeplink": "https://www.youtube.com/watch?v=Ro7dSNHla1E&t=2600s", "t_seconds": 2600}, {"point": "Owen's addition: EGCG is a broad antimicrobial, a biofilm disruptor, and a quorum-sensing disruptor, while iron feeds organisms and copper/zinc kill them - so part of the digestive benefit may be reshaping the gut flora, not just metal chelation.", "timestamp": "59:39", "deeplink": "https://www.youtube.com/watch?v=Ro7dSNHla1E&t=3579s", "t_seconds": 3579}, {"point": "Jacob's counter-view: heavy metals are the root CAUSE and bad bacteria are the SYMPTOM; functional medicine is right that the gut is foundational, but 'zinc is the base of the gut,' so metal detox + zinc is the deeper level.", "timestamp": "62:15", "deeplink": "https://www.youtube.com/watch?v=Ro7dSNHla1E&t=3735s", "t_seconds": 3735}, {"point": "Iron as an excess free radical can damage DNA, and cancer is more aggressive with poorer DNA health - so getting iron out (chelation) while zinc repairs DNA is why Jacob calls this the 'holy grail.'", "timestamp": "63:37", "deeplink": "https://www.youtube.com/watch?v=Ro7dSNHla1E&t=3817s", "t_seconds": 3817}, {"point": "B6 is the key balancer - Jacob likens it to Indiana Jones doing a 'switcheroo' inside cells, pulling out what doesn't belong (iron) and swapping in what does (zinc); low B6 means poor absorption, but too much B6 alone pulls out more metal than the body can handle without the other nutrients.", "timestamp": "111:41", "deeplink": "https://www.youtube.com/watch?v=Ro7dSNHla1E&t=6701s", "t_seconds": 6701}, {"point": "At sustained high doses Jacob theorizes the protocol is a 'fountain of youth' via rejuvenating hormones (e.g. growth hormone) enabled by tolerating multi-gram EGCG; healthier DNA is theorized to improve facial symmetry, hair thickness, eye lightness, and physique.", "timestamp": "113:39", "deeplink": "https://www.youtube.com/watch?v=Ro7dSNHla1E&t=6819s", "t_seconds": 6819}], "protocol": [{"point": "EGCG at roughly 200-300mg per dose is almost universally required to make the high zinc levels tolerable/absorbable.", "timestamp": "16:41", "deeplink": "https://www.youtube.com/watch?v=Ro7dSNHla1E&t=1001s", "t_seconds": 1001}, {"point": "Updated STANDARD dose: 200mg B6, ~500mg biotin (B7), 500mg B5, 7,000-8,000mg vitamin C, and 200-300mg zinc; pure powder is recommended especially for biotin.", "timestamp": "18:03", "deeplink": "https://www.youtube.com/watch?v=Ro7dSNHla1E&t=1083s", "t_seconds": 1083}, {"point": "Don't take all the zinc at once - start with 200mg, wait a bit, then take another 100mg alongside more molybdenum and EGCG.", "timestamp": "18:38", "deeplink": "https://www.youtube.com/watch?v=Ro7dSNHla1E&t=1118s", "t_seconds": 1118}, {"point": "EGCG is dosed at about 2,200-2,400mg per 200mg of zinc; molybdenum about 6-7mg (people who need less molybdenum must play it by ear).", "timestamp": "19:16", "deeplink": "https://www.youtube.com/watch?v=Ro7dSNHla1E&t=1156s", "t_seconds": 1156}, {"point": "A single 'calibration attempt' is roughly 500mg EGCG + 50-100mg zinc + 1-2mg molybdenum, repeated as needed to correct symptoms.", "timestamp": "20:15", "deeplink": "https://www.youtube.com/watch?v=Ro7dSNHla1E&t=1215s", "t_seconds": 1215}, {"point": "You must take ALL seven ingredients; skipping any means you're doing your own experiment and shouldn't blame the protocol. Don't assume you don't need biotin just because you've taken it before - 500mg is required.", "timestamp": "39:56", "deeplink": "https://www.youtube.com/watch?v=Ro7dSNHla1E&t=2396s", "t_seconds": 2396}, {"point": "SYMPTOMS OF LOW MOLYBDENUM / excess copper (take molybdenum): itchy legs/shins and tops of feet, anger, nausea, pain in arms, left-side stomach pain, greasy brittle hair, clammy (cold+sweaty) hands, pale lips.", "timestamp": "41:47", "deeplink": "https://www.youtube.com/watch?v=Ro7dSNHla1E&t=2507s", "t_seconds": 2507}, {"point": "SYMPTOMS OF LOW ZINC (take ~100mg zinc + ~1.5mg molybdenum): red oily fingertips, depression, red lips, nausea, thinning hair in front, gut/right-side pain, lower back pain, loss of appetite, testicular pain, acidic diarrhea or light-colored stool.", "timestamp": "48:18", "deeplink": "https://www.youtube.com/watch?v=Ro7dSNHla1E&t=2898s", "t_seconds": 2898}, {"point": "SYMPTOMS OF LOW EGCG / excess iron (take more EGCG): extreme cold or hot hands/feet, nausea, hair thinning and oily, front/sinus headache (NOT migraine), gassiness, right/left side pain, yellow eyes, dark circles, insomnia, widening/thinning of the mouth lining, itchy scalp, feeling full/bloated, shaky hands, endless diarrhea, constipation.", "timestamp": "55:15", "deeplink": "https://www.youtube.com/watch?v=Ro7dSNHla1E&t=3315s", "t_seconds": 3315}, {"point": "Nausea is the key motivating calibration trigger; if you're not nauseous you generally have no reason to calibrate.", "timestamp": "55:26", "deeplink": "https://www.youtube.com/watch?v=Ro7dSNHla1E&t=3326s", "t_seconds": 3326}, {"point": "Distinguish sinus/front headache (needs MORE EGCG) from a migraine (drilling pain behind the eyes) - EGCG makes migraines far worse; for migraines run a dose WITHOUT EGCG plus higher biotin and molybdenum.", "timestamp": "57:44", "deeplink": "https://www.youtube.com/watch?v=Ro7dSNHla1E&t=3464s", "t_seconds": 3464}, {"point": "Right/left side pains are tricky (can be low EGCG) - if you get them you usually need all three: more zinc, EGCG, and molybdenum. Low-copper individuals (like Owen) need far less molybdenum.", "timestamp": "47:34", "deeplink": "https://www.youtube.com/watch?v=Ro7dSNHla1E&t=2854s", "t_seconds": 2854}, {"point": "Lower back pain / early kidney-stone sign: run the formula WITHOUT EGCG (to clear copper only, leaving iron), taking zinc to free the copper and molybdenum to remove it; no extra C needed since the standard dose already has plenty.", "timestamp": "51:06", "deeplink": "https://www.youtube.com/watch?v=Ro7dSNHla1E&t=3066s", "t_seconds": 3066}, {"point": "Stool guide: pale/hard stool with hard constipation = low vitamin C; dark/thick stool = low biotin or low EGCG (iron too high). Endless diarrhea can be too much vitamin C making you over-acidic.", "timestamp": "69:01", "deeplink": "https://www.youtube.com/watch?v=Ro7dSNHla1E&t=4141s", "t_seconds": 4141}, {"point": "Jacob's current daily intake mirrors the forum standard dose: 200mg B6, 500mg B5, ~500mg biotin, ~7,500mg vitamin C, ~2,600mg EGCG, 6.5mg molybdenum, 200mg zinc, then a second round ~5 min later of 100mg zinc + 2.5-3mg molybdenum + ~650-700mg EGCG.", "timestamp": "70:18", "deeplink": "https://www.youtube.com/watch?v=Ro7dSNHla1E&t=4218s", "t_seconds": 4218}, {"point": "Brand notes: Jacob personally uses Horbaach EGCG (stronger, ~45% standardized, ~275mg/capsule) but recommends Life Extension for newcomers because it's known to work and less intense.", "timestamp": "71:45", "deeplink": "https://www.youtube.com/watch?v=Ro7dSNHla1E&t=4305s", "t_seconds": 4305}, {"point": "Vitamins are much safer to take in excess (water-soluble, pee out) EXCEPT B6; minerals do serious damage if taken alone or in excess without the vitamins to balance/absorb them.", "timestamp": "74:15", "deeplink": "https://www.youtube.com/watch?v=Ro7dSNHla1E&t=4455s", "t_seconds": 4455}, {"point": "'Drip drain' concept: being SLIGHTLY too low on a nutrient lets the process continue while slowly robbing you (gradual onset of anxiety, gut pain, itchy shins, etc.); being SEVERELY too low makes the body abort - nausea and vomiting.", "timestamp": "75:57", "deeplink": "https://www.youtube.com/watch?v=Ro7dSNHla1E&t=4557s", "t_seconds": 4557}, {"point": "The formula strongly suppresses appetite (satiating); a downside if you're underweight, an upside for many. Jacob eats ~one full meal a day and feels he's losing fat/gaining muscle and bone density.", "timestamp": "78:38", "deeplink": "https://www.youtube.com/watch?v=Ro7dSNHla1E&t=4718s", "t_seconds": 4718}, {"point": "Owen's personal variation: full protocol but with extra EGCG (up to 4g on a full dose, ~2g on a half dose) and very little or no molybdenum, dosing molybdenum by his uric-acid levels; he aims to keep uric acid at the TOP of the normal range because uric acid is a potent antioxidant.", "timestamp": "88:56", "deeplink": "https://www.youtube.com/watch?v=Ro7dSNHla1E&t=5336s", "t_seconds": 5336}, {"point": "For newcomers: read forum page one thoroughly before starting; deviating from the exact amounts makes it impossible for Jacob to help troubleshoot because he can't know what's off.", "timestamp": "124:02", "deeplink": "https://www.youtube.com/watch?v=Ro7dSNHla1E&t=7442s", "t_seconds": 7442}, {"point": "Take balance-imbalance into account when interpreting blood tests: leaving yourself imbalanced at the moment of a test can produce a false-positive (e.g. transiently elevated liver enzyme) that normalizes once the balance is corrected and you retest.", "timestamp": "102:07", "deeplink": "https://www.youtube.com/watch?v=Ro7dSNHla1E&t=6127s", "t_seconds": 6127}]}, {"id": "v5", "title": "New Nutrient Formula to Replenish Zinc is the Holy Grail of Health and Longevity? | RP Ep. 102", "url": "https://www.youtube.com/watch?v=20h3vZDi-nI", "ep": 102, "host": "Rejuvenate Podcast", "summary": "This is the foundational, first-ever interview with Jacob ('the real Heisenberg'), the anonymous creator of the HG7 ('Holy Grail 7') protocol, hosted by Owen Robinson of the Rejuvenate Podcast. Jacob recounts how, over roughly 15 years of daily self-experimentation that began as a teenager trying to stop hair loss, he arrived at a 7-nutrient formula (EGCG, molybdenum, zinc, B5, B6, B7/biotin, vitamin C) intended to detox iron and copper and replenish zinc. His central theory is that near-universal zinc deficiency arises because iron and copper occupy zinc's storage/receptor sites, and that removing them in a precise balance and sequence restores hormones, mood, energy, and even reverses aging. He reports dramatic outcomes for himself (mental stability, height, strength, libido, clear urine despite smoking and junk food), his girlfriend (~100 lb weight loss, allergies gone), and his bipolar sister, and the host corroborates with his own before/after lab data (estradiol, lead, uric acid, and B-vitamin status). Both stress this is unproven personal theory, that the whole protocol must be taken together with symptom-based calibration, and that transformation typically takes 3-6 months.", "takeaways": [{"point": "HG7 ('Holy Grail 7') is a 7-nutrient protocol designed to detox iron and copper and replenish zinc, which Jacob and testers are calling a potential 'Holy Grail' of health.", "timestamp": "10:24", "deeplink": "https://www.youtube.com/watch?v=20h3vZDi-nI&t=624s", "t_seconds": 624}, {"point": "The seven components are EGCG (green tea extract), molybdenum, zinc, and the water-soluble vitamins B5, B6, B7/biotin and vitamin C.", "timestamp": "40:22", "deeplink": "https://www.youtube.com/watch?v=20h3vZDi-nI&t=2422s", "t_seconds": 2422}, {"point": "The entire formula was reverse-engineered from ~15 years of daily self-experimentation, not from credentials or existing literature; Jacob is anonymous, uncredentialed, sells nothing and charges nothing.", "timestamp": "04:45", "deeplink": "https://www.youtube.com/watch?v=20h3vZDi-nI&t=285s", "t_seconds": 285}, {"point": "Core theory: almost everyone is some degree of zinc deficient because iron and copper (bound together) occupy zinc's storage and receptor sites.", "timestamp": "36:56", "deeplink": "https://www.youtube.com/watch?v=20h3vZDi-nI&t=2216s", "t_seconds": 2216}, {"point": "The components MUST be taken all together; any element taken in isolation triggers deficiency symptoms in the others.", "timestamp": "26:28", "deeplink": "https://www.youtube.com/watch?v=20h3vZDi-nI&t=1588s", "t_seconds": 1588}, {"point": "The single biggest discovery was biotin - the protocol calls for ~200 mg (roughly 10,000x the RDA), far beyond any commercial supplement.", "timestamp": "51:42", "deeplink": "https://www.youtube.com/watch?v=20h3vZDi-nI&t=3102s", "t_seconds": 3102}, {"point": "Molybdenum is the critical last piece: it produces the uric acid needed to bind and flush free copper out via the kidneys.", "timestamp": "83:19", "deeplink": "https://www.youtube.com/watch?v=20h3vZDi-nI&t=4999s", "t_seconds": 4999}, {"point": "Dosing is calibrated to each person using body symptoms, emotional state, and even how each pure nutrient tastes on the tongue.", "timestamp": "94:36", "deeplink": "https://www.youtube.com/watch?v=20h3vZDi-nI&t=5676s", "t_seconds": 5676}, {"point": "Reported transformations span himself, his girlfriend, family, and forum testers - including his sister's bipolar/paranoia resolving.", "timestamp": "29:16", "deeplink": "https://www.youtube.com/watch?v=20h3vZDi-nI&t=1756s", "t_seconds": 1756}, {"point": "Real 'transformation' effects (facial bone structure, height, strength) reportedly take about 3 to 6 months.", "timestamp": "134:39", "deeplink": "https://www.youtube.com/watch?v=20h3vZDi-nI&t=8079s", "t_seconds": 8079}, {"point": "This is explicitly presented as unproven personal theory; the host started at a quarter dose and urges caution.", "timestamp": "08:51", "deeplink": "https://www.youtube.com/watch?v=20h3vZDi-nI&t=531s", "t_seconds": 531}], "qa": [{"question": "What were you struggling with, and what led you to develop your own formula?", "answer": "It started as a teenager: his brother's bodybuilding got him into testosterone-boosting supplements, which increased hair shedding; tracing that to DHT led to saw palmetto and then to zinc as the 'essential' root cause, kicking off years of self-experimentation.", "timestamp": "12:52", "deeplink": "https://www.youtube.com/watch?v=20h3vZDi-nI&t=772s", "t_seconds": 772}, {"question": "How did the final breakthrough happen?", "answer": "After losing his job and girlfriend he dosed supplements recklessly; a molybdenum megadose put him in hospital with bleeding kidneys, but there he theorized molybdenum was rapidly draining everything else. Taking all the nutrients at once at home felt like 'the lights turned on in my body.'", "timestamp": "18:41", "deeplink": "https://www.youtube.com/watch?v=20h3vZDi-nI&t=1121s", "t_seconds": 1121}, {"question": "What benefits have you and others experienced?", "answer": "His bipolar sister's paranoia/mania subsided; he gained 'remote control' over his emotions, better digestion, clear urine despite smoking/soda/fried food, grew ~2 inches taller, feels smarter, higher libido; his girlfriend's asthma/allergies resolved and she lost weight.", "timestamp": "29:01", "deeplink": "https://www.youtube.com/watch?v=20h3vZDi-nI&t=1741s", "t_seconds": 1741}, {"question": "What exactly is the formula?", "answer": "EGCG (green tea extract), molybdenum (mineral), zinc (mineral), and the water-soluble vitamins B5, B6, B7/biotin and vitamin C.", "timestamp": "40:19", "deeplink": "https://www.youtube.com/watch?v=20h3vZDi-nI&t=2419s", "t_seconds": 2419}, {"question": "Why do you believe iron binds to copper?", "answer": "Whenever he took EGCG (a known iron chelator), copper toxicity symptoms surfaced; and detoxing copper without EGCG surfaced iron toxicity - so the two always appear as a pair. A forum member's blood test showed iron spiking after the formula with low EGCG.", "timestamp": "39:28", "deeplink": "https://www.youtube.com/watch?v=20h3vZDi-nI&t=2368s", "t_seconds": 2368}, {"question": "Isn't a high dose of B6 a neuropathy risk?", "answer": "He experienced that neuropathy himself, but concluded B6 wasn't causing it - the neuropathy was actually deficiency of biotin and vitamin C being burned through as B6 forced the detox cycle without its partners.", "timestamp": "44:02", "deeplink": "https://www.youtube.com/watch?v=20h3vZDi-nI&t=2642s", "t_seconds": 2642}, {"question": "How much biotin does the formula call for?", "answer": "Originally 100 mg, now raised to 200 mg (about 200,000 mcg) because testers kept showing low-biotin symptoms; biotin is the safest component to overdo.", "timestamp": "52:28", "deeplink": "https://www.youtube.com/watch?v=20h3vZDi-nI&t=3148s", "t_seconds": 3148}, {"question": "What are the deficiency symptoms of low biotin?", "answer": "Leg and foot cramps (calcium metabolism), hair follicles feeling clogged, bad constipation and bulky stool, huge anxiety, and vivid bad dreams/nightmares.", "timestamp": "56:50", "deeplink": "https://www.youtube.com/watch?v=20h3vZDi-nI&t=3410s", "t_seconds": 3410}, {"question": "Why aren't the other B vitamins (B1, B2, etc.) necessary?", "answer": "He never found symptoms he couldn't fix with the seven; you get enough of the others from food, and removing excess iron/copper drastically lowers the body's B-vitamin consumption so stores rebuild.", "timestamp": "60:58", "deeplink": "https://www.youtube.com/watch?v=20h3vZDi-nI&t=3658s", "t_seconds": 3658}, {"question": "Why do you call copper 'feminizing'?", "answer": "Because copper directly antagonizes zinc, and zinc blocks the aromatase enzyme that converts hormones into feminine (estrogenic) byproducts - so excess copper lets aromatization run and lowers testosterone.", "timestamp": "67:46", "deeplink": "https://www.youtube.com/watch?v=20h3vZDi-nI&t=4066s", "t_seconds": 4066}, {"question": "Have you considered classic heavy metals like lead or mercury?", "answer": "His focus is iron, copper and zinc (with molybdenum supporting); he theorizes increased zinc retention lets the body clear other heavy metals like cadmium on its own.", "timestamp": "69:04", "deeplink": "https://www.youtube.com/watch?v=20h3vZDi-nI&t=4144s", "t_seconds": 4144}, {"question": "What does molybdenum actually do in the protocol?", "answer": "It gives a quick 'floodgate' of uric acid that latches onto free copper in the blood and flushes it through the urine; without it copper recycles in the kidneys and wreaks havoc. It won't work if iron exceeds copper.", "timestamp": "83:19", "deeplink": "https://www.youtube.com/watch?v=20h3vZDi-nI&t=4999s", "t_seconds": 4999}, {"question": "Could chronically low uric acid indicate copper overload?", "answer": "Yes - Jacob says that theory has weight; the body may be depleting all its uric acid trying to flush excess copper.", "timestamp": "91:15", "deeplink": "https://www.youtube.com/watch?v=20h3vZDi-nI&t=5475s", "t_seconds": 5475}, {"question": "What is 'calibration' and why is it needed?", "answer": "Everyone uses a similar nutrient ratio but starts from a different iron/copper balance, so you adjust zinc, molybdenum, or EGCG based on symptom groups until the standard dose works.", "timestamp": "94:57", "deeplink": "https://www.youtube.com/watch?v=20h3vZDi-nI&t=5697s", "t_seconds": 5697}, {"question": "Is it safe to overdo biotin and molybdenum?", "answer": "Biotin has essentially no known toxicity (MS studies used 300 mg for months); molybdenum is riskier - a small number of hospitalization cases exist - and its uric-acid effect is crucial, so it must be taken with the rest of the formula.", "timestamp": "108:44", "deeplink": "https://www.youtube.com/watch?v=20h3vZDi-nI&t=6524s", "t_seconds": 6524}, {"question": "How does the 'taste test' work?", "answer": "With pure nutrients, if your body needs it the substance tastes almost sweet and your tongue flips it to the back of your throat; if you don't need it, your gag reflex reacts violently.", "timestamp": "112:44", "deeplink": "https://www.youtube.com/watch?v=20h3vZDi-nI&t=6764s", "t_seconds": 6764}, {"question": "What's the difference between depression and apathy in your symptom map?", "answer": "Depression is the brain feeding you actively sad/regretful thoughts (low B6 or zinc); apathy is feeling nothing - 'like a ghost,' neither sad nor happy (low EGCG or zinc).", "timestamp": "122:41", "deeplink": "https://www.youtube.com/watch?v=20h3vZDi-nI&t=7361s", "t_seconds": 7361}, {"question": "Any final thoughts?", "answer": "It's personal theory, not doctor-endorsed; don't ignore your doctor; these nutrients aren't foreign to the body; the worst reaction he's seen on the standard protocol is throwing up; follow the protocol exactly and calibrate.", "timestamp": "131:20", "deeplink": "https://www.youtube.com/watch?v=20h3vZDi-nI&t=7880s", "t_seconds": 7880}], "claims": [{"claim": "Origin story: the whole investigation began in his teens when testosterone-boosting supplements (taken to bodybuild like his older brother) increased hair shedding, which he traced through DHT and saw palmetto down to zinc.", "detail": "", "timestamp": "13:00", "deeplink": "https://www.youtube.com/watch?v=20h3vZDi-nI&t=780s", "t_seconds": 780}, {"claim": "A hormone test at age 20-21 with a naturopath showed estradiol at senior-level highs alongside very high testosterone, prompting the theory that something was blocking his zinc from controlling aromatase.", "detail": "", "timestamp": "15:39", "deeplink": "https://www.youtube.com/watch?v=20h3vZDi-nI&t=939s", "t_seconds": 939}, {"claim": "He found articles stating iron, copper and zinc all compete for absorption, and extrapolated that iron and copper also block zinc's storage sites - the seed of the whole theory.", "detail": "", "timestamp": "16:37", "deeplink": "https://www.youtube.com/watch?v=20h3vZDi-nI&t=997s", "t_seconds": 997}, {"claim": "Taking copper to 'balance' zinc worked for about a day and then made him progressively much worse.", "detail": "", "timestamp": "17:01", "deeplink": "https://www.youtube.com/watch?v=20h3vZDi-nI&t=1021s", "t_seconds": 1021}, {"claim": "He learned to view vitamins as depleting each other rather than 'causing' symptoms (e.g., B6 drains biotin; vitamin C drains molybdenum); molybdenum was the final missing piece.", "detail": "", "timestamp": "18:08", "deeplink": "https://www.youtube.com/watch?v=20h3vZDi-nI&t=1088s", "t_seconds": 1088}, {"claim": "A handful-sized molybdenum megadose put him in the hospital with bleeding kidneys and a 10 mm kidney stone.", "detail": "", "timestamp": "19:31", "deeplink": "https://www.youtube.com/watch?v=20h3vZDi-nI&t=1171s", "t_seconds": 1171}, {"claim": "Taking all the nutrients at once after leaving the hospital felt like 'the lights turned on in my body,' reversing years of near-bipolar emotional swings, daily vomiting, and bathroom bleeding.", "detail": "", "timestamp": "20:01", "deeplink": "https://www.youtube.com/watch?v=20h3vZDi-nI&t=1201s", "t_seconds": 1201}, {"claim": "His bipolar sister, who had speech-altering mania and paranoia, reported her paranoia was 'totally gone' the first day on the protocol; ~6 months in she was no longer close to manic.", "detail": "", "timestamp": "29:16", "deeplink": "https://www.youtube.com/watch?v=20h3vZDi-nI&t=1756s", "t_seconds": 1756}, {"claim": "He reports his urine went from dark brown to consistently clear despite heavy soda, cigarettes and deep-fried food.", "detail": "", "timestamp": "33:25", "deeplink": "https://www.youtube.com/watch?v=20h3vZDi-nI&t=2005s", "t_seconds": 2005}, {"claim": "He says he grew ~2 inches taller between age 30 and 33 (now almost/over 6'2\") on the protocol.", "detail": "", "timestamp": "33:42", "deeplink": "https://www.youtube.com/watch?v=20h3vZDi-nI&t=2022s", "t_seconds": 2022}, {"claim": "Evidence for iron surfacing: a forum member took a blood test ~24h off the formula, then retook it ~2h after a dose with low EGCG, and his iron rose significantly.", "detail": "", "timestamp": "41:34", "deeplink": "https://www.youtube.com/watch?v=20h3vZDi-nI&t=2494s", "t_seconds": 2494}, {"claim": "Host corroboration: his NutrEval test showed 8/10 depletion in B6 and 9/10 in biotin despite taking a B-complex and up to ~5,000 mcg biotin/day (~100x-plus RDA).", "detail": "", "timestamp": "48:13", "deeplink": "https://www.youtube.com/watch?v=20h3vZDi-nI&t=2893s", "t_seconds": 2893}, {"claim": "Host corroboration: a repeat NutrEval ~2.5 weeks after starting the formula was the first he'd ever seen with NO B-vitamin deficiency of any kind, even after stopping his B-complex.", "detail": "", "timestamp": "61:47", "deeplink": "https://www.youtube.com/watch?v=20h3vZDi-nI&t=3707s", "t_seconds": 3707}, {"claim": "Host corroboration: his estradiol dropped to the lowest reading he'd ever recorded roughly 34 days after starting the formula (76 pre-formula down to a new low).", "detail": "", "timestamp": "70:29", "deeplink": "https://www.youtube.com/watch?v=20h3vZDi-nI&t=4229s", "t_seconds": 4229}, {"claim": "Host corroboration: his lead level (ref 0-3) had been 27 when first tested in 2021, stabilized at ~7 for years, and had dropped to ~3.5 two-to-three weeks after starting; EGCG also binds lead and cadmium.", "detail": "", "timestamp": "71:08", "deeplink": "https://www.youtube.com/watch?v=20h3vZDi-nI&t=4268s", "t_seconds": 4268}, {"claim": "Host corroboration: his uric acid had chronically tested too low; on the formula it rose (e.g., ~200 to ~350) then fell back, consistent with molybdenum being consumed to flush copper.", "detail": "", "timestamp": "90:44", "deeplink": "https://www.youtube.com/watch?v=20h3vZDi-nI&t=5444s", "t_seconds": 5444}, {"claim": "Alphalipoic acid taken after months of EGCG (which had chelated iron and left copper unbound) surfaced so much copper it caused kidney-stone-after-kidney-stone - 'the worst experience of my life.'", "detail": "", "timestamp": "77:27", "deeplink": "https://www.youtube.com/watch?v=20h3vZDi-nI&t=4647s", "t_seconds": 4647}, {"claim": "Girlfriend outcome: reportedly lost close to 100 pounds from a clinically obese starting point without major lifestyle change, plus resolved dust allergies/asthma and facial softening.", "detail": "", "timestamp": "126:52", "deeplink": "https://www.youtube.com/watch?v=20h3vZDi-nI&t=7612s", "t_seconds": 7612}, {"claim": "Strength claim: despite little exercise, smoking, and junk food, his push-up count rose from ~15-20 to ~35-40, while gaining upper-body build and staying 200 lb but 2 inches taller.", "detail": "", "timestamp": "128:19", "deeplink": "https://www.youtube.com/watch?v=20h3vZDi-nI&t=7699s", "t_seconds": 7699}, {"claim": "Safety data cited: MS studies used 300 mg/day biotin for months with no negative effects, supporting biotin's very low toxicity.", "detail": "", "timestamp": "108:44", "deeplink": "https://www.youtube.com/watch?v=20h3vZDi-nI&t=6524s", "t_seconds": 6524}, {"claim": "Safety caveat cited by host: a small number of documented cases exist of people overdoing molybdenum and hospitalizing themselves.", "detail": "", "timestamp": "109:44", "deeplink": "https://www.youtube.com/watch?v=20h3vZDi-nI&t=6584s", "t_seconds": 6584}, {"claim": "Host frames the origin/credibility angle: this is the guest's first-ever interview; he's anonymous, uncredentialed, sells nothing, charges nothing, and lives an admittedly unhealthy lifestyle yet claims 3 years of transformation.", "detail": "", "timestamp": "06:04", "deeplink": "https://www.youtube.com/watch?v=20h3vZDi-nI&t=364s", "t_seconds": 364}], "quotes": [{"quote": "I took everything at once and it was like the lights turned on in my body.", "timestamp": "20:01", "deeplink": "https://www.youtube.com/watch?v=20h3vZDi-nI&t=1201s", "t_seconds": 1201}, {"quote": "Imagine the best you've ever felt and think of that as normal, and everything else that doesn't align with that, think of that as a symptom.", "timestamp": "27:33", "deeplink": "https://www.youtube.com/watch?v=20h3vZDi-nI&t=1653s", "t_seconds": 1653}, {"quote": "The biggest Discovery in this formula was the biotin.", "timestamp": "51:42", "deeplink": "https://www.youtube.com/watch?v=20h3vZDi-nI&t=3102s", "t_seconds": 3102}, {"quote": "No one believes it, but you need a ton more.", "timestamp": "51:52", "deeplink": "https://www.youtube.com/watch?v=20h3vZDi-nI&t=3112s", "t_seconds": 3112}, {"quote": "There is no information on the internet that says you need to take 20,000% of your daily recommended dosage.", "timestamp": "45:26", "deeplink": "https://www.youtube.com/watch?v=20h3vZDi-nI&t=2726s", "t_seconds": 2726}, {"quote": "This is all reverse engineered from something that works for me and works for most people.", "timestamp": "26:16", "deeplink": "https://www.youtube.com/watch?v=20h3vZDi-nI&t=1576s", "t_seconds": 1576}, {"quote": "It's much better in your body to be a little bit higher copper than iron than it is to be higher iron than copper.", "timestamp": "81:12", "deeplink": "https://www.youtube.com/watch?v=20h3vZDi-nI&t=4872s", "t_seconds": 4872}, {"quote": "The body is kind of choosing the lesser of two evils by putting you in this poor emotional chronic fatigue state versus surging your blood with these metals and eventually killing you.", "timestamp": "64:14", "deeplink": "https://www.youtube.com/watch?v=20h3vZDi-nI&t=3854s", "t_seconds": 3854}, {"quote": "The more copper toxic you get, the more just crazy and evil you become, the more selfish you become.", "timestamp": "89:21", "deeplink": "https://www.youtube.com/watch?v=20h3vZDi-nI&t=5361s", "t_seconds": 5361}, {"quote": "These nutrients are not foreign to the body; the body knows exactly what to do with them.", "timestamp": "131:44", "deeplink": "https://www.youtube.com/watch?v=20h3vZDi-nI&t=7904s", "t_seconds": 7904}, {"quote": "This is my baby, and I want to make sure that anybody that tries my baby is feeling good on it.", "timestamp": "133:08", "deeplink": "https://www.youtube.com/watch?v=20h3vZDi-nI&t=7988s", "t_seconds": 7988}, {"quote": "I honestly thought... I would live forever with this information while everyone else dies around me.", "timestamp": "133:58", "deeplink": "https://www.youtube.com/watch?v=20h3vZDi-nI&t=8038s", "t_seconds": 8038}, {"quote": "It literally puts you in like a second puberty state.", "timestamp": "125:22", "deeplink": "https://www.youtube.com/watch?v=20h3vZDi-nI&t=7522s", "t_seconds": 7522}], "theory": [{"point": "Almost the entire species is some level of zinc deficient, but it doesn't manifest until 'too late' as chronic fatigue, digestive issues, hair loss, and hormonal problems.", "timestamp": "36:56", "deeplink": "https://www.youtube.com/watch?v=20h3vZDi-nI&t=2216s", "t_seconds": 2216}, {"point": "Zinc is a huge player in the production and balance of the body's hormones, including blocking the aromatase enzyme.", "timestamp": "37:15", "deeplink": "https://www.youtube.com/watch?v=20h3vZDi-nI&t=2235s", "t_seconds": 2235}, {"point": "The body treats iron as rare and hoards it because humans evolved to hunt and bleed regularly; industrialization removed routine bleeding, but our physiology hasn't caught up, so iron accumulates.", "timestamp": "37:35", "deeplink": "https://www.youtube.com/watch?v=20h3vZDi-nI&t=2255s", "t_seconds": 2255}, {"point": "Because surging stored iron through the blood would be dangerous, the body uses copper to store, bind and oxidize iron - and this iron-copper complex sits in zinc's receptor sites.", "timestamp": "38:38", "deeplink": "https://www.youtube.com/watch?v=20h3vZDi-nI&t=2318s", "t_seconds": 2318}, {"point": "Zinc sweats/excretes out very easily (a mainstream fact), so the body preferentially keeps iron and copper and lets zinc go.", "timestamp": "38:56", "deeplink": "https://www.youtube.com/watch?v=20h3vZDi-nI&t=2336s", "t_seconds": 2336}, {"point": "Iron and copper bind together or suppress each other, so chelating iron with EGCG frees copper (surfacing copper symptoms), and removing copper surfaces iron.", "timestamp": "39:28", "deeplink": "https://www.youtube.com/watch?v=20h3vZDi-nI&t=2368s", "t_seconds": 2368}, {"point": "Vitamin B6 pulls iron and copper out of the receptor/storage sites into the bloodstream, evidenced by a strong metallic/coppery taste when taking it.", "timestamp": "42:44", "deeplink": "https://www.youtube.com/watch?v=20h3vZDi-nI&t=2564s", "t_seconds": 2564}, {"point": "High-dose B6 doesn't cause neuropathy per se; it forces the detox cycle and rapidly drains biotin and vitamin C, and it's that deficiency that produces neuropathy.", "timestamp": "44:17", "deeplink": "https://www.youtube.com/watch?v=20h3vZDi-nI&t=2657s", "t_seconds": 2657}, {"point": "Vitamin C acts as a lubricant of the bloodstream and a mobilizer/binder that pushes copper toward the detox sites (but doesn't itself remove the metal).", "timestamp": "72:42", "deeplink": "https://www.youtube.com/watch?v=20h3vZDi-nI&t=4362s", "t_seconds": 4362}, {"point": "EGCG is a 'silent' iron chelator that passes the blood-brain barrier and chelates iron in the tissues without needing it pulled into blood first.", "timestamp": "76:56", "deeplink": "https://www.youtube.com/watch?v=20h3vZDi-nI&t=4616s", "t_seconds": 4616}, {"point": "The body treats EGCG-bound iron as non-recyclable and passes it out through the bile duct, whereas unbound iron is too large to exit via urine and gets recycled.", "timestamp": "83:57", "deeplink": "https://www.youtube.com/watch?v=20h3vZDi-nI&t=5037s", "t_seconds": 5037}, {"point": "Molybdenum produces a quick surge of uric acid that latches onto free copper and flushes it through the urine; it fails if iron exceeds copper.", "timestamp": "83:19", "deeplink": "https://www.youtube.com/watch?v=20h3vZDi-nI&t=4999s", "t_seconds": 4999}, {"point": "Once iron/copper are removed, zinc finally refills the storage sites; you must replenish zinc or the freed copper tries to bind new metal and return to storage.", "timestamp": "82:36", "deeplink": "https://www.youtube.com/watch?v=20h3vZDi-nI&t=4956s", "t_seconds": 4956}, {"point": "Continuously rising zinc puts the body into 'DNA heal mode' via telomerase, theoretically halting or reversing aging.", "timestamp": "84:36", "deeplink": "https://www.youtube.com/watch?v=20h3vZDi-nI&t=5076s", "t_seconds": 5076}, {"point": "Copper is zinc's antagonist, so excess copper is 'feminizing' - it unblocks aromatase and lowers testosterone (why zinc/ZMA are prized in bodybuilding).", "timestamp": "68:29", "deeplink": "https://www.youtube.com/watch?v=20h3vZDi-nI&t=4109s", "t_seconds": 4109}, {"point": "Excess copper and iron constantly drain B vitamins (copper stimulates the adrenals); chronic fatigue is the body's protective 'lesser of two evils' versus flooding the blood with metals.", "timestamp": "63:07", "deeplink": "https://www.youtube.com/watch?v=20h3vZDi-nI&t=3787s", "t_seconds": 3787}, {"point": "Women tend to live longer and skew toward emotional (rather than chronic-fatigue) disorders because menstruation depletes iron while copper stays stuck.", "timestamp": "66:58", "deeplink": "https://www.youtube.com/watch?v=20h3vZDi-nI&t=4018s", "t_seconds": 4018}, {"point": "Copper prevents iron overload, so removing copper alone (e.g., with copper-only chelators) leaves iron unbalanced and triggers iron-overload symptoms like constipation and brain fog.", "timestamp": "114:52", "deeplink": "https://www.youtube.com/watch?v=20h3vZDi-nI&t=6892s", "t_seconds": 6892}, {"point": "Free copper is needed to produce melanin/hair and skin color, which is why detoxing copper alone (without clearing iron first) can turn hair white.", "timestamp": "80:14", "deeplink": "https://www.youtube.com/watch?v=20h3vZDi-nI&t=4814s", "t_seconds": 4814}, {"point": "The body removes these metals in a specific balance and sequence, which is why single-ingredient chelators fail or harm - the whole cycle must run together.", "timestamp": "79:40", "deeplink": "https://www.youtube.com/watch?v=20h3vZDi-nI&t=4780s", "t_seconds": 4780}, {"point": "Modern metal exposure (fortified food, farming, and vaccines containing metals) plus the loss of bleeding leaves humanity 'set up to fail' with accumulating iron and copper.", "timestamp": "65:39", "deeplink": "https://www.youtube.com/watch?v=20h3vZDi-nI&t=3939s", "t_seconds": 3939}, {"point": "It is safer to run slightly higher copper than iron than the reverse, because the body can still use a little free copper for energy whereas high iron cannot be used.", "timestamp": "81:12", "deeplink": "https://www.youtube.com/watch?v=20h3vZDi-nI&t=4872s", "t_seconds": 4872}], "protocol": [{"point": "The full protocol is seven items taken together: EGCG, molybdenum, zinc, B5, B6, B7/biotin, and vitamin C.", "timestamp": "40:22", "deeplink": "https://www.youtube.com/watch?v=20h3vZDi-nI&t=2422s", "t_seconds": 2422}, {"point": "Never take components in isolation - taking any single element alone tends to make you feel bad by draining the others; the whole formula must be taken together.", "timestamp": "54:20", "deeplink": "https://www.youtube.com/watch?v=20h3vZDi-nI&t=3260s", "t_seconds": 3260}, {"point": "Biotin dose is 200 mg (raised from an initial 100 mg) - roughly 200,000 mcg, about 10,000x the ~30 mcg RDA.", "timestamp": "52:28", "deeplink": "https://www.youtube.com/watch?v=20h3vZDi-nI&t=3148s", "t_seconds": 3148}, {"point": "Use pure biotin powder rather than pills, since no supplement provides enough and it's cost-effective; biotin is the safest component to overdo.", "timestamp": "52:08", "deeplink": "https://www.youtube.com/watch?v=20h3vZDi-nI&t=3128s", "t_seconds": 3128}, {"point": "Biotin can be taken as pure powder under the tongue - it dissolves fast when the body needs it and just clumps when it doesn't.", "timestamp": "58:49", "deeplink": "https://www.youtube.com/watch?v=20h3vZDi-nI&t=3529s", "t_seconds": 3529}, {"point": "B5 is about 500 mg (roughly double what's strictly needed) and is uncontroversial and commonly available at that amount.", "timestamp": "56:29", "deeplink": "https://www.youtube.com/watch?v=20h3vZDi-nI&t=3389s", "t_seconds": 3389}, {"point": "Molybdenum needs vary widely and are almost always low; testers have raised it from ~500 mcg to ~3,000 mcg and up as feedback dictates.", "timestamp": "54:55", "deeplink": "https://www.youtube.com/watch?v=20h3vZDi-nI&t=3295s", "t_seconds": 3295}, {"point": "Typical zinc dose is ~100 mg, which pairs with roughly 750 mg EGCG (the host used ~660 mg EGCG with 100 mg zinc due to his low-iron history).", "timestamp": "103:16", "deeplink": "https://www.youtube.com/watch?v=20h3vZDi-nI&t=6196s", "t_seconds": 6196}, {"point": "EGCG must be a standardized extract (about 45-50%); the Life Extension brand is confirmed effective, and brand quality is noticeably variable.", "timestamp": "76:00", "deeplink": "https://www.youtube.com/watch?v=20h3vZDi-nI&t=4560s", "t_seconds": 4560}, {"point": "Vitamin C is around 5 grams (5,000 mg), a level far below historical high-dose vitamin C use (e.g., Linus Pauling).", "timestamp": "75:06", "deeplink": "https://www.youtube.com/watch?v=20h3vZDi-nI&t=4506s", "t_seconds": 4506}, {"point": "The B6 amount is not extreme - comparable to a single daily dose of a Life Extension B-complex.", "timestamp": "43:37", "deeplink": "https://www.youtube.com/watch?v=20h3vZDi-nI&t=2617s", "t_seconds": 2617}, {"point": "Always keep both zinc and EGCG on hand when taking molybdenum, and pair molybdenum with zinc/EGCG, because those trigger copper release that needs the uric-acid surge.", "timestamp": "100:34", "deeplink": "https://www.youtube.com/watch?v=20h3vZDi-nI&t=6034s", "t_seconds": 6034}, {"point": "Calibration uses three symptom groups mapping to: too much zinc, not enough zinc, or not enough molybdenum - adjust molybdenum, zinc, and EGCG (vitamins sit water-soluble in the stomach until needed).", "timestamp": "96:37", "deeplink": "https://www.youtube.com/watch?v=20h3vZDi-nI&t=5797s", "t_seconds": 5797}, {"point": "Symptom checker #1 (pale lips, itchy legs, anger, nausea, greasy hair, left-side pain, cold clammy hands) = need more molybdenum.", "timestamp": "99:28", "deeplink": "https://www.youtube.com/watch?v=20h3vZDi-nI&t=5968s", "t_seconds": 5968}, {"point": "Symptom checker #2 (reddish lips, itchy feet/rectum, depression, right-side/testicular or gut pain, migraine, coppery taste) = need zinc (plus molybdenum).", "timestamp": "100:31", "deeplink": "https://www.youtube.com/watch?v=20h3vZDi-nI&t=6031s", "t_seconds": 6031}, {"point": "Symptom checker #3 (headache, warm hands/feet, purple nail beds, bloating, constipation, wheezing, oily hair, bleeding gums, yellow eyes) = too much iron; take more EGCG (with molybdenum). Do NOT take EGCG during a migraine.", "timestamp": "102:02", "deeplink": "https://www.youtube.com/watch?v=20h3vZDi-nI&t=6122s", "t_seconds": 6122}, {"point": "Emotional calibration: depression = low B6 or zinc; anxiety = low biotin or molybdenum; anger = low B5, vitamin C, or molybdenum; apathy = low EGCG or zinc.", "timestamp": "118:47", "deeplink": "https://www.youtube.com/watch?v=20h3vZDi-nI&t=7127s", "t_seconds": 7127}, {"point": "Taste-test calibration: a needed pure nutrient tastes sweet and is swallowed easily (even sour vitamin C tastes sweet when needed), while an unneeded one triggers gag reflex.", "timestamp": "112:44", "deeplink": "https://www.youtube.com/watch?v=20h3vZDi-nI&t=6764s", "t_seconds": 6764}, {"point": "After a couple of successful calibrations the standard dose should work; going too low on anything produces symptoms within about two doses.", "timestamp": "97:37", "deeplink": "https://www.youtube.com/watch?v=20h3vZDi-nI&t=5857s", "t_seconds": 5857}, {"point": "Worst reaction seen on the standard protocol is simply vomiting once; bad symptoms mainly come from deviating (e.g., skimping biotin or taking a fraction of the dose).", "timestamp": "131:52", "deeplink": "https://www.youtube.com/watch?v=20h3vZDi-nI&t=7912s", "t_seconds": 7912}, {"point": "Timeline: some feel better mentally/digestively early, but real transformation (facial structure, height) reportedly emerges around 3 to 6 months.", "timestamp": "134:39", "deeplink": "https://www.youtube.com/watch?v=20h3vZDi-nI&t=8079s", "t_seconds": 8079}]}]}, "success": {"stories": [{"author": "chalceconist", "outcome": "positive", "duration": "~1.5 years", "summary": "Says formula helped a lot fixing zinc deficiency and mediating copper toxicity, still progressing. Doing 1.33x the ratios 1-2x/day. Blindspot was Moly Glycinate ov
